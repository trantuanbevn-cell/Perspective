<style>
:root {
  --navy:   #1F3864;
  --navy2:  #2E4A7A;
  --navy3:  #4472C4;
  --gold:   #FFC000;
  --gold2:  #FFD966;
  --orange: #ED7D31;
  --gray1:  #F2F2F2;
  --gray2:  #D9D9D9;
  --gray3:  #BFBFBF;
  --gray4:  #595959;
  --dark:   #1A1A1A;
  --new-bg: #E2EFDA; --new-tx: #375623;
  --rev-bg: #FFF2CC; --rev-tx: #7F6000;
  --r: 4px; --r2: 6px;
  /* theme aliases */
  --ex-navy:   var(--navy);
  --ex-navy2:  var(--navy2);
  --ex-navy3:  var(--navy3);
  --ex-gold:   var(--gold);
  --ex-gold2:  var(--gold2);
  --ex-orange: var(--orange);
  --ex-gray1:  var(--gray1);
  --ex-gray2:  var(--gray2);
  --ex-gray3:  var(--gray3);
  --ex-gray4:  var(--gray4);
  --ex-dark:   var(--dark);
  --new-bg:    #E2EFDA; --new-text: #375623;
  --rev-bg:    #FFF2CC; --rev-text: #7F6000;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Be Vietnam Pro','Noto Sans JP',sans-serif;font-size:13px;background:#EAECF0;color:var(--dark);min-height:100vh}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:var(--gray3);border-radius:3px}

/* HEADER */
.header{
  background:var(--navy);height:60px;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;position:sticky;top:0;z-index:300;
  border-bottom:3px solid var(--gold);box-shadow:0 2px 12px rgba(0,0,0,.3);
  gap:12px;
}
.hdr-logo{display:flex;align-items:center;flex-shrink:0}
.hdr-logo img{height:46px;width:auto;object-fit:contain;filter:brightness(0) invert(1);display:block}
.hdr-nav{display:flex;gap:3px;flex-shrink:0}
.nav-btn{padding:6px 12px;border-radius:var(--r);border:1px solid rgba(255,255,255,.2);background:transparent;color:rgba(255,255,255,.75);font-size:12px;font-family:inherit;cursor:pointer;transition:all .15s;white-space:nowrap}
.nav-btn:hover{color:#fff;background:rgba(255,255,255,.1)}
.nav-btn.active{background:var(--gold);color:var(--navy);border-color:var(--gold);font-weight:600}
.hdr-right{display:flex;gap:6px;align-items:center;flex-shrink:0}

/* MONTH STRIP */
.month-strip{background:var(--navy2);display:flex;align-items:stretch;padding:0 14px;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid rgba(255,255,255,.1)}
.month-strip::-webkit-scrollbar{display:none}
.mtab{padding:8px 16px;font-size:12px;font-weight:500;color:rgba(255,255,255,.5);cursor:pointer;border:none;border-bottom:2px solid transparent;margin-bottom:-1px;background:none;font-family:inherit;transition:all .15s;white-space:nowrap}
.mtab:hover{color:rgba(255,255,255,.85)}
.mtab.active{color:var(--gold);border-bottom-color:var(--gold)}
.mtab-add{color:var(--gold2);font-size:20px;padding:2px 14px;line-height:1}

/* LAYOUT */
#pageMain{display:flex;height:calc(100vh - 93px)}
#pageDashboard,#pageStaff,#pageSettings{display:none;padding:18px 22px;overflow-y:auto;height:calc(100vh - 93px)}

/* SIDEBAR */
.sidebar{width:252px;min-width:210px;background:#fff;border-right:1px solid var(--gray2);display:flex;flex-direction:column;overflow:hidden}
.sidebar-hd{padding:10px 14px;background:var(--navy);color:#fff;font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;display:flex;align-items:center;justify-content:space-between}
.sidebar-hd span{background:var(--gold);color:var(--navy);border-radius:99px;padding:1px 8px;font-size:10px}
.pj-list{flex:1;overflow-y:auto}
.pj-item{padding:9px 13px;cursor:pointer;border-left:3px solid transparent;border-bottom:1px solid var(--gray1);transition:all .12s}
.pj-item:hover{background:var(--gray1)}
.pj-item.active{border-left-color:var(--gold);background:#FFFBEE}
.pj-title{font-weight:600;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pj-sub{font-size:10px;color:var(--gray4);margin-top:3px;display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.sidebar-ft{padding:8px 10px;border-top:1px solid var(--gray2);background:var(--gray1)}

/* CONTENT */
.content{flex:1;overflow-y:auto;background:#EAECF0}
.content-inner{padding:14px 18px}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:4px;padding:6px 12px;border-radius:var(--r);border:1px solid var(--gray2);background:#fff;color:var(--dark);font-family:inherit;font-size:12px;cursor:pointer;transition:all .12s;white-space:nowrap;line-height:1.4}
.btn:hover{background:var(--gray1)}
.btn-primary{background:var(--navy);color:#fff;border-color:var(--navy)}
.btn-primary:hover{background:var(--navy2)}
.btn-gold{background:var(--gold);color:var(--navy);border-color:var(--gold);font-weight:600}
.btn-gold:hover{background:var(--gold2)}
.btn-sm{padding:4px 10px;font-size:11px}
.btn-xs{padding:2px 7px;font-size:10px}
.btn-danger{color:#c00}
.btn-danger:hover{background:#fff0f0;border-color:#fcc}
.btn-ghost{background:transparent;border-color:transparent}
.btn-ghost:hover{background:var(--gray1);border-color:var(--gray2)}
.btn-full{width:100%;justify-content:center}
.btn-new{background:var(--new-bg);color:var(--new-tx);border-color:#a9d18e}
.btn-new:hover{background:#d0e9c4}
.btn-rev{background:var(--rev-bg);color:var(--rev-tx);border-color:#ffd966}
.btn-rev:hover{background:#ffe59a}

/* BADGES */
.badge{display:inline-flex;align-items:center;padding:1px 7px;border-radius:99px;font-size:10px;font-weight:600;white-space:nowrap}
.b-osaka{background:#dbeafe;color:#1d4ed8}
.b-tokyo{background:#fce7f3;color:#9d174d}
.chip{display:inline-flex;align-items:center;padding:2px 8px;border-radius:99px;font-size:10px;font-weight:600}
.chip-new{background:var(--new-bg);color:var(--new-tx)}
.chip-gold{background:var(--rev-bg);color:var(--rev-tx)}
.chip-navy{background:var(--navy);color:#fff}

/* SYNC STATUS */
.sync-btn{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:99px;font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;border:1px solid rgba(255,255,255,.25);color:rgba(255,255,255,.8);background:transparent;font-family:inherit}
.sync-btn:hover{background:rgba(255,255,255,.1)}
.sync-btn .dot{width:7px;height:7px;border-radius:50%;background:#888;flex-shrink:0}
.sync-btn.synced .dot{background:#4ade80;box-shadow:0 0 5px #4ade80}
.sync-btn.error .dot{background:#f87171}
.sync-btn.syncing .dot{background:var(--gold);animation:pulse .8s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* CARD */
.card{background:#fff;border:1px solid var(--gray2);border-radius:var(--r2);margin-bottom:12px;overflow:hidden}
.card-hd{background:var(--navy);color:#fff;padding:9px 14px;font-size:12px;font-weight:600;display:flex;align-items:center;justify-content:space-between;gap:8px;border-bottom:2px solid var(--gold)}
.card-hd-title{display:flex;align-items:center;gap:7px}
.card-body{padding:12px 14px}

/* HERO STATS */
.hero-row{display:grid;grid-template-columns:1fr 1fr 1fr 1fr auto;gap:10px;margin-bottom:12px}
.hero-box{background:#fff;border:1px solid var(--gray2);border-radius:var(--r2);padding:13px 15px;border-top:4px solid var(--gray3)}
.hero-box.green{border-top-color:#70AD47}
.hero-box.gold{border-top-color:var(--gold)}
.hero-box.navy{border-top-color:var(--navy);background:var(--navy);color:#fff}
.hero-box.orange{border-top-color:var(--orange)}
.hero-num{font-size:38px;font-weight:700;line-height:1}
.hero-box.green .hero-num{color:var(--new-tx)}
.hero-box.gold .hero-num{color:var(--rev-tx)}
.hero-box.navy .hero-num{color:var(--gold)}
.hero-lbl{font-size:11px;color:var(--gray4);margin-top:3px;text-transform:uppercase;letter-spacing:.05em;font-weight:500}
.hero-box.navy .hero-lbl{color:rgba(255,255,255,.6)}
.hero-jp{font-size:10px;color:var(--gray3);margin-top:1px}
.progress-track{height:5px;background:var(--gray2);border-radius:3px;overflow:hidden;margin-top:8px}
.progress-fill{height:100%;border-radius:3px;transition:width .4s}
.progress-fill.green{background:#70AD47}
.progress-fill.gold{background:var(--gold)}
.progress-label{font-size:10px;color:var(--gray4);margin-top:3px;display:flex;justify-content:space-between}
/* Target box */
.target-box{background:var(--navy);color:#fff;border-radius:var(--r2);padding:13px 15px;display:flex;flex-direction:column;gap:8px;min-width:170px}
.target-box .tgt-title{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--gold2);font-weight:600}
.target-row{display:flex;align-items:center;justify-content:space-between;gap:8px}
.target-row label{font-size:11px;color:rgba(255,255,255,.7)}
.target-input{width:64px;padding:4px 7px;text-align:center;border:1px solid rgba(255,255,255,.3);border-radius:var(--r);background:rgba(255,255,255,.1);color:#fff;font-family:inherit;font-size:14px;font-weight:700}
.target-input:focus{outline:none;border-color:var(--gold)}

/* RENDER TABLE — hàng ngang */
.rtbl{width:100%;border-collapse:collapse;font-size:12px}
.rtbl thead th{background:var(--navy);color:#fff;padding:7px 9px;text-align:left;font-size:10px;letter-spacing:.06em;text-transform:uppercase;white-space:nowrap;border-right:1px solid rgba(255,255,255,.1)}
.rtbl tbody td{padding:6px 8px;border-bottom:1px solid var(--gray1);vertical-align:middle;border-right:1px solid #f5f5f5}
.rtbl tbody tr:hover td{background:#FFFBEE}
.rtbl tfoot td{font-weight:700;background:var(--rev-bg)!important;border-top:2px solid var(--navy);padding:7px 9px}
/* Group header row */
.grp-hd td{background:var(--navy2)!important;color:#fff;padding:6px 9px;font-weight:600;font-size:11px}
/* Row bg by status */
.row-new td{background:#f8fff5}
.row-rev td{background:#fffdf0}

/* Inline inputs in table */
.tbl-input{width:100%;padding:4px 7px;border:1px solid var(--gray2);border-radius:var(--r);font-family:inherit;font-size:12px;background:#fff}
.tbl-input:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 2px rgba(255,192,0,.15)}
.tbl-input-dark{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);border-radius:var(--r);padding:4px 8px;color:#fff;font-family:inherit;font-size:12px;font-weight:600;width:100%;min-width:0}
.tbl-input-dark:focus{outline:none;border-color:var(--gold)}
.qty-inp{width:54px;padding:4px 5px;text-align:center;border:1px solid var(--gray2);border-radius:var(--r);font-family:inherit;font-size:13px;font-weight:700;background:#fff}
.qty-inp:focus{outline:none;border-color:var(--gold)}
.sel-sm{padding:4px 8px;border:1px solid var(--gray2);border-radius:var(--r);font-family:inherit;font-size:12px;background:#fff;cursor:pointer;width:100%}
.sel-sm:focus{outline:none;border-color:var(--gold)}
/* Status toggle */
.st-toggle{display:inline-flex;border:1px solid var(--gray2);border-radius:var(--r);overflow:hidden}
.st-opt{padding:3px 9px;font-size:11px;font-weight:600;cursor:pointer;border:none;background:#fff;font-family:inherit;transition:all .1s;color:var(--gray3)}
.st-opt.new.on{background:var(--new-bg);color:var(--new-tx)}
.st-opt.rev.on{background:var(--rev-bg);color:var(--rev-tx)}

/* INFO GRID */
.info-grid{display:grid;gap:10px}
.info-grid.c2{grid-template-columns:1fr 1fr}
.info-grid.c3{grid-template-columns:1fr 1fr 1fr}
.info-grid.c4{grid-template-columns:1fr 1fr 1fr 1fr}
.field{display:flex;flex-direction:column;gap:3px}
.field label{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--gray4);font-weight:600}
.field input,.field select,.field textarea{padding:6px 9px;border:1px solid var(--gray2);border-radius:var(--r);font-family:inherit;font-size:12px;background:#fff;transition:border-color .12s}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 2px rgba(255,192,0,.15)}
.field textarea{resize:vertical;min-height:64px}

/* PHOTOS */
.photos-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px}
.photo-slot{aspect-ratio:4/3;border:2px dashed var(--gray2);border-radius:var(--r2);overflow:hidden;position:relative;cursor:pointer;background:var(--gray1);display:flex;flex-direction:column;align-items:center;justify-content:center;transition:border-color .12s}
.photo-slot:hover{border-color:var(--gold)}
.photo-slot.filled{border-style:solid;border-color:var(--gray2)}
.photo-slot img{width:100%;height:100%;object-fit:cover}
.photo-slot .ph-ico{font-size:20px;color:var(--gray3)}
.photo-slot .ph-txt{font-size:10px;color:var(--gray3);margin-top:3px}
.photo-slot .ph-del{position:absolute;top:3px;right:3px;background:rgba(0,0,0,.6);color:#fff;border:none;border-radius:50%;width:20px;height:20px;font-size:12px;cursor:pointer;display:none;align-items:center;justify-content:center;z-index:2}
.photo-slot:hover .ph-del{display:flex}
.photo-slot input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;z-index:1}

/* STAFF PERF BARS */
.perf-bar{margin-bottom:4px}
.perf-bar-row{display:flex;justify-content:space-between;font-size:11px;margin-bottom:2px}
.perf-bar-track{height:4px;background:rgba(255,255,255,.15);border-radius:2px;display:flex;overflow:hidden}
.perf-bar-new{background:#70AD47;border-radius:2px}
.perf-bar-rev{background:var(--gold);border-radius:2px}

/* MONTH SUMMARY TABLE */
.sum-tbl{width:100%;border-collapse:collapse;font-size:12px}
.sum-tbl th{background:var(--navy);color:#fff;padding:7px 9px;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.06em}
.sum-tbl td{padding:8px 9px;border-bottom:1px solid var(--gray1)}
.sum-tbl tr:hover td{background:#FFFBEE;cursor:pointer}
.sum-tbl .tr-total td{font-weight:700;background:var(--rev-bg)!important;border-top:2px solid var(--navy)}
.num-c{text-align:center;font-weight:600}

/* PERF TABLE */
.perf-tbl{width:100%;border-collapse:collapse;font-size:12px}
.perf-tbl th{background:var(--navy);color:#fff;padding:7px 10px;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.06em}
.perf-tbl td{padding:8px 10px;border-bottom:1px solid var(--gray1)}
.perf-tbl tr:hover td{background:#FFFBEE}
.perf-tbl .total-row td{font-weight:700;background:var(--gray1)!important;border-top:2px solid var(--navy)}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;z-index:999}
.modal{background:#fff;border-radius:var(--r2);padding:22px 26px;max-width:560px;width:92%;box-shadow:0 24px 64px rgba(0,0,0,.25);max-height:90vh;overflow-y:auto}
.modal h3{font-size:15px;font-weight:700;margin-bottom:16px;color:var(--navy);border-left:3px solid var(--gold);padding-left:10px}
.modal-ft{display:flex;justify-content:flex-end;gap:8px;margin-top:18px;flex-wrap:wrap}

/* TOAST */
.toast{position:fixed;bottom:22px;right:22px;background:var(--navy);color:#fff;padding:10px 18px;border-radius:var(--r2);font-size:12px;border-left:4px solid var(--gold);z-index:9999;box-shadow:0 8px 24px rgba(0,0,0,.2);animation:tsin .2s ease}
@keyframes tsin{from{transform:translateY(8px);opacity:0}to{transform:translateY(0);opacity:1}}

/* NOTE TEXTAREA */
.note-ta{width:100%;padding:9px 11px;border:1px solid var(--gray2);border-radius:var(--r);font-family:inherit;font-size:12px;resize:vertical;min-height:72px;background:#FFFDF5}
.note-ta:focus{outline:none;border-color:var(--gold)}

/* REPORT OVERLAY */
.rpt-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:2000;display:flex;align-items:center;justify-content:center}
.rpt-container{background:#fff;width:860px;max-width:96vw;max-height:92vh;border-radius:8px;display:flex;flex-direction:column;box-shadow:0 24px 80px rgba(0,0,0,.4);overflow:hidden}
.rpt-header{background:var(--navy);color:#fff;padding:12px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:3px solid var(--gold);flex-shrink:0}
.rpt-header h2{font-size:14px;font-weight:700;display:flex;align-items:center;gap:8px}
.rpt-actions{display:flex;gap:8px}
.rpt-body{flex:1;overflow-y:auto}

/* VIEW ONLY BANNER */
#viewBanner{position:fixed;bottom:0;left:0;right:0;background:#7F6000;color:#FFF2CC;text-align:center;padding:7px;font-size:12px;font-weight:600;z-index:500;letter-spacing:.04em}

/* REPORT DOC STYLES */
.report-doc{padding:36px 44px;font-family:'Be Vietnam Pro','Noto Sans JP',sans-serif;font-size:12px;color:#1a1a1a;background:#fff}
.report-doc .doc-hd{display:flex;justify-content:space-between;align-items:flex-start;padding-bottom:14px;border-bottom:2px solid #1F3864;margin-bottom:20px}
.report-doc .doc-logo{display:flex;align-items:center;gap:11px}
.report-doc .doc-logo-mark{width:40px;height:40px;background:#1F3864;border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;color:#FFC000}
.report-doc .doc-title-main{font-size:17px;font-weight:700;color:#1F3864;line-height:1.2}
.report-doc .doc-title-sub{font-size:11px;color:#595959;margin-top:2px}
.report-doc .doc-meta{text-align:right;font-size:11px;color:#595959;line-height:1.9}
.report-doc .doc-meta strong{color:#1F3864}
.report-doc .sec-title{font-size:13px;font-weight:700;color:#1F3864;border-left:4px solid #FFC000;padding-left:9px;margin:20px 0 10px}
.report-doc .kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:11px;margin-bottom:20px}
.report-doc .kpi-box{border:1px solid #D9D9D9;border-radius:6px;padding:12px;border-top:3px solid #1F3864;text-align:center}
.report-doc .kpi-num{font-size:28px;font-weight:700;color:#1F3864;line-height:1}
.report-doc .kpi-box.gold{border-top-color:#FFC000}.report-doc .kpi-box.gold .kpi-num{color:#7F6000}
.report-doc .kpi-box.green{border-top-color:#70AD47}.report-doc .kpi-box.green .kpi-num{color:#375623}
.report-doc .kpi-box.orange{border-top-color:#ED7D31}.report-doc .kpi-box.orange .kpi-num{color:#7F3500}
.report-doc .kpi-lbl{font-size:10px;color:#595959;margin-top:4px;text-transform:uppercase;letter-spacing:.05em}
.report-doc table{width:100%;border-collapse:collapse;font-size:11px;margin-bottom:14px}
.report-doc table th{background:#1F3864;color:#fff;padding:7px 9px;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.06em}
.report-doc table td{padding:7px 9px;border-bottom:1px solid #F2F2F2}
.report-doc table tr:nth-child(even) td{background:#F9F9F9}
.report-doc table tfoot td{font-weight:700;background:#FFF2CC!important;border-top:2px solid #1F3864}
.report-doc .c-new{color:#375623;font-weight:600;text-align:center}
.report-doc .c-rev{color:#7F6000;font-weight:600;text-align:center}
.report-doc .c-tot{font-weight:700;text-align:center}
.report-doc .c-ot{color:#C55A11;font-weight:600;text-align:center}
.report-doc .b-osaka{background:#dbeafe;color:#1d4ed8;padding:1px 7px;border-radius:99px;font-size:10px;font-weight:600}
.report-doc .b-tokyo{background:#fce7f3;color:#9d174d;padding:1px 7px;border-radius:99px;font-size:10px;font-weight:600}
.report-doc .pj-block{margin-bottom:16px;border:1px solid #E8E8E8;border-radius:6px;overflow:hidden}
.report-doc .pj-block-hd{background:#EEF3FB;padding:8px 13px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #D9D9D9}
.report-doc .pj-block-hd .pj-name{font-weight:700;font-size:12px;color:#1F3864}
.report-doc .pj-block-hd .pj-chips{display:flex;gap:5px;align-items:center}
.report-doc .pj-block-hd .chip-new{background:#E2EFDA;color:#375623;padding:2px 7px;border-radius:99px;font-size:10px;font-weight:600}
.report-doc .pj-block-hd .chip-rev{background:#FFF2CC;color:#7F6000;padding:2px 7px;border-radius:99px;font-size:10px;font-weight:600}
.report-doc .pj-block-hd .chip-tot{background:#1F3864;color:#fff;padding:2px 7px;border-radius:99px;font-size:10px;font-weight:600}
.report-doc .ot-staff-block{margin-bottom:18px}
.report-doc .ot-staff-hd{background:#1F3864;color:#fff;padding:8px 13px;border-radius:6px 6px 0 0;display:flex;justify-content:space-between;align-items:center}
.report-doc .ot-staff-hd .sname{font-size:13px;font-weight:700}
.report-doc .ot-staff-hd .stotal{color:#FFC000;font-size:13px;font-weight:700}
.report-doc .doc-footer{margin-top:32px;padding-top:11px;border-top:1px solid #D9D9D9;display:flex;justify-content:space-between;font-size:10px;color:#BFBFBF}
.report-doc .sign-section{display:grid;grid-template-columns:1fr 1fr;gap:36px;margin-top:26px}
.report-doc .sign-box{border-top:1px solid #595959;padding-top:9px;text-align:center;font-size:11px;color:#595959}

/* THEME PICKERS */
.color-picker-row{display:flex;align-items:center;gap:9px;margin-bottom:10px}
.color-picker-row label{font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--gray4);font-weight:600;min-width:170px}
.color-picker-row input[type=color]{width:38px;height:30px;padding:2px;border:1px solid var(--gray2);border-radius:var(--r);cursor:pointer;background:#fff}
.theme-swatch{width:24px;height:24px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all .15s;flex-shrink:0}
.theme-swatch.active{border-color:#fff;box-shadow:0 0 0 2px var(--navy)}

/* SETTINGS TAGS */
.tag-cloud{display:flex;flex-wrap:wrap;gap:6px}
.tag-edit{display:inline-flex;align-items:center;gap:4px;background:var(--gray1);border:1px solid var(--gray2);border-radius:99px;padding:3px 10px}
.tag-edit input{border:none;background:transparent;font-family:inherit;font-size:11px;outline:none}
.tag-del{cursor:pointer;color:var(--gray3);font-size:14px;line-height:1}
.tag-del:hover{color:#c00}

/* OT LOG ENTRY */
.ot-entry{display:flex;align-items:center;gap:7px;padding:5px 0;border-bottom:1px solid var(--gray1);font-size:12px}
.ot-entry:last-child{border-bottom:none}

/* DASHBOARD */
.dash-grid{display:grid;gap:12px}
.dash-grid.c2{grid-template-columns:1fr 1fr}
.dash-grid.c3{grid-template-columns:1fr 1fr 1fr}
.chart-box{background:#fff;border:1px solid var(--gray2);border-radius:var(--r2);padding:14px}
.chart-box h4{font-size:12px;font-weight:600;color:var(--navy);margin-bottom:10px;text-transform:uppercase;letter-spacing:.06em;border-left:3px solid var(--gold);padding-left:7px}
</style>
</head>
<body>

<!-- HEADER -->

<script>

const SK = 'phoicanh_v3';

function freshData() {
  const now = new Date();
  const mid = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  return {
    settings: {
      staffList: ['トゥアン','ヒエン','L.フォン','ハー','ズエン','タイン','M.フオン'],
      typeList: ['外観パース','アプローチパース','エントランスパース','鳥瞰パース',
        'ラウンジパース','スタイルラウンジ','内観パース','大浴場パース',
        '和室パース','浴室パース','集会室パース','レストランパース','着色立面作成',
        'スカイラウンジ','中庭パース','風除室パース','バルコニーパース','住戸内パース'],
      contactList: ['ソン','フン','ニャー','TT.チエン','N.ビン','ニュン','カイン','Inamura','Ogura','Okuda'],
      sync: {}
    },
    months: { [mid]: { projects: [], targetNew: 0, targetRev: 0 } },
    activeMonth: mid
  };
}

let D = (() => {
  try { const r = localStorage.getItem(SK); if(r) return JSON.parse(r); } catch(e){}
  return freshData();
})();

function save() {
  if (window._viewOnly) return;
  localStorage.setItem(SK, JSON.stringify(D));
  triggerAutoSync();
}

let activePjId = null;
let activePage = 'main';

function gid() { return Date.now().toString(36)+Math.random().toString(36).slice(2,5); }
function x(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function toast(msg, dur=2800) {
  const t = document.getElementById('toastEl');
  t.textContent = msg; t.style.display='block';
  clearTimeout(t._t); t._t = setTimeout(()=>t.style.display='none', dur);
}

function setSyncStatus(state, label) {
  const btn=document.getElementById('syncBtn'), lbl=document.getElementById('syncLabel');
  if(!btn) return;
  btn.className=`sync-btn ${state}`;
  lbl.textContent=label;
}

function monthLabel(mid) {
  const [y,m]=mid.split('-');
  return `T${parseInt(m)}/${y}`;
}

function curMonth() { return D.months[D.activeMonth]||{projects:[],targetNew:0,targetRev:0}; }
function curProjects() { return curMonth().projects||[]; }
function getPj(id) { return curProjects().find(p=>p.id===id); }

function totalNew(p) {
  const a=(p.records||[]).filter(r=>r.status==='new').reduce((s,r)=>s+(r.qty||0),0);
  const b=(p.groups||[]).flatMap(g=>g.rows||[]).filter(r=>r.status==='new').reduce((s,r)=>s+(r.qty||0),0);
  return a+b;
}
function totalRev(p) {
  const a=(p.records||[]).filter(r=>r.status==='rev').reduce((s,r)=>s+(r.qty||0),0);
  const b=(p.groups||[]).flatMap(g=>g.rows||[]).filter(r=>r.status==='rev').reduce((s,r)=>s+(r.qty||0),0);
  return a+b;
}
function totalOT(p) {
  const a=(p.otLog||[]).reduce((s,e)=>s+(e.hours||0),0);
  const b=(p.groups||[]).flatMap(g=>g.rows||[]).reduce((s,r)=>s+(r.ot||0),0);
  return a+b;
}

/* PAGE NAV */
function showPage(pg) {
  activePage=pg;
  ['main','dashboard','staff','settings'].forEach(p=>{
    const el=document.getElementById('page'+p.charAt(0).toUpperCase()+p.slice(1));
    if(el) el.style.display = p===pg?(p==='main'?'flex':'block'):'none';
    const btn=document.getElementById('nav'+p.charAt(0).toUpperCase()+p.slice(1));
    if(btn) btn.classList.toggle('active',p===pg);
  });
  if(pg==='dashboard') renderDashboard();
  else if(pg==='staff') renderStaffPage();
  else if(pg==='settings') renderSettings();
}

/* MONTH STRIP */
function renderMonthStrip() {
  const strip=document.getElementById('monthStrip');
  const months=Object.keys(D.months).sort();
  strip.innerHTML=months.map(mid=>`
    <button class="mtab ${mid===D.activeMonth?'active':''}" onclick="switchMonth('${mid}')">
      ${monthLabel(mid)}
    </button>`).join('')+`<button class="mtab mtab-add" onclick="addMonth()" title="Thêm tháng mới">＋</button>`;
  const staffSel=document.getElementById('staffMonth');
  if(staffSel) staffSel.innerHTML=months.map(mid=>`<option value="${mid}" ${mid===D.activeMonth?'selected':''}>${monthLabel(mid)}</option>`).join('');
  const dashY=document.getElementById('dashYear');
  if(dashY){
    const years=[...new Set(months.map(m=>m.split('-')[0]))].sort();
    dashY.innerHTML=years.map(y=>`<option value="${y}">${y}</option>`).join('');
    dashY.value=new Date().getFullYear().toString();
  }
}

function switchMonth(mid) { D.activeMonth=mid; activePjId=null; save(); renderAll(); }
function addMonth() {
  const months=Object.keys(D.months).sort();
  const last=months[months.length-1]||D.activeMonth;
  let [y,m]=last.split('-').map(Number);
  m++;if(m>12){m=1;y++;}
  const newMid=`${y}-${String(m).padStart(2,'0')}`;
  if(!D.months[newMid]) D.months[newMid]={projects:[],targetNew:0,targetRev:0};
  D.activeMonth=newMid; activePjId=null; save(); renderAll();
  toast(`✓ Đã thêm ${monthLabel(newMid)}`);
}

/* SIDEBAR */
function renderSidebar() {
  const pjs=curProjects();
  document.getElementById('pjCount').textContent=pjs.length;
  const list=document.getElementById('pjList');
  if(!pjs.length){ list.innerHTML='<div style="padding:18px;text-align:center;color:var(--gray4);font-size:11px">Chưa có dự án</div>'; return; }
  list.innerHTML=pjs.map(p=>`
    <div class="pj-item ${p.id===activePjId?'active':''}" onclick="selectPj('${p.id}')">
      <div class="pj-title">${x(p.nameVN||p.nameJP||'—')}</div>
      <div class="pj-sub">
        <span class="badge ${p.office==='大阪'?'b-osaka':'b-tokyo'}">${p.office||'—'}</span>
        <span class="chip chip-new" style="font-size:9px">新${totalNew(p)}</span>
        <span class="chip chip-gold" style="font-size:9px">修${totalRev(p)}</span>
      </div>
    </div>`).join('');
}

function selectPj(id) { activePjId=id; renderSidebar(); renderContent(); }

/* CONTENT */
function renderContent() {
  const ci=document.getElementById('contentInner');
  if(activePjId){ const p=getPj(activePjId); if(!p){activePjId=null;renderContent();return;} renderProjectDetail(ci,p); }
  else renderMonthOverview(ci);
}

/* MONTH OVERVIEW */

  const pjs=curProjects();
  const m=curMonth();
  const sumNew=pjs.reduce((s,p)=>s+totalNew(p),0);
  const sumRev=pjs.reduce((s,p)=>s+totalRev(p),0);
  const tgtNew=m.targetNew||0, tgtRev=m.targetRev||0;
  const tgtAll=tgtNew+tgtRev;
  const pctNew=tgtNew>0?Math.min(100,Math.round(sumNew/tgtNew*100)):0;
  const pctRev=tgtRev>0?Math.min(100,Math.round(sumRev/tgtRev*100)):0;

  const otMap={};
  D.settings.staffList.forEach(s=>otMap[s]=0);
  pjs.forEach(p=>{
    (p.otLog||[]).forEach(e=>{if(otMap[e.staff]!==undefined)otMap[e.staff]+=(e.hours||0);});
    (p.groups||[]).flatMap(g=>g.rows||[]).forEach(r=>{if(r.staff&&r.ot>0&&otMap[r.staff]!==undefined)otMap[r.staff]+=(r.ot||0);});
  });
  const staffWithOT=D.settings.staffList.filter(s=>otMap[s]>0);

  const smPerf={};
  D.settings.staffList.forEach(s=>smPerf[s]=0);
  pjs.forEach(p=>{
    (p.groups||[]).flatMap(g=>g.rows||[]).forEach(r=>{ if(r.staff&&smPerf[r.staff]!==undefined) smPerf[r.staff]+=(r.qty||0); });
    (p.records||[]).forEach(r=>{ if(r.staff&&smPerf[r.staff]!==undefined) smPerf[r.staff]+=(r.qty||0); });
  });
  const maxPerf=Math.max(1,...Object.values(smPerf));
  const activePerf=D.settings.staffList.filter(s=>smPerf[s]>0).sort((a,b)=>smPerf[b]-smPerf[a]);

  ci.innerHTML=`
  <div class="hero-row" style="grid-template-columns:1fr 1fr 1fr auto">
    <div class="hero-box green">
      <div class="hero-num">${sumNew}</div>
      <div class="hero-lbl">作成 — Làm mới</div>
      <div class="progress-track"><div class="progress-fill green" style="width:${pctNew}%"></div></div>
      <div class="progress-label"><span>${pctNew}% mục tiêu</span><span>${sumNew}/${tgtNew}</span></div>
    </div>
    <div class="hero-box gold">
      <div class="hero-num">${sumRev}</div>
      <div class="hero-lbl">修正 — Sửa lại</div>
      <div class="progress-track"><div class="progress-fill gold" style="width:${pctRev}%"></div></div>
      <div class="progress-label"><span>${pctRev}% mục tiêu</span><span>${sumRev}/${tgtRev}</span></div>
    </div>
    <div class="hero-box navy">
      <div style="font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--gold2);font-weight:700;margin-bottom:8px">⚡ Hiệu suất nhân sự</div>
      ${activePerf.length ? activePerf.slice(0,6).map(s=>`
        <div class="perf-bar">
          <div class="perf-bar-row">
            <span style="color:rgba(255,255,255,.85);font-weight:500">${s}</span>
            <span style="color:var(--gold);font-weight:700">${smPerf[s]}</span>
          </div>
          <div class="perf-bar-track">
            <div class="perf-bar-new" style="width:${Math.round(smPerf[s]/maxPerf*100)}%"></div>
          </div>
        </div>`).join('')
      : '<div style="font-size:11px;color:rgba(255,255,255,.4);text-align:center;padding:6px 0">Chưa có dữ liệu</div>'}
      ${staffWithOT.length?`<div style="margin-top:8px;padding-top:7px;border-top:1px solid rgba(255,255,255,.15);font-size:10px;color:var(--gold2)">
        ⏱ ${staffWithOT.map(s=>s+' '+otMap[s].toFixed(1)+'h').join(' · ')}
      </div>`:''}
    </div>
    <div class="target-box">
      <div class="tgt-title">🎯 Mục tiêu tháng</div>
      <div class="target-row">
        <label>作成 Mới</label>
        <input class="target-input" type="number" value="${tgtNew}" min="0" id="tgtN" onchange="updateMonthTarget('targetNew',+this.value)">
      </div>
      <div class="target-row">
        <label>修正 Sửa</label>
        <input class="target-input" type="number" value="${tgtRev}" min="0" id="tgtR" onchange="updateMonthTarget('targetRev',+this.value)">
      </div>
      <div style="font-size:10px;color:rgba(255,255,255,.5);margin-top:4px" id="tgtTotal">Tổng = ${tgtAll} phối cảnh</div>
    </div>
  </div>

  <div class="card">
    <div class="card-hd"><span class="card-hd-title">📋 Chi tiết dự án — ${monthLabel(D.activeMonth)}</span></div>
    <div style="overflow-x:auto"><table class="sum-tbl">
      <thead><tr>
        <th>#</th><th>Dự án</th><th>VP</th><th>Liên hệ JP</th>
        <th style="text-align:center">作成 Mới</th>
        <th style="text-align:center">修正 Sửa</th>
        <th style="text-align:center">Tổng</th>
        <th style="text-align:center">OT</th>
      </tr></thead>
      <tbody>
        ${pjs.length===0?'<tr><td colspan="8" style="text-align:center;padding:18px;color:var(--gray4)">Chưa có dự án — nhấn ＋ Dự án mới</td></tr>':''}
        ${pjs.map((p,i)=>{
          const ot=totalOT(p);
          return `<tr onclick="selectPj('${p.id}')" style="cursor:pointer">
            <td style="color:var(--gray4)">${i+1}</td>
            <td><div style="font-weight:600">${x(p.nameVN||p.nameJP||'—')}</div>
                ${p.nameJP&&p.nameVN?`<div style="font-size:10px;color:var(--gray4)">${x(p.nameJP)}</div>`:''}</td>
            <td><span class="badge ${p.office==='大阪'?'b-osaka':'b-tokyo'}">${p.office||'—'}</span></td>
            <td>${x(p.contact||'—')}</td>
            <td class="num-c" style="color:var(--new-tx)">${totalNew(p)}</td>
            <td class="num-c" style="color:var(--rev-tx)">${totalRev(p)}</td>
            <td class="num-c" style="font-weight:700">${totalNew(p)+totalRev(p)}</td>
            <td class="num-c" style="color:var(--orange)">${ot>0?ot.toFixed(1)+'h':'—'}</td>
          </tr>`;
        }).join('')}
      </tbody>
      <tfoot><tr class="tr-total">
        <td colspan="4" style="font-weight:700">Tổng cộng</td>
        <td class="num-c" style="color:var(--new-tx)">${sumNew}</td>
        <td class="num-c" style="color:var(--rev-tx)">${sumRev}</td>
        <td class="num-c">${sumNew+sumRev}</td>
        <td class="num-c" style="color:var(--orange)">${pjs.reduce((s,p)=>s+totalOT(p),0).toFixed(1)}h</td>
      </tr></tfoot>
    </table></div>
  </div>

  ${renderMonthStaffCard(pjs)}
  `;
}

function updateMonthTarget(field, val) {
  if(!D.months[D.activeMonth]) D.months[D.activeMonth]={projects:[],targetNew:0,targetRev:0};
  D.months[D.activeMonth][field]=Math.max(0,val); save();
  const m=curMonth();
  const el=document.getElementById('tgtTotal');
  if(el) el.textContent=`Tổng = ${(m.targetNew||0)+(m.targetRev||0)} phối cảnh`;
}

function renderMonthStaffCard(pjs) {
  const sm={};
  D.settings.staffList.forEach(s=>sm[s]={n:0,r:0,ot:0});
  pjs.forEach(p=>{
    (p.groups||[]).flatMap(g=>g.rows||[]).forEach(r=>{
      if(r.staff&&sm[r.staff]){
        if(r.status==='new') sm[r.staff].n+=(r.qty||0);
        else sm[r.staff].r+=(r.qty||0);
        sm[r.staff].ot+=(r.ot||0);
      }
    });
    (p.records||[]).forEach(r=>{ if(r.staff&&sm[r.staff]){ if(r.status==='new') sm[r.staff].n+=(r.qty||0); else sm[r.staff].r+=(r.qty||0); } });
    (p.otLog||[]).forEach(e=>{if(e.staff&&sm[e.staff])sm[e.staff].ot+=(e.hours||0);});
  });
  const active=D.settings.staffList.filter(s=>sm[s].n+sm[s].r+sm[s].ot>0);
  if(!active.length) return '';
  const tn=active.reduce((s,k)=>s+sm[k].n,0);
  const tr=active.reduce((s,k)=>s+sm[k].r,0);
  const to=active.reduce((s,k)=>s+sm[k].ot,0);
  return `<div class="card">
    <div class="card-hd"><span class="card-hd-title">👥 Tổng kết nhân sự tháng</span></div>
    <div style="overflow-x:auto"><table class="perf-tbl">
      <thead><tr><th>Nhân sự</th><th style="text-align:center">作成 Mới</th><th style="text-align:center">修正 Sửa</th><th style="text-align:center">Tổng</th><th style="text-align:center">OT(h)</th></tr></thead>
      <tbody>
        ${active.map(s=>`<tr>
          <td style="font-weight:600">${s}</td>
          <td class="num-c" style="color:var(--new-tx)">${sm[s].n}</td>
          <td class="num-c" style="color:var(--rev-tx)">${sm[s].r}</td>
          <td class="num-c" style="font-weight:700">${sm[s].n+sm[s].r}</td>
          <td class="num-c" style="color:var(--orange)">${sm[s].ot>0?sm[s].ot.toFixed(1):'—'}</td>
        </tr>`).join('')}
        <tr class="total-row"><td>Tổng</td><td class="num-c">${tn}</td><td class="num-c">${tr}</td><td class="num-c">${tn+tr}</td><td class="num-c" style="color:var(--orange)">${to>0?to.toFixed(1):'—'}</td></tr>
      </tbody>
    </table></div></div>`;
}

/* PHOTOS */
function renderPhotoSlots(p) {
  const photos=p.photos||[]; let html='';
  for(let i=0;i<6;i++){
    const ph=photos[i];
    if(ph) html+=`<div class="photo-slot filled"><img src="${ph}" alt="Photo ${i+1}"><button class="ph-del" onclick="delPhoto('${p.id}',${i})">✕</button></div>`;
    else html+=`<label class="photo-slot"><span class="ph-ico">🖼</span><span class="ph-txt">Thêm ảnh</span><input type="file" accept="image/*" onchange="uploadPhoto('${p.id}',${i},this)"></label>`;
  }
  return html;
}
function uploadPhoto(pjId,slot,input) {
  const file=input.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{ const p=getPj(pjId); if(!p) return; if(!p.photos) p.photos=[]; p.photos[slot]=e.target.result; save();
    const g=document.getElementById(`photoGrid-${pjId}`); if(g) g.innerHTML=renderPhotoSlots(p); toast('✓ Đã thêm ảnh'); };
  reader.readAsDataURL(file);
}
function delPhoto(pjId,slot) {
  const p=getPj(pjId); if(!p||!p.photos) return;
  p.photos[slot]=null; p.photos=p.photos.filter((_,i)=>i!==slot); save();
  const g=document.getElementById(`photoGrid-${pjId}`); if(g) g.innerHTML=renderPhotoSlots(p);
}

/* GROUPS — Excel-style hạng mục */
function renderGroups(p) {
  const groups=p.groups||[];
  if(!groups.length) return `<tr><td colspan="7" style="text-align:center;padding:18px;color:var(--gray4)">
    Chưa có hạng mục — bấm <strong>＋ Thêm hạng mục</strong> ở trên</td></tr>`;
  return groups.map(g=>{
    const rows=g.rows||[];
    const gNew=rows.filter(r=>r.status==='new').reduce((s,r)=>s+(r.qty||0),0);
    const gRev=rows.filter(r=>r.status==='rev').reduce((s,r)=>s+(r.qty||0),0);
    const gOT=rows.reduce((s,r)=>s+(r.ot||0),0);
    const gTot=gNew+gRev;
    const rowsHtml=rows.map(r=>`
      <tr class="row-${r.status}" data-gid="${g.id}" data-rid="${r.id}">
        <td style="padding-left:14px">
          <div class="st-toggle">
            <button class="st-opt new ${r.status==='new'?'on':''}"
              onclick="setRowSt('${p.id}','${g.id}','${r.id}','new',this)">作成 Mới</button>
            <button class="st-opt rev ${r.status==='rev'?'on':''}"
              onclick="setRowSt('${p.id}','${g.id}','${r.id}','rev',this)">修正 Sửa</button>
          </div>
        </td>
        <td>
          <select class="sel-sm" onchange="updRow('${p.id}','${g.id}','${r.id}','staff',this.value)">
            <option value="">— Chọn —</option>
            ${D.settings.staffList.map(s=>`<option value="${s}" ${r.staff===s?'selected':''}>${s}</option>`).join('')}
          </select>
        </td>
        <td style="text-align:center">
          <input class="qty-inp" type="number" min="0" value="${r.qty||0}"
            onchange="updRow('${p.id}','${g.id}','${r.id}','qty',+this.value);refreshPjTotals('${p.id}')">
        </td>
        <td>
          <input class="tbl-input" value="${x(r.note||'')}"
            onchange="updRow('${p.id}','${g.id}','${r.id}','note',this.value)" placeholder="Ghi chú…">
        </td>
        <td style="text-align:center">
          <input class="qty-inp" type="number" min="0" step="0.5" value="${r.ot||''}"
            style="color:var(--orange)" placeholder="0"
            onchange="updRow('${p.id}','${g.id}','${r.id}','ot',+this.value||0);refreshPjTotals('${p.id}')">
        </td>
        <td><button class="btn btn-xs btn-ghost btn-danger" onclick="delRow('${p.id}','${g.id}','${r.id}')">✕</button></td>
      </tr>`).join('');
    return `
    <tr class="grp-hd" data-gid="${g.id}">
      <td>
        <div style="display:flex;align-items:center;gap:8px">
          <input class="tbl-input-dark" list="tl-${p.id}" value="${x(g.type||'')}"
            onchange="updGroup('${p.id}','${g.id}','type',this.value)"
            placeholder="Nhập tên hạng mục… (外観パース)">
          <datalist id="tl-${p.id}">${D.settings.typeList.map(t=>`<option value="${t}">`).join('')}</datalist>
          <button class="btn btn-xs" style="background:rgba(255,255,255,.18);color:#fff;border-color:rgba(255,255,255,.3);white-space:nowrap;flex-shrink:0"
            onclick="addRow('${p.id}','${g.id}')">＋ Thêm dòng</button>
        </div>
      </td>
      <td colspan="2" style="text-align:right;padding-right:12px">
        <span class="chip chip-new" style="font-size:9px">新${gNew}</span>
        <span class="chip chip-gold" style="font-size:9px;margin-left:2px">修${gRev}</span>
      </td>
      <td style="text-align:center;font-size:15px;font-weight:800;color:var(--gold)">${gTot}</td>
      <td></td>
      <td style="text-align:center;color:var(--gold2);font-size:11px">${gOT>0?gOT.toFixed(1)+'h':'—'}</td>
      <td><button class="btn btn-xs btn-ghost" style="color:rgba(255,255,255,.5)" onclick="delGroup('${p.id}','${g.id}')">🗑</button></td>
    </tr>
    ${rowsHtml}`;
  }).join('');
}

function addGroup(pjId) {
  const p=getPj(pjId); if(!p) return;
  if(!p.groups) p.groups=[];
  p.groups.push({id:gid(),type:'',rows:[{id:gid(),status:'new',staff:'',qty:0,note:'',ot:0}]});
  save(); rebuildGroups(pjId); refreshPjTotals(pjId);
  setTimeout(()=>{ const inputs=document.querySelectorAll(`#rbody-${pjId} .grp-hd .tbl-input-dark`); if(inputs.length) inputs[inputs.length-1].focus(); },50);
}
function addRow(pjId,gid2) {
  const p=getPj(pjId); if(!p) return;
  const g=(p.groups||[]).find(g=>g.id===gid2); if(!g) return;
  g.rows.push({id:gid(),status:'new',staff:'',qty:0,note:'',ot:0});
  save(); rebuildGroups(pjId); refreshPjTotals(pjId);
}
function delGroup(pjId,gid2) {
  if(!confirm('Xóa hạng mục này?')) return;
  const p=getPj(pjId); if(!p) return;
  p.groups=(p.groups||[]).filter(g=>g.id!==gid2);
  save(); rebuildGroups(pjId); refreshPjTotals(pjId);
}
function delRow(pjId,gid2,rid) {
  const p=getPj(pjId); if(!p) return;
  const g=(p.groups||[]).find(g=>g.id===gid2); if(!g) return;
  g.rows=g.rows.filter(r=>r.id!==rid);
  save(); rebuildGroups(pjId); refreshPjTotals(pjId);
}
function rebuildGroups(pjId) {
  const p=getPj(pjId); if(!p) return;
  const tbody=document.getElementById(`rbody-${pjId}`); if(tbody) tbody.innerHTML=renderGroups(p);
}
function setRowSt(pjId,gid2,rid,status,btn) {
  updRow(pjId,gid2,rid,'status',status);
  const tr=btn.closest('tr[data-rid]'); if(!tr) return;
  tr.className=`row-${status}`;
  tr.querySelectorAll('.st-opt').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  refreshPjTotals(pjId);
}
function updGroup(pjId,gid2,field,val) {
  const p=getPj(pjId); if(!p) return;
  const g=(p.groups||[]).find(g=>g.id===gid2); if(!g) return;
  g[field]=val; save();
}
function updRow(pjId,gid2,rid,field,val) {
  const p=getPj(pjId); if(!p) return;
  const g=(p.groups||[]).find(g=>g.id===gid2); if(!g) return;
  const r=g.rows.find(r=>r.id===rid); if(!r) return;
  r[field]=val; save();
}
function refreshPjTotals(pjId) {
  const p=getPj(pjId); if(!p) return;
  const tn=totalNew(p),tr=totalRev(p),ta=tn+tr,ot=totalOT(p);
  const heros=document.querySelectorAll('.hero-num');
  if(heros[0]) heros[0].textContent=tn;
  if(heros[1]) heros[1].textContent=tr;
  const ft=document.getElementById(`rfoot-${pjId}`);
  if(ft){ const cells=ft.querySelectorAll('td'); if(cells[3]) cells[3].textContent=ta; if(cells[5]) cells[5].textContent=ot>0?ot.toFixed(1)+'h':'—'; }
  renderSidebar();
}

/* DASHBOARD */

  const months=Object.keys(D.months).filter(m=>m.startsWith(year)).sort();
  const dc=document.getElementById('dashContent'); if(!dc) return;
  const mData=months.map(mid=>{
    const m=D.months[mid]||{projects:[]};
    const pjs=m.projects||[];
    return {mid,label:monthLabel(mid),n:pjs.reduce((s,p)=>s+totalNew(p),0),
      r:pjs.reduce((s,p)=>s+totalRev(p),0),ot:pjs.reduce((s,p)=>s+totalOT(p),0),
      pjCount:pjs.length,tN:m.targetNew||0,tR:m.targetRev||0};
  });
  const staffAnn={};
  D.settings.staffList.forEach(s=>staffAnn[s]={n:0,r:0,ot:0});
  months.forEach(mid=>{
    const pjs=(D.months[mid]||{projects:[]}).projects||[];
    pjs.forEach(p=>{
      (p.groups||[]).flatMap(g=>g.rows||[]).forEach(r=>{
        if(r.staff&&staffAnn[r.staff]){ if(r.status==='new') staffAnn[r.staff].n+=(r.qty||0); else staffAnn[r.staff].r+=(r.qty||0); staffAnn[r.staff].ot+=(r.ot||0); }
      });
      (p.otLog||[]).forEach(e=>{if(e.staff&&staffAnn[e.staff])staffAnn[e.staff].ot+=(e.hours||0);});
    });
  });

    <div class="hero-box navy" style="padding:12px"><div class="hero-num" style="font-size:28px">${totN+totR}</div><div class="hero-lbl">Tổng phối cảnh</div></div>
    <div class="hero-box orange" style="padding:12px"><div class="hero-num" style="font-size:28px">${totOT.toFixed(1)}h</div><div class="hero-lbl">Tổng OT</div></div>
  </div>
  <div class="dash-grid c2" style="margin-bottom:12px">
    <div class="chart-box"><h4>Phối cảnh theo tháng</h4><canvas id="cMonthly" height="180"></canvas></div>
    <div class="chart-box"><h4>Năng suất nhân sự</h4><canvas id="cStaff" height="180"></canvas></div>
  </div>
  <div class="dash-grid c3" style="margin-bottom:12px">
    <div class="chart-box"><h4>Mới vs Sửa</h4><canvas id="cRatio" height="150"></canvas></div>
    <div class="chart-box"><h4>OT nhân sự</h4><canvas id="cOT" height="150"></canvas></div>
    <div class="chart-box"><h4>Thực tế vs Mục tiêu</h4><canvas id="cTarget" height="150"></canvas></div>
  </div>
  <div class="card">
    <div class="card-hd"><span class="card-hd-title">📊 Hiệu suất chi tiết nhân sự — ${year}</span></div>
    <div style="overflow-x:auto"><table class="perf-tbl">
      <thead><tr><th>Nhân sự</th><th style="text-align:center">作成</th><th style="text-align:center">修正</th>

/* ══════════════════════════════════════════════════════
   SYNC SYSTEM — Password-based, 2-level access
   Backend: JSONBin.io (free, no signup needed for users)
   
   CÁCH HOẠT ĐỘNG:
   - Admin (chủ app) tạo 1 bin trên jsonbin.io, lấy BIN_ID + API_KEY
   - Đặt mật khẩu EDIT và mật khẩu VIEW (lưu trong D.settings.sync)
   - Người khác chỉ cần nhập đúng mật khẩu để đọc hoặc sửa
   - Toàn bộ dữ liệu được mã hoá AES trước khi lên cloud
══════════════════════════════════════════════════════ */

const SYNC = {
  // Credentials chỉ admin biết (lưu localStorage, không chia sẻ)
  get binId()  { return localStorage.getItem('sync_bin_id')||''; },
  get apiKey() { return localStorage.getItem('sync_api_key')||''; },
  set binId(v)  { localStorage.setItem('sync_bin_id', v); },
  set apiKey(v) { localStorage.setItem('sync_api_key', v); },
  get lastSync() { return localStorage.getItem('sync_last')||''; },
  set lastSync(v){ localStorage.setItem('sync_last', v); },
  // Session: quyền hiện tại sau khi đăng nhập
  get role() { return sessionStorage.getItem('sync_role')||'none'; }, // 'admin'|'edit'|'view'|'none'
  set role(v) { sessionStorage.setItem('sync_role', v); },
  get autoOn() { return localStorage.getItem('sync_auto')==='1'; },
  set autoOn(v) { localStorage.setItem('sync_auto', v?'1':'0'); }
};

/* ── AES-GCM encryption (pure Web Crypto, no libs) ── */
async function deriveKey(password, salt) {
  const enc = new TextEncoder();
  const keyMaterial = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey(
    { name:'PBKDF2', salt: enc.encode(salt), iterations:100000, hash:'SHA-256' },
    keyMaterial, { name:'AES-GCM', length:256 }, false, ['encrypt','decrypt']
  );
}

async function encryptData(data, password) {
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const key = await deriveKey(password, 'phoicanh_salt_v1');
  const enc = new TextEncoder();
  const encrypted = await crypto.subtle.encrypt({ name:'AES-GCM', iv }, key, enc.encode(JSON.stringify(data)));
  // Pack: iv(12 bytes) + encrypted
  const combined = new Uint8Array(12 + encrypted.byteLength);
  combined.set(iv, 0);
  combined.set(new Uint8Array(encrypted), 12);
  return btoa(String.fromCharCode(...combined));
}

async function decryptData(b64, password) {
  const combined = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
  const iv = combined.slice(0, 12);
  const data = combined.slice(12);
  const key = await deriveKey(password, 'phoicanh_salt_v1');
  const dec = await crypto.subtle.decrypt({ name:'AES-GCM', iv }, key, data);
  return JSON.parse(new TextDecoder().decode(dec));
}

/* ── Hash password for comparison (stored in D.settings.sync) ── */
async function hashPw(pw) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pw+'pc_salt'));
  return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,'0')).join('');
}

/* ── JSONBin API ── */
const JBIN = 'https://api.jsonbin.io/v3';

async function syncPush() {
  if (!SYNC.binId || !SYNC.apiKey) return false;
  const editPw = D.settings?.sync?.editPw || 'gendai2024';
  try {
    const payload = await encryptData(D, editPw);
    const res = await fetch(`${JBIN}/b/${SYNC.binId}`, {
      method:'PUT',
      headers:{ 'Content-Type':'application/json', 'X-Master-Key': SYNC.apiKey },
      body: JSON.stringify({ data: payload, ts: Date.now() })
    });
    if (!res.ok) throw new Error(res.status);
    SYNC.lastSync = new Date().toLocaleString('vi-VN');
    setSyncStatus('synced', SYNC.autoOn?'⚡ Auto':'✓ Đã lưu');
    return true;
  } catch(e) {
    setSyncStatus('error','Lỗi lưu');
    return false;
  }
}

async function syncPull(password) {
  if (!SYNC.binId) return null;
  try {
    const headers = SYNC.apiKey
      ? { 'X-Master-Key': SYNC.apiKey }
      : {};
    const res = await fetch(`${JBIN}/b/${SYNC.binId}/latest`, { headers });
    if (!res.ok) throw new Error(res.status);
    const json = await res.json();
    const payload = json.record?.data;
    if (!payload) throw new Error('no_data');
    return await decryptData(payload, password);
  } catch(e) {
    if (e.message === 'no_data') throw e;
    throw new Error('wrong_password');
  }
}

async function syncDoLogin() {
  const binId = document.getElementById('li-binid')?.value.trim();
  const pw    = document.getElementById('li-pw')?.value;
  if (!binId) { alert('Vui lòng nhập Bin ID'); return; }
  if (!pw)    { alert('Vui lòng nhập mật khẩu'); return; }

  setSyncStatus('syncing','Đang xác thực…');
  closeModal();

  try {
    // Pull data first — it contains the hashed passwords
    const pulled = await syncPull(pw).catch(async () => {
      // If decrypt fails, try to get raw to check passwords (admin case)
      throw new Error('wrong_password');
    });

    // Check hash against passwords in settings
    const h = await hashPw(pw);
    const sync = pulled?.settings?.sync || D.settings?.sync || {};

    let role = 'none';
    if (sync.adminHash && h === sync.adminHash) role = 'admin';
    else if (sync.editHash  && h === sync.editHash)  role = 'edit';
    else if (sync.viewHash  && h === sync.viewHash)  role = 'view';

    if (role === 'none') {
      setSyncStatus('error','Sai mật khẩu');
      toast('✗ Sai mật khẩu — thử lại');
      setTimeout(()=>openSyncPanel(), 1200);
      return;
    }

    // Save session
    SYNC.role = role;
    SYNC.binId = binId;
    if (role === 'admin') SYNC.apiKey = SYNC.apiKey; // keep existing
    // Store editPw locally for encryption/decryption
    if (role === 'admin' && sync.editPw) localStorage.setItem('sync_edit_pw', sync.editPw);
    else if (role === 'edit') localStorage.setItem('sync_edit_pw', pw);

    // Load pulled data
    if (role === 'view') {
      // View: load data but disable all edit functions
      D = pulled; save(); renderAll();
      enableViewOnlyMode(true);
    } else {
      D = pulled; save(); renderAll();
      enableViewOnlyMode(false);
    }

    SYNC.lastSync = new Date().toLocaleString('vi-VN');
    const roleLabels = {admin:'✓ Admin', edit:'✓ Edit', view:'👁 View'};
    setSyncStatus('synced', SYNC.autoOn && role==='admin' ? '⚡ Auto' : roleLabels[role]);
    toast(`✓ Đăng nhập thành công — quyền ${role.toUpperCase()}`);

    // Auto setup auto-sync for admin
    if (role === 'admin' && SYNC.autoOn) {
      setSyncStatus('synced','⚡ Auto');
    }

  } catch(e) {
    setSyncStatus('error','Lỗi');
    toast('✗ Không thể kết nối hoặc sai mật khẩu');
    setTimeout(()=>openSyncPanel(), 1500);
  }
}

async function syncPullWithRole() {
  const role = SYNC.role;
  const pw = role==='admin' ? localStorage.getItem('sync_edit_pw')||''
           : role==='edit'  ? localStorage.getItem('sync_edit_pw')||''
           : null;

  if (!pw && role!=='view') { toast('⚠ Phiên làm việc hết hạn — đăng nhập lại'); openSyncPanel(); return; }

  setSyncStatus('syncing','Đang tải…');

    toast('✓ Dữ liệu đã được cập nhật');

    setSyncStatus('error','Lỗi tải');

}

function applyTheme(themeKey) {
  const theme = THEMES[themeKey];
  if (!theme) return;
  const root = document.documentElement;
  Object.entries(theme).forEach(([k,v]) => {
    if (k.startsWith('--')) root.style.setProperty(k, v);
  });
  // Update header bg if needed
  document.querySelector('.header').style.background = theme['--ex-navy']||'';
  document.querySelector('.month-strip').style.background = theme['--ex-navy2']||'';
  localStorage.setItem('app_theme', themeKey);
  if (themeKey !== 'custom') localStorage.setItem('app_theme_data', JSON.stringify(theme));
}

function applyCustomColor(varName, val) {
  document.documentElement.style.setProperty(varName, val);
  // Save to custom theme
  const saved = JSON.parse(localStorage.getItem('app_custom_theme')||'{}');
  saved[varName] = val;
  localStorage.setItem('app_custom_theme', JSON.stringify(saved));
  localStorage.setItem('app_theme', 'custom');
}

function loadSavedTheme() {
  const key = localStorage.getItem('app_theme');
  if (!key) return;
  if (key === 'custom') {
    const custom = JSON.parse(localStorage.getItem('app_custom_theme')||'{}');
    if (Object.keys(custom).length) {
      const root = document.documentElement;
      Object.entries(custom).forEach(([k,v]) => root.style.setProperty(k, v));
    }
  } else if (THEMES[key]) {
    applyTheme(key);
  }
}

function updateColorInputs() {
  // Update color pickers to reflect new theme
  const root = document.documentElement;
  const vars = ['--ex-navy','--ex-navy2','--ex-gold','--ex-orange','--new-bg','--rev-bg'];
  vars.forEach(v => {
    const id = 'cp-'+v.replace(/--/g,'').replace(/-/g,'_');
    const el = document.getElementById(id);
    if (el) el.value = cssToHex(getComputedStyle(root).getPropertyValue(v).trim());
  });
}

function cssToHex(color) {
  if (!color) return '#1F3864';
  color = color.trim();
  if (color.startsWith('#') && color.length===7) return color;
  if (color.startsWith('#') && color.length===4) {
    return '#'+color[1]+color[1]+color[2]+color[2]+color[3]+color[3];
  }
  // rgb(r,g,b) → hex
  const m = color.match(/rgb\s*\(\s*(\d+)\s*,\s*(\d+)\s*,\s*(\d+)\s*\)/);
  if (m) return '#'+[m[1],m[2],m[3]].map(n=>parseInt(n).toString(16).padStart(2,'0')).join('');
  return '#1F3864';
}

function resetTheme() {
  localStorage.removeItem('app_theme');
  localStorage.removeItem('app_custom_theme');
  localStorage.removeItem('app_theme_data');
  applyTheme('navy-gold');
  closeModal();
  toast('↺ Đã đặt lại màu mặc định');
}

/* ══════════════════════════════════════════════════════
   REPORT 2: OT NHÂN SỰ
══════════════════════════════════════════════════════ */
function exportOTReport() {
  const pjs = curProjects();
  const ml = monthLabel(D.activeMonth);
  const now = new Date().toLocaleDateString('vi-VN',{day:'2-digit',month:'2-digit',year:'numeric'});

  // Collect OT per staff
  const staffOT = {};
  D.settings.staffList.forEach(s=>staffOT[s]={total:0,entries:[]});
  pjs.forEach(p=>{
    (p.otLog||[]).forEach(e=>{
      if(e.staff&&staffOT[e.staff]){
        staffOT[e.staff].total+=(e.hours||0);
        staffOT[e.staff].entries.push({...e, pjName:p.nameVN||p.nameJP||'?', pjOffice:p.office||''});
      }
    });
  });

  const activeStaff = D.settings.staffList.filter(s=>staffOT[s].total>0);

  if(!activeStaff.length) {
    toast('Tháng này chưa có nhân sự nào phát sinh OT');
    return;
  }

  const totalOT = activeStaff.reduce((s,k)=>s+staffOT[k].total,0);

  const staffBlocks = activeStaff.map(s=>{
    const v = staffOT[s];
    const entries = v.entries.slice().sort((a,b)=>a.date>b.date?1:-1);
    return `<div class="ot-staff-block">
      <div class="ot-staff-hd">
        <span class="sname">${s}</span>
        <span class="stotal">Tổng: ${v.total.toFixed(1)} giờ</span>
      </div>
      <table style="margin-bottom:0;border-radius:0 0 6px 6px;overflow:hidden">
        <thead><tr>
          <th style="background:#2E4A7A">Ngày</th>
          <th style="background:#2E4A7A">Dự án</th>
          <th style="background:#2E4A7A">Văn phòng</th>
          <th style="background:#2E4A7A;text-align:center">Số giờ OT</th>
          <th style="background:#2E4A7A">Ghi chú</th>
        </tr></thead>
        <tbody>
          ${entries.map(e=>`<tr>
            <td>${e.date}</td>
            <td>${x(e.pjName)}</td>
            <td><span class="${e.pjOffice==='大阪'?'b-osaka':'b-tokyo'}">${e.pjOffice||'—'}</span></td>
            <td class="c-ot">${e.hours}h</td>
            <td style="font-size:10px;color:#595959">${x(e.note||'')}</td>
          </tr>`).join('')}
        </tbody>
        <tfoot><tr>
          <td colspan="3" style="text-align:right">Tổng OT ${s}:</td>
          <td class="c-ot" style="font-size:13px">${v.total.toFixed(1)}h</td>
          <td></td>
        </tr></tfoot>
      </table>
    </div>`;
  }).join('');

  const html = `<div class="report-doc">
    <div class="doc-header">

/* ── REPORT OVERLAY RENDERER ── */
function showReportOverlay(title, bodyHtml) {
  const overlay = document.createElement('div');
  overlay.className = 'rpt-overlay';
  overlay.id = 'rptOverlay';
  overlay.innerHTML = `
    <div class="rpt-container">
      <div class="rpt-header">
        <h2>${title}</h2>
        <div class="rpt-actions">
          <button class="btn btn-sm" style="background:rgba(255,255,255,.1);color:#fff;border-color:rgba(255,255,255,.3)" onclick="printReport()">🖨 In / Lưu PDF</button>
          <button class="btn btn-sm btn-gold" onclick="closeReport()">✕ Đóng</button>
        </div>
      </div>
      <div class="rpt-body" id="rptBody">${bodyHtml}</div>
    </div>
  `;
  overlay.onclick = e => { if(e.target===overlay) closeReport(); };
  document.body.appendChild(overlay);
}

function printReport() {
  const body = document.getElementById('rptBody');
  if (!body) return;
  const w = window.open('','_blank','width=900,height=700');
  w.document.write(`<!DOCTYPE html><html><head>
    <meta charset="UTF-8">
    <title>Báo cáo Phối Cảnh Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
      *{box-sizing:border-box;margin:0;padding:0}
      body{font-family:'Be Vietnam Pro','Noto Sans JP',sans-serif;font-size:12px;color:#1a1a1a;background:#fff}
      @page{size:A4;margin:0}
      @media print{body{-webkit-print-color-adjust:exact;print-color-adjust:exact}}
      ${[...document.styleSheets].flatMap(s=>{try{return[...s.cssRules].filter(r=>r.selectorText?.includes('.report-doc')||r.selectorText?.includes('.doc-')||r.selectorText?.includes('.kpi-')||r.selectorText?.includes('.pj-block')||r.selectorText?.includes('.ot-staff')||r.selectorText?.includes('.sign-')||r.selectorText?.includes('.c-new')||r.selectorText?.includes('.c-rev')||r.selectorText?.includes('.c-tot')||r.selectorText?.includes('.c-ot')||r.selectorText?.includes('.b-osaka')||r.selectorText?.includes('.b-tokyo')||r.selectorText?.includes('.chip-')||r.selectorText?.includes('.section-title')).map(r=>r.cssText)}catch(e){return[];}}).join('\n')}
    </style>
  </head><body>${body.innerHTML}</body></html>`);
  w.document.close();
  setTimeout(()=>{ w.focus(); w.print(); },600);
}

function closeReport() { document.getElementById('rptOverlay')?.remove(); }
