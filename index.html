              ? '<div style="font-size:11px;color:var(--gray3);font-style:italic">Chưa có lịch nghỉ</div>'
              : (prof.leaves||[]).sort((a,b)=>a.from>b.from?1:-1).map(l=>{
                  const isPast = (l.to||l.from) < today;
                  const isActive = (l.from||l.to)<=today && (l.to||l.from)>=today;
                  const days2 = l.from&&l.to ? Math.round((new Date(l.to)-new Date(l.from))/86400000)+1 : 1;
                  return `<div style="display:flex;align-items:center;gap:6px;padding:4px 7px;border-radius:var(--r);background:${isActive?'#fff5f5':isPast?'var(--gray1)':'#fff8f2'};margin-bottom:4px;border-left:3px solid ${isActive?'#e74c3c':isPast?'var(--gray3)':'var(--orange)'}">
                    <div style="flex:1;min-width:0">
                      <div style="font-size:11px;font-weight:600;color:${isPast?'var(--gray4)':'var(--dark)'}">${l.from||'?'} → ${l.to||l.from||'?'} (${days2} ngày)</div>
                      ${l.reason?`<div style="font-size:10px;color:var(--gray4)">${x(l.reason)}</div>`:''}
                    </div>
                    <span style="font-size:9px;padding:1px 5px;border-radius:3px;background:${isActive?'#e74c3c':isPast?'var(--gray2)':'var(--orange)'};color:#fff;white-space:nowrap">${isActive?'Đang nghỉ':isPast?'Đã qua':'Sắp nghỉ'}</span>
                    <button class="btn btn-xs btn-ghost btn-danger" onclick="delLeave('${s}','${l.id}')">✕</button>
                  </div>`;
                }).join('')
            }
          </div>

          </div><!-- end collapsible -->

          <!-- Order control -->
          <div style="margin-top:10px;padding-top:8px;border-top:1px solid var(--gray1);display:flex;align-items:center;gap:8px">
            <span style="font-size:10px;color:var(--gray4)">Thứ tự:</span>
            <input type="number" min="1" max="99" value="${prof.order||idx+1}"
              style="width:48px;padding:3px 6px;border:1px solid var(--gray2);border-radius:var(--r);font-size:11px;text-align:center"
              onchange="saveStaffProfile('${s}','order',+this.value);renderStaffPage()">
            ${v.pjs.length ? '<span style="font-size:10px;color:var(--gray4);margin-left:auto">Dự án: ' + v.pjs.slice(0,2).map(n=>'<span style="background:var(--gray1);padding:1px 5px;border-radius:3px;font-size:9px">'+x(n)+'</span>').join(' ') + '</span>' : ''}
          </div>
        </div>
      </div>`;
    }).join('')}
  </div>
  `;
}

function toggleSalary(salId) {
  const el = document.getElementById(salId);
  const hidden = document.getElementById('sal-hidden-' + salId.replace('sal-',''));
  if(el) el.style.display = el.style.display==='none' ? 'block' : 'none';
  if(hidden) hidden.style.display = hidden.style.display==='none' ? 'block' : 'none';
}


/* SETTINGS */
function applyThemeColor(varName, value) {
  if (!value || value.length < 4) return;
  document.documentElement.style.setProperty(varName, value);
  const saved = JSON.parse(localStorage.getItem('theme_colors')||'{}');
  saved[varName] = value;
  localStorage.setItem('theme_colors', JSON.stringify(saved));
  const map = {
    '--app-bg':'clr-app-bg','--card-bg':'clr-card-bg','--sidebar-bg':'clr-sidebar-bg',
    '--table-bg':'clr-table-bg','--table-hover':'clr-table-hover'
  };
  const id = map[varName];
  if (id) {
    const el = document.getElementById(id); if(el) el.value = value;
    const elTxt = document.getElementById(id+'-txt'); if(elTxt) elTxt.value = value;
  }
}

function applyThemePreset(app, card, sidebar, table, hover) {
  applyThemeColor('--app-bg',   app);
  applyThemeColor('--card-bg',  card);
  applyThemeColor('--sidebar-bg', sidebar);
  applyThemeColor('--table-bg',  table || card);
  applyThemeColor('--table-hover', hover || '#FFFBEE');
}

function resetThemeColors() {
  applyThemePreset('#EAECF0','#FFFFFF','#F5F5F5','#FFFFFF','#FFFBEE');
  localStorage.removeItem('theme_colors');
  toast('✓ Đã đặt lại màu mặc định');
}

function loadSavedTheme() {
  try {
    const saved = JSON.parse(localStorage.getItem('theme_colors')||'{}');
    Object.entries(saved).forEach(([k,v]) => {
      document.documentElement.style.setProperty(k, v);
    });
  } catch(e) {}
}

function updThemeColorPickers() {
  const saved = JSON.parse(localStorage.getItem('theme_colors')||'{}');
  const map = {
    '--app-bg':'clr-app-bg','--card-bg':'clr-card-bg','--sidebar-bg':'clr-sidebar-bg',
    '--table-bg':'clr-table-bg','--table-hover':'clr-table-hover'
  };
  Object.entries(map).forEach(([varName, id]) => {
    const val = saved[varName];
    if (val) {
      const el = document.getElementById(id); if(el) el.value = val;
      const elTxt = document.getElementById(id+'-txt'); if(elTxt) elTxt.value = val;
    }
  });
}

function addTag(cid,w) {
  const c=document.createElement('div'); c.className='tag-edit';
  c.innerHTML=`<input style="width:${w}px" placeholder="Nhập…"><span class="tag-del" onclick="this.parentElement.remove()">×</span>`;
  document.getElementById(cid).appendChild(c); c.querySelector('input').focus();
}
function saveSettings() {
  D.settings.staffList=[...document.querySelectorAll('#staffTags .tag-edit input')].map(e=>e.value.trim()).filter(Boolean);
  D.settings.typeList=[...document.querySelectorAll('#typeTags .tag-edit input')].map(e=>e.value.trim()).filter(Boolean);
  D.settings.typeListVN=[...document.querySelectorAll('#typeVNTags .tag-edit input')].map(e=>e.value.trim()).filter(Boolean);
  D.settings.contactList=[...document.querySelectorAll('#contactTags .tag-edit input')].map(e=>e.value.trim()).filter(Boolean);
  D.settings.contactListVN=[...document.querySelectorAll('#contactVNTags .tag-edit input')].map(e=>e.value.trim()).filter(Boolean);
  save(); toast('✓ Đã lưu cài đặt');
}

/* MODAL */
function showModal(html) {
  const bg=document.createElement('div'); bg.className='modal-bg'; bg.id='activeModal';
  bg.innerHTML=`<div class="modal">${html}</div>`;
  bg.onclick=e=>{if(e.target===bg)closeModal();};
  document.getElementById('modalRoot').appendChild(bg);
}
function closeModal() { document.getElementById('activeModal')?.remove(); }

      // Rate limit: tối thiểu 5 phút giữa 2 lần push

      localStorage.setItem('sync_last_push', now);
      await syncPush();
    }, 4000);
  }

   SYNC SYSTEM — Password-based, 2-level access
   Backend: GitHub Gist (free, CORS-friendly)
   
   CÁCH HOẠT ĐỘNG:
   - Admin tạo GitHub Token + Gist ID
   - Đặt mật khẩu EDIT và mật khẩu VIEW (lưu trong D.settings.sync)
   - Người khác chỉ cần nhập đúng mật khẩu để đọc hoặc sửa
   - Toàn bộ dữ liệu được mã hoá AES trước khi lên cloud
══════════════════════════════════════════════════════ */

/* ── AES-GCM encryption (pure Web Crypto, no libs) ── */
async function deriveKey(password, salt) {
  const enc = new TextEncoder();
  const keyMaterial = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey(
    { name:'PBKDF2', salt: enc.encode(salt), iterations:100000, hash:'SHA-256' },
    keyMaterial, { name:'AES-GCM', length:256 }, false, ['encrypt','decrypt']
  );
}

async function encryptData(data, password) {
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const key = await deriveKey(password, 'phoicanh_salt_v1');
  const enc = new TextEncoder();
  const encrypted = await crypto.subtle.encrypt({ name:'AES-GCM', iv }, key, enc.encode(JSON.stringify(data)));
  // Pack: iv(12 bytes) + encrypted
  const combined = new Uint8Array(12 + encrypted.byteLength);
  combined.set(iv, 0);
  combined.set(new Uint8Array(encrypted), 12);
  return btoa(String.fromCharCode(...combined));
}

async function decryptData(b64, password) {
  const combined = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
  const iv = combined.slice(0, 12);
  const data = combined.slice(12);
  const key = await deriveKey(password, 'phoicanh_salt_v1');
  const dec = await crypto.subtle.decrypt({ name:'AES-GCM', iv }, key, data);
  return JSON.parse(new TextDecoder().decode(dec));
}

/* ── Hash password for comparison (stored in D.settings.sync) ── */
async function hashPw(pw) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pw+'pc_salt'));
  return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,'0')).join('');
}

/* ── GitHub Gist Sync ── */
const GIST_API = 'https://api.github.com/gists';

/* ── Nén ảnh base64 xuống ~50% chất lượng, max 800px ── */
async function compressBase64Photo(b64, quality=0.5, maxPx=800) {
  return new Promise(resolve => {
    try {
      const img = new Image();
      img.onload = () => {
        let w = img.width, h = img.height;
        if (w > maxPx || h > maxPx) {
          if (w >= h) { h = Math.round(h * maxPx / w); w = maxPx; }
          else        { w = Math.round(w * maxPx / h); h = maxPx; }
        }
        const cv = document.createElement('canvas');
        cv.width = w; cv.height = h;
        cv.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(cv.toDataURL('image/jpeg', quality));
      };
      img.onerror = () => resolve(b64);
      img.src = b64;
    } catch(e) { resolve(b64); }
  });
}

/* ── Clone D, chỉ giữ ảnh đầu tiên mỗi dự án, nén JPEG 50%, max 800px ── */
async function buildSyncPayload() {
  const clone = JSON.parse(JSON.stringify(D));
  const jobs = [];
  Object.values(clone.months || {}).forEach(m => {
    [...(m.projects||[]), ...(m.projectsVN||[])].forEach(p => {
      if (p.photos && p.photos.length > 0) {
        const first = p.photos[0];
        p.photos = [null];
        jobs.push(
          compressBase64Photo(first, 0.5, 800).then(compressed => {
            p.photos[0] = compressed;
          })
        );
      } else {
        p.photos = [];
      }
    });
  });
  await Promise.all(jobs);
  return clone;
}

async function syncPush() {
  const gistId  = localStorage.getItem('sync_gist_id')  || D.settings?.sync?.gistId  || '';
  const ghToken = localStorage.getItem('sync_gh_token') || D.settings?.sync?.ghToken || '';
  if (!gistId || !ghToken) return false;
  try {
    setSyncStatus('syncing', '⏳ Đang nén ảnh…');
    const payload = await buildSyncPayload();
    const body = JSON.stringify(payload);
    const sizeKB = Math.round(body.length * 0.75 / 1024);
    setSyncStatus('syncing', `⬆ ${sizeKB}KB…`);
    const res = await fetch(`${GIST_API}/${gistId}`, {
      method: 'PATCH',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `token ${ghToken}`,
        'Accept': 'application/vnd.github.v3+json'
      },
      body: JSON.stringify({ files: { 'phoicanh.json': { content: body } } })
    });
    if (!res.ok) {
      const t = await res.text();
      throw new Error(`HTTP ${res.status}: ${t.slice(0,80)}`);
    }
    SYNC.lastSync = new Date().toLocaleString('vi-VN');
    setSyncStatus('synced', '✓ Admin');
    toast(`✅ Đã đồng bộ lên cloud (${sizeKB}KB)`);
    return true;
  } catch(e) {
    console.error('syncPush error:', e.message);
    setSyncStatus('error', 'Lỗi sync');
    toast('✗ Lỗi: ' + e.message.slice(0,50));
    return false;
  }
}

async function syncPull(decryptPassword) {
  const gistId  = SYNC.gistId  || localStorage.getItem('sync_gist_id')  || D.settings?.sync?.gistId  || '';
  const ghToken = SYNC.ghToken || localStorage.getItem('sync_gh_token') || '';
  if (!gistId) throw new Error('no_gist_id');
  try {
    const headers = { 'Accept': 'application/vnd.github.v3+json' };
    if (ghToken) headers['Authorization'] = `token ${ghToken}`;
    const res = await fetch(`${GIST_API}/${gistId}`, { headers });
    if (!res.ok) {
      const t = await res.text();
      throw new Error(`HTTP ${res.status}: ${t.slice(0,80)}`);
    }
    const json = await res.json();
    const fileContent = json?.files?.['phoicanh.json']?.content;
    if (!fileContent) throw new Error('empty_data');
    let parsed;
    try { parsed = JSON.parse(fileContent); }
    catch(e) { throw new Error('parse_error: ' + e.message); }
    if (!parsed || typeof parsed !== 'object') throw new Error('invalid_data');

    // ── CLOUD THẮNG — chỉ giữ credentials local ──
    // Lưu credentials từ localStorage TRƯỚC KHI ghi đè D
    // localStorage là nguồn tin cậy duy nhất — không dùng D.settings.sync
    const localGistId  = localStorage.getItem('sync_gist_id')  || '';
    const localToken   = localStorage.getItem('sync_gh_token') || '';
    const localEditPw  = localStorage.getItem('sync_edit_pw')  || '';

    // Lấy toàn bộ data từ cloud
    D = parsed;

    // Deep merge months: giữ tất cả tháng từ cả cloud lẫn local (tránh mất dữ liệu offline)
    if (parsed.months) {
      const localMonths = JSON.parse(localStorage.getItem(SK) || '{}').months || {};
      Object.keys(localMonths).forEach(mid => {
        if (!D.months[mid]) D.months[mid] = localMonths[mid];
      });
    }

    // Khôi phục credentials — gistId và token từ localStorage luôn thắng
    if (!D.settings) D.settings = {};
    if (!D.settings.sync) D.settings.sync = {};
    // Giữ mọi thứ từ cloud (adminHash, editHash...) nhưng gistId/token/editPw dùng local
    if (localGistId) { D.settings.sync.gistId = localGistId; localStorage.setItem('sync_gist_id', localGistId); }
    if (localToken)  { localStorage.setItem('sync_gh_token', localToken); }
    if (localEditPw) { D.settings.sync.editPw = localEditPw; localStorage.setItem('sync_edit_pw', localEditPw); }

    try { localStorage.setItem(SK, JSON.stringify(D)); } catch(e) {}
    SYNC.lastSync = new Date().toLocaleString('vi-VN');
    setSyncStatus('synced', '✓ Synced');
    return parsed;
  } catch(e) {
    console.error('syncPull error:', e.message);
    setSyncStatus('error', 'Lỗi pull: ' + e.message.slice(0,30));
    throw e;
  }
}


async function quickSync() {
  const role = SYNC.role;

  if (!SYNC.gistId && !SYNC.binId) {
    if (role === 'admin') openSyncPanel();
    else {
      persistD();
      setSyncStatus('synced', role === 'edit' ? '✓ Edit' : '👁 View');
      toast('✓ Đã lưu dữ liệu cục bộ');
    }
    return;
  }

  if (role === 'admin' || role === 'edit') {
    if (!SYNC.ghToken && role === 'admin') {
      toast('⚠ Chưa có GitHub Token — mở cài đặt Sync');
      openSyncPanel();
      return;
    }
    if (!SYNC.ghToken) {
      persistD();
      setSyncStatus('synced', '✓ Edit');
      toast('✓ Đã lưu dữ liệu cục bộ');
      return;
    }
    setSyncStatus('syncing', 'Đang lưu…');
    // Manual sync bypasses rate limit
    localStorage.setItem('sync_last_push', Date.now());
    const ok = await syncPush();
    if (ok) {
      toast('✓ Đã đồng bộ lên cloud');
    } else {
      setSyncStatus('synced', role === 'admin' ? '✓ Admin' : '✓ Edit');
      toast('⚠ Không sync được — dữ liệu đã lưu local');
    }
  } else if (role === 'view') {
    if (SYNC.binId && SYNC.apiKey) await syncPullWithRole();
    else { setSyncStatus('synced', '👁 View'); toast('ℹ Chế độ xem — không thể đồng bộ'); }
  } else {
    openSyncPanel();
  }
}

function importBackup(input) {
  const file = input.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.months || !data.settings) { alert('File backup không hợp lệ'); return; }
      if (!confirm('Khôi phục từ file backup? Dữ liệu hiện tại sẽ bị thay thế.')) return;
      D = data; save(); renderAll();
      toast('✓ Đã khôi phục từ backup thành công');
    } catch(err) { alert('Lỗi đọc file: ' + err.message); }
  };
  reader.readAsText(file);
}

async function testGistConnection(apiKey, binId) {
  try {
    const headers = {'Accept':'application/vnd.github.v3+json'};
    if (apiKey && apiKey.startsWith('ghp_')) headers['Authorization'] = `token ${apiKey}`;
    const res = await fetch(`https://api.github.com/gists/${binId}`, { headers });
    const txt = await res.text();
    console.log('testConnection:', res.status, txt.slice(0,200));
    return { ok: res.ok, status: res.status, body: txt.slice(0,200) };
  } catch(e) {
    console.error('testConnection error:', e.message);
    return { ok: false, status: 0, body: e.message };
  }
}

async function confirmSyncSetup() {
  const apiKey = document.getElementById('su-apikey')?.value.trim();
  const binId  = document.getElementById('su-binid')?.value.trim();
  const adminPw = document.getElementById('su-admin-pw')?.value || '204290';
  const editPw  = document.getElementById('su-edit-pw')?.value  || '123456';
  const viewPw  = document.getElementById('su-view-pw')?.value  || '280510';

  if (!apiKey) { alert('Vui lòng điền GitHub Token'); return; }
  if (!binId)  { alert('Vui lòng điền Bin ID'); return; }

  // Save as GitHub Gist credentials
  SYNC.ghToken = apiKey; // apiKey field = GitHub token
  SYNC.gistId  = binId;  // binId field  = Gist ID
  SYNC.apiKey  = apiKey;
  SYNC.binId   = binId;
  SYNC.role    = 'admin';
  localStorage.setItem('sync_gh_token',   apiKey);
  localStorage.setItem('sync_gist_id',    binId);
  localStorage.setItem('sync_edit_pw',    editPw);
  localStorage.setItem('sync_api_key',    apiKey);
  localStorage.setItem('sync_bin_id',     binId);

  if (!D.settings.sync) D.settings.sync = {};
  D.settings.sync.gistId  = binId;
  D.settings.sync.ghToken = apiKey;
  D.settings.sync.binId   = binId;
  D.settings.sync.editPw  = editPw;
  // Hash passwords (non-blocking — use SPLASH_PW as source of truth)
  try {
    D.settings.sync.adminHash = await hashPw(adminPw);
    D.settings.sync.editHash  = await hashPw(editPw);
    D.settings.sync.viewHash  = await hashPw(viewPw);
  } catch(e) {
    // If crypto fails, skip hash — splash login still works via SPLASH_PW map

  save();
  setSyncStatus('syncing','Đang kiểm tra kết nối…');

  toast('⏳ Đang kiểm tra kết nối GitHub Gist…');

  // Test connection first

  if (!testResult.ok && testResult.status === 0) {
    setSyncStatus('error','Lỗi mạng');

    toast('✗ GitHub Token không đúng — kiểm tra lại token ghp_...');

  if (testResult.status === 404) {
    setSyncStatus('error','Bin ID sai');
    toast('✗ Gist ID không tìm thấy — kiểm tra lại ID từ URL gist.github.com');
    return;
  }

  toast('✓ Kết nối OK — đang đẩy dữ liệu lên cloud…');
  const ok = await syncPush();
  if (ok) {
    toast('✅ Đã kết nối thành công! Dữ liệu đã lên cloud.');
    setSyncStatus('synced','✓ Admin');
  } else {
    // Show detailed error hint
    toast('✗ Chưa kết nối được — xem hướng dẫn bên dưới');

  try {
    localStorage.setItem('sync_bin_id_public', binId);
    SYNC.binId = binId;

    const h = await hashPw(pw);
    const storedEditPw = localStorage.getItem('sync_edit_pw') || '';

    // ── Verify password & determine role ──
    // Priority: check LOCAL hashes first (fast, no network)
    // Then pull from cloud if needed (Edit/View on new device)
    const localSync = D.settings?.sync || {};
    let role = 'none';
    let pulled = null;

    // Check local hashes
    if (localSync.adminHash && h === localSync.adminHash) {
      role = 'admin';
    } else if (localSync.editHash && h === localSync.editHash) {
      role = 'edit';
    } else if (localSync.viewHash && h === localSync.viewHash) {
      role = 'view';
    } else {
      // Local check failed → try pulling from cloud to get latest hashes
      // Edit/View role: data encrypted with editPw, try pw as editPw first
      setSyncStatus('syncing', 'Đang kết nối…');
      try {
        pulled = await syncPull(pw); // works if pw == editPw (Edit role)
      } catch(e1) {
        if (storedEditPw && storedEditPw !== pw) {
          try { pulled = await syncPull(storedEditPw); } catch(e2) {}
        }
      }
      if (pulled) {
        const cloudSync = pulled.settings?.sync || {};
        if (cloudSync.adminHash && h === cloudSync.adminHash) role = 'admin';
        else if (cloudSync.editHash && h === cloudSync.editHash) role = 'edit';
        else if (cloudSync.viewHash && h === cloudSync.viewHash) role = 'view';
      }
    }

    if (role === 'none') {
      setSyncStatus('error', 'Sai mật khẩu');
      toast('✗ Sai mật khẩu — vui lòng kiểm tra lại');
      setTimeout(() => openSyncPanel(), 1500);
      return;
    }

    // ── Save session ──
    SYNC.role  = role;
    SYNC.binId = binId;

    // editPw storage:
    // - Admin: editPw was set at confirmSyncSetup → already in localStorage
    //   If not found (new device), admin must use "Tải dữ liệu" after login
    // - Edit: pw IS the editPw (data encrypted with editPw)
    // - View: uses storedEditPw for decryption
    if (role === 'edit') {
      localStorage.setItem('sync_edit_pw', pw);
    }
    // For admin: do NOT overwrite editPw with adminPw — they are different!
    // editPw should already be stored from setup. If missing, warn.
    if (role === 'admin' && !storedEditPw) {
      // Admin on new device — needs to re-enter editPw separately
      toast('⚠ Admin trên thiết bị mới — vui lòng dùng nút "Tải dữ liệu" sau khi nhập Edit Password');
    }

    // ── Load cloud data if pulled ──
    if (pulled) {
      D = pulled; save(); renderAll();
    }

    enableViewOnlyMode(role === 'view');

    SYNC.lastSync = new Date().toLocaleString('vi-VN');
    const roleLabels = {admin:'✓ Admin', edit:'✓ Edit', view:'👁 View'};
    setSyncStatus('synced', SYNC.autoOn && role === 'admin' ? '⚡ Auto' : roleLabels[role]);
    toast('✓ Đăng nhập thành công — quyền ' + role.toUpperCase() + (pulled ? ' (đã tải dữ liệu mới)' : ''));

  } catch(e) {
    setSyncStatus('error', 'Lỗi kết nối');
    const msg = e.message || '';
    if (msg.includes('no_bin_id'))         toast('✗ Bin ID không hợp lệ');
    else if (msg.includes('connect_http_401')) toast('✗ Master Key sai hoặc hết hạn');
    else if (msg.includes('connect_http_404')) toast('✗ Bin ID không tồn tại');
    else if (msg.includes('decrypt_fail'))     toast('✗ Sai mật khẩu — không giải mã được');
    else toast('✗ Lỗi: ' + msg);
    setTimeout(() => openSyncPanel(), 2000);
  }
}

async function syncPullWithRole() {
  const editPw = localStorage.getItem('sync_edit_pw') || '';
  if (!editPw) {
    toast('⚠ Phiên làm việc hết hạn — đăng nhập lại');
    openSyncPanel(); return;
  }
  setSyncStatus('syncing','Đang tải…');
  closeModal();
  try {
    const pulled = await syncPull(editPw);
    D = pulled; save(); renderAll();
    SYNC.lastSync = new Date().toLocaleString('vi-VN');
    setSyncStatus('synced', SYNC.autoOn&&SYNC.role==='admin'?'⚡ Auto':'✓ Đã tải');
    toast('✓ Dữ liệu đã được cập nhật');
  } catch(e) {
    setSyncStatus('error','Lỗi tải');
    const msg = e.message||'';
    if (msg.includes('decrypt_fail')) toast('✗ Không giải mã được — đăng nhập lại');
    else toast('✗ Lỗi tải: ' + msg);
  }
}

async function doSyncPush() {

function renderStorageMeter() {
  const bar = document.getElementById('storageBar');
  if (!bar) return;
  try {
    const data = localStorage.getItem(SK) || '';
    const kb = Math.round(data.length * 0.75 / 1024);
    const maxKB = 5120;
    const pct = Math.min(100, Math.round(kb / maxKB * 100));
    const color = pct > 80 ? '#e74c3c' : pct > 55 ? '#E67E22' : '#27AE60';
    let photoCount = 0;
    Object.values(D.months).forEach(m => { [...(m.projects||[]),...(m.projectsVN||[])].forEach(p => { photoCount += (p.photos||[]).filter(Boolean).length; }); });
    bar.innerHTML = `
      <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--gray4);margin-bottom:3px">
        <span style="color:${kb>4096?'#e74c3c':kb>3072?'#f39c12':'#27ae60'}">💾 ${(kb/1024).toFixed(1)}MB / 5MB (${Math.round(kb/5120*100)}%)</span>
        <span style="color:${color};font-weight:600">${pct}%</span>
      </div>
      <div style="height:4px;background:var(--gray2);border-radius:2px;overflow:hidden">
        <div style="height:100%;background:${color};width:${pct}%;border-radius:2px;transition:width .4s"></div>
      </div>
      ${photoCount > 0 ? `<div style="font-size:10px;color:var(--gray4);margin-top:3px">📷 ${photoCount} ảnh đang lưu</div>` : ''}
      ${pct > 70 ? `<button class="btn btn-xs btn-danger" style="margin-top:5px;width:100%" onclick="openClearPhotosModal()">🗑 Dọn ảnh cũ</button>` : ''}
    `;
  } catch(e) {}
}

// Auto-xóa ảnh tháng cũ — giữ lại 2 tháng gần nhất
function autoCleanOldPhotos() {
  const sorted = Object.keys(D.months).sort().reverse(); // mới → cũ
  const keep = sorted.slice(0, 2); // giữ 2 tháng gần nhất
  const old = sorted.slice(2);
  if (!old.length) return 0;
  let freed = 0;
  old.forEach(mid => {
    [...(D.months[mid]?.projects||[]),...(D.months[mid]?.projectsVN||[])].forEach(p => {
      (p.photos||[]).filter(Boolean).forEach(ph => { freed += ph.length; });
      p.photos = [];
    });
  });
  const freedKB = Math.round(freed * 0.75 / 1024);
  if (freedKB > 0) {
    persistD();
    toast(`✓ Đã tự động xóa ảnh ${old.length} tháng cũ, giải phóng ~${freedKB}KB`, 4000);
  }
  return freedKB;
}

// Kiểm tra dung lượng và cảnh báo
function checkStorageAndWarn() {
  try {
    const json = JSON.stringify(D);
    const usedKB = Math.round(json.length * 0.75 / 1024);
    const pct = usedKB / 5120 * 100;
    
    if (pct >= 90) {
      // Nguy hiểm: tự động dọn ảnh cũ
      const freed = autoCleanOldPhotos();
      if (freed === 0) {
        // Vẫn đầy → cảnh báo mạnh
        showStorageAlert(usedKB, pct, 'danger');
      }
    } else if (pct >= 75) {
      // Cảnh báo vàng
      showStorageAlert(usedKB, pct, 'warn');
    } else if (pct >= 60) {
      // Nhắc nhở nhẹ
      toast(`💾 Dung lượng: ${(usedKB/1024).toFixed(1)}MB / 5MB (${Math.round(pct)}%) — Nên xóa ảnh tháng cũ`, 4000);
    }
    return pct;
  } catch(e) { return 0; }
}

function applyTheme(themeKey) {
  const theme = THEMES[themeKey]; if (!theme) return;
  const root = document.documentElement;
  Object.entries(theme).forEach(([k,v]) => { if (k.startsWith('--')) root.style.setProperty(k, v); });
  document.querySelector('.header').style.background = theme['--ex-navy']||'';
  document.querySelector('.month-strip').style.background = theme['--ex-navy2']||'';
  localStorage.setItem('app_theme', themeKey);
  if (themeKey !== 'custom') localStorage.setItem('app_theme_data', JSON.stringify(theme));
}

function applyCustomColor(varName, val) {
  document.documentElement.style.setProperty(varName, val);
  const saved = JSON.parse(localStorage.getItem('app_custom_theme')||'{}');
  saved[varName] = val; localStorage.setItem('app_custom_theme', JSON.stringify(saved));
  localStorage.setItem('app_theme', 'custom');
}


function cssToHex(color) {
  if (!color) return '#1F3864'; color = color.trim();
  if (color.startsWith('#') && color.length===7) return color;
  if (color.startsWith('#') && color.length===4) return '#'+color[1]+color[1]+color[2]+color[2]+color[3]+color[3];
  const m = color.match(/rgb\s*\(\s*(\d+)\s*,\s*(\d+)\s*,\s*(\d+)\s*\)/);
  if (m) return '#'+[m[1],m[2],m[3]].map(n=>parseInt(n).toString(16).padStart(2,'0')).join('');
  return '#1F3864';
}

function resetTheme() {
  localStorage.removeItem('app_theme'); localStorage.removeItem('app_custom_theme'); localStorage.removeItem('app_theme_data');
  applyTheme('navy-gold'); closeModal(); toast('↺ Đã đặt lại màu mặc định');
}

              style="width:36px;height:32px;padding:2px;border:1px solid var(--gray2);border-radius:4px;cursor:pointer">
            <label style="font-size:11px;color:var(--gray4)">${l}</label>
          </div>`).join('')}
      </div>
    </div>
    <div class="modal-ft">
      <button class="btn btn-danger btn-sm" onclick="resetTheme()">↺ Mặc định</button>
      <button class="btn btn-gold" onclick="closeModal()">✓ Xong</button>
    </div>
  `);
}

function updateColorInputs() {
  const root = document.documentElement;
  [['--ex-navy','navy'],['--ex-navy2','navy2'],['--ex-gold','gold'],['--ex-orange','orange'],['--new-bg','new_bg'],['--rev-bg','rev_bg']].forEach(([v,id]) => {
    const el = document.getElementById('cp-'+v.replace(/--/g,'').replace(/-/g,'_'));
    if (el) el.value = cssToHex(getComputedStyle(root).getPropertyValue(v).trim());
  });
}

function exportProjectReport(section) {
  section = section || 'jp';
  const isVN = section === 'vn';
  const pjs = isVN
    ? (D.months[D.activeMonth]?.projectsVN || [])
    : (D.months[D.activeMonth]?.projects   || []);
  const m = curMonth();
  const ml = monthLabel(D.activeMonth);
  const now = new Date().toLocaleDateString('vi-VN',{day:'2-digit',month:'2-digit',year:'numeric'});
  const sumNew = pjs.reduce((s,p)=>s+totalNew(p),0);
  const sumRev = pjs.reduce((s,p)=>s+totalRev(p),0);
  const sectionLabel = isVN ? '🇻🇳 Dự án Việt Nam' : '🇯🇵 Dự án Nhật';
  const headerColor  = isVN ? '#C8292A' : '#1F3864';
  const newColor     = isVN ? '#1A7A3A' : '#375623';
  const revColor     = isVN ? '#7F4000' : '#7F6000';

  const pjBlocks = pjs.map((p,i) => {
    const groups = p.groups||[];
    if (!groups.length && totalNew(p)+totalRev(p)===0) return '';
    const tn = totalNew(p), tr = totalRev(p);

    // Group rows: only type name + new count + rev count
    const groupRows = groups.filter(g=>{
      const gNew = (g.rows||[]).filter(r=>r.status==='new').reduce((s,r)=>s+(r.qty||0),0);
      const gRev = (g.rows||[]).filter(r=>r.status==='rev').reduce((s,r)=>s+(r.qty||0),0);
      return gNew+gRev > 0;
    }).map(g => {
      const gNew = (g.rows||[]).filter(r=>r.status==='new').reduce((s,r)=>s+(r.qty||0),0);
      const gRev = (g.rows||[]).filter(r=>r.status==='rev').reduce((s,r)=>s+(r.qty||0),0);
      return `<tr>
        <td style="padding:5px 10px;border-bottom:1px solid #f0f0f0">${x(g.type||'—')}</td>
        <td style="padding:5px 10px;text-align:center;border-bottom:1px solid #f0f0f0;color:#375623;font-weight:600">${gNew||'—'}</td>
        <td style="padding:5px 10px;text-align:center;border-bottom:1px solid #f0f0f0;color:#7F6000;font-weight:600">${gRev||'—'}</td>
        <td style="padding:5px 10px;text-align:center;border-bottom:1px solid #f0f0f0;font-weight:700">${gNew+gRev}</td>
      </tr>`;
    }).join('');

    return `<div style="margin-bottom:18px;border:1px solid #e0e0e0;border-radius:6px;overflow:hidden">
      <div style="background:${headerColor};color:#fff;padding:8px 12px;display:flex;justify-content:space-between;align-items:center">
        <div>
          <span style="font-weight:700;font-size:13px">${i+1}. ${x(p.nameVN||p.nameJP||'—')}</span>
          ${p.nameJP&&p.nameVN?`<span style="font-size:10px;color:rgba(255,255,255,.6);margin-left:8px">${x(p.nameJP)}</span>`:''}
        </div>
        <div style="display:flex;gap:8px;align-items:center">
          <span style="background:#E2EFDA;color:${newColor};padding:2px 8px;border-radius:99px;font-size:11px;font-weight:700">新 ${tn}</span>
          <span style="background:#FFF2CC;color:${revColor};padding:2px 8px;border-radius:99px;font-size:11px;font-weight:700">修 ${tr}</span>
          <span style="background:#FFC000;color:${headerColor};padding:2px 8px;border-radius:99px;font-size:11px;font-weight:800">計 ${tn+tr}</span>
        </div>
      </div>
      ${groupRows ? `<table style="width:100%;border-collapse:collapse;font-size:12px">
        <thead><tr style="background:#f5f5f5">
          <th style="padding:6px 10px;text-align:left;font-weight:600;color:#555">Hạng mục</th>
          <th style="padding:6px 10px;text-align:center;font-weight:600;color:${newColor}">作成 Mới</th>
          <th style="padding:6px 10px;text-align:center;font-weight:600;color:${revColor}">修正 Sửa</th>
          <th style="padding:6px 10px;text-align:center;font-weight:600">Tổng</th>
        </tr></thead>
        <tbody>${groupRows}</tbody>
      </table>` : '<div style="padding:10px;font-size:11px;color:#bbb;text-align:center">Chưa có hạng mục</div>'}
    </div>`;
  }).join('');

  const html = `<div style="font-family:'Be Vietnam Pro',sans-serif;font-size:13px;color:#1a1a1a;max-width:800px;margin:0 auto;padding:24px">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;padding-bottom:14px;border-bottom:3px solid ${headerColor}">
      <div>
        <div style="font-size:10px;color:#aaa;letter-spacing:.05em">Gengai Sougo Việt Nam / Design Studio</div>
        <div style="font-size:22px;font-weight:700;color:${headerColor};margin-top:4px">Báo cáo ${sectionLabel} — ${ml}</div>
        <div style="font-size:11px;color:#888;margin-top:2px">Ngày xuất: ${now}</div>
      </div>
      <div style="text-align:right">
        <div style="font-size:12px;color:#555">Tổng dự án: <strong>${pjs.filter(p=>totalNew(p)+totalRev(p)>0).length}</strong></div>
        <div style="font-size:12px;color:${newColor};margin-top:4px">作成 Làm mới: <strong>${sumNew}</strong></div>
        <div style="font-size:12px;color:${revColor}">修正 Sửa lại: <strong>${sumRev}</strong></div>
        <div style="font-size:14px;font-weight:800;color:${headerColor};margin-top:2px">Tổng: ${sumNew+sumRev} phối cảnh</div>
      </div>
    </div>
    ${pjBlocks||'<p style="color:#bbb">Không có dữ liệu</p>'}
    <div style="margin-top:20px;padding-top:12px;border-top:1px solid #e0e0e0;display:flex;justify-content:space-between;font-size:10px;color:#aaa">
      <span>Gengai Sougo Việt Nam / Design Studio — Performance Management Software</span>
      <span>${ml} | ${now}</span>
    </div>
  </div>`;

  showReportOverlay('📋 Báo cáo ' + sectionLabel + ' — ' + ml, html);
}

function exportOTReport(section) {
  section = section || 'jp';
  const isVN = section === 'vn';
  const pjs = isVN
    ? (D.months[D.activeMonth]?.projectsVN || [])
    : (D.months[D.activeMonth]?.projects   || []);
  const ml = monthLabel(D.activeMonth);
  const now = new Date().toLocaleDateString('vi-VN',{day:'2-digit',month:'2-digit',year:'numeric'});
  const sectionLabel = isVN ? '🇻🇳 Dự án Việt Nam' : '🇯🇵 Dự án Nhật';
  const headerColor  = isVN ? '#C55A11' : '#ED7D31';
  const staffOT = {};
  D.settings.staffList.forEach(s=>staffOT[s]={total:0,entries:[]});
  pjs.forEach(p=>{
    (p.otLog||[]).forEach(e=>{
      if(e.staff&&staffOT[e.staff]){
        staffOT[e.staff].total+=(e.hours||0);
        staffOT[e.staff].entries.push({...e,pjName:p.nameVN||p.nameJP||'?',pjOffice:p.office||''});
      }
    });
  });
  const activeStaff = D.settings.staffList.filter(s=>staffOT[s].total>0);
  if(!activeStaff.length){ toast('Tháng này chưa có nhân sự nào phát sinh OT'); return; }
  const totalOT = activeStaff.reduce((s,k)=>s+staffOT[k].total,0);

  const staffBlocks = activeStaff.map(s=>{
    const v = staffOT[s];
    return `<div style="margin-bottom:14px;border:1px solid #e0e0e0;border-radius:6px;overflow:hidden">
      <div style="background:${headerColor};color:#fff;padding:8px 12px;display:flex;justify-content:space-between">
        <span style="font-weight:700">${s}</span>
        <span style="font-weight:800">Tổng: ${v.total.toFixed(1)}h</span>
      </div>
      <table style="width:100%;border-collapse:collapse;font-size:12px">
        <thead><tr style="background:#f5f5f5">
          <th style="padding:5px 10px;text-align:left">Ngày</th>
          <th style="padding:5px 10px;text-align:left">Dự án</th>
          <th style="padding:5px 10px;text-align:center">Giờ OT</th>
        </tr></thead>
        <tbody>${v.entries.map(e=>`<tr><td style="padding:5px 10px;border-bottom:1px solid #f0f0f0">${e.date||'?'}</td><td style="padding:5px 10px;border-bottom:1px solid #f0f0f0">${x(e.pjName)}</td><td style="padding:5px 10px;text-align:center;border-bottom:1px solid #f0f0f0;font-weight:700;color:#ED7D31">${e.hours}h</td></tr>`).join('')}</tbody>
      </table>
    </div>`;
  }).join('');

  const html = `<div style="font-family:'Be Vietnam Pro',sans-serif;font-size:13px;color:#1a1a1a;max-width:800px;margin:0 auto;padding:24px">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;padding-bottom:14px;border-bottom:3px solid ${headerColor}">
      <div>
        <div style="font-size:10px;color:#aaa;letter-spacing:.05em">Gengai Sougo Việt Nam / Design Studio</div>
        <div style="font-size:22px;font-weight:700;color:${headerColor};margin-top:4px">Báo cáo OT ${sectionLabel} — ${ml}</div>
        <div style="font-size:11px;color:#888;margin-top:2px">Ngày xuất: ${now}</div>
      </div>
      <div style="text-align:right">
        <div style="font-size:12px;color:#555">Nhân sự có OT: <strong>${activeStaff.length}</strong></div>
        <div style="font-size:14px;font-weight:800;color:${headerColor};margin-top:4px">Tổng: ${totalOT.toFixed(1)}h</div>
      </div>
    </div>
    ${staffBlocks}
  </div>`;

  showReportOverlay('⏱ Báo cáo OT ' + sectionLabel + ' — ' + ml, html);
}

function showReportOverlay(title, bodyHtml) {
  const overlay = document.createElement('div');
  overlay.id = 'rptOverlay';
  overlay.style.cssText = 'position:fixed;inset:0;z-index:8000;background:rgba(0,0,0,.55);display:flex;flex-direction:column';
  overlay.innerHTML = `
    <div style="background:#1F3864;color:#fff;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0">
      <h2 style="font-size:15px;font-weight:700">${title}</h2>
      <div style="display:flex;gap:8px">
        <button class="btn btn-sm" style="background:rgba(255,255,255,.15);color:#fff;border-color:rgba(255,255,255,.3)" onclick="printReport()">🖨 In / Lưu PDF</button>
        <button class="btn btn-sm btn-gold" onclick="closeReport()">✕ Đóng</button>
      </div>
    </div>
    <div id="rptBody" style="flex:1;overflow-y:auto;background:#fff">${bodyHtml}</div>`;
  overlay.onclick = e => { if(e.target===overlay) closeReport(); };
  document.body.appendChild(overlay);
}

function printReport() {
  const body = document.getElementById('rptBody'); if (!body) return;
  const w = window.open('','_blank','width=900,height=700');
  w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Báo cáo Phối Cảnh Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Be Vietnam Pro',sans-serif;font-size:12px;color:#1a1a1a;background:var(--table-bg)}@page{size:A4;margin:15mm}@media print{body{-webkit-print-color-adjust:exact;print-color-adjust:exact}}</style>
  </head><body>${body.innerHTML}</body></html>`);
  w.document.close(); setTimeout(()=>{ w.focus(); w.print(); }, 600);
}

function closeReport() { document.getElementById('rptOverlay')?.remove(); }

// Global: apply UI restrictions based on role
function applyRoleUI(role) {
  if (role === 'admin') return;
  if (role === 'edit') {
    // Hide Dashboard, Nhân sự, Cài đặt tabs
    ['navDash','navStaff','navSettings'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.style.display = 'none';
    });
    // Hide ONLY report + theme buttons (keep ＋ Dự án mới and Sync visible)
    document.querySelectorAll('.hdr-right .btn').forEach(btn => {
      const oc = btn.getAttribute('onclick') || '';
      if (oc.includes('openExportMenu') || oc.includes('openThemePicker'))
        btn.style.display = 'none';
    });
    // Make sure we're on main page
    if (activePage !== 'main') showPage('main');
  }
  if (role === 'view') {
    enableViewOnlyMode(true);
  }
}

// Passwords — plain text comparison (works on file:// and https://)
// ── splashLogin alias — window._splashLogin được gán trong initSplash ──

(function initSplash() {
  // Luôn gán _splashLogin TRƯỚC — dù có lỗi gì bên dưới
  window._splashLogin = function() {
    try {
      const pw = (document.getElementById('splashPwInput').value || '').trim();
      const errEl = document.getElementById('splashError');
      if (!pw) { if(errEl) errEl.textContent = 'Vui lòng nhập mật khẩu'; return; }
      if(errEl) errEl.textContent = '';
      const role = SPLASH_PW[pw] || null;
      if (!role) {
        if(errEl) { errEl.textContent = 'Mật khẩu không đúng. Thử lại.'; errEl.classList.remove('shake'); void errEl.offsetWidth; errEl.classList.add('shake'); }
        const inp = document.getElementById('splashPwInput');
        if(inp) { inp.value = ''; inp.focus(); }
        return;
      }
      try { sessionStorage.setItem('splash_role', role); } catch(e) {}
      try { SYNC.role = role; } catch(e) {}
      if (role === 'view') { try { enableViewOnlyMode(true); } catch(e) {} }
      const splash = document.getElementById('splashScreen');
      const hdr = document.querySelector('.header');
      const pgm = document.getElementById('pageMain');
      if(splash) splash.classList.add('fade-out');
      setTimeout(async () => {
        if(splash) splash.style.display = 'none';
        if(hdr) hdr.style.visibility = '';
        if(pgm) pgm.style.visibility = '';
        try { applyRoleUI(role); } catch(e) {}
        try { renderAll(); } catch(e) {}
        try {
          const gistId = SYNC.gistId || D.settings?.sync?.gistId || '';
          if (gistId) {
            setSyncStatus('syncing', 'Đang tải…');
            try {
              const pulled = await syncPull('');
              if (pulled) { renderAll(); setSyncStatus('synced', role==='admin'?'✓ Admin':role==='edit'?'✓ Edit':'👁 View'); toast('✓ Đã tải dữ liệu mới nhất từ cloud'); }
              else { setSyncStatus('synced', role==='admin'?'✓ Admin':role==='edit'?'✓ Edit':'👁 View'); }
            } catch(e) { setSyncStatus('', 'Sync'); }
            try { startPeriodicPull(); } catch(e) {}
          } else if (role === 'admin') {
            const ghToken = localStorage.getItem('sync_gh_token') || '';
            if (!ghToken) setTimeout(()=>toast('💡 Cần GitHub Token — vào Cài đặt → Thiết lập đồng bộ'), 1200);
          }
        } catch(e) {}
      }, 650);
    } catch(e) { console.error('splashLogin error:', e); }
  };
  window.splashLogin = window._splashLogin;

  // Check session — already logged in
  try {
    const sessionRole = sessionStorage.getItem('splash_role');
    if (sessionRole) {
      const splash = document.getElementById('splashScreen');
      if(splash) splash.style.display = 'none';
      try {
        if (sessionRole === 'view') { SYNC.role='view'; enableViewOnlyMode(true); }
        else if (sessionRole === 'edit') { SYNC.role='edit'; }
        else { SYNC.role='admin'; }
      } catch(e) {}
      setTimeout(() => { try { applyRoleUI(sessionRole); } catch(e) {} }, 300);
      setTimeout(async () => {
        try {
          const gistId = SYNC.gistId || D.settings?.sync?.gistId || '';
          if (!gistId) return;
          setSyncStatus('syncing','Đang tải…');
          await syncPull('');
          renderAll();
          setSyncStatus('synced', sessionRole==='admin'?'✓ Admin':sessionRole==='edit'?'✓ Edit':'👁 View');
          startPeriodicPull();
        } catch(e) { setSyncStatus('','Sync'); }
      }, 800);
      return;
    }
  } catch(e) {}

  // Hide app until login
  try {
    const hdr = document.querySelector('.header');
    const pgm = document.getElementById('pageMain');
    if (hdr) hdr.style.visibility = 'hidden';
    if (pgm) pgm.style.visibility = 'hidden';
  } catch(e) {}
})();
