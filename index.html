<style>
/* ═══════════ DESIGN TOKENS (Excel color palette) ═══════════ */
:root {
  /* Exact Excel tones: dark navy header + gold accent + white/light gray body */
  --ex-navy:    #1F3864;   /* Excel dark blue header */
  --ex-navy2:   #2E4A7A;   /* secondary navy */
  --ex-navy3:   #4472C4;   /* Excel medium blue */
  --ex-gold:    #FFC000;   /* Excel yellow/gold — THE signature color */
  --ex-gold2:   #FFD966;   /* lighter gold */
  --ex-red:     #FF0000;   /* Excel red font */
  --ex-white:   #FFFFFF;
  --ex-gray1:   #F2F2F2;   /* lightest bg */
  --ex-gray2:   #D9D9D9;   /* border */
  --ex-gray3:   #BFBFBF;   /* muted */
  --ex-gray4:   #595959;   /* text secondary */
  --ex-dark:    #1A1A1A;
  --ex-green:   #375623;   /* Excel dark green text */
  --ex-green2:  #E2EFDA;   /* Excel light green bg */
  --ex-red2:    #FFC7CE;   /* Excel light red bg */
  --ex-orange:  #ED7D31;   /* Excel orange accent */
  /* Functional */
  --new-bg:     #E2EFDA;
  --new-text:   #375623;
  --rev-bg:     #FFF2CC;
  --rev-text:   #7F6000;
  --r:          4px;
  --r2:         6px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  font-family: 'Be Vietnam Pro', 'Noto Sans JP', sans-serif;
  font-size: 13px;
  background: #EAECF0;
  color: var(--ex-dark);
  min-height: 100vh;
}

/* ═══════════ SCROLLBAR ═══════════ */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--ex-gray3); border-radius: 3px; }

/* ═══════════ TOP HEADER ═══════════ */
.header {
  background: var(--ex-navy);
  height: 56px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 20px;
  position: sticky; top: 0; z-index: 200;
  border-bottom: 3px solid var(--ex-gold);
  box-shadow: 0 2px 12px rgba(0,0,0,.3);
}
.header-logo {
  display: flex; align-items: center; gap: 12px;
}
.header-logo .logo-mark {
  width: 32px; height: 32px;
  background: var(--ex-gold);
  border-radius: var(--r);
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 14px; color: var(--ex-navy);
}
.header-logo .logo-text {
  font-weight: 700; font-size: 15px; color: #fff;
  letter-spacing: .02em;
  line-height: 1.2;
}
.header-logo .logo-sub {
  font-size: 10px; color: var(--ex-gold2); font-weight: 400;
}
.header-nav { display: flex; gap: 4px; }
.nav-btn {
  padding: 6px 14px;
  border-radius: var(--r);
  border: 1px solid rgba(255,255,255,.2);
  background: transparent;
  color: rgba(255,255,255,.75);
  font-size: 12px; font-family: inherit; cursor: pointer;
  transition: all .15s;
}
.nav-btn:hover, .nav-btn.active {
  background: rgba(255,255,255,.12);
  color: #fff; border-color: rgba(255,255,255,.4);
}
.nav-btn.active { background: var(--ex-gold); color: var(--ex-navy); border-color: var(--ex-gold); font-weight: 600; }
.header-right { display: flex; gap: 8px; align-items: center; }

/* ═══════════ MONTH TABS ═══════════ */
.month-strip {
  background: var(--ex-navy2);
  display: flex; align-items: stretch;
  padding: 0 16px;
  gap: 0;
  border-bottom: 1px solid rgba(255,255,255,.1);
  overflow-x: auto; scrollbar-width: none;
}
.month-strip::-webkit-scrollbar { display: none; }
.mtab {
  padding: 9px 18px;
  font-size: 12px; font-weight: 500;
  color: rgba(255,255,255,.55);
  cursor: pointer;
  border-bottom: 3px solid transparent;
  white-space: nowrap;
  transition: all .15s;
  font-family: inherit;
  background: none; border-top: none; border-left: none; border-right: none;
}
.mtab:hover { color: rgba(255,255,255,.85); }
.mtab.active { color: var(--ex-gold); border-bottom-color: var(--ex-gold); }
.mtab-add { color: var(--ex-gold2); font-size: 18px; padding: 4px 14px; line-height: 1; }

/* ═══════════ LAYOUT ═══════════ */
#pageMain { display: flex; height: calc(100vh - 90px); }
#pageDashboard, #pageStaff, #pageSettings { 
  display: none; padding: 20px 24px; overflow-y: auto; height: calc(100vh - 90px);
}

.sidebar {
  width: 260px; min-width: 220px;
  background: #fff;
  border-right: 1px solid var(--ex-gray2);
  display: flex; flex-direction: column;
  overflow: hidden;
}
.sidebar-hd {
  padding: 12px 14px;
  background: var(--ex-navy);
  color: #fff;
  font-size: 11px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase;
  display: flex; align-items: center; justify-content: space-between;
}
.sidebar-hd span { background: var(--ex-gold); color: var(--ex-navy); border-radius: 99px; padding: 1px 8px; font-size: 10px; }
.pj-list { flex: 1; overflow-y: auto; }
.pj-item {
  padding: 10px 14px; cursor: pointer;
  border-left: 3px solid transparent;
  border-bottom: 1px solid var(--ex-gray1);
  transition: all .12s;
}
.pj-item:hover { background: var(--ex-gray1); }
.pj-item.active { border-left-color: var(--ex-gold); background: #FFFBEE; }
.pj-item .pj-title { font-weight: 600; font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.pj-item .pj-sub { font-size: 10px; color: var(--ex-gray4); margin-top: 3px; display: flex; gap: 5px; align-items: center; }
.sidebar-ft { padding: 10px 12px; border-top: 1px solid var(--ex-gray2); background: var(--ex-gray1); }

.content { flex: 1; overflow-y: auto; background: #EAECF0; }
.content-inner { padding: 16px 20px; }

/* ═══════════ BUTTONS ═══════════ */
.btn {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 7px 14px; border-radius: var(--r); border: 1px solid var(--ex-gray2);
  background: #fff; color: var(--ex-dark);
  font-family: inherit; font-size: 12px; cursor: pointer; transition: all .12s;
  white-space: nowrap;
}
.btn:hover { background: var(--ex-gray1); }
.btn-primary { background: var(--ex-navy); color: #fff; border-color: var(--ex-navy); }
.btn-primary:hover { background: var(--ex-navy2); }
.btn-gold { background: var(--ex-gold); color: var(--ex-navy); border-color: var(--ex-gold); font-weight: 600; }
.btn-gold:hover { background: var(--ex-gold2); }
.btn-sm { padding: 5px 10px; font-size: 11px; }
.btn-xs { padding: 3px 8px; font-size: 10px; }
.btn-danger { color: #c00; }
.btn-danger:hover { background: #fff0f0; border-color: #ffaaaa; }
.btn-ghost { background: transparent; border-color: transparent; }
.btn-ghost:hover { background: var(--ex-gray1); border-color: var(--ex-gray2); }
.btn-full { width: 100%; justify-content: center; }
.btn-new { background: var(--new-bg); color: var(--new-text); border-color: #a9d18e; }
.btn-new:hover { background: #d0e9c4; }
.btn-rev { background: var(--rev-bg); color: var(--rev-text); border-color: #ffd966; }
.btn-rev:hover { background: #ffe59a; }

/* ═══════════ BADGES / PILLS ═══════════ */
.badge {
  display: inline-flex; align-items: center; padding: 1px 7px;
  border-radius: 99px; font-size: 10px; font-weight: 600; white-space: nowrap;
}
.badge-osaka { background: #dbeafe; color: #1d4ed8; }
.badge-tokyo { background: #fce7f3; color: #9d174d; }
.badge-new { background: var(--new-bg); color: var(--new-text); }
.badge-rev { background: var(--rev-bg); color: var(--rev-text); }
.badge-gold { background: var(--ex-gold); color: var(--ex-navy); }

/* ═══════════ CARD ═══════════ */
.card {
  background: #fff; border: 1px solid var(--ex-gray2);
  border-radius: var(--r2); margin-bottom: 14px;
  overflow: hidden;
}
.card-hd {
  background: var(--ex-navy); color: #fff;
  padding: 10px 16px; font-size: 12px; font-weight: 600;
  display: flex; align-items: center; justify-content: space-between; gap: 10px;
  border-bottom: 2px solid var(--ex-gold);
}
.card-hd .card-hd-title { display: flex; align-items: center; gap: 8px; }
.card-body { padding: 14px 16px; }

/* ═══════════ HERO STATS (TOP BIG) ═══════════ */
.hero-stats {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr 1fr auto;
  gap: 12px;
  margin-bottom: 16px;
  align-items: stretch;
}
.hero-box {
  background: #fff; border: 1px solid var(--ex-gray2);
  border-radius: var(--r2); padding: 16px 18px;
  border-top: 4px solid var(--ex-gray3);
  display: flex; flex-direction: column; justify-content: space-between;
}
.hero-box.gold { border-top-color: var(--ex-gold); }
.hero-box.navy { border-top-color: var(--ex-navy); }
.hero-box.green { border-top-color: #70AD47; }
.hero-box.orange { border-top-color: var(--ex-orange); }
.hero-num {
  font-size: 42px; font-weight: 700; line-height: 1;
  font-family: 'Be Vietnam Pro', sans-serif;
}
.hero-box.gold .hero-num { color: var(--ex-navy); }
.hero-box.navy .hero-num { color: var(--ex-navy); }
.hero-box.green .hero-num { color: var(--new-text); }
.hero-box.orange .hero-num { color: #7f3500; }
.hero-label { font-size: 11px; color: var(--ex-gray4); margin-top: 4px; font-weight: 500; text-transform: uppercase; letter-spacing: .06em; }
.hero-jp { font-size: 10px; color: var(--ex-gray3); margin-top: 2px; }
.hero-progress { margin-top: 10px; }
.progress-track { height: 6px; background: var(--ex-gray2); border-radius: 3px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--ex-gold); border-radius: 3px; transition: width .4s; }
.progress-fill.green { background: #70AD47; }
.progress-label { font-size: 10px; color: var(--ex-gray4); margin-top: 3px; display: flex; justify-content: space-between; }
.hero-target-box {
  background: var(--ex-navy); color: #fff;
  border-radius: var(--r2); padding: 16px 18px;
  display: flex; flex-direction: column; gap: 10px;
  min-width: 180px;
}
.hero-target-box .tgt-title { font-size: 10px; letter-spacing: .08em; text-transform: uppercase; color: var(--ex-gold2); font-weight: 600; }
.hero-target-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.hero-target-row label { font-size: 11px; color: rgba(255,255,255,.7); }
.hero-target-input {
  width: 70px; padding: 5px 8px; text-align: center;
  border: 1px solid rgba(255,255,255,.3); border-radius: var(--r);
  background: rgba(255,255,255,.1); color: #fff;
  font-family: inherit; font-size: 14px; font-weight: 600;
}
.hero-target-input:focus { outline: none; border-color: var(--ex-gold); }

/* ═══════════ RENDER TABLE ═══════════ */
.tbl-wrap { overflow-x: auto; }
.rtbl {
  width: 100%; border-collapse: collapse; font-size: 12px;
}
.rtbl th {
  background: var(--ex-navy); color: #fff;
  padding: 8px 10px; text-align: left;
  font-size: 10px; letter-spacing: .07em; text-transform: uppercase;
  border-right: 1px solid rgba(255,255,255,.1);
  white-space: nowrap;
}
.rtbl td {
  padding: 7px 10px; border-bottom: 1px solid var(--ex-gray1);
  vertical-align: middle; border-right: 1px solid #f5f5f5;
}
.rtbl tr:hover td { background: #FFFBEE; }
.rtbl .row-new td { background: #f7fff4; }
.rtbl .row-rev td { background: #fffdf0; }
.rtbl .row-new:hover td, .rtbl .row-rev:hover td { background: #FFFBEE; }
.rtbl tfoot td { font-weight: 700; background: var(--ex-gray1) !important; border-top: 2px solid var(--ex-navy); }

.qty-inp {
  width: 56px; padding: 5px 6px; text-align: center;
  border: 1px solid var(--ex-gray2); border-radius: var(--r);
  font-family: inherit; font-size: 14px; font-weight: 700; background: #fff;
}
.qty-inp:focus { outline: none; border-color: var(--ex-gold); box-shadow: 0 0 0 2px rgba(255,192,0,.2); }
.type-inp {
  width: 100%; min-width: 150px; padding: 5px 8px;
  border: 1px solid var(--ex-gray2); border-radius: var(--r);
  font-family: inherit; font-size: 12px; background: #fff;
}
.type-inp:focus { outline: none; border-color: var(--ex-gold); }
.sel-sm {
  padding: 5px 8px; border: 1px solid var(--ex-gray2); border-radius: var(--r);
  font-family: inherit; font-size: 12px; background: #fff; cursor: pointer;
}
.sel-sm:focus { outline: none; border-color: var(--ex-gold); }

/* ═══════════ STATUS TOGGLE ═══════════ */
.status-toggle { display: flex; border: 1px solid var(--ex-gray2); border-radius: var(--r); overflow: hidden; }
.st-opt {
  padding: 4px 10px; font-size: 11px; font-weight: 600; cursor: pointer;
  border: none; background: #fff; font-family: inherit; transition: all .1s;
}
.st-opt.new.selected { background: var(--new-bg); color: var(--new-text); }
.st-opt.rev.selected { background: var(--rev-bg); color: var(--rev-text); }
.st-opt:not(.selected) { color: var(--ex-gray3); }

/* ═══════════ INFO GRID ═══════════ */
.info-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
.info-grid.c4 { grid-template-columns: repeat(4, 1fr); }
.info-grid.c2 { grid-template-columns: repeat(2, 1fr); }
.field { display: flex; flex-direction: column; gap: 4px; }
.field label {
  font-size: 10px; text-transform: uppercase; letter-spacing: .08em;
  color: var(--ex-gray4); font-weight: 600;
}
.field input, .field select, .field textarea {
  padding: 7px 10px; border: 1px solid var(--ex-gray2); border-radius: var(--r);
  font-family: inherit; font-size: 12px; background: #fff;
  transition: border-color .12s;
}
.field input:focus, .field select:focus, .field textarea:focus {
  outline: none; border-color: var(--ex-gold); box-shadow: 0 0 0 2px rgba(255,192,0,.15);
}
.field textarea { resize: vertical; min-height: 72px; }

/* ═══════════ PHOTOS GRID ═══════════ */
.photos-grid {
  display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px;
}
.photo-slot {
  aspect-ratio: 4/3; border: 2px dashed var(--ex-gray2);
  border-radius: var(--r2); overflow: hidden; position: relative;
  cursor: pointer; transition: border-color .12s;
  background: var(--ex-gray1); display: flex; flex-direction: column;
  align-items: center; justify-content: center;
}
.photo-slot:hover { border-color: var(--ex-gold); }
.photo-slot.has-img { border-style: solid; border-color: var(--ex-gray2); }
.photo-slot img { width: 100%; height: 100%; object-fit: cover; }
.photo-slot .ph-placeholder { font-size: 22px; color: var(--ex-gray3); }
.photo-slot .ph-plus { font-size: 10px; color: var(--ex-gray3); margin-top: 4px; }
.photo-slot .ph-del {
  position: absolute; top: 3px; right: 3px;
  background: rgba(0,0,0,.6); color: #fff;
  border: none; border-radius: 50%; width: 20px; height: 20px;
  font-size: 12px; cursor: pointer; display: none;
  align-items: center; justify-content: center;
}
.photo-slot:hover .ph-del { display: flex; }
.photo-slot input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }

/* ═══════════ OT TABLE ═══════════ */
.ot-grid {
  display: grid; grid-template-columns: 1fr auto auto auto;
  gap: 6px; align-items: center;
}
.ot-row { display: contents; }
.ot-row > * { padding: 5px 0; border-bottom: 1px solid var(--ex-gray1); }
.ot-inp {
  width: 70px; padding: 5px 8px; text-align: center;
  border: 1px solid var(--ex-gray2); border-radius: var(--r);
  font-family: inherit; font-size: 12px;
}
.ot-inp:focus { outline: none; border-color: var(--ex-gold); }

/* ═══════════ STAFF PERFORMANCE TABLE ═══════════ */
.perf-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.perf-table th {
  background: var(--ex-navy); color: #fff;
  padding: 8px 12px; text-align: left;
  font-size: 10px; text-transform: uppercase; letter-spacing: .06em;
  border-right: 1px solid rgba(255,255,255,.1);
}
.perf-table td {
  padding: 9px 12px; border-bottom: 1px solid var(--ex-gray1);
  border-right: 1px solid #f5f5f5;
}
.perf-table tr:hover td { background: #FFFBEE; }
.perf-table .total-row td { font-weight: 700; background: var(--ex-gray1) !important; border-top: 2px solid var(--ex-navy); }
.num-c { text-align: center; font-weight: 600; }
.mini-bar {
  display: flex; align-items: center; gap: 6px;
}
.mini-bar-track { flex: 1; height: 6px; background: var(--ex-gray2); border-radius: 3px; overflow: hidden; }
.mini-bar-fill { height: 100%; background: var(--ex-gold); border-radius: 3px; }
.mini-bar-fill.blue { background: var(--ex-navy3); }
.mini-bar-fill.green { background: #70AD47; }

/* ═══════════ DASHBOARD GRID ═══════════ */
.dash-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.dash-grid.c3 { grid-template-columns: 1fr 1fr 1fr; }
.dash-grid.full { grid-template-columns: 1fr; }
.chart-box {
  background: #fff; border: 1px solid var(--ex-gray2);
  border-radius: var(--r2); padding: 16px;
}
.chart-box h4 {
  font-size: 12px; font-weight: 600; color: var(--ex-navy);
  margin-bottom: 12px; text-transform: uppercase; letter-spacing: .06em;
  border-left: 3px solid var(--ex-gold); padding-left: 8px;
}

/* ═══════════ MODAL ═══════════ */
.modal-bg {
  position: fixed; inset: 0; background: rgba(0,0,0,.5);
  display: flex; align-items: center; justify-content: center; z-index: 999;
}
.modal {
  background: #fff; border-radius: var(--r2);
  padding: 24px 28px; max-width: 560px; width: 92%;
  box-shadow: 0 24px 64px rgba(0,0,0,.25);
}
.modal h3 { font-size: 16px; font-weight: 700; margin-bottom: 18px; color: var(--ex-navy); border-left: 3px solid var(--ex-gold); padding-left: 10px; }
.modal-ft { display: flex; justify-content: flex-end; gap: 8px; margin-top: 20px; }

/* ═══════════ TOAST ═══════════ */
.toast {
  position: fixed; bottom: 24px; right: 24px;
  background: var(--ex-navy); color: #fff;
  padding: 11px 20px; border-radius: var(--r2); font-size: 13px;
  border-left: 4px solid var(--ex-gold); z-index: 9999;
  box-shadow: 0 8px 24px rgba(0,0,0,.2);
  animation: toastin .2s ease;
}
@keyframes toastin { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

/* ═══════════ SECTION HEADER ═══════════ */
.sect-hd {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 14px;
}
.sect-hd h2 { font-size: 18px; font-weight: 700; color: var(--ex-navy); }
.sect-hd .sect-sub { font-size: 11px; color: var(--ex-gray4); margin-top: 2px; }

/* ═══════════ SETTINGS TAGS ═══════════ */
.tag-cloud { display: flex; flex-wrap: wrap; gap: 6px; }
.tag-edit {
  display: inline-flex; align-items: center; gap: 4px;
  background: var(--ex-gray1); border: 1px solid var(--ex-gray2);
  border-radius: 99px; padding: 4px 10px;
}
.tag-edit input { border: none; background: transparent; font-family: inherit; font-size: 11px; outline: none; width: 80px; }
.tag-edit .tdel { cursor: pointer; color: var(--ex-gray3); }
.tag-edit .tdel:hover { color: var(--ex-red); }

/* ═══════════ MINI STAT CHIP ═══════════ */
.chip { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 99px; font-size: 11px; font-weight: 600; }
.chip-gold { background: var(--rev-bg); color: var(--rev-text); }
.chip-green { background: var(--new-bg); color: var(--new-text); }
.chip-blue { background: #dbeafe; color: #1d4ed8; }
.chip-navy { background: var(--ex-navy); color: #fff; }

/* ═══════════ DIVIDER ═══════════ */
.divider { border: none; border-top: 1px solid var(--ex-gray2); margin: 14px 0; }

/* ═══════════ EMPTY ═══════════ */
.empty-state { text-align: center; padding: 50px 20px; color: var(--ex-gray4); }
.empty-state .ei { font-size: 40px; margin-bottom: 10px; }
.empty-state h3 { font-size: 15px; font-weight: 700; color: var(--ex-navy); margin-bottom: 6px; }

/* ═══════════ NOTE AREA ═══════════ */
.note-ta {
  width: 100%; padding: 10px 12px;
  border: 1px solid var(--ex-gray2); border-radius: var(--r);
  font-family: inherit; font-size: 12px; resize: vertical; min-height: 80px;
  background: #FFFDF5;
}
.note-ta:focus { outline: none; border-color: var(--ex-gold); }

/* ═══════════ GITHUB SYNC ═══════════ */
.sync-status {
  display: flex; align-items: center; gap: 6px;
  padding: 4px 10px; border-radius: 99px;
  font-size: 11px; font-weight: 600; cursor: pointer;
  transition: all .15s; border: 1px solid rgba(255,255,255,.25);
  color: rgba(255,255,255,.8); background: transparent; font-family: inherit;
}
.sync-status:hover { background: rgba(255,255,255,.1); }
.sync-status .dot { width: 7px; height: 7px; border-radius: 50%; background: #888; flex-shrink: 0; }
.sync-status.synced .dot { background: #4ade80; box-shadow: 0 0 5px #4ade80; }
.sync-status.error .dot { background: #f87171; }
.sync-status.syncing .dot { background: var(--ex-gold); animation: pulse .8s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

/* ═══════════ REPORT OVERLAY ═══════════ */
.rpt-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.65);
  z-index: 2000; display: flex; align-items: center; justify-content: center;
}
.rpt-container {
  background: #fff; width: 860px; max-width: 96vw;
  max-height: 92vh; border-radius: 8px;
  display: flex; flex-direction: column;
  box-shadow: 0 24px 80px rgba(0,0,0,.4); overflow: hidden;
}
.rpt-header {
  background: var(--ex-navy); color: #fff;
  padding: 13px 20px; display: flex; align-items: center; justify-content: space-between;
  border-bottom: 3px solid var(--ex-gold); flex-shrink: 0;
}
.rpt-header h2 { font-size: 14px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
.rpt-actions { display: flex; gap: 8px; }
.rpt-body { flex: 1; overflow-y: auto; }

/* ── REPORT DOCUMENT ── */
.report-doc {
  padding: 40px 48px;
  font-family: 'Be Vietnam Pro','Noto Sans JP',sans-serif;
  font-size: 12px; color: #1a1a1a; background: #fff;
}
.report-doc .doc-header {
  display: flex; justify-content: space-between; align-items: flex-start;
  padding-bottom: 16px; border-bottom: 2px solid #1F3864; margin-bottom: 24px;
}
.report-doc .doc-logo { display: flex; align-items: center; gap: 12px; }
.report-doc .doc-logo-mark {
  width: 42px; height: 42px; background: #1F3864; border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-weight: 800; font-size: 14px; color: #FFC000;
}
.report-doc .doc-title-main { font-size: 18px; font-weight: 700; color: #1F3864; line-height: 1.2; }
.report-doc .doc-title-sub { font-size: 11px; color: #595959; margin-top: 3px; }
.report-doc .doc-meta { text-align: right; font-size: 11px; color: #595959; line-height: 1.9; }
.report-doc .doc-meta strong { color: #1F3864; }
.report-doc .section-title {
  font-size: 13px; font-weight: 700; color: #1F3864;
  border-left: 4px solid #FFC000; padding-left: 10px;
  margin: 22px 0 12px;
}
.report-doc .kpi-row { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; margin-bottom: 22px; }
.report-doc .kpi-box {
  border: 1px solid #D9D9D9; border-radius: 6px; padding: 14px;
  border-top: 3px solid #1F3864; text-align: center;
}
.report-doc .kpi-num { font-size: 30px; font-weight: 700; color: #1F3864; line-height: 1; }
.report-doc .kpi-box.gold { border-top-color: #FFC000; }
.report-doc .kpi-box.gold .kpi-num { color: #7F6000; }
.report-doc .kpi-box.green { border-top-color: #70AD47; }
.report-doc .kpi-box.green .kpi-num { color: #375623; }
.report-doc .kpi-box.orange { border-top-color: #ED7D31; }
.report-doc .kpi-box.orange .kpi-num { color: #7F3500; }
.report-doc .kpi-lbl { font-size: 10px; color: #595959; margin-top: 5px; text-transform: uppercase; letter-spacing: .05em; }
.report-doc table { width: 100%; border-collapse: collapse; font-size: 11px; margin-bottom: 16px; }
.report-doc table th {
  background: #1F3864; color: #fff; padding: 8px 10px;
  text-align: left; font-size: 10px; text-transform: uppercase; letter-spacing: .06em;
}
.report-doc table td { padding: 8px 10px; border-bottom: 1px solid #F2F2F2; }
.report-doc table tr:nth-child(even) td { background: #F9F9F9; }
.report-doc table tfoot td { font-weight: 700; background: #FFF2CC !important; border-top: 2px solid #1F3864; }
.report-doc .c-new { color: #375623; font-weight: 600; text-align: center; }
.report-doc .c-rev { color: #7F6000; font-weight: 600; text-align: center; }
.report-doc .c-tot { font-weight: 700; text-align: center; }
.report-doc .c-ot  { color: #C55A11; font-weight: 600; text-align: center; }
.report-doc .b-osaka { background:#dbeafe;color:#1d4ed8;padding:1px 7px;border-radius:99px;font-size:10px;font-weight:600; }
.report-doc .b-tokyo { background:#fce7f3;color:#9d174d;padding:1px 7px;border-radius:99px;font-size:10px;font-weight:600; }
.report-doc .pj-block { margin-bottom: 18px; border: 1px solid #E8E8E8; border-radius: 6px; overflow: hidden; }
.report-doc .pj-block-hd {
  background: #EEF3FB; padding: 9px 14px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid #D9D9D9;
}
.report-doc .pj-block-hd .pj-name { font-weight: 700; font-size: 12px; color: #1F3864; }
.report-doc .pj-block-hd .pj-chips { display: flex; gap: 6px; align-items: center; }
.report-doc .pj-block-hd .chip-new { background:#E2EFDA;color:#375623;padding:2px 8px;border-radius:99px;font-size:10px;font-weight:600; }
.report-doc .pj-block-hd .chip-rev { background:#FFF2CC;color:#7F6000;padding:2px 8px;border-radius:99px;font-size:10px;font-weight:600; }
.report-doc .pj-block-hd .chip-tot { background:#1F3864;color:#fff;padding:2px 8px;border-radius:99px;font-size:10px;font-weight:600; }
.report-doc .ot-staff-block { margin-bottom: 20px; }
.report-doc .ot-staff-hd {
  background: #1F3864; color: #fff; padding: 9px 14px; border-radius: 6px 6px 0 0;
  display: flex; justify-content: space-between; align-items: center;
}
.report-doc .ot-staff-hd .sname { font-size: 13px; font-weight: 700; }
.report-doc .ot-staff-hd .stotal { color: #FFC000; font-size: 13px; font-weight: 700; }
.report-doc .doc-footer {
  margin-top: 36px; padding-top: 12px; border-top: 1px solid #D9D9D9;
  display: flex; justify-content: space-between; font-size: 10px; color: #BFBFBF;
}
.report-doc .sign-section {
  display: grid; grid-template-columns: 1fr 1fr; gap: 40px; margin-top: 28px;
}
.report-doc .sign-box {
  border-top: 1px solid #595959; padding-top: 10px; text-align: center;
  font-size: 11px; color: #595959;
}

/* ═══════════ THEME PICKER ═══════════ */
.theme-swatch {
  width: 32px; height: 32px; border-radius: 50%; cursor: pointer;
  border: 3px solid transparent; transition: all .15s; flex-shrink: 0;
}
.theme-swatch:hover { transform: scale(1.15); }
.theme-swatch.active { border-color: #fff; box-shadow: 0 0 0 2px var(--ex-navy); }
.color-picker-row {
  display: flex; align-items: center; gap: 10px; margin-bottom: 12px;
}
.color-picker-row label {
  font-size: 11px; text-transform: uppercase; letter-spacing: .07em;
  color: var(--ex-gray4); font-weight: 600; min-width: 120px;
}
.color-picker-row input[type=color] {
  width: 40px; height: 32px; padding: 2px; border: 1px solid var(--ex-gray2);
  border-radius: var(--r); cursor: pointer; background: #fff;
}
.color-picker-row .color-preview {
  width: 80px; height: 28px; border-radius: var(--r);
  border: 1px solid var(--ex-gray2); display: flex; align-items: center;
  justify-content: center; font-size: 10px; font-weight: 600;
}

/* ═══════════ OT log entry ═══════════ */
/* OT log entry */
.ot-entry {
  display: flex; align-items: center; gap: 8px;
  padding: 5px 0; border-bottom: 1px solid var(--ex-gray1);
  font-size: 12px;
}
.ot-entry:last-child { border-bottom: none; }
.ot-date { color: var(--ex-gray4); min-width: 70px; }
.ot-hours { font-weight: 700; color: var(--ex-navy); min-width: 40px; }
.ot-name { color: var(--ex-gray4); min-width: 80px; }

/* month summary table */
.sum-tbl { width: 100%; border-collapse: collapse; font-size: 12px; }
.sum-tbl th { background: var(--ex-navy); color: #fff; padding: 8px 10px; text-align: left; font-size: 10px; text-transform: uppercase; letter-spacing: .06em; }
.sum-tbl td { padding: 9px 10px; border-bottom: 1px solid var(--ex-gray1); }
.sum-tbl tr:hover td { background: #FFFBEE; cursor: pointer; }
.sum-tbl .tr-total td { font-weight: 700; background: var(--rev-bg) !important; border-top: 2px solid var(--ex-navy); }
</style>
</head>

  </div>
  <div class="header-nav">
    <button class="nav-btn active" id="navMain" onclick="showPage('main')">📋 Dự án / Tháng</button>
    <button class="nav-btn" id="navDash" onclick="showPage('dashboard')">📊 Dashboard</button>
    <button class="nav-btn" id="navStaff" onclick="showPage('staff')">👥 Nhân sự</button>
    <button class="nav-btn" id="navSettings" onclick="showPage('settings')">⚙ Cài đặt</button>
  </div>
  <div class="header-right">
    <button class="sync-status" id="syncBtn" onclick="openSyncPanel()" title="GitHub Sync">
      <span class="dot"></span><span id="syncLabel">Sync</span>
    </button>
    <button class="btn btn-sm" style="background:rgba(255,255,255,.1);color:#fff;border-color:rgba(255,255,255,.25)" onclick="openThemePicker()" title="Tuỳ chỉnh màu sắc">🎨</button>
    <button class="btn btn-sm" style="background:rgba(255,255,255,.1);color:#fff;border-color:rgba(255,255,255,.25)" onclick="openExportMenu()">📤 Xuất báo cáo</button>
    <button class="btn btn-gold btn-sm" onclick="openAddProject()">＋ Dự án mới</button>
  </div>
</div>

<!-- MONTH TABS -->
<div class="month-strip" id="monthStrip"></div>

<!-- ═══ PAGE: MAIN ═══ -->
<div id="pageMain">
  <div class="sidebar">
    <div class="sidebar-hd">Dự án tháng <span id="pjCount">0</span></div>
    <div class="pj-list" id="pjList"></div>
    <div class="sidebar-ft">
      <button class="btn btn-full btn-primary btn-sm" onclick="openAddProject()">＋ Thêm dự án</button>
    </div>
  </div>
  <div class="content">
    <div class="content-inner" id="contentInner">
      <div class="empty-state"><div class="ei">📁</div><h3>Chọn dự án hoặc xem tổng kết tháng</h3><p style="margin-top:6px">Nhấn vào dự án bên trái hoặc xem Dashboard tổng hợp</p></div>
    </div>
  </div>
</div>

<!-- ═══ PAGE: DASHBOARD ═══ -->
<div id="pageDashboard">
  <div class="sect-hd">
    <div><h2>Dashboard Tổng Hợp</h2><div class="sect-sub">Năng suất & hiệu suất toàn văn phòng</div></div>
    <select class="sel-sm" id="dashYear" onchange="renderDashboard()" style="width:120px"></select>
  </div>
  <div id="dashContent"></div>
</div>

<!-- ═══ PAGE: STAFF ═══ -->
<div id="pageStaff">
  <div class="sect-hd">
    <div><h2>Quản lý Nhân sự</h2><div class="sect-sub">Hiệu suất, OT và phân công từng tháng</div></div>
    <div style="display:flex;gap:8px">
      <select class="sel-sm" id="staffMonth" onchange="renderStaffPage()" style="width:130px"></select>
    </div>
  </div>
  <div id="staffContent"></div>
</div>

<!-- ═══ PAGE: SETTINGS ═══ -->
<div id="pageSettings">
  <div class="sect-hd"><h2>Cài đặt hệ thống</h2></div>
  <div id="settingsContent"></div>
</div>

<!-- MODAL CONTAINER & TOAST -->
<div id="modalRoot"></div>
<div id="toastEl" style="display:none" class="toast"></div>
<canvas id="hiddenCanvas" style="display:none"></canvas>

<script>
/* ══════════════════════════════════════════════════════
   CONSTANTS & DEFAULTS
══════════════════════════════════════════════════════ */
const SK = 'phoicanh_pro_v2';

function freshData() {
  const now = new Date();
  const mid = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  return {
    settings: {
      staffList: ['トゥアン','ヒエン','L.フォン','ハー','ズエン','タイン','M.フオン'],
      typeList: ['外観パース','アプローチパース','エントランスパース','鳥瞰パース',
        'ラウンジパース','スタイルラウンジ','内観パース','大浴場パース','大浴パース',
        '和室パース','浴室パース','集会室パース','レストランパース','着色立面作成',
        'スカイラウンジ','中庭パース','風除室パース','バルコニーパース','住戸内パース',
        'コワーキングスペース','EVホールパース','玄関周りのパース'],
      contactList: ['ソン','フン','ニャー','TT.チエン','N.ビン','ニュン','カイン',
        'Inamura','Ogura','Okuda','Ushirozuru'],
    },
    months: {
      [mid]: { projects: [], targetNew: 20, targetRev: 36 }
    },
    activeMonth: mid
  };
}

let D = (() => {
  try { const r = localStorage.getItem(SK); if(r) return JSON.parse(r); } catch(e){}
  return freshData();
})();

function save() { localStorage.setItem(SK, JSON.stringify(D)); }

let activePjId = null;
let activePage = 'main';

/* ══════════════════════════════════════════════════════
   UTILS
══════════════════════════════════════════════════════ */
function gid() { return Date.now().toString(36)+Math.random().toString(36).slice(2,5); }

function x(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function toast(msg, dur=2800) {
  const t = document.getElementById('toastEl');
  t.textContent = msg; t.style.display='block';
  clearTimeout(t._t);
  t._t = setTimeout(()=>t.style.display='none', dur);
}

function curMonth() { return D.months[D.activeMonth] || {projects:[], targetNew:20, targetRev:36}; }
function curProjects() { return curMonth().projects || []; }
function getPj(id) { return curProjects().find(p=>p.id===id); }
function getAllProjects() {
  return Object.entries(D.months).flatMap(([mid, m])=>(m.projects||[]).map(p=>({...p,_month:mid})));
}

function totalNew(p) { return (p.records||[]).filter(r=>r.status==='new').reduce((s,r)=>s+(r.qty||0),0); }
function totalRev(p) { return (p.records||[]).filter(r=>r.status==='rev').reduce((s,r)=>s+(r.qty||0),0); }

function monthLabel(mid) {
  const [y,m] = mid.split('-');
  return `T${parseInt(m)}/${y}`;
}

/* ══════════════════════════════════════════════════════
   PAGE NAVIGATION
══════════════════════════════════════════════════════ */
function showPage(p) {
  activePage = p;
  ['main','dashboard','staff','settings'].forEach(pg => {
    document.getElementById('page'+pg.charAt(0).toUpperCase()+pg.slice(1)).style.display = pg===p ? (pg==='main'?'flex':'block') : 'none';
    document.getElementById('nav'+pg.charAt(0).toUpperCase()+pg.slice(1))?.classList.toggle('active', pg===p);
  });
  if (p==='dashboard') renderDashboard();
  else if (p==='staff') renderStaffPage();
  else if (p==='settings') renderSettings();
}

/* ══════════════════════════════════════════════════════
   MONTH STRIP
══════════════════════════════════════════════════════ */
function renderMonthStrip() {
  const strip = document.getElementById('monthStrip');
  const months = Object.keys(D.months).sort();
  strip.innerHTML = months.map(mid => `
    <button class="mtab ${mid===D.activeMonth?'active':''}" onclick="switchMonth('${mid}')">${monthLabel(mid)}</button>
  `).join('') + `<button class="mtab mtab-add" title="Thêm tháng mới" onclick="addMonth()">＋</button>`;
  // populate selects
  populateMonthSelects(months);
}
function populateMonthSelects(months) {
  const staffSel = document.getElementById('staffMonth');
  if (staffSel) {
    staffSel.innerHTML = months.map(mid=>`<option value="${mid}" ${mid===D.activeMonth?'selected':''}>${monthLabel(mid)}</option>`).join('');
  }
  const dashY = document.getElementById('dashYear');
  if (dashY) {
    const years = [...new Set(months.map(m=>m.split('-')[0]))].sort();
    dashY.innerHTML = years.map(y=>`<option value="${y}">${y}</option>`).join('');
    dashY.value = new Date().getFullYear();
  }
}

function switchMonth(mid) {
  D.activeMonth = mid; activePjId = null; save();
  renderAll();
}
function addMonth() {
  const months = Object.keys(D.months).sort();
  const last = months[months.length-1];
  let [y,m] = last.split('-').map(Number);
  m++; if(m>12){m=1;y++;}
  const newMid = `${y}-${String(m).padStart(2,'0')}`;
  if (!D.months[newMid]) D.months[newMid] = {projects:[], targetNew:20, targetRev:36};
  D.activeMonth = newMid; activePjId = null; save();
  renderAll(); toast(`✓ Đã thêm ${monthLabel(newMid)}`);
}

/* ══════════════════════════════════════════════════════
   SIDEBAR
══════════════════════════════════════════════════════ */
function renderSidebar() {
  const pjs = curProjects();
  document.getElementById('pjCount').textContent = pjs.length;
  const list = document.getElementById('pjList');
  if (!pjs.length) {
    list.innerHTML = '<div style="padding:20px;text-align:center;color:var(--ex-gray4);font-size:11px">Chưa có dự án</div>';
    return;
  }
  list.innerHTML = pjs.map(p=>`
    <div class="pj-item ${p.id===activePjId?'active':''}" onclick="selectPj('${p.id}')">
      <div class="pj-title">${x(p.nameVN||p.nameJP||'—')}</div>
      <div class="pj-sub">
        <span class="badge badge-${p.office==='大阪'?'osaka':'tokyo'}">${p.office||'?'}</span>
        <span class="chip chip-green" style="padding:0 5px;font-size:9px">新${totalNew(p)}</span>
        <span class="chip chip-gold" style="padding:0 5px;font-size:9px">修${totalRev(p)}</span>
      </div>
    </div>
  `).join('');
}

/* ══════════════════════════════════════════════════════
   SELECT PROJECT
══════════════════════════════════════════════════════ */
function selectPj(id) {
  activePjId = id;
  renderSidebar();
  renderContent();
}

/* ══════════════════════════════════════════════════════
   CONTENT AREA (month summary or project detail)
══════════════════════════════════════════════════════ */
function renderContent() {
  const ci = document.getElementById('contentInner');
  if (activePjId) {
    const p = getPj(activePjId);
    if (!p) { activePjId=null; renderContent(); return; }
    renderProjectDetail(ci, p);
  } else {
    renderMonthOverview(ci);
  }
}

/* ── MONTH OVERVIEW ── */
function renderMonthOverview(ci) {
  const pjs = curProjects();
  const m = curMonth();
  const sumNew = pjs.reduce((s,p)=>s+totalNew(p),0);
  const sumRev = pjs.reduce((s,p)=>s+totalRev(p),0);
  const sumAll = sumNew+sumRev;
  const tgtNew = m.targetNew||0;
  const tgtRev = m.targetRev||0;
  const tgtAll = tgtNew+tgtRev;
  const pctNew = tgtNew>0?Math.min(100,Math.round(sumNew/tgtNew*100)):0;
  const pctRev = tgtRev>0?Math.min(100,Math.round(sumRev/tgtRev*100)):0;

  // Staff OT sum
  const otMap = {};
  D.settings.staffList.forEach(s=>otMap[s]=0);
  pjs.forEach(p=>(p.otLog||[]).forEach(e=>{if(otMap[e.staff]!==undefined)otMap[e.staff]+=(e.hours||0);}));
  const totalOT = Object.values(otMap).reduce((s,v)=>s+v,0);

  ci.innerHTML = `
  <!-- HERO STATS -->
  <div class="hero-stats">
    <div class="hero-box green">
      <div>
        <div class="hero-num">${sumNew}</div>
        <div class="hero-label">作成 — Làm mới</div>
        <div class="hero-jp">Mục tiêu: ${tgtNew}</div>
      </div>
      <div class="hero-progress">
        <div class="progress-track"><div class="progress-fill green" style="width:${pctNew}%"></div></div>
        <div class="progress-label"><span>${pctNew}% đạt mục tiêu</span><span>${sumNew}/${tgtNew}</span></div>
      </div>
    </div>
    <div class="hero-box gold">
      <div>
        <div class="hero-num">${sumRev}</div>
        <div class="hero-label">修正 — Sửa lại</div>
        <div class="hero-jp">Mục tiêu: ${tgtRev}</div>
      </div>
      <div class="hero-progress">
        <div class="progress-track"><div class="progress-fill" style="width:${pctRev}%"></div></div>
        <div class="progress-label"><span>${pctRev}% đạt mục tiêu</span><span>${sumRev}/${tgtRev}</span></div>
      </div>
    </div>
    <div class="hero-box navy">
      <div>
        <div class="hero-num">${sumAll}</div>
        <div class="hero-label">Tổng phối cảnh</div>
        <div class="hero-jp">Mục tiêu: ${tgtAll}</div>
      </div>
      <div class="hero-progress">
        <div class="progress-track"><div class="progress-fill" style="width:${tgtAll>0?Math.min(100,Math.round(sumAll/tgtAll*100)):0}%;background:var(--ex-navy3)"></div></div>
        <div class="progress-label"><span>${tgtAll>0?Math.min(100,Math.round(sumAll/tgtAll*100)):0}%</span><span>${pjs.length} dự án</span></div>
      </div>
    </div>
    <div class="hero-box orange">
      <div>
        <div class="hero-num">${D.settings.staffList.filter(s=>otMap[s]>0).length}</div>
        <div class="hero-label">Nhân sự có OT</div>
        <div class="hero-jp">Phát sinh trong tháng</div>
      </div>
      <div style="margin-top:10px">
        ${D.settings.staffList.filter(s=>otMap[s]>0).map(s=>`
          <div style="display:flex;justify-content:space-between;font-size:10px;margin-bottom:3px;align-items:center">
            <span style="color:var(--ex-gray4)">${s}</span>
            <span style="font-weight:700;color:var(--ex-orange);background:#fff8f3;padding:1px 7px;border-radius:99px">${otMap[s].toFixed(1)}h</span>
          </div>`).join('')||'<div style="font-size:11px;color:var(--ex-gray3);text-align:center;padding:6px 0">Chưa có OT</div>'}
      </div>
    </div>
    <div class="hero-target-box">
      <div class="tgt-title">🎯 Mục tiêu tháng</div>
      <div class="hero-target-row">
        <label>作成 Mới</label>
        <input class="hero-target-input" type="number" value="${tgtNew}" onchange="updateMonthTarget('targetNew',+this.value)">
      </div>
      <div class="hero-target-row">
        <label>修正 Sửa</label>
        <input class="hero-target-input" type="number" value="${tgtRev}" onchange="updateMonthTarget('targetRev',+this.value)">
      </div>
      <div style="font-size:10px;color:rgba(255,255,255,.5);margin-top:4px">Tổng = ${tgtAll} phối cảnh</div>
    </div>
  </div>

  <!-- PROJECT SUMMARY TABLE -->
  <div class="card">
    <div class="card-hd">
      <span class="card-hd-title">📋 Chi tiết tất cả dự án — ${monthLabel(D.activeMonth)}</span>
    </div>
    <div class="tbl-wrap">
      <table class="sum-tbl">
        <thead><tr>
          <th>#</th><th>Dự án</th><th>Văn phòng</th><th>Liên hệ JP</th>
          <th style="text-align:center">作成 Mới</th>
          <th style="text-align:center">修正 Sửa</th>
          <th style="text-align:center">Tổng</th>
          <th>OT (h)</th>
        </tr></thead>
        <tbody>
          ${pjs.length===0?'<tr><td colspan="8" style="text-align:center;padding:20px;color:var(--ex-gray4)">Chưa có dự án trong tháng này</td></tr>':''}
          ${pjs.map((p,i)=>{
            const otH = (p.otLog||[]).reduce((s,e)=>s+(e.hours||0),0);
            return `<tr onclick="selectPj('${p.id}')">
              <td style="color:var(--ex-gray4)">${i+1}</td>
              <td><div style="font-weight:600">${x(p.nameVN||p.nameJP||'—')}</div>
                  <div style="font-size:10px;color:var(--ex-gray4)">${x(p.nameJP||'')}</div></td>
              <td><span class="badge badge-${p.office==='大阪'?'osaka':'tokyo'}">${p.office||'—'}</span></td>
              <td>${x(p.contact||'—')}</td>
              <td class="num-c" style="color:var(--new-text)">${totalNew(p)}</td>
              <td class="num-c" style="color:var(--rev-text)">${totalRev(p)}</td>
              <td class="num-c" style="font-weight:700">${totalNew(p)+totalRev(p)}</td>
              <td style="font-size:11px">${otH>0?otH.toFixed(1)+'h':'—'}</td>
            </tr>`;
          }).join('')}
        </tbody>
        <tfoot><tr class="tr-total">
          <td colspan="4" style="font-weight:700">Tổng cộng</td>
          <td class="num-c" style="color:var(--new-text)">${sumNew}</td>
          <td class="num-c" style="color:var(--rev-text)">${sumRev}</td>
          <td class="num-c">${sumAll}</td>
          <td>${totalOT.toFixed(1)}h</td>
        </tr></tfoot>
      </table>
    </div>
  </div>

  <!-- STAFF SUMMARY FOR MONTH -->
  ${renderMonthStaffCard(pjs)}
  `;
}

function renderMonthStaffCard(pjs) {
  const sm = {};
  D.settings.staffList.forEach(s=>sm[s]={new:0,rev:0,ot:0});
  pjs.forEach(p=>{
    (p.records||[]).forEach(r=>{
      if(r.staff&&sm[r.staff]){
        if(r.status==='new') sm[r.staff].new+=(r.qty||0);
        else sm[r.staff].rev+=(r.qty||0);
      }
    });
    (p.otLog||[]).forEach(e=>{if(e.staff&&sm[e.staff])sm[e.staff].ot+=(e.hours||0);});
  });
  const active = D.settings.staffList.filter(s=>sm[s].new+sm[s].rev+sm[s].ot>0);
  if (!active.length) return '';
  const tn=active.reduce((s,k)=>s+sm[k].new,0);
  const tr=active.reduce((s,k)=>s+sm[k].rev,0);
  const to=active.reduce((s,k)=>s+sm[k].ot,0);
  return `<div class="card">
    <div class="card-hd"><span class="card-hd-title">👥 Tổng kết nhân sự tháng</span></div>
    <div class="tbl-wrap">
    <table class="perf-table">
      <thead><tr><th>Nhân sự</th><th style="text-align:center">作成 Mới</th><th style="text-align:center">修正 Sửa</th><th style="text-align:center">Tổng</th><th style="text-align:center">OT (h)</th></tr></thead>
      <tbody>
        ${active.map(s=>`<tr>
          <td style="font-weight:600">${s}</td>
          <td class="num-c" style="color:var(--new-text)">${sm[s].new}</td>
          <td class="num-c" style="color:var(--rev-text)">${sm[s].rev}</td>
          <td class="num-c">${sm[s].new+sm[s].rev}</td>
          <td class="num-c" style="color:var(--ex-orange)">${sm[s].ot>0?sm[s].ot.toFixed(1):'—'}</td>
        </tr>`).join('')}
        <tr class="total-row"><td>Tổng</td><td class="num-c">${tn}</td><td class="num-c">${tr}</td><td class="num-c">${tn+tr}</td><td class="num-c">${to>0?to.toFixed(1):'—'}</td></tr>
      </tbody>
    </table></div></div>`;
}

function updateMonthTarget(field, val) {
  if (!D.months[D.activeMonth]) D.months[D.activeMonth]={projects:[],targetNew:20,targetRev:36};
  D.months[D.activeMonth][field] = val;
  save();
}

/* ══════════════════════════════════════════════════════
   PROJECT DETAIL
══════════════════════════════════════════════════════ */
function renderProjectDetail(ci, p) {
  const tn=totalNew(p), tr2=totalRev(p), ta=tn+tr2;
  const m = curMonth();
  const tgtNew=m.targetNew||0, tgtRev=m.targetRev||0;
  const otTotal = (p.otLog||[]).reduce((s,e)=>s+(e.hours||0),0);
  const photos = p.photos||[];

  ci.innerHTML = `
  <!-- HERO STATS FOR THIS PROJECT -->
  <div class="hero-stats" style="grid-template-columns:1fr 1fr 1fr auto">
    <div class="hero-box green">
      <div class="hero-num">${tn}</div>
      <div class="hero-label">作成 — Làm mới</div>
    </div>
    <div class="hero-box gold">
      <div class="hero-num">${tr2}</div>
      <div class="hero-label">修正 — Sửa lại</div>
    </div>
    <div class="hero-box navy">
      <div class="hero-num">${ta}</div>
      <div class="hero-label">Tổng phối cảnh</div>
      <div class="hero-jp">OT: ${otTotal.toFixed(1)} giờ</div>
    </div>
    <div class="hero-target-box" style="min-width:160px">
      <div class="tgt-title">📌 THÁNG ${monthLabel(D.activeMonth)}</div>
      <div style="font-size:11px;color:rgba(255,255,255,.7);margin-top:4px">Mục tiêu tháng:</div>
      <div style="font-size:13px;font-weight:600;color:var(--ex-gold)">${tgtNew} mới / ${tgtRev} sửa</div>
      <button class="btn btn-xs" style="margin-top:8px;background:rgba(255,255,255,.1);color:#fff;border-color:rgba(255,255,255,.2)" onclick="activePjId=null;renderSidebar();renderContent()">← Về tổng kết tháng</button>
    </div>
  </div>

  <!-- PROJECT INFO -->
  <div class="card">
    <div class="card-hd">
      <span class="card-hd-title">📂 Thông tin dự án
        <span class="badge badge-${p.office==='大阪'?'osaka':'tokyo'}">${p.office||'—'}</span>
      </span>
      <div style="display:flex;gap:6px">
        <button class="btn btn-sm" onclick="openEditProject('${p.id}')">✏ Sửa</button>
        <button class="btn btn-sm btn-danger" onclick="deletePj('${p.id}')">🗑</button>
      </div>
    </div>
    <div class="card-body">
      <div class="info-grid c4">
        <div class="field"><label>Tên dự án (VN)</label>
          <input value="${x(p.nameVN||'')}" onchange="updPj('${p.id}','nameVN',this.value)" placeholder="Tên gợi nhớ…"></div>
        <div class="field"><label>Tên dự án (JP)</label>
          <input value="${x(p.nameJP||'')}" onchange="updPj('${p.id}','nameJP',this.value)" placeholder="例：吹田市古江台計画"></div>
        <div class="field"><label>Văn phòng</label>
          <select onchange="updPj('${p.id}','office',this.value)">
            <option ${p.office==='大阪'?'selected':''}>大阪</option>

/* ── PHOTO SLOTS ── */
function renderPhotoSlots(p) {
  const photos = p.photos||[];
  let html='';
  for(let i=0;i<6;i++){
    const ph=photos[i];
    if(ph){
      html+=`<div class="photo-slot has-img">
        <img src="${ph}" alt="Photo ${i+1}">
        <button class="ph-del" onclick="delPhoto('${p.id}',${i})" title="Xóa ảnh">✕</button>
      </div>`;
    } else {
      html+=`<label class="photo-slot">
        <span class="ph-placeholder">🖼</span>
        <span class="ph-plus">Thêm ảnh</span>
        <input type="file" accept="image/*" onchange="uploadPhoto('${p.id}',${i},this)">
      </label>`;
    }
  }
  return html;
}

function uploadPhoto(pjId, slot, input) {
  const file = input.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const p = getPj(pjId); if(!p) return;
    if(!p.photos) p.photos=[];
    p.photos[slot] = e.target.result;
    save();
    const grid = document.getElementById(`photoGrid-${pjId}`);
    if(grid) grid.innerHTML = renderPhotoSlots(p);
    toast('✓ Đã thêm ảnh');
  };
  reader.readAsDataURL(file);
}

function delPhoto(pjId, slot) {
  const p = getPj(pjId); if(!p||!p.photos) return;
  p.photos[slot] = null;
  p.photos = p.photos.filter((_,i)=>i!==slot);
  save();
  const grid = document.getElementById(`photoGrid-${pjId}`);
  if(grid) grid.innerHTML = renderPhotoSlots(p);
}

/* ── RENDER TABLE BODY ── */
function renderRbody(p) {
  const recs = p.records||[];
  if(!recs.length) return '<tr><td colspan="7" style="text-align:center;padding:16px;color:var(--ex-gray4)">Chưa có hạng mục — nhấn + để thêm</td></tr>';
  return recs.map((r,i)=>`
    <tr class="row-${r.status}" data-rid="${r.id}">
      <td style="color:var(--ex-gray4)">${i+1}</td>
      <td>
        <input class="type-inp" list="tl-${p.id}" value="${x(r.type||'')}"
          onchange="updRec('${p.id}','${r.id}','type',this.value)"
          placeholder="Chọn hoặc nhập hạng mục…">
        <datalist id="tl-${p.id}">${D.settings.typeList.map(t=>`<option value="${t}">`).join('')}</datalist>
      </td>
      <td>
        <div class="status-toggle">
          <button class="st-opt new ${r.status==='new'?'selected':''}"
            onclick="updRec('${p.id}','${r.id}','status','new');this.classList.add('selected');this.nextSibling.classList.remove('selected');refreshRow('${p.id}','${r.id}')">作成 Mới</button>
          <button class="st-opt rev ${r.status==='rev'?'selected':''}"
            onclick="updRec('${p.id}','${r.id}','status','rev');this.classList.add('selected');this.previousSibling.classList.remove('selected');refreshRow('${p.id}','${r.id}')">修正 Sửa</button>
        </div>
      </td>
      <td>
        <select class="sel-sm" onchange="updRec('${p.id}','${r.id}','staff',this.value)">
          <option value="">— Chọn —</option>
          ${D.settings.staffList.map(s=>`<option ${r.staff===s?'selected':''}>${s}</option>`).join('')}
        </select>
      </td>
      <td style="text-align:center">
        <input class="qty-inp" type="number" min="0" value="${r.qty||0}"
          onchange="updRec('${p.id}','${r.id}','qty',+this.value);refreshTotals('${p.id}')">
      </td>
      <td>
        <input style="width:100%;padding:4px 7px;border:1px solid var(--ex-gray2);border-radius:var(--r);font-family:inherit;font-size:11px"
          value="${x(r.note||'')}" onchange="updRec('${p.id}','${r.id}','note',this.value)" placeholder="Ghi chú…">
      </td>
      <td>
        <button class="btn btn-xs btn-ghost btn-danger" onclick="delRec('${p.id}','${r.id}')">✕</button>
      </td>
    </tr>
  `).join('');
}

function refreshRow(pjId, recId) {
  const p = getPj(pjId); if(!p) return;
  const r = p.records.find(x=>x.id===recId); if(!r) return;
  // Update row class
  const tr = document.querySelector(`tr[data-rid="${recId}"]`);
  if(tr) { tr.className = `row-${r.status}`; }
  refreshTotals(pjId);
}

function refreshTotals(pjId) {
  const p = getPj(pjId); if(!p) return;
  const tn=totalNew(p),tr2=totalRev(p),ta=tn+tr2;
  // update hero nums
  const heros = document.querySelectorAll('.hero-num');
  if(heros[0]) heros[0].textContent=tn;
  if(heros[1]) heros[1].textContent=tr2;
  if(heros[2]) heros[2].textContent=ta;
  // update tfoot
  const tfoot = document.querySelector('.rtbl tfoot td:nth-child(2)');
  if(tfoot) tfoot.textContent=ta;
  renderSidebar();
}

function addRecord(pjId, status) {
  const p = getPj(pjId); if(!p) return;
  if(!p.records) p.records=[];
  p.records.push({id:gid(),type:'',status,staff:'',qty:0,note:''});
  save();
  const tbody = document.getElementById(`rbody-${pjId}`);
  if(tbody) tbody.innerHTML = renderRbody(p);
  refreshTotals(pjId);
}

function updRec(pjId, recId, field, val) {
  const p = getPj(pjId); if(!p) return;
  const r = p.records.find(x=>x.id===recId); if(!r) return;
  r[field]=val; save();
}

function delRec(pjId, recId) {
  const p = getPj(pjId); if(!p) return;
  p.records = p.records.filter(r=>r.id!==recId); save();
  const tbody = document.getElementById(`rbody-${pjId}`);
  if(tbody) tbody.innerHTML = renderRbody(p);
  refreshTotals(pjId);
}

/* ── OT LOG ── */
function renderOTLog(p) {
  const log = (p.otLog||[]).slice().sort((a,b)=>b.date>a.date?1:-1);
  if(!log.length) return '<div style="color:var(--ex-gray4);font-size:11px;padding:8px 0">Chưa có bản ghi OT</div>';
  return log.map(e=>`
    <div class="ot-entry">
      <span class="ot-date">${e.date}</span>
      <span class="ot-name">${e.staff}</span>
      <span class="ot-hours">${e.hours}h</span>
      <span style="flex:1;color:var(--ex-gray4);font-size:11px">${x(e.note||'')}</span>
      <button class="btn btn-xs btn-ghost btn-danger" onclick="delOT('${p.id}','${e.id}')">✕</button>
    </div>
  `).join('');
}

function confirmOT(pjId) {
  const d=document.getElementById('ot-date').value;
  const s=document.getElementById('ot-staff').value;
  const h=+document.getElementById('ot-hours').value;
  const n=document.getElementById('ot-note').value;
  if(!d||!s||!h){alert('Vui lòng điền đủ ngày, nhân sự và số giờ');return;}
  const p=getPj(pjId); if(!p) return;
  if(!p.otLog) p.otLog=[];
  p.otLog.push({id:gid(),date:d,staff:s,hours:h,note:n});
  save(); closeModal();
  const el=document.getElementById(`otLog-${pjId}`);
  if(el) el.innerHTML=renderOTLog(p);
  // refresh OT total
  const otEl=document.querySelector(`#otLog-${pjId}`+' ~ div span span');
  const otTotal=(p.otLog||[]).reduce((s,e)=>s+(e.hours||0),0);
  toast(`✓ Ghi OT ${h}h cho ${s}`);
  // re-render hero nums
  const heros=document.querySelectorAll('.hero-num');
  if(heros[2]) heros[2].nextElementSibling&&(heros[2].nextElementSibling.textContent=`OT: ${otTotal.toFixed(1)} giờ`);
}

function delOT(pjId, otId) {
  const p=getPj(pjId); if(!p) return;
  p.otLog=p.otLog.filter(e=>e.id!==otId); save();
  const el=document.getElementById(`otLog-${pjId}`);
  if(el) el.innerHTML=renderOTLog(p);
}

/* ══════════════════════════════════════════════════════
   DASHBOARD PAGE
══════════════════════════════════════════════════════ */
function renderDashboard() {
  const year = document.getElementById('dashYear')?.value || new Date().getFullYear().toString();
  const months = Object.keys(D.months).filter(m=>m.startsWith(year)).sort();
  const dc = document.getElementById('dashContent'); if(!dc) return;

  // Aggregate data
  const monthlyData = months.map(mid=>{
    const m=D.months[mid]||{projects:[]};
    const pjs=m.projects||[];
    const sn=pjs.reduce((s,p)=>s+totalNew(p),0);
    const sr=pjs.reduce((s,p)=>s+totalRev(p),0);
    const ot=pjs.reduce((s,p)=>s+(p.otLog||[]).reduce((x,e)=>x+(e.hours||0),0),0);
    return {mid, label:monthLabel(mid), new:sn, rev:sr, total:sn+sr, ot, pjCount:pjs.length, targetNew:m.targetNew||0, targetRev:m.targetRev||0};
  });

  // Staff annual data
  const staffAnnual = {};
  D.settings.staffList.forEach(s=>staffAnnual[s]={new:0,rev:0,ot:0,months:{}});
  months.forEach(mid=>{
    const pjs=(D.months[mid]||{projects:[]}).projects||[];
    D.settings.staffList.forEach(s=>{
      if(!staffAnnual[s].months[mid]) staffAnnual[s].months[mid]={new:0,rev:0,ot:0};
    });
    pjs.forEach(p=>{
      (p.records||[]).forEach(r=>{
        if(r.staff&&staffAnnual[r.staff]){
          if(r.status==='new'){staffAnnual[r.staff].new+=(r.qty||0);staffAnnual[r.staff].months[mid]&&(staffAnnual[r.staff].months[mid].new+=(r.qty||0));}
          else{staffAnnual[r.staff].rev+=(r.qty||0);staffAnnual[r.staff].months[mid]&&(staffAnnual[r.staff].months[mid].rev+=(r.qty||0));}
        }
      });
      (p.otLog||[]).forEach(e=>{
        const mid2=e.date.substring(0,7);
        if(e.staff&&staffAnnual[e.staff]&&mid2===mid){
          staffAnnual[e.staff].ot+=(e.hours||0);
          staffAnnual[e.staff].months[mid]&&(staffAnnual[e.staff].months[mid].ot+=(e.hours||0));
        }
      });
    });
  });

  const activeStaff = D.settings.staffList.filter(s=>staffAnnual[s].new+staffAnnual[s].rev+staffAnnual[s].ot>0);

  dc.innerHTML = `
  <!-- KPI SUMMARY ROW -->
  <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:16px">
    ${[
      {val:monthlyData.reduce((s,m)=>s+m.new,0), lbl:'Tổng Làm mới', cls:'green', jp:'作成 累計'},
      {val:monthlyData.reduce((s,m)=>s+m.rev,0), lbl:'Tổng Sửa lại', cls:'gold', jp:'修正 累計'},
      {val:monthlyData.reduce((s,m)=>s+m.total,0), lbl:'Tổng phối cảnh', cls:'navy', jp:'合計'},
      {val:monthlyData.reduce((s,m)=>s+m.pjCount,0), lbl:'Tổng dự án', cls:'orange', jp:'プロジェクト数'},
      {val:monthlyData.reduce((s,m)=>s+m.ot,0).toFixed(1)+'h', lbl:'Tổng OT', cls:'gray', jp:'OT累計時間'}
    ].map(k=>`<div class="hero-box ${k.cls}" style="padding:14px">
      <div class="hero-num" style="font-size:32px">${k.val}</div>
      <div class="hero-label">${k.lbl}</div>
      <div class="hero-jp">${k.jp}</div>
    </div>`).join('')}
  </div>

  <!-- CHARTS ROW -->
  <div class="dash-grid" style="margin-bottom:14px">
    <div class="chart-box">
      <h4>Phối cảnh theo tháng — ${year}</h4>
      <canvas id="chartMonthly" height="180"></canvas>
    </div>
    <div class="chart-box">
      <h4>Năng suất nhân sự (tổng ${year})</h4>
      <canvas id="chartStaff" height="180"></canvas>
    </div>
  </div>
  <div class="dash-grid c3" style="margin-bottom:14px">
    <div class="chart-box">
      <h4>Tỉ lệ Mới vs Sửa</h4>
      <canvas id="chartRatio" height="160"></canvas>
    </div>
    <div class="chart-box">
      <h4>OT nhân sự cả năm</h4>
      <canvas id="chartOT" height="160"></canvas>
    </div>
    <div class="chart-box">
      <h4>Tiến độ vs Mục tiêu</h4>
      <canvas id="chartTarget" height="160"></canvas>
    </div>
  </div>

  <!-- STAFF PERFORMANCE TABLE -->
  <div class="card">
    <div class="card-hd"><span class="card-hd-title">📊 Hiệu suất chi tiết từng nhân sự — ${year}</span></div>
    <div class="tbl-wrap">
    <table class="perf-table">
      <thead><tr>
        <th>Nhân sự</th>
        <th style="text-align:center">作成 Mới</th>
        <th style="text-align:center">修正 Sửa</th>
        <th style="text-align:center">Tổng</th>
        <th style="text-align:center">OT (h)</th>
        <th style="min-width:160px">Năng suất</th>
        <th>Đánh giá</th>
      </tr></thead>
      <tbody>
        ${(()=>{
          const maxT=Math.max(1,...activeStaff.map(s=>staffAnnual[s].new+staffAnnual[s].rev));
          const maxOT=Math.max(1,...activeStaff.map(s=>staffAnnual[s].ot));
          return activeStaff.map(s=>{
            const v=staffAnnual[s];
            const t=v.new+v.rev;
            const pct=Math.round(t/maxT*100);
            const otPct=Math.round(v.ot/maxOT*100);
            const grade = t>=maxT*0.8?'🟢 Xuất sắc':t>=maxT*0.6?'🟡 Tốt':t>=maxT*0.4?'🟠 Khá':'🔴 Cần cải thiện';
            return `<tr>
              <td style="font-weight:600">${s}</td>
              <td class="num-c" style="color:var(--new-text)">${v.new}</td>
              <td class="num-c" style="color:var(--rev-text)">${v.rev}</td>
              <td class="num-c" style="font-weight:700">${t}</td>
              <td class="num-c" style="color:var(--ex-orange)">${v.ot>0?v.ot.toFixed(1):'—'}</td>
              <td>
                <div class="mini-bar">
                  <div class="mini-bar-track"><div class="mini-bar-fill" style="width:${pct}%"></div></div>
                  <span style="font-size:10px;color:var(--ex-gray4);min-width:32px;text-align:right">${pct}%</span>
                </div>
                ${v.ot>0?`<div class="mini-bar" style="margin-top:3px">
                  <div class="mini-bar-track"><div class="mini-bar-fill blue" style="width:${otPct}%"></div></div>
                  <span style="font-size:10px;color:var(--ex-gray4);min-width:32px;text-align:right">${v.ot.toFixed(1)}h</span>
                </div>`:''}
              </td>
              <td style="font-size:12px">${grade}</td>
            </tr>`;
          }).join('')||'<tr><td colspan="7" style="text-align:center;padding:16px;color:var(--ex-gray4)">Chưa có dữ liệu</td></tr>';
        })()}
      </tbody>
    </table>
    </div>
  </div>
  `;

  // Draw charts after DOM ready
  setTimeout(()=>{
    drawMonthlyChart(monthlyData);
    drawStaffChart(activeStaff, staffAnnual);
    drawRatioChart(monthlyData);
    drawOTChart(activeStaff, staffAnnual);
    drawTargetChart(monthlyData);
  }, 50);
}

function drawMonthlyChart(md) {
  const el = document.getElementById('chartMonthly'); if(!el) return;
  if(el._chart) el._chart.destroy();
  el._chart = new Chart(el, {
    type:'bar',
    data:{
      labels:md.map(m=>m.label),
      datasets:[
        {label:'作成 Mới', data:md.map(m=>m.new), backgroundColor:'#70AD47', borderRadius:3},
        {label:'修正 Sửa', data:md.map(m=>m.rev), backgroundColor:'#FFC000', borderRadius:3},
      ]
    },
    options:{
      plugins:{legend:{labels:{font:{size:11},color:'#595959'}}},
      scales:{x:{grid:{display:false},ticks:{color:'#595959',font:{size:10}}},
              y:{ticks:{color:'#595959',font:{size:10}},grid:{color:'#f0f0f0'}}},
      responsive:true, maintainAspectRatio:true
    }
  });
}

function drawStaffChart(staffList, data) {
  const el = document.getElementById('chartStaff'); if(!el) return;
  if(el._chart) el._chart.destroy();
  el._chart = new Chart(el, {
    type:'bar',
    data:{
      labels:staffList,
      datasets:[
        {label:'作成 Mới', data:staffList.map(s=>data[s].new), backgroundColor:'#70AD47', borderRadius:3},
        {label:'修正 Sửa', data:staffList.map(s=>data[s].rev), backgroundColor:'#FFC000', borderRadius:3},
      ]
    },
    options:{
      indexAxis:'y',
      plugins:{legend:{labels:{font:{size:11},color:'#595959'}}},
      scales:{x:{grid:{color:'#f0f0f0'},ticks:{color:'#595959',font:{size:10}}},
              y:{grid:{display:false},ticks:{color:'#595959',font:{size:10}}}},
      responsive:true, maintainAspectRatio:true
    }
  });
}

function drawRatioChart(md) {
  const el = document.getElementById('chartRatio'); if(!el) return;
  if(el._chart) el._chart.destroy();
  const tn=md.reduce((s,m)=>s+m.new,0), tr=md.reduce((s,m)=>s+m.rev,0);
  el._chart = new Chart(el, {
    type:'doughnut',
    data:{
      labels:['作成 Mới','修正 Sửa'],
      datasets:[{data:[tn,tr],backgroundColor:['#70AD47','#FFC000'],borderWidth:2,borderColor:'#fff'}]
    },
    options:{
      plugins:{legend:{position:'bottom',labels:{font:{size:11},color:'#595959'}}},
      responsive:true, maintainAspectRatio:true
    }
  });
}

function drawOTChart(staffList, data) {
  const el = document.getElementById('chartOT'); if(!el) return;
  if(el._chart) el._chart.destroy();
  const withOT = staffList.filter(s=>data[s].ot>0);
  el._chart = new Chart(el, {
    type:'bar',
    data:{
      labels:withOT.length?withOT:['Chưa có dữ liệu'],
      datasets:[{label:'OT (giờ)', data:withOT.map(s=>data[s].ot), backgroundColor:'#ED7D31', borderRadius:3}]
    },
    options:{
      plugins:{legend:{labels:{font:{size:11},color:'#595959'}}},
      scales:{x:{grid:{display:false},ticks:{color:'#595959',font:{size:10}}},
              y:{ticks:{color:'#595959',font:{size:10}},grid:{color:'#f0f0f0'}}},
      responsive:true, maintainAspectRatio:true
    }
  });
}

function drawTargetChart(md) {
  const el = document.getElementById('chartTarget'); if(!el) return;
  if(el._chart) el._chart.destroy();
  el._chart = new Chart(el, {
    type:'bar',
    data:{
      labels:md.map(m=>m.label),
      datasets:[
        {label:'Thực tế', data:md.map(m=>m.total), backgroundColor:'#4472C4', borderRadius:3},
        {label:'Mục tiêu', data:md.map(m=>m.targetNew+m.targetRev), backgroundColor:'rgba(255,192,0,.3)', borderColor:'#FFC000', borderWidth:1, borderRadius:3},
      ]
    },
    options:{
      plugins:{legend:{labels:{font:{size:11},color:'#595959'}}},
      scales:{x:{grid:{display:false},ticks:{color:'#595959',font:{size:10}}},
              y:{ticks:{color:'#595959',font:{size:10}},grid:{color:'#f0f0f0'}}},
      responsive:true, maintainAspectRatio:true
    }
  });
}

/* ══════════════════════════════════════════════════════
   STAFF PAGE
══════════════════════════════════════════════════════ */
function renderStaffPage() {
  const mid = document.getElementById('staffMonth')?.value || D.activeMonth;
  const sc = document.getElementById('staffContent'); if(!sc) return;
  const pjs = (D.months[mid]||{projects:[]}).projects||[];

  const staffData = {};
  D.settings.staffList.forEach(s=>staffData[s]={new:0,rev:0,ot:0,projects:[],otLog:[]});
  pjs.forEach(p=>{
    (p.records||[]).forEach(r=>{
      if(r.staff&&staffData[r.staff]){
        if(r.status==='new') staffData[r.staff].new+=(r.qty||0);
        else staffData[r.staff].rev+=(r.qty||0);
        if(!staffData[r.staff].projects.includes(p.nameVN||p.nameJP)) staffData[r.staff].projects.push(p.nameVN||p.nameJP||'?');
      }
    });
    (p.otLog||[]).forEach(e=>{
      if(e.staff&&staffData[e.staff]){
        staffData[e.staff].ot+=(e.hours||0);
        staffData[e.staff].otLog.push({...e,pjName:p.nameVN||p.nameJP||'?'});
      }
    });
  });

  sc.innerHTML = `
  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px">
    ${D.settings.staffList.map(s=>{
      const v=staffData[s];
      const t=v.new+v.rev;
      return `<div class="card">
        <div class="card-hd">
          <span class="card-hd-title" style="font-size:14px">${s}</span>
          <div style="display:flex;gap:4px">
            <span class="chip chip-green">新${v.new}</span>
            <span class="chip chip-gold">修${v.rev}</span>
            ${v.ot>0?`<span class="chip" style="background:#fde8d8;color:#7f3500">OT${v.ot.toFixed(1)}h</span>`:''}
          </div>
        </div>
        <div class="card-body" style="padding:12px 14px">
          <div style="margin-bottom:10px">
            <div style="display:flex;justify-content:space-between;margin-bottom:4px">
              <span style="font-size:11px;color:var(--ex-gray4)">Tổng phối cảnh</span>
              <span style="font-weight:700;font-size:15px">${t}</span>
            </div>
            <div class="progress-track" style="height:8px">
              <div class="progress-fill green" style="width:${t>0?Math.min(100,Math.round(v.new/t*100)):0}%;float:left"></div>
              <div class="progress-fill" style="width:${t>0?Math.min(100,Math.round(v.rev/t*100)):0}%;float:left;background:var(--ex-gold)"></div>
            </div>
            <div style="font-size:10px;color:var(--ex-gray4);margin-top:3px">Mới ${v.new} | Sửa ${v.rev}</div>
          </div>
          ${v.projects.length?`<div style="font-size:10px;color:var(--ex-gray4);margin-bottom:8px">
            <strong>Dự án:</strong> ${v.projects.slice(0,3).map(n=>`<span style="background:var(--ex-gray1);padding:1px 6px;border-radius:3px;margin:1px">${x(n)}</span>`).join('')}
            ${v.projects.length>3?`+${v.projects.length-3} nữa`:''}
          </div>`:''}
          ${v.otLog.length?`<div style="border-top:1px solid var(--ex-gray1);padding-top:8px">
            <div style="font-size:10px;color:var(--ex-gray4);font-weight:600;margin-bottom:6px">OT gần đây:</div>
            ${v.otLog.sort((a,b)=>b.date>a.date?1:-1).slice(0,4).map(e=>`
              <div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px">
                <span style="color:var(--ex-gray4)">${e.date}</span>
                <span style="color:var(--ex-gray4);flex:1;margin:0 8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${x(e.pjName)}</span>
                <span style="font-weight:600;color:var(--ex-orange)">${e.hours}h</span>
              </div>
            `).join('')}
            ${v.otLog.length>4?`<div style="font-size:10px;color:var(--ex-gray4)">+${v.otLog.length-4} bản ghi khác</div>`:''}
          </div>`:''}
          ${!t&&!v.ot?'<div style="font-size:11px;color:var(--ex-gray3);text-align:center;padding:10px">Chưa có hoạt động trong tháng này</div>':''}
        </div>
      </div>`;
    }).join('')}
  </div>
  `;
}

        </div>
        <button class="btn btn-sm" style="margin-top:10px" onclick="addTagTo('contactTags',80)">+ Thêm</button>

    </div>
    <div class="card" style="grid-column:1/-1">
      <div class="card-hd"><span class="card-hd-title">🏷 Danh mục hạng mục phối cảnh (Tùy biến)</span></div>
      <div class="card-body">
        <p style="font-size:11px;color:var(--ex-gray4);margin-bottom:10px">Chỉnh sửa tên hạng mục, thêm mới hoặc xóa bớt theo nhu cầu</p>
        <div class="tag-cloud" id="typeTags">
          ${D.settings.typeList.map(t=>`<div class="tag-edit"><input value="${x(t)}" style="width:140px"><span class="tdel" onclick="this.parentElement.remove()">×</span></div>`).join('')}
        </div>
        <button class="btn btn-sm" style="margin-top:10px" onclick="addTagTo('typeTags',140)">+ Thêm hạng mục</button>
      </div>
    </div>
  </div>
  <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:16px">
    <button class="btn btn-gold" onclick="saveSettings()">💾 Lưu tất cả cài đặt</button>
  </div>
  `;
}

function addTagTo(containerId, w) {
  const c=document.createElement('div'); c.className='tag-edit';
  c.innerHTML=`<input style="width:${w}px" placeholder="Nhập…"><span class="tdel" onclick="this.parentElement.remove()">×</span>`;
  document.getElementById(containerId).appendChild(c);
  c.querySelector('input').focus();
}

function saveSettings() {
  D.settings.staffList=[...document.querySelectorAll('#staffTags .tag-edit input')].map(e=>e.value.trim()).filter(Boolean);
  D.settings.typeList=[...document.querySelectorAll('#typeTags .tag-edit input')].map(e=>e.value.trim()).filter(Boolean);
  D.settings.contactList=[...document.querySelectorAll('#contactTags .tag-edit input')].map(e=>e.value.trim()).filter(Boolean);
  save(); toast('✓ Đã lưu cài đặt hệ thống');
}

function showModal(html) {
  const bg=document.createElement('div'); bg.className='modal-bg'; bg.id='activeModal';
  bg.innerHTML=`<div class="modal">${html}</div>`;
  bg.onclick=e=>{if(e.target===bg)closeModal();};
  document.getElementById('modalRoot').appendChild(bg);
}
function closeModal() { document.getElementById('activeModal')?.remove(); }

/* ══════════════════════════════════════════════════════
   SYNC SYSTEM — Password-based, 2-level access
   Backend: JSONBin.io (free, no signup needed for users)
   
   CÁCH HOẠT ĐỘNG:
   - Admin (chủ app) tạo 1 bin trên jsonbin.io, lấy BIN_ID + API_KEY
   - Đặt mật khẩu EDIT và mật khẩu VIEW (lưu trong D.settings.sync)
   - Người khác chỉ cần nhập đúng mật khẩu để đọc hoặc sửa
   - Toàn bộ dữ liệu được mã hoá AES trước khi lên cloud
══════════════════════════════════════════════════════ */

const SYNC = {
  // Credentials chỉ admin biết (lưu localStorage, không chia sẻ)
  get binId()  { return localStorage.getItem('sync_bin_id')||''; },
  get apiKey() { return localStorage.getItem('sync_api_key')||''; },
  set binId(v)  { localStorage.setItem('sync_bin_id', v); },
  set apiKey(v) { localStorage.setItem('sync_api_key', v); },
  get lastSync() { return localStorage.getItem('sync_last')||''; },
  set lastSync(v){ localStorage.setItem('sync_last', v); },
  // Session: quyền hiện tại sau khi đăng nhập
  get role() { return sessionStorage.getItem('sync_role')||'none'; }, // 'admin'|'edit'|'view'|'none'
  set role(v) { sessionStorage.setItem('sync_role', v); },
  get autoOn() { return localStorage.getItem('sync_auto')==='1'; },
  set autoOn(v) { localStorage.setItem('sync_auto', v?'1':'0'); }
};

/* ── AES-GCM encryption (pure Web Crypto, no libs) ── */
async function deriveKey(password, salt) {
  const enc = new TextEncoder();
  const keyMaterial = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey(
    { name:'PBKDF2', salt: enc.encode(salt), iterations:100000, hash:'SHA-256' },
    keyMaterial, { name:'AES-GCM', length:256 }, false, ['encrypt','decrypt']
  );
}

async function encryptData(data, password) {
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const key = await deriveKey(password, 'phoicanh_salt_v1');
  const enc = new TextEncoder();
  const encrypted = await crypto.subtle.encrypt({ name:'AES-GCM', iv }, key, enc.encode(JSON.stringify(data)));
  // Pack: iv(12 bytes) + encrypted
  const combined = new Uint8Array(12 + encrypted.byteLength);
  combined.set(iv, 0);
  combined.set(new Uint8Array(encrypted), 12);
  return btoa(String.fromCharCode(...combined));
}

async function decryptData(b64, password) {
  const combined = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
  const iv = combined.slice(0, 12);
  const data = combined.slice(12);
  const key = await deriveKey(password, 'phoicanh_salt_v1');
  const dec = await crypto.subtle.decrypt({ name:'AES-GCM', iv }, key, data);
  return JSON.parse(new TextDecoder().decode(dec));
}

/* ── Hash password for comparison (stored in D.settings.sync) ── */
async function hashPw(pw) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pw+'pc_salt'));
  return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,'0')).join('');
}

/* ── JSONBin API ── */
const JBIN = 'https://api.jsonbin.io/v3';

async function syncPush() {
  if (!SYNC.binId || !SYNC.apiKey) return false;
  const editPw = D.settings?.sync?.editPw || 'gendai2024';
  try {
    const payload = await encryptData(D, editPw);
    const res = await fetch(`${JBIN}/b/${SYNC.binId}`, {
      method:'PUT',
      headers:{ 'Content-Type':'application/json', 'X-Master-Key': SYNC.apiKey },
      body: JSON.stringify({ data: payload, ts: Date.now() })
    });
    if (!res.ok) throw new Error(res.status);
    SYNC.lastSync = new Date().toLocaleString('vi-VN');
    setSyncStatus('synced', SYNC.autoOn?'⚡ Auto':'✓ Đã lưu');
    return true;
  } catch(e) {
    setSyncStatus('error','Lỗi lưu');
    return false;
  }
}

async function syncPull(password) {
  if (!SYNC.binId) return null;
  try {
    const headers = SYNC.apiKey
      ? { 'X-Master-Key': SYNC.apiKey }
      : {};
    const res = await fetch(`${JBIN}/b/${SYNC.binId}/latest`, { headers });
    if (!res.ok) throw new Error(res.status);
    const json = await res.json();
    const payload = json.record?.data;
    if (!payload) throw new Error('no_data');
    return await decryptData(payload, password);
  } catch(e) {
    if (e.message === 'no_data') throw e;
    throw new Error('wrong_password');
  }
}

/* ── STATUS BAR ── */
function setSyncStatus(state, label) {
  const btn = document.getElementById('syncBtn');
  const lbl = document.getElementById('syncLabel');
  if (!btn) return;
  btn.className = `sync-status ${state}`;
  lbl.textContent = label;
}

/* ── AUTO SYNC hook (called by save()) ── */
function triggerAutoSync() {
  if (SYNC.autoOn && SYNC.binId && SYNC.apiKey && SYNC.role==='admin') {
    clearTimeout(triggerAutoSync._t);
    setSyncStatus('syncing','Đang lưu…');
    triggerAutoSync._t = setTimeout(syncPush, 4000);
  }
}

async function confirmSyncSetup() {
  const apiKey = document.getElementById('su-apikey')?.value.trim();
  const binId  = document.getElementById('su-binid')?.value.trim();
  const adminPw = document.getElementById('su-admin-pw')?.value;
  const editPw  = document.getElementById('su-edit-pw')?.value;
  const viewPw  = document.getElementById('su-view-pw')?.value;

  if (!apiKey||!binId) { alert('Vui lòng điền Master Key và Bin ID'); return; }
  if (!adminPw||!editPw||!viewPw) { alert('Vui lòng đặt đủ 3 mật khẩu'); return; }

  // Save admin credentials locally
  SYNC.apiKey = apiKey;
  SYNC.binId  = binId;
  SYNC.role   = 'admin';

  // Store hashed passwords + binId in app data (shared)
  if (!D.settings.sync) D.settings.sync = {};
  D.settings.sync.adminHash = await hashPw(adminPw);
  D.settings.sync.editHash  = await hashPw(editPw);
  D.settings.sync.viewHash  = await hashPw(viewPw);
  D.settings.sync.editPw    = editPw;  // needed for encryption key (stored locally only via admin)
  D.settings.sync.binId     = binId;   // public — needed by all devices to find data

  save();
  setSyncStatus('syncing','Đang lưu…');
  closeModal();

  const ok = await syncPush();
  if (ok) {
    toast('✓ Đã thiết lập xong! Chia sẻ Bin ID + mật khẩu cho team');
    setSyncStatus('synced','✓ Admin');
    setTimeout(()=>showSyncStatus(), 800);
  } else {
    toast('✗ Lỗi kết nối — kiểm tra lại Master Key và Bin ID');
  }
}
