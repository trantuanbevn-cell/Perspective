function applyTheme(themeKey) {
  const theme = THEMES[themeKey];
  if (!theme) return;
  const root = document.documentElement;
  Object.entries(theme).forEach(([k,v]) => {
    if (k.startsWith('--')) root.style.setProperty(k, v);
  });
  // Update header bg if needed
  document.querySelector('.header').style.background = theme['--ex-navy']||'';
  document.querySelector('.month-strip').style.background = theme['--ex-navy2']||'';
  localStorage.setItem('app_theme', themeKey);
  if (themeKey !== 'custom') localStorage.setItem('app_theme_data', JSON.stringify(theme));
}

function applyCustomColor(varName, val) {
  document.documentElement.style.setProperty(varName, val);
  // Save to custom theme
  const saved = JSON.parse(localStorage.getItem('app_custom_theme')||'{}');
  saved[varName] = val;
  localStorage.setItem('app_custom_theme', JSON.stringify(saved));
  localStorage.setItem('app_theme', 'custom');
}

function loadSavedTheme() {
  const key = localStorage.getItem('app_theme');
  if (!key) return;
  if (key === 'custom') {
    const custom = JSON.parse(localStorage.getItem('app_custom_theme')||'{}');
    if (Object.keys(custom).length) {
      const root = document.documentElement;
      Object.entries(custom).forEach(([k,v]) => root.style.setProperty(k, v));
    }
  } else if (THEMES[key]) {
    applyTheme(key);
  }
}

function updateColorInputs() {
  // Update color pickers to reflect new theme
  const root = document.documentElement;
  const vars = ['--ex-navy','--ex-navy2','--ex-gold','--ex-orange','--new-bg','--rev-bg'];
  vars.forEach(v => {
    const id = 'cp-'+v.replace(/--/g,'').replace(/-/g,'_');
    const el = document.getElementById(id);
    if (el) el.value = cssToHex(getComputedStyle(root).getPropertyValue(v).trim());
  });
}

function cssToHex(color) {
  if (!color) return '#1F3864';
  color = color.trim();
  if (color.startsWith('#') && color.length===7) return color;
  if (color.startsWith('#') && color.length===4) {
    return '#'+color[1]+color[1]+color[2]+color[2]+color[3]+color[3];
  }
  // rgb(r,g,b) → hex
  const m = color.match(/rgb\s*\(\s*(\d+)\s*,\s*(\d+)\s*,\s*(\d+)\s*\)/);
  if (m) return '#'+[m[1],m[2],m[3]].map(n=>parseInt(n).toString(16).padStart(2,'0')).join('');
  return '#1F3864';
}

function resetTheme() {
  localStorage.removeItem('app_theme');
  localStorage.removeItem('app_custom_theme');
  localStorage.removeItem('app_theme_data');
  applyTheme('navy-gold');
  closeModal();
  toast('↺ Đã đặt lại màu mặc định');
}

/* ══════════════════════════════════════════════════════
   REPORT 2: OT NHÂN SỰ
══════════════════════════════════════════════════════ */
function exportOTReport() {
  const pjs = curProjects();
  const ml = monthLabel(D.activeMonth);
  const now = new Date().toLocaleDateString('vi-VN',{day:'2-digit',month:'2-digit',year:'numeric'});

  // Collect OT per staff
  const staffOT = {};
  D.settings.staffList.forEach(s=>staffOT[s]={total:0,entries:[]});
  pjs.forEach(p=>{
    (p.otLog||[]).forEach(e=>{
      if(e.staff&&staffOT[e.staff]){
        staffOT[e.staff].total+=(e.hours||0);
        staffOT[e.staff].entries.push({...e, pjName:p.nameVN||p.nameJP||'?', pjOffice:p.office||''});
      }
    });
  });

  const activeStaff = D.settings.staffList.filter(s=>staffOT[s].total>0);

  if(!activeStaff.length) {
    toast('Tháng này chưa có nhân sự nào phát sinh OT');
    return;
  }

  const totalOT = activeStaff.reduce((s,k)=>s+staffOT[k].total,0);

  const staffBlocks = activeStaff.map(s=>{
    const v = staffOT[s];
    const entries = v.entries.slice().sort((a,b)=>a.date>b.date?1:-1);
    return `<div class="ot-staff-block">
      <div class="ot-staff-hd">
        <span class="sname">${s}</span>
        <span class="stotal">Tổng: ${v.total.toFixed(1)} giờ</span>
      </div>
      <table style="margin-bottom:0;border-radius:0 0 6px 6px;overflow:hidden">
        <thead><tr>
          <th style="background:#2E4A7A">Ngày</th>
          <th style="background:#2E4A7A">Dự án</th>
          <th style="background:#2E4A7A">Văn phòng</th>
          <th style="background:#2E4A7A;text-align:center">Số giờ OT</th>
          <th style="background:#2E4A7A">Ghi chú</th>
        </tr></thead>
        <tbody>
          ${entries.map(e=>`<tr>
            <td>${e.date}</td>
            <td>${x(e.pjName)}</td>
            <td><span class="${e.pjOffice==='大阪'?'b-osaka':'b-tokyo'}">${e.pjOffice||'—'}</span></td>
            <td class="c-ot">${e.hours}h</td>
            <td style="font-size:10px;color:#595959">${x(e.note||'')}</td>
          </tr>`).join('')}
        </tbody>
        <tfoot><tr>
          <td colspan="3" style="text-align:right">Tổng OT ${s}:</td>
          <td class="c-ot" style="font-size:13px">${v.total.toFixed(1)}h</td>
          <td></td>
        </tr></tfoot>
      </table>
    </div>`;
  }).join('');

  const html = `<div class="report-doc">
    <div class="doc-header">

/* ── REPORT OVERLAY RENDERER ── */
function showReportOverlay(title, bodyHtml) {
  const overlay = document.createElement('div');
  overlay.className = 'rpt-overlay';
  overlay.id = 'rptOverlay';
  overlay.innerHTML = `
    <div class="rpt-container">
      <div class="rpt-header">
        <h2>${title}</h2>
        <div class="rpt-actions">
          <button class="btn btn-sm" style="background:rgba(255,255,255,.1);color:#fff;border-color:rgba(255,255,255,.3)" onclick="printReport()">🖨 In / Lưu PDF</button>
          <button class="btn btn-sm btn-gold" onclick="closeReport()">✕ Đóng</button>
        </div>
      </div>
      <div class="rpt-body" id="rptBody">${bodyHtml}</div>
    </div>
  `;
  overlay.onclick = e => { if(e.target===overlay) closeReport(); };
  document.body.appendChild(overlay);
}

function printReport() {
  const body = document.getElementById('rptBody');
  if (!body) return;
  const w = window.open('','_blank','width=900,height=700');
  w.document.write(`<!DOCTYPE html><html><head>
    <meta charset="UTF-8">
    <title>Báo cáo Phối Cảnh Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
      *{box-sizing:border-box;margin:0;padding:0}
      body{font-family:'Be Vietnam Pro','Noto Sans JP',sans-serif;font-size:12px;color:#1a1a1a;background:#fff}
      @page{size:A4;margin:0}
      @media print{body{-webkit-print-color-adjust:exact;print-color-adjust:exact}}
      ${[...document.styleSheets].flatMap(s=>{try{return[...s.cssRules].filter(r=>r.selectorText?.includes('.report-doc')||r.selectorText?.includes('.doc-')||r.selectorText?.includes('.kpi-')||r.selectorText?.includes('.pj-block')||r.selectorText?.includes('.ot-staff')||r.selectorText?.includes('.sign-')||r.selectorText?.includes('.c-new')||r.selectorText?.includes('.c-rev')||r.selectorText?.includes('.c-tot')||r.selectorText?.includes('.c-ot')||r.selectorText?.includes('.b-osaka')||r.selectorText?.includes('.b-tokyo')||r.selectorText?.includes('.chip-')||r.selectorText?.includes('.section-title')).map(r=>r.cssText)}catch(e){return[];}}).join('\n')}
    </style>
  </head><body>${body.innerHTML}</body></html>`);
  w.document.close();
  setTimeout(()=>{ w.focus(); w.print(); },600);
}

function closeReport() { document.getElementById('rptOverlay')?.remove(); }



/* RENDER ALL */
function renderAll() {
  renderMonthStrip();
  renderSidebar();
  renderStorageMeter();
  if(activePage==='main') renderContent();
  else if(activePage==='dashboard') renderDashboard();
  else if(activePage==='staff') renderStaffPage();
  else if(activePage==='settings') renderSettings();
}

function renderStorageMeter() {
  const bar = document.getElementById('storageBar');
  if (!bar) return;
  try {
    const data = localStorage.getItem(SK) || '';
    const kb = Math.round(data.length * 0.75 / 1024);
    const maxKB = 5120; // 5MB safe limit
    const pct = Math.min(100, Math.round(kb / maxKB * 100));
    const color = pct > 80 ? '#e74c3c' : pct > 55 ? '#E67E22' : '#27AE60';
    // Count photos
    let photoCount = 0;
    Object.values(D.months).forEach(m => (m.projects||[]).forEach(p => { photoCount += (p.photos||[]).filter(Boolean).length; }));
    bar.innerHTML = `
      <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--gray4);margin-bottom:3px">
        <span>💾 ${(kb/1024).toFixed(1)}MB / 5MB</span>
        <span style="color:${color};font-weight:600">${pct}%</span>
      </div>
      <div style="height:4px;background:var(--gray2);border-radius:2px;overflow:hidden">
        <div style="height:100%;background:${color};width:${pct}%;border-radius:2px;transition:width .4s"></div>
      </div>
      ${photoCount > 0 ? `<div style="font-size:10px;color:var(--gray4);margin-top:3px">📷 ${photoCount} ảnh đang lưu</div>` : ''}
      ${pct > 70 ? `<button class="btn btn-xs btn-danger" style="margin-top:5px;width:100%" onclick="openClearPhotosModal()">🗑 Dọn ảnh cũ</button>` : ''}
    `;
  } catch(e) {}
}

function openClearPhotosModal() {
  let totalPhotos = 0, months = [];
  Object.entries(D.months).forEach(([mid, m]) => {
    let cnt = 0;
    (m.projects||[]).forEach(p => { cnt += (p.photos||[]).filter(Boolean).length; });
    if (cnt > 0) { months.push({mid, label: monthLabel(mid), cnt}); totalPhotos += cnt; }
  });
  showModal(`
    <h3>🗑 Dọn dẹp ảnh — giải phóng dung lượng</h3>
    <div style="margin-bottom:14px;font-size:12px;color:var(--gray4)">
      Tổng <strong>${totalPhotos} ảnh</strong> đang lưu. Chọn tháng muốn xóa ảnh:
    </div>
    ${months.map(({mid, label, cnt}) => `
      <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border:1px solid var(--gray2);border-radius:var(--r);margin-bottom:6px">
        <span style="font-weight:600">${label} — ${cnt} ảnh</span>
        <button class="btn btn-sm btn-danger" onclick="clearMonthPhotos('${mid}')">Xóa ảnh</button>
      </div>`).join('')}
    <div class="modal-ft">
      <button class="btn" onclick="closeModal()">Đóng</button>
      <button class="btn btn-danger" onclick="clearAllPhotos()">Xóa tất cả ảnh</button>
    </div>
  `);
}

function clearMonthPhotos(mid) {
  (D.months[mid]?.projects||[]).forEach(p => { p.photos = []; });
  save(); closeModal(); renderStorageMeter();
  toast('✓ Đã xóa ảnh tháng ' + monthLabel(mid));
}

function clearAllPhotos() {
  if (!confirm('Xóa toàn bộ ảnh tất cả các tháng?')) return;
  Object.values(D.months).forEach(m => (m.projects||[]).forEach(p => { p.photos = []; }));
  save(); closeModal(); renderStorageMeter();
  toast('✓ Đã xóa tất cả ảnh');
}
