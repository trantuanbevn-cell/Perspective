/* ── Local date string (avoid UTC offset shift) ── */
function localDateStr(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return y + '-' + m + '-' + day;
}

function getHolidays() {
  if (D.settings.holidays) return D.settings.holidays;
  const y = new Date().getFullYear();
  return [
    {date:`${y}-01-01`,name:'Tết Dương lịch'},
    {date:`${y}-02-16`,name:'Tết Nguyên Đán'},
    {date:`${y}-02-17`,name:'Tết Nguyên Đán'},
    {date:`${y}-02-18`,name:'Tết Nguyên Đán'},
    {date:`${y}-02-19`,name:'Tết Nguyên Đán'},
    {date:`${y}-02-20`,name:'Tết Nguyên Đán'},
    {date:`${y}-02-21`,name:'Tết Nguyên Đán'},
    {date:`${y}-02-22`,name:'Tết Nguyên Đán'},
    {date:`${y}-04-06`,name:'Giỗ Tổ Hùng Vương'},
    {date:`${y}-04-30`,name:'Giải phóng miền Nam'},
    {date:`${y}-05-01`,name:'Quốc tế Lao động'},
    {date:`${y}-09-02`,name:'Quốc khánh'},
  ];
}

function renderMonthGantt(pjs) {
  const today = new Date(); today.setHours(0,0,0,0);
  const todayStr = localDateStr(today);
  const days = [];
  // 7 ngày trước + hôm nay + 20 ngày sau = 28 ngày (4 tuần)
  for(let i=-7;i<21;i++){
    const d=new Date(today); d.setDate(today.getDate()+i); days.push(d);
  }
  const startStr = localDateStr(days[0]);
  const endStr   = localDateStr(days[days.length-1]);
  function dk(d){ return localDateStr(d); }

  const holidays = getHolidays();
  const holidayMap = {};
  holidays.forEach(h=>{ holidayMap[h.date]=h.name; });

  function getTrips(staff) {
    return ((D.settings.staffProfiles||{})[staff]||{}).trips || [];
  }

  const soon3 = new Date(today); soon3.setDate(today.getDate()+3);
  const soon3Str = localDateStr(soon3);

  // Collect ALL tasks — gắn flag isVN để phân biệt màu
  const m = curMonth();
  const vnIds = new Set((m.projectsVN||[]).map(p=>p.id));
  const allTasks = pjs.flatMap((p, pIdx) =>
    (p.groups||[]).flatMap(g =>
      (g.rows||[])
        .filter(r => r.staff && (r.dateFrom||r.dateTo))
        .map(r => ({
          ...r,
          pjName:    p.nameVN||p.nameJP||'—',
          groupName: g.type||'—',
          pjNum:     pIdx + 1,
          isVN:      vnIds.has(p.id)
        }))
    )
  );

  function overlaps(r) {
    const from=r.dateFrom||r.dateTo||'', to=r.dateTo||r.dateFrom||'';
    if(!from&&!to) return false;
    return from<=endStr && to>=startStr;
  }

  // Per-staff task map
  const staffMap = {};
  D.settings.staffList.forEach(s=>staffMap[s]=[]);
  allTasks.filter(overlaps).forEach(r=>{
    if(r.staff && staffMap[r.staff]) staffMap[r.staff].push(r);
  });

  // Day VN names
  const dayVN = ['CN','T2','T3','T4','T5','T6','T7'];

  // ── Month header spans ──
  let curMo=-1, mSpan=0;
  const monthSpans=[];
  days.forEach((d,i)=>{
    if(d.getMonth()!==curMo){
      if(curMo>=0) monthSpans.push({label:['T1','T2','T3','T4','T5','T6','T7','T8','T9','T10','T11','T12'][curMo],span:mSpan});
      curMo=d.getMonth(); mSpan=1;
    } else mSpan++;
    if(i===20) monthSpans.push({label:['T1','T2','T3','T4','T5','T6','T7','T8','T9','T10','T11','T12'][curMo],span:mSpan});
  });
  const hdrMonths = monthSpans.map(m=>`<th colspan="${m.span}" style="background:var(--navy2);color:var(--gold2);font-size:10px;text-align:center;padding:3px;border-right:1px solid rgba(255,255,255,.15)">${m.label}</th>`).join('');

  // Day header
  const hdrDays = days.map((d,i)=>{
    const dStr=dk(d), isToday=dStr===todayStr, isSun=d.getDay()===0, isSat=d.getDay()===6;
    const isHoliday=!!holidayMap[dStr], isPast=dStr<todayStr;
    const isWeekBorder=d.getDay()===1&&i>0;
    const bg=isToday?'var(--gold)':isHoliday?'#c0392b':isPast?'#2c3e50':'var(--navy)';
    const col=isToday?'var(--navy)':isSun||isSat||isHoliday?'rgba(255,255,255,.45)':isPast?'rgba(255,255,255,.5)':'rgba(255,255,255,.85)';
    const ttl=isHoliday?` title="${holidayMap[dStr]}"`:isToday?' title="Hôm nay"':'';
    return `<th${ttl} style="min-width:26px;max-width:34px;text-align:center;font-size:9px;padding:2px 1px;background:${bg};color:${col};font-weight:${isToday?'800':'400'};border-left:${isWeekBorder?'2px solid rgba(255,255,255,.3)':'none'};opacity:${isPast&&!isToday?0.75:1}">
      <div>${isHoliday?'🔴':dayVN[d.getDay()]}</div><div style="font-size:10px;font-weight:${isToday?800:600}">${d.getDate()}</div>
    </th>`;
  }).join('');

  // ── Staff rows — sắp xếp theo thứ tự JP/VN ──
  const STAFF_ORDER = ['Management トゥアン','SGN ヒエン','SGN L.フォン','HAN M.フオン','SGN ズエン','HAN ハー','HAN T.タイン','HAN H.タイン','HAN D.チュン','HAN ニュー'];
  const sortedStaff = [...D.settings.staffList].sort((a,b)=>{
    const ia=STAFF_ORDER.indexOf(a),ib=STAFF_ORDER.indexOf(b);
    if(ia===-1&&ib===-1)return 0;if(ia===-1)return 1;if(ib===-1)return -1;return ia-ib;
  });
  const staffRows = sortedStaff.map(staff => {
    const tasks = staffMap[staff]||[];
    const isBusy = tasks.length>0;

    const activeLeaveList = getStaffLeaves(staff).filter(l=>{
      const lt=l.to||l.from; return lt>=todayStr;
    });
    const leaveParts = activeLeaveList.map(l=>{
      const sess = l.session==='morning'?'🌅 Sáng':l.session==='afternoon'?'🌇 Chiều':'🏖';
      const range = l.to&&l.to!==l.from ? `${l.from}→${l.to}` : (l.from||'?');
      return `<div style="font-size:9px;color:#e74c3c;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${sess} ${range}</div>`;
    }).join('');

    // Trips
    const trips = getTrips(staff);
    const upcomingTrips = trips.filter(t=>(t.to||t.from)>=todayStr);
    const tripParts = upcomingTrips.map(t=>`<div style="font-size:9px;color:#8e44ad;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">✈ ${t.from||'?'}${t.to&&t.to!==t.from?'→'+t.to:''} ${t.note||''}</div>`).join('');

    const taskParts = tasks.map(r=>{
      const isActuallyDone = !!(r.doneAt);                                      // đã bấm ✓ UP
      const isDoneByDate   = r.dateTo && r.dateTo < todayStr && !isActuallyDone; // quá ngày chưa UP
      const isTodayUp      = r.dateTo === todayStr && !isActuallyDone;           // hôm nay UP
      const isUrgent       = r.dateTo && r.dateTo > todayStr && r.dateTo <= soon3Str && !isActuallyDone; // sắp UP (>hôm nay)
      const numColor = r.isVN
        ? (r.status==='new' ? '#7c3aed' : '#db2777')
        : (r.status==='new' ? '#27ae60' : '#b8860b');

      const badge = isActuallyDone
        ? '<span style="font-size:7px;background:#27ae60;color:#fff;border-radius:2px;padding:0 3px;margin-left:2px;font-weight:700">✓ Đã UP</span>'
        : isTodayUp
        ? '<span style="font-size:7px;color:#e74c3c;font-weight:800;margin-left:2px">🔴 Hôm nay UP</span>'
        : isUrgent
        ? '<span style="font-size:7px;color:#e67e22;font-weight:700;margin-left:2px">⚡Sắp UP</span>'
        : '';

      const textColor = isActuallyDone ? '#27ae60'
        : isTodayUp ? '#e74c3c'
        : isUrgent  ? '#e67e22'
        : isDoneByDate ? '#aaa'
        : 'inherit';

      return `<div style="font-size:9px;display:flex;align-items:center;gap:2px;white-space:nowrap;overflow:hidden">
        <span style="font-size:8px;font-weight:800;color:${numColor};flex-shrink:0">[${r.pjNum||'?'}]</span>
        <span style="overflow:hidden;text-overflow:ellipsis;color:${textColor}">${r.groupName.length>8?r.groupName.substring(0,8)+'…':r.groupName}</span>
        ${r.upTime && !isActuallyDone ? `<span style="font-size:7px;color:#c0392b;font-weight:800;background:#fff0f0;border-radius:2px;padding:0 2px;flex-shrink:0">⚡${r.upTime}</span>` : ''}
        ${badge}
      </div>`;
    }).join('');

    const summary = leaveParts+tripParts || '';
    const nameBg  = tasks.length>0||trips.length>0 ? 'var(--gray1)' : '#e8fdf0';

    // Day cells — mỗi hạng mục 1 dòng riêng, label trên bar, không chồng
    const ROW_H = 16; // px mỗi hàng hạng mục
    // taskCount: số dòng cần hiển thị (tính cả trip nếu không có task)
    const hasAnyTrip = upcomingTrips.length > 0;
    const taskCount = Math.max(1, tasks.length + (hasAnyTrip && tasks.length===0 ? 1 : 0));

    const dayCells = days.map((d,i)=>{
      const dkStr=dk(d), isToday=dkStr===todayStr, isSun=d.getDay()===0, isSat=d.getDay()===6;
      const isPast=dkStr<todayStr, isHoliday=!!holidayMap[dkStr];
      const isWeekBorder=d.getDay()===1&&i>0;
      const isOnLeave = getStaffLeaves(staff).some(l=>{
        const lf=l.from||l.to, lt=l.to||l.from;
        return lf&&lt&&lf<=dkStr&&lt>=dkStr;
      });
      const isOnTrip = trips.some(t=>{
        const tf=t.from||t.to, tt=t.to||t.from;
        return tf&&tt&&tf<=dkStr&&tt>=dkStr;
      });
      const activeTasks = tasks.filter(r=>{
        const from=r.dateFrom||r.dateTo, to=r.dateTo||r.dateFrom;
        return from&&to&&from<=dkStr&&to>=dkStr;
      });

      const bg = isOnLeave?'rgba(231,76,60,.1)':isHoliday?'rgba(192,57,43,.07)':isToday?'rgba(255,192,0,.1)':isPast?'rgba(0,0,0,.02)':isSun||isSat?'rgba(231,76,60,.04)':'#fff';
      const borderL = isWeekBorder?'2px solid #ccc':'1px solid #ddd';
      const cellH = taskCount * ROW_H;

      // Xây dựng từng dòng per task
      const rowDivs = tasks.map((r, ri) => {
        const from=r.dateFrom||r.dateTo, to=r.dateTo||r.dateFrom;
        const active = from&&to&&from<=dkStr&&to>=dkStr;
        const isActuallyDone = !!(r.doneAt);
        const isTodayUp = r.dateTo===todayStr && !isActuallyDone;
        const isDoneByDate = r.dateTo && r.dateTo<todayStr && !isActuallyDone;
        const isNew = r.status==='new';
        const isFirst = from===dkStr || dkStr===startStr;
        const isLast  = to===dkStr;
        const top = ri * ROW_H;

        let inner = '';
        if (active) {
          const bc = (isActuallyDone||isDoneByDate) ? '#adb5bd'
            : r.isVN ? (isNew?'#7c3aed':'#db2777')
            :          (isNew?'#5a9a35':'#d4900a');
          const br = isFirst&&isLast?'2px':isFirst?'2px 0 0 2px':isLast?'0 2px 2px 0':'0';
          const typeName = (r.groupName||'').replace('パース','').replace('作成','').trim();
          // Label: trên cùng dòng, bar ở giữa-dưới, UP ở trên bar
          const labelHtml = isFirst
            ? `<div style="position:absolute;top:1px;left:2px;font-size:6px;color:${bc};white-space:nowrap;font-weight:700;z-index:10;text-shadow:0 0 3px #fff,0 0 3px #fff,0 0 3px #fff">[${r.pjNum||'?'}] ${typeName}</div>`
            : '';
          const upHtml = (isToday && isTodayUp)
            ? `<div style="position:absolute;top:1px;right:2px;font-size:6px;font-weight:900;color:#e74c3c;z-index:11;text-shadow:0 0 3px #fff">UP</div>`
            : '';
          // Bar nằm phía dưới dòng, có khoảng cách với chữ
          inner = `${labelHtml}${upHtml}<div style="position:absolute;bottom:3px;left:0;right:0;height:3px;background:${bc};border-radius:${br};opacity:${isActuallyDone?0.6:1}"></div>`;
        }
        return `<div style="position:absolute;top:${top}px;left:0;right:0;height:${ROW_H}px;overflow:visible">${inner}</div>`;
      });

      // Trip bar riêng dòng nếu không có task
      if (isOnTrip && tasks.length===0) {
        const tripActive = activeTasks.length===0;
        const tripHtml = tripActive
          ? `<div style="position:absolute;top:0;left:0;right:0;height:${ROW_H}px;overflow:visible"><div style="position:absolute;top:1px;left:2px;font-size:6px;color:#8e44ad;white-space:nowrap;font-weight:700;z-index:10;text-shadow:0 0 3px #fff">✈</div><div style="position:absolute;bottom:3px;left:0;right:0;height:3px;background:#8e44ad;border-radius:2px"></div></div>`
          : '';
        return `<td style="background:${bg};border-left:${borderL};border-bottom:1px solid #ddd;padding:0;position:relative;overflow:visible"><div style="height:${cellH}px;position:relative;overflow:visible">${tripHtml}</div></td>`;
      }

      return `<td style="background:${bg};border-left:${borderL};border-bottom:1px solid #ddd;padding:0;position:relative;overflow:visible"><div style="height:${cellH}px;position:relative;overflow:visible">${rowDivs.join('')}</div></td>`;
    }).join('');

    return `<tr style="border-bottom:1px solid #ddd">
      <td style="background:${nameBg};padding:4px 8px;min-width:130px;max-width:150px;border-right:1px solid #bbb;vertical-align:top">
        <div style="font-weight:700;font-size:12px;color:var(--navy);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${staff}</div>
        ${summary ? `<div style="margin-top:2px">${summary}</div>` : (tasks.length===0&&trips.length===0?'<div style="font-size:9px;color:#27AE60">✓ Rảnh</div>':'')}
        ${tasks.length>0?`<div style="margin-top:1px">${tasks.map(r=>{
          const isNew=r.status==='new';
          const bc=r.isVN?(isNew?'#7c3aed':'#db2777'):(isNew?'#5a9a35':'#d4900a');
          const typeName=(r.groupName||'').replace('パース','').replace('作成','').trim();
          return `<div style="font-size:8px;color:${bc};white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:130px;line-height:${ROW_H}px">[${r.pjNum||'?'}] ${typeName}</div>`;
        }).join('')}</div>`:''}
      </td>
      <td style="background:${nameBg};padding:4px 2px;border-right:1px solid #bbb;vertical-align:middle;text-align:center;min-width:36px">
        ${(()=>{
          // Tổng OT từ tất cả hạng mục của nhân sự này trong tháng hiện tại
          const m = curMonth();
          let otTotal = 0;
          [...(m.projects||[]),...(m.projectsVN||[])].forEach(p=>{
            (p.groups||[]).forEach(g=>{
              (g.rows||[]).forEach(r=>{
                if(r.staff===staff && r.ot) otTotal += (r.ot||0);
              });
            });
            (p.otLog||[]).forEach(e=>{ if(e.staff===staff) otTotal+=(e.hours||0); });
          });
          return otTotal > 0
            ? `<div style="font-size:11px;font-weight:800;color:#e67e22">${otTotal}</div><div style="font-size:8px;color:#aaa">h</div>`
            : `<div style="font-size:10px;color:#ccc">—</div>`;
        })()}
      </td>
      ${dayCells}
    </tr>`;
  }).join('');

  return `<div style="overflow-x:auto">
  <table style="width:100%;border-collapse:collapse;font-size:11px;min-width:600px">
    <thead>
      <tr>
        <th style="background:var(--navy);width:140px;min-width:130px;padding:4px 8px;color:rgba(255,255,255,.7);font-size:10px;text-align:left">Nhân sự</th>
        <th style="background:var(--navy);width:36px;min-width:36px;padding:4px 4px;color:#FFC000;font-size:10px;text-align:center;white-space:nowrap">OT</th>
        ${hdrMonths}
      </tr>
      <tr>
        <th style="background:var(--navy2);padding:4px 8px;font-size:9px;color:var(--gold2);text-align:left">
          Hôm nay: <strong style="color:var(--gold)">${todayStr.split('-').slice(1).join('/')}</strong>
        </th>
        <th style="background:var(--navy2);padding:4px;font-size:9px;color:var(--gold2);text-align:center">h</th>
        ${hdrDays}
      </tr>
    </thead>
    <tbody>${staffRows}</tbody>
  </table>
  </div>
  <div style="padding:7px 12px;display:flex;gap:10px;font-size:10px;color:var(--gray4);background:var(--gray1);border-top:1px solid var(--gray2);flex-wrap:wrap">
    <span>Chú thích:</span>
    <span style="display:flex;align-items:center;gap:3px"><span style="width:12px;height:7px;background:#5a9a35;border-radius:2px;display:inline-block"></span>Làm mới</span>
    <span style="display:flex;align-items:center;gap:3px"><span style="width:12px;height:7px;background:#d4900a;border-radius:2px;display:inline-block"></span>Sửa lại</span>
    <span style="display:flex;align-items:center;gap:3px"><span style="width:12px;height:7px;background:#5a9a35;border-radius:2px;display:inline-block"></span>🇯🇵 Mới</span>
    <span style="display:flex;align-items:center;gap:3px"><span style="width:12px;height:7px;background:#d4900a;border-radius:2px;display:inline-block"></span>🇯🇵 Sửa</span>
    <span style="display:flex;align-items:center;gap:3px"><span style="width:12px;height:7px;background:#7c3aed;border-radius:2px;display:inline-block"></span>🇻🇳 Mới</span>
    <span style="display:flex;align-items:center;gap:3px"><span style="width:12px;height:7px;background:#db2777;border-radius:2px;display:inline-block"></span>🇻🇳 Sửa</span>
    <span style="display:flex;align-items:center;gap:3px"><span style="font-size:8px;font-weight:800;color:#e74c3c">🔴</span><span style="color:#e74c3c;font-weight:700">Hôm nay UP</span></span>
    <span style="display:flex;align-items:center;gap:3px"><span style="font-size:8px;color:#e67e22">⚡</span><span style="color:#e67e22;font-weight:700">Sắp UP</span></span>
    <span style="display:flex;align-items:center;gap:3px"><span style="width:12px;height:7px;background:#adb5bd;border-radius:2px;display:inline-block"></span><span style="color:#888;">Đã UP / Qua ngày</span></span>
    <span style="display:flex;align-items:center;gap:3px"><span style="width:12px;height:7px;background:#8e44ad;border-radius:2px;display:inline-block"></span>✈ Công tác</span>
    <span style="display:flex;align-items:center;gap:3px"><span style="width:12px;height:7px;background:rgba(231,76,60,.2);border:1px solid #e74c3c;border-radius:2px;display:inline-block"></span>Nghỉ phép</span>
    <span style="display:flex;align-items:center;gap:3px"><span style="display:inline-block;font-size:9px">🔴</span>Ngày lễ</span>
    <span style="margin-left:auto;font-style:italic">Hover để xem chi tiết</span>
  </div>`;
}

function updateMonthTarget(field, val) {
  if(!D.months[D.activeMonth]) D.months[D.activeMonth]={projects:[],projectsVN:[],targetNew:0,targetRev:0};
  D.months[D.activeMonth][field] = Math.max(0, val); save();
  refreshHeroTargetDisplay();
}

function refreshHeroTargetDisplay() {
  const m = curMonth();
  const pjs = curProjects();
  const sumNew = pjs.reduce((s,p)=>s+totalNew(p),0);
  const sumRev = pjs.reduce((s,p)=>s+totalRev(p),0);
  const tgtNew = m.targetNew||0, tgtRev = m.targetRev||0;
  const pctNew = tgtNew>0?Math.min(100,Math.round(sumNew/tgtNew*100)):0;
  const pctRev = tgtRev>0?Math.min(100,Math.round(sumRev/tgtRev*100)):0;
  const doneNew = tgtNew>0 && sumNew>=tgtNew;
  const doneRev = tgtRev>0 && sumRev>=tgtRev;

  // Small hero boxes - progress bars
  const pN=document.getElementById('prgNew'); if(pN) pN.style.width=pctNew+'%';
  const pR=document.getElementById('prgRev'); if(pR) pR.style.width=pctRev+'%';
  const lblN=document.getElementById('lblNew'); if(lblN) lblN.textContent=sumNew+'/'+tgtNew;
  const lblR=document.getElementById('lblRev'); if(lblR) lblR.textContent=sumRev+'/'+tgtRev;

  // Target box - progress bars with green when done
  const ptN=document.getElementById('prgTgtNew');
  if(ptN){ ptN.style.width=pctNew+'%'; ptN.style.background=doneNew?'#4ade80':'#70AD47'; }
  const ptR=document.getElementById('prgTgtRev');
  if(ptR){ ptR.style.width=pctRev+'%'; ptR.style.background=doneRev?'#4ade80':'var(--gold)'; }

  // Target box - actual numbers (green when done)
  const aN=document.getElementById('tgt-actual-new');
  if(aN){ aN.textContent=sumNew; aN.style.color=doneNew?'#4ade80':'var(--gold)'; }
  const aR=document.getElementById('tgt-actual-rev');
  if(aR){ aR.textContent=sumRev; aR.style.color=doneRev?'#4ade80':'var(--gold)'; }

  // Total label
  const el=document.getElementById('tgtTotal');
  if(el) el.textContent='Tổng = '+(tgtNew+tgtRev)+' phối cảnh';

  // Hero nums (month view only)
  if (!activePjId) {
    const hN=document.getElementById('heroSumNew'); if(hN) hN.textContent=sumNew;
    const hR=document.getElementById('heroSumRev'); if(hR) hR.textContent=sumRev;
  }
}

function renderMonthStaffCard(pjs) {
  const sm={};
  D.settings.staffList.forEach(s=>sm[s]={n:0,r:0,ot:0});
  pjs.forEach(p=>{
    (p.groups||[]).flatMap(g=>g.rows||[]).forEach(r=>{
      if(r.staff&&sm[r.staff]){
        if(r.status==='new') sm[r.staff].n+=(r.qty||0);
        else sm[r.staff].r+=(r.qty||0);
        sm[r.staff].ot+=(r.ot||0);
      }
    });
    (p.records||[]).forEach(r=>{ if(r.staff&&sm[r.staff]){ if(r.status==='new') sm[r.staff].n+=(r.qty||0); else sm[r.staff].r+=(r.qty||0); } });
    (p.otLog||[]).forEach(e=>{if(e.staff&&sm[e.staff])sm[e.staff].ot+=(e.hours||0);});
  });
  const active=D.settings.staffList.filter(s=>sm[s].n+sm[s].r+sm[s].ot>0);
  if(!active.length) return '';
  const tn=active.reduce((s,k)=>s+sm[k].n,0);
  const tr=active.reduce((s,k)=>s+sm[k].r,0);
  const to=active.reduce((s,k)=>s+sm[k].ot,0);
  return `<div class="card">
    <div class="card-hd"><span class="card-hd-title">👥 Tổng kết nhân sự tháng</span></div>
    <div style="overflow-x:auto"><table class="perf-tbl">
      <thead><tr><th>Nhân sự</th><th style="text-align:center">作成 Mới</th><th style="text-align:center">修正 Sửa</th><th style="text-align:center">Tổng</th><th style="text-align:center">OT(h)</th></tr></thead>
      <tbody>
        ${active.map(s=>`<tr>
          <td style="font-weight:600">${s}</td>
          <td class="num-c" style="color:var(--new-tx)">${sm[s].n}</td>
          <td class="num-c" style="color:var(--rev-tx)">${sm[s].r}</td>
          <td class="num-c" style="font-weight:700">${sm[s].n+sm[s].r}</td>
          <td class="num-c" style="color:var(--orange)">${sm[s].ot>0?sm[s].ot.toFixed(1):'—'}</td>
        </tr>`).join('')}
        <tr class="total-row"><td>Tổng</td><td class="num-c">${tn}</td><td class="num-c">${tr}</td><td class="num-c">${tn+tr}</td><td class="num-c" style="color:var(--orange)">${to>0?to.toFixed(1):'—'}</td></tr>
      </tbody>
    </table></div></div>`;
}

  const m = curMonth();
  const tgtNew = m.targetNew || 0, tgtRev = m.targetRev || 0;
  const pctNew = tgtNew > 0 ? Math.min(100, Math.round(sumNew / tgtNew * 100)) : 0;
  const pctRev = tgtRev > 0 ? Math.min(100, Math.round(sumRev / tgtRev * 100)) : 0;

  // Staff breakdown for this project
  const sm = {};
  D.settings.staffList.forEach(s => sm[s] = {n:0, r:0, ot:0});
  (p.groups||[]).flatMap(g => g.rows||[]).forEach(r => {

      else sm[r.staff].r += (r.qty||0);
      sm[r.staff].ot += (r.ot||0);

  });

  heroRow.innerHTML = `

      ${activeS.length ? activeS.map(s => `
        <div class="perf-bar">
          <div class="perf-bar-row">
            <span style="color:rgba(255,255,255,.85);font-weight:500">${s}</span>

          </div>
          <div class="perf-bar-track">
            <div class="perf-bar-new" style="width:${maxV>0?Math.round(sm[s].n/maxV*100):0}%"></div>
            <div class="perf-bar-rev" style="width:${maxV>0?Math.round(sm[s].r/maxV*100):0}%"></div>

}

/* PHOTOS */
function renderPhotoSlots(p) {
  const photos=p.photos||[]; let html='';
  for(let i=0;i<6;i++){
    const ph=photos[i];
    if(ph) html+=`<div class="photo-slot filled"><img src="${ph}" alt="Photo ${i+1}"><button class="ph-del" onclick="delPhoto('${p.id}',${i})">✕</button></div>`;
    else html+=`<label class="photo-slot"><span class="ph-ico">🖼</span><span class="ph-txt">Thêm ảnh</span><input type="file" accept="image/*" onchange="uploadPhoto('${p.id}',${i},this)"></label>`;
  }
  return html;
}
function uploadPhoto(pjId, slot, input) {
  const file = input.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      // Auto compress: max 480px, JPEG quality 0.50 → ~10-15KB/ảnh (tối ưu cho 12 tháng)
      const MAX = 480;
      let w = img.width, h = img.height;
      if (w > MAX || h > MAX) {
        if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
        else { w = Math.round(w * MAX / h); h = MAX; }
      }
      const cv = document.createElement('canvas');
      cv.width = w; cv.height = h;
      cv.getContext('2d').drawImage(img, 0, 0, w, h);
      const compressed = cv.toDataURL('image/jpeg', 0.50);
      const kb = Math.round(compressed.length * 0.75 / 1024);
      const p = getPj(pjId); if (!p) return;
      if (!p.photos) p.photos = [];
      p.photos[slot] = compressed; save();
      const g = document.getElementById('photoGrid-' + pjId);
      if (g) g.innerHTML = renderPhotoSlots(p);
      toast('✓ Đã thêm ảnh (' + kb + 'KB)');
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}
function delPhoto(pjId,slot) {
  const p=getPj(pjId); if(!p||!p.photos) return;
  p.photos[slot]=null; p.photos=p.photos.filter((_,i)=>i!==slot); save();
  const g=document.getElementById(`photoGrid-${pjId}`); if(g) g.innerHTML=renderPhotoSlots(p);
}

// ══════════════════════════════════════════════════════
// KPI CALCULATION ENGINE
// ══════════════════════════════════════════════════════

// Calculate monthly KPI for a staff member from a set of rows
function calcKPI(rows, section, totalOTHours, totalQty, onTimeRate) {
  const fields = section === 'vn' ? RATING_VN : RATING_JP;
  
  // Collect avg per field from rated rows
  const fieldSums = {}, fieldCounts = {};
  fields.forEach(rf => { fieldSums[rf.field] = 0; fieldCounts[rf.field] = 0; });
  
  rows.forEach(r => {
    fields.forEach(rf => {
      const v = r[rf.field];
      if (v && v > 0) { fieldSums[rf.field] += v; fieldCounts[rf.field]++; }
    });
  });

  if (section === 'jp') {
    // Group A: Kỹ thuật diễn họa (rate0-rate5) — weight 40%
    const grpA = ['rate0','rate1','rate2','rate3','rate4','rate5'];
    const grpB = ['rate6','rate7','rate8','rate9'];   // weight 30%
    const grpC = ['rate10','rate11','rate12','rate13']; // weight 30%
    
    const avgGroup = (fields_) => {
      const vals = fields_.map(f => fieldCounts[f] > 0 ? fieldSums[f]/fieldCounts[f] : null).filter(v=>v!==null);
      return vals.length ? vals.reduce((a,b)=>a+b,0)/vals.length : 0;
    };
    
    const A = avgGroup(grpA), B = avgGroup(grpB), C = avgGroup(grpC);
    const hasData = A > 0 || B > 0 || C > 0;
    if (!hasData) return null;
    
    let kpi = (A * 0.40) + (B * 0.30) + (C * 0.30);
    
    // OT bonus: tiered by hours
    if (totalOTHours > 30) kpi *= 1.20;
    else if (totalOTHours > 20) kpi *= 1.10;
    else if (totalOTHours > 10) kpi *= 1.05;
    // Error penalty: rate7 (Tỷ lệ lỗi) low → penalty
    const errorScore = fieldCounts['rate7'] > 0 ? fieldSums['rate7']/fieldCounts['rate7'] : 10;
    if (errorScore < 3) kpi *= 0.85; // high error rate
    
    return Math.min(10, kpi);
    
  } else {
    // VN — Group A: Giai đoạn thiết kế rate0..rate6 (weight 45%)
    const grpA = ['rate0','rate1','rate2','rate3','rate4','rate5','rate6'];
    // VN — Group B: Kỹ thuật rate7..rate10 (weight 30%)
    const grpB = ['rate7','rate8','rate9','rate10'];
    // VN — Group C: Thái độ rate11..rate13 (weight 25%)
    const grpC = ['rate11','rate12','rate13'];

    const avgGroup = (fields_) => {
      const vals = fields_.map(f => fieldCounts[f] > 0 ? fieldSums[f]/fieldCounts[f] : null).filter(v=>v!==null);
      return vals.length ? vals.reduce((a,b)=>a+b,0)/vals.length : 0;
    };

    const A = avgGroup(grpA), B = avgGroup(grpB), C = avgGroup(grpC);
    const hasData = A > 0 || B > 0 || C > 0;
    if (!hasData) return null;

    let kpi = (A * 0.45) + (B * 0.30) + (C * 0.25);

    // OT bonus
    if (totalOTHours > 30) kpi *= 1.20;
    else if (totalOTHours > 20) kpi *= 1.10;
    else if (totalOTHours > 10) kpi *= 1.05;
    // Penalty: rate10 (Tỷ lệ lỗi/Revision) thấp → nhiều revision
    // rate10 giờ liên kết với UP muộn nên phản ánh thực tế tốt hơn
    const revScore = fieldCounts['rate10'] > 0 ? fieldSums['rate10']/fieldCounts['rate10'] : 10;
    if (revScore < 3) kpi *= 0.90;

    return Math.min(10, kpi);
  }
}

// Rolling KPI: weighted average of 3M recent (50%) + 12M avg (35%) + best month (15%)
function calcRollingKPI(monthlyKPIs) {
  // monthlyKPIs: array of numbers sorted newest→oldest
  if (!monthlyKPIs.length) return null;
  const valid = monthlyKPIs.filter(v => v !== null && v > 0);
  if (!valid.length) return null;
  
  const avg12 = valid.slice(0,12).reduce((a,b)=>a+b,0) / Math.min(valid.length,12);
  const avg3  = valid.slice(0,3).reduce((a,b)=>a+b,0)  / Math.min(valid.length,3);
  const best  = Math.max(...valid.slice(0,12));
  
  return (avg3 * 0.50) + (avg12 * 0.35) + (best * 0.15);
}

// KPI grade label
function kpiGrade(v) {
  if (v === null || v === 0) return {label:'—', color:'#bbb', stars:0};
  if (v >= 9.0) return {label:'Exceptional', color:'#8E44AD', stars:5};
  if (v >= 8.0) return {label:'Xuất sắc',    color:'#E74C3C', stars:4};
  if (v >= 7.0) return {label:'Tốt',         color:'#27AE60', stars:3};
  if (v >= 6.0) return {label:'Khá',         color:'#F39C12', stars:2};
  return              {label:'Cần cải thiện',color:'#95A5A6', stars:1};
}

function kpiStars(g) {
  return '⭐'.repeat(g.stars) || '—';
}

// Aggregate staff KPI across all months per section
function getStaffMonthlyKPIs(staffName, section) {
  const months = Object.keys(D.months).sort().reverse(); // newest first
  const result = [];
  months.forEach(mid => {
    const m = D.months[mid] || {};
    const pjs = section === 'jp' ? (m.projects||[]) : (m.projectsVN||[]);
    const rows = [];
    let otH = 0;
    pjs.forEach(p => {
      (p.groups||[]).flatMap(g=>g.rows||[]).forEach(r => {
        if (r.staff === staffName) rows.push(r);
      });
      (p.otLog||[]).forEach(e => { if (e.staff===staffName) otH += (e.hours||0); });
    });
    if (rows.length) {
      const kpi = calcKPI(rows, section, otH, rows.reduce((s,r)=>s+(r.qty||0),0), 1);
      result.push({mid, kpi, rows: rows.length, ot: otH});
    }
  });
  return result;
}

// Rating save — immediate, uses getPjGlobal for cross-navigation safety
function calcUpScore(doneAt, dateTo) {
  // doneAt: ISO string local "2026-04-21T14:32:00" (giờ VN)
  // dateTo: "2026-04-21"
  if (!doneAt || !dateTo) return null;

  // Lấy ngày và giờ từ local time string (không qua Date để tránh múi giờ UTC)
  const doneDate = doneAt.slice(0, 10);            // "2026-04-21"
  const hh = parseInt(doneAt.slice(11, 13), 10);   // giờ local VN
  const mm = parseInt(doneAt.slice(14, 16), 10);
  const doneHour = hh + mm / 60;

  if (doneDate < dateTo) return 10;                          // Trước ngày deadline → SỚM
  if (doneDate === dateTo && doneHour < 17) return 10;       // Trước 17h → SỚM
  if (doneDate === dateTo && doneHour < 18) return 8;        // 17h–18h → ĐÚNG GIỜ
  if (doneDate === dateTo && doneHour < 19) return 5;        // 18h–19h → BÌNH THƯỜNG
  if (doneDate === dateTo) return 2;                         // Sau 19h cùng ngày → MUỘN

  // Quá ngày — tính số ngày trễ bằng chuỗi date để tránh lỗi DST
  const [dy, dm, dd] = dateTo.split('-').map(Number);
  const [fy, fm, fd] = doneDate.split('-').map(Number);
  const deadlineMs = Date.UTC(dy, dm-1, dd);
  const doneMs     = Date.UTC(fy, fm-1, fd);
  const diffDays   = Math.round((doneMs - deadlineMs) / 86400000);
  if (diffDays === 1) return 3;   // Quá 1 ngày
  if (diffDays === 2) return 1;   // Quá 2 ngày
  return 0;                       // Quá 3+ ngày
}

function recalcStaffUpKPI(staffName) {
  const m = D.months[D.activeMonth];
  if (!m) return;

  // Thu thập tất cả row đã UP của nhân sự này, tách JP và VN
  const jpRows = (m.projects||[]).flatMap(p=>
    (p.groups||[]).flatMap(g=>(g.rows||[]).filter(r=>r.staff===staffName && r.doneAt))
  );
  const vnRows = (m.projectsVN||[]).flatMap(p=>
    (p.groups||[]).flatMap(g=>(g.rows||[]).filter(r=>r.staff===staffName && r.doneAt))
  );
  const allRows = [...jpRows, ...vnRows];
  if (!allRows.length) return;

  const total    = allRows.length;
  const scores   = allRows.map(r=>r.upScore||0);
  const avgScore = scores.reduce((a,b)=>a+b,0)/total;

  const earlyCount  = allRows.filter(r=>(r.upScore||0) === 10).length;
  const onDotCount  = allRows.filter(r=>(r.upScore||0) === 8).length;
  const normalCount = allRows.filter(r=>(r.upScore||0) === 5).length;
  const lateCount   = allRows.filter(r=>(r.upScore||0) < 5).length;
  const onTimeCount = earlyCount + onDotCount;

  const earlyPct  = earlyCount  / total;
  const latePct   = lateCount   / total;
  const onTimePct = onTimeCount / total;

  // Điểm tốc độ (% sớm)
  const speedScore  = earlyPct>=0.8?10:earlyPct>=0.6?8:earlyPct>=0.4?6:earlyPct>=0.2?4:2;
  // Điểm đúng hạn TB
  const avgUpScore  = Math.min(10, Math.round(avgScore*10)/10);
  // Điểm tập trung (% sớm+đúng giờ)
  const focusScore  = onTimePct>=0.95?10:onTimePct>=0.8?9:onTimePct>=0.65?7:onTimePct>=0.5?5:onTimePct>=0.3?3:1;
  // Tỷ lệ lỗi/muộn nghịch chiều
  const lateScore   = latePct<=0?10:latePct<=0.1?8:latePct<=0.25?6:latePct<=0.4?4:2;
  // Trách nhiệm (UP÷Giao × TB điểm)
  const totalAssignedJP = (m.projects||[]).flatMap(p=>
    (p.groups||[]).flatMap(g=>(g.rows||[]).filter(r=>r.staff===staffName && (r.qty||0)>0))
  ).length;
  const totalAssignedVN = (m.projectsVN||[]).flatMap(p=>
    (p.groups||[]).flatMap(g=>(g.rows||[]).filter(r=>r.staff===staffName && (r.qty||0)>0))
  ).length;
  const totalAssigned = totalAssignedJP + totalAssignedVN;
  const doneRatio   = totalAssigned>0 ? Math.min(1, total/totalAssigned) : 1;
  const respScore   = Math.round(doneRatio * avgScore * 10) / 10;

  // Lưu vào staffProfiles (dùng chung cho báo cáo)
  if (!D.settings.staffProfiles) D.settings.staffProfiles = {};
  if (!D.settings.staffProfiles[staffName]) D.settings.staffProfiles[staffName] = {};
  if (!D.settings.staffProfiles[staffName].upKPI) D.settings.staffProfiles[staffName].upKPI = {};
  D.settings.staffProfiles[staffName].upKPI[D.activeMonth] = {
    speedScore, lateScore, avgUpScore, focusScore, respScore,
    total, earlyCount, onDotCount, normalCount, lateCount,
    avgScore: Math.round(avgScore*10)/10,
    updatedAt: new Date().toISOString()
  };

  // ── Áp vào JP rows: rate6=Tốc độ, rate7=Tỷ lệ lỗi, rate8=TB điểm, rate10=Tập trung, rate11=Trách nhiệm ──
  const jpAssigned = (m.projects||[]).flatMap(p=>
    (p.groups||[]).flatMap(g=>g.rows||[])
  );
  jpAssigned.filter(r=>r.staff===staffName).forEach(r=>{
    r.rate6  = speedScore;
    r.rate7  = lateScore;
    r.rate8  = avgUpScore;
    r.rate10 = focusScore;
    r.rate11 = respScore;
  });

  // ── Áp vào VN rows: giữ nguyên tiêu chí VN, chỉ liên kết 2 field phù hợp nhất ──
  // rate10 = Tỷ lệ lỗi/Revision → UP muộn nhiều → revision nhiều → điểm thấp hơn (dùng lateScore nghịch)
  // rate11 = Tiến độ/Milestone  → UP đúng/sớm → milestone tốt → dùng avgUpScore
  const vnAssigned = (m.projectsVN||[]).flatMap(p=>
    (p.groups||[]).flatMap(g=>g.rows||[])
  );
  vnAssigned.filter(r=>r.staff===staffName).forEach(r=>{
    r.rate10 = lateScore;   // Tỷ lệ lỗi/Revision: UP muộn → revision tăng → điểm thấp
    r.rate11 = avgUpScore;  // Tiến độ/Milestone: điểm TB mốc thời gian UP
  });
}

function markRowDone(pjId, gId, rId) {
  const pj = allCurProjects().find(p=>p.id===pjId);
  if (!pj) return;
  const g = (pj.groups||[]).find(g=>g.id===gId);
  if (!g) return;
  const r = (g.rows||[]).find(r=>r.id===rId);
  if (!r) return;
  if (r.doneAt) return; // không cho bấm lại

  // Lấy local time VN — không dùng toISOString() vì đó là UTC
  const now = new Date();
  const pad = n => String(n).padStart(2,'0');
  const doneAt = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}T${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;

  const score = calcUpScore(doneAt, r.dateTo);
  r.doneAt  = doneAt;
  r.upScore = score;

  const label = score===10?'🟢 SỚM':score===8?'🔵 ĐÚNG GIỜ':score===5?'🟡 BÌNH THƯỜNG':score>=1?'🔴 MUỘN':'🔴 QUÁ HẠN';
  const timeStr = `${pad(now.getHours())}:${pad(now.getMinutes())}`;

  if (r.staff) recalcStaffUpKPI(r.staff);

  persistD();
  const tbody = document.getElementById('rbody-' + pjId);
  if (tbody) tbody.innerHTML = renderGroups(pj);
  refreshPjTotals(pjId);

  toast(`✓ Đã UP — ${label} lúc ${timeStr} | Điểm: ${score}/10`, 4000);
}

function updRowRating(pjId, gId, rId, field, val) {
  const p = getPjGlobal(pjId);
  if (!p) return;
  const g = (p.groups||[]).find(g => g.id === gId);
  if (!g) return;
  const r = g.rows.find(r => r.id === rId);
  if (!r) return;
  r[field] = +val;
  persistD();
}

/* GROUPS — per-group gray shading for easy visual separation */
function renderGroups(p) {
  const groups = p.groups||[];
  if (!groups.length) return `<tr><td colspan="${(sessionStorage.getItem('splash_role')||'admin')==='edit' ? 9 : 12}" style="text-align:center;padding:20px;color:var(--gray4)">
    Chưa có hạng mục — bấm <strong style="color:var(--navy)">＋ Thêm hạng mục</strong> ở trên</td></tr>`;

  // High-contrast alternating palette: strong difference between adjacent groups
  const GRP = [
    {bg:'#ffffff', hdr:'#f0f0f0', border:'#b0b0b0', stripe:'#f8f8f8'}, // 1 white
    {bg:'#d8d8d8', hdr:'#c8c8c8', border:'#888888', stripe:'#d0d0d0'}, // 2 medium gray
    {bg:'#f5f5f5', hdr:'#e8e8e8', border:'#a8a8a8', stripe:'#eeeeee'}, // 3 light gray
    {bg:'#b8b8b8', hdr:'#a8a8a8', border:'#686868', stripe:'#b0b0b0'}, // 4 dark gray
    {bg:'#ececec', hdr:'#dcdcdc', border:'#999999', stripe:'#e4e4e4'}, // 5 silver
    {bg:'#c8c8c8', hdr:'#b8b8b8', border:'#787878', stripe:'#c0c0c0'}, // 6 mid gray
    {bg:'#f9f9f9', hdr:'#ebebeb', border:'#b8b8b8', stripe:'#f2f2f2'}, // 7 near white
    {bg:'#a8a8a8', hdr:'#989898', border:'#585858', stripe:'#a0a0a0'}, // 8 charcoal gray
  ];

  const today = localDateStr(new Date());
  const soon3 = localDateStr(new Date(Date.now()+3*86400000));

  return groups.map((g, gi) => {
    const rows = g.rows||[];
    const gNew = rows.filter(r=>r.status==='new').reduce((s,r)=>s+(r.qty||0),0);
    const gRev = rows.filter(r=>r.status==='rev').reduce((s,r)=>s+(r.qty||0),0);
    const gOT  = rows.reduce((s,r)=>s+(r.ot||0),0);
    const gTot = gNew+gRev;
    const gc   = GRP[gi % GRP.length];

    // ── CẤP HẠNG MỤC: sáng+viền xanh nếu có UP hôm nay/tương lai; xám nếu không ──
    const gHasTodayUp   = rows.some(r=>r.dateTo===today && !r.doneAt);
    const gHasFutureUp  = rows.some(r=>r.dateTo>today && !r.doneAt);
    const gHasActiveUp  = gHasTodayUp || gHasFutureUp;
    // Border: xanh khi active, transparent khi xám
    const gBorderColor  = gHasActiveUp ? '#27ae60' : 'transparent';
    const gBorderWidth  = gHasActiveUp ? '3px' : '2px';
    // Tên hạng mục: KHÔNG mờ nếu có bất kỳ row nào có lịch UP đang chờ
    const gDimStyle     = gHasActiveUp ? '' : 'opacity:0.42;filter:saturate(0.1) brightness(0.85);';

    const rowsHtml = rows.map((r, ri) => {
      const isFirst = ri === 0;

      // ── CẤP DÒNG: sáng+viền xanh nếu có UP hôm nay/tương lai; xám nếu không ──
      const rActiveUp = !!(r.dateTo) && r.dateTo >= today && !r.doneAt;
      const rIsDone   = !!(r.doneAt);
      // Sáng: có dateTo >= hôm nay và chưa done
      // Xám: không có dateTo, hoặc dateTo quá khứ, hoặc đã done
      const rowBg = rActiveUp
        ? '#f0fff4'    // xanh cực nhạt khi active
        : rIsDone
        ? '#f5f5f5'    // xám nhạt khi đã UP xong
        : '#f5f5f5';   // xám nhạt khi không có lịch
      const rowBorder  = rActiveUp ? 'outline:1.5px solid #27ae60;outline-offset:-1px;' : '';
      const rowDimmed  = !rActiveUp && !rIsDone ? 'opacity:0.45;filter:saturate(0.1) brightness(0.88);' : '';
      // Done: xám nhạt nhưng không dim opacity (vẫn đọc được badge ✓)
      const rowStyle   = rActiveUp
        ? `background:${rowBg};${rowBorder}`
        : rIsDone

      const isDark = parseInt(gc.bg.slice(1,3),16) < 180;

      return `<tr data-gid="${g.id}" data-rid="${r.id}"

          background:${gc.hdr};

          border-right:1px solid ${gc.border};

            <input class="tbl-input-dark" list="tl-${p.id}" value="${x(g.type||'')}"

              style="background:var(--navy);border-color:rgba(255,255,255,.25);color:#fff;font-weight:700;font-size:11px;width:100%"
              placeholder="外観パース…">

          </div>
          <div style="padding:3px 8px 5px;${gHasActiveUp?'':'opacity:0.45;filter:saturate(0.1) brightness(0.85);'}display:flex;align-items:center;justify-content:space-between;background:var(--navy2);gap:6px;flex-wrap:nowrap">
            <div style="display:flex;gap:4px;align-items:center;min-width:0;overflow:hidden">
              <span style="font-size:9px;color:var(--gold2)">Làm mới:</span>
              <span style="font-size:11px;font-weight:700;color:var(--gold)">${gNew}</span>
              <span style="font-size:9px;color:rgba(255,255,255,.4)">|</span>
              <span style="font-size:9px;color:var(--gold2)">Sửa:</span>

                onclick="delGroup('${p.id}','${g.id}')">🗑</button>
            </div>
          </div>
        </td>` : ''}
        <td style="border-left:2px solid ${gc.border}">

                if ((r.qty||0) <= 0) {
                  return `<button class="btn btn-xs" disabled
                    style="background:#f5f5f5;color:#ccc;border-color:#e0e0e0;font-size:10px;padding:2px 6px;cursor:not-allowed;opacity:.6"
                    title="Chưa có số lượng">✓ UP</button>`;
                }
                return `<button class="btn btn-xs" style="background:#e8f5e9;color:#2e7d32;border-color:#a5d6a7;font-size:10px;padding:2px 6px;white-space:nowrap"

        <td style="text-align:center">
          <button class="btn btn-xs btn-ghost btn-danger" onclick="delRow('${p.id}','${g.id}','${r.id}')">✕</button>
        </td>
      </tr>`;
    }).join('');
    return rowsHtml;
  }).join('');
}

/* Staff schedule - 3-week Gantt calendar */
function renderStaffSchedule(p) {
  // Build date range: today + 21 days (3 weeks)
  const today = new Date();
  today.setHours(0,0,0,0);
  const days = [];
  for(let i=0;i<21;i++){
    const d = new Date(today);
    d.setDate(today.getDate()+i);
    days.push(d);
  }
  const todayStr = localDateStr(today);
  const endStr   = localDateStr(days[20]);

  // Week separator indices
  const dow = today.getDay(); // 0=Sun
  // Days per week display
  const weekStarts = [];
  let wStart=0;
  days.forEach((d,i)=>{ if(i===0||(d.getDay()===1)){weekStarts.push(i);} });

  // Collect ALL tasks from this project (bao gồm cả ngoài 3 tuần)
  const allTasks = (p.groups||[]).flatMap(g=>
    (g.rows||[]).filter(r=>r.staff&&(r.dateFrom||r.dateTo)).map(r=>({
      ...r,
      pjName: p.nameVN||p.nameJP||'Dự án',
      groupName: g.type||'—'
    }))
  );

  // Filter to tasks overlapping the 3-week window
  function overlaps(r) {
    const from = r.dateFrom||r.dateTo||'';
    const to   = r.dateTo||r.dateFrom||'';
    if(!from&&!to) return false;
    return (!to || to >= todayStr) && (!from || from <= endStr);
  }

  // Lấy danh sách nhân sự CỦA DỰ ÁN này (có tham gia ít nhất 1 hàng)
  const pjStaffActive = [...new Set(
    allTasks.filter(overlaps).map(r=>r.staff).filter(Boolean)
  )];
  const pjStaffPast = [...new Set(
    allTasks.filter(r=>!overlaps(r)).map(r=>r.staff).filter(Boolean)
      .filter(s=>!pjStaffActive.includes(s))
  )];
  // Sắp xếp theo thứ tự trong staffList
  const sortStaff = arr => D.settings.staffList.filter(s=>arr.includes(s));
  const activeStaffList = sortStaff(pjStaffActive);
  const pastStaffList   = sortStaff(pjStaffPast);

  // Nếu không có nhân sự nào → báo trống
  if (!activeStaffList.length && !pastStaffList.length) {
    return `<div style="padding:20px;text-align:center;color:#aaa;font-size:12px">
      Chưa có nhân sự nào được gán trong dự án này
    </div>`;
  }

  // Build per-staff task map
  const staffMap = {};
  [...activeStaffList,...pastStaffList].forEach(s => staffMap[s]=[]);
  allTasks.filter(overlaps).forEach(r=>{
    if(r.staff && staffMap[r.staff]!==undefined) staffMap[r.staff].push(r);
  });

  // Date formatting helpers
  function toD(str){ return str?new Date(str+'T00:00:00'):null; }
  function dateKey(d){ return localDateStr(d); }

  // Build day header HTML
  const dayColW = 'calc((100% - 90px) / 21)';

  let hdrMonths = '';
  let hdrDays   = '';
  let curMonth  = -1;
  let mSpan     = 0, mStart = 0;
  const monthSpans = [];
  days.forEach((d,i)=>{
    if(d.getMonth()!==curMonth){
      if(curMonth>=0) monthSpans.push({label:['T1','T2','T3','T4','T5','T6','T7','T8','T9','T10','T11','T12'][curMonth], span:mSpan});
      curMonth=d.getMonth(); mSpan=1;
    } else mSpan++;
    if(i===20) monthSpans.push({label:['T1','T2','T3','T4','T5','T6','T7','T8','T9','T10','T11','T12'][curMonth], span:mSpan});
  });

  const dayVN = ['CN','T2','T3','T4','T5','T6','T7'];
  hdrDays = days.map((d,i)=>{
    const isToday = dateKey(d)===todayStr;
    const isSun   = d.getDay()===0;
    const isSat   = d.getDay()===6;
    const isWeekBorder = d.getDay()===1 && i>0;
    return `<th style="
      min-width:28px;max-width:36px;text-align:center;font-size:9px;padding:2px 1px;
      background:${isToday?'var(--gold)':'var(--navy)'};
      color:${isToday?'var(--navy)':isSun||isSat?'rgba(255,255,255,.4)':'rgba(255,255,255,.8)'};
      font-weight:${isToday?'800':'400'};
      border-left:${isWeekBorder?'2px solid rgba(255,255,255,.3)':'none'};
    ">
      <div>${dayVN[d.getDay()]}</div>
      <div style="font-size:10px;font-weight:${isToday?'800':'600'}">${d.getDate()}</div>
    </th>`;
  }).join('');

  // Month header
  hdrMonths = monthSpans.map(m=>
    `<th colspan="${m.span}" style="background:var(--navy2);color:var(--gold2);font-size:10px;text-align:center;padding:3px;border-right:1px solid rgba(255,255,255,.15)">${m.label}</th>`
  ).join('');

  // Build each staff row — chỉ nhân sự của dự án này
  function buildStaffRow(staff, isPastStaff) {
    const tasks = (staffMap[staff]||[]);

    const dayCells = days.map((d,i)=>{
      const dk = dateKey(d);
      const isToday = dk===todayStr;
      const isSun   = d.getDay()===0;
      const isSat   = d.getDay()===6;
      const isWeekBorder = d.getDay()===1 && i>0;
      const activeTasks = tasks.filter(r=>{
        const from = r.dateFrom||r.dateTo;
        const to   = r.dateTo||r.dateFrom;
        return from<=dk && to>=dk;
      });
      const leaves = getStaffLeaves(staff);
      const isOnLeave = leaves.some(l=>{
        const lf=l.from||l.to, lt=l.to||l.from;
        return lf && lt && lf<=dk && lt>=dk;
      });
      const bg = isOnLeave?'rgba(231,76,60,.08)':isToday?'rgba(255,192,0,.08)':isSun||isSat?'rgba(0,0,0,.03)':'#fff';
      const borderL = isWeekBorder?'2px solid rgba(0,0,0,.08)':'1px solid #f0f0f0';
      if(activeTasks.length===0){
        return `<td style="background:${bg};border-left:${borderL};padding:1px"></td>`;
      }
      const blocks = activeTasks.map(r=>{
        const isActuallyDone = !!(r.doneAt);
        const isNew = r.status==='new';
        // Màu thanh: xám nếu past staff hoặc đã UP, xanh/vàng nếu active
        const barColor = (isPastStaff || isActuallyDone) ? '#adb5bd'
          : isNew ? '#5a9a35' : '#d4900a';
        const isFirstDay = r.dateFrom===dk;
        const isLastDay  = r.dateTo===dk;
        return `<div title="${x(r.groupName)} · ${isNew?'Làm mới':'Sửa lại'} · ${r.dateFrom||'?'} → ${r.dateTo||'?'}"
          style="background:${barColor};height:11px;margin:1px 0;
          border-radius:${isFirstDay?'3px 0 0 3px':isLastDay?'0 3px 3px 0':'0'};
          overflow:hidden;font-size:7.5px;color:#fff;white-space:nowrap;padding:0 3px;line-height:11px;font-weight:700;
          opacity:${isPastStaff?0.5:1}">
          ${isFirstDay?x(r.groupName.substring(0,6)):''}
        </div>`;
      }).join('');
      return `<td style="background:${bg};border-left:${borderL};padding:1px;vertical-align:top">${blocks}</td>`;
    }).join('');

    const activeLeaveList = getStaffLeaves(staff).filter(l=>{
      const lt=l.to||l.from; return lt >= todayStr;
    });
    const taskSummary = tasks.length>0 || activeLeaveList.length>0
      ? activeLeaveList.map(l=>`<div style="font-size:9px;margin-bottom:1px;display:flex;align-items:center;gap:3px;white-space:nowrap">
          <span style="width:6px;height:6px;border-radius:50%;background:#e74c3c;flex-shrink:0;display:inline-block"></span>
          <span style="color:#e74c3c;overflow:hidden;text-overflow:ellipsis">Nghỉ ${l.from||'?'}${l.to&&l.to!==l.from?'→'+l.to:''}</span>
        </div>`).join('')
        + tasks.map(r=>{
          const overdue = r.dateTo && r.dateTo < todayStr && !r.doneAt;
          const done    = !!(r.doneAt);
          const dotColor = done ? '#adb5bd' : r.status==='new' ? '#70AD47' : 'var(--gold)';
          return `<div style="font-size:9px;margin-bottom:1px;display:flex;align-items:center;gap:3px;white-space:nowrap;overflow:hidden">
            <span style="width:6px;height:6px;border-radius:50%;background:${dotColor};flex-shrink:0;display:inline-block"></span>
            <span style="overflow:hidden;text-overflow:ellipsis;color:${done?'#aaa':overdue?'#e74c3c':'inherit'};text-decoration:${done?'line-through':'none'}">${x(r.groupName.length>10?r.groupName.substring(0,10)+'…':r.groupName)}</span>
            ${overdue?'<span style="color:#e74c3c;font-weight:700">!</span>':''}
            ${done?'<span style="color:#27ae60;font-size:8px">✓</span>':''}
          </div>`;
        }).join('')
      : `<div style="font-size:9px;color:#aaa;font-style:italic">Không có task</div>`;

    // Name cell: active = sáng, past = mờ xám
    const nameBg   = isPastStaff ? '#f9f9f9' : 'var(--gray1)';
    const nameColor= isPastStaff ? '#aaa' : 'var(--navy)';
    const rowOpacity = isPastStaff ? 'opacity:0.55' : '';
    return `<tr style="border-bottom:1px solid var(--gray2);${rowOpacity}">
      <td style="background:${nameBg};padding:5px 8px;min-width:90px;border-right:1px solid var(--gray2);vertical-align:top">
        <div style="font-weight:700;font-size:11px;color:${nameColor}">${staff}</div>
        ${isPastStaff?'<div style="font-size:8px;color:#bbb;font-style:italic">Đã hoàn thành</div>':''}
        ${taskSummary}
      </td>
      ${dayCells}
    </tr>`;
  }

  // Render: active trước, sau đó past có divider
  let staffRows = activeStaffList.map(s=>buildStaffRow(s,false)).join('');
  if(pastStaffList.length>0){
    staffRows += `<tr><td colspan="${days.length+1}"
      style="background:#f5f5f5;padding:4px 10px;font-size:10px;color:#aaa;font-style:italic;border-top:2px dashed #e0e0e0">
      ↓ Nhân sự đã hoàn thành / không còn lịch trong 3 tuần tới
    </td></tr>`;
    staffRows += pastStaffList.map(s=>buildStaffRow(s,true)).join('');
  }

  return `
  <div style="overflow-x:auto">
  <table style="width:100%;border-collapse:collapse;font-size:11px;min-width:600px">
    <thead>
      <tr>
        <th style="background:var(--navy);width:90px;min-width:90px;padding:4px 8px;color:rgba(255,255,255,.7);font-size:10px;text-align:left">Nhân sự</th>
        ${hdrMonths}
      </tr>
      <tr>
        <th style="background:var(--navy2);padding:4px 8px;font-size:10px;color:rgba(255,255,255,.6);text-align:left">
          <div>Hôm nay:</div>
          <div style="color:var(--gold);font-weight:700">${todayStr.split('-').slice(1).join('/')}</div>
        </th>
        ${hdrDays}
      </tr>
    </thead>
    <tbody>${staffRows}</tbody>
  </table>
  </div>
  <div style="padding:8px 12px;display:flex;gap:14px;font-size:10px;color:var(--gray4);background:var(--gray1);border-top:1px solid var(--gray2)">
    <span>Chú thích:</span>
    <span style="display:flex;align-items:center;gap:4px"><span style="width:12px;height:8px;background:#70AD47;border-radius:2px;display:inline-block"></span> Làm mới</span>
    <span style="display:flex;align-items:center;gap:4px"><span style="width:12px;height:8px;background:var(--gold);border-radius:2px;display:inline-block"></span> Sửa lại</span>
    <span style="display:flex;align-items:center;gap:4px"><span style="color:#e74c3c">!</span> Quá hạn</span>
    <span style="display:flex;align-items:center;gap:4px"><span style="width:12px;height:8px;background:rgba(255,192,0,.15);border:1px solid var(--gold);border-radius:2px;display:inline-block"></span> Hôm nay</span>
    <span style="margin-left:auto;font-style:italic">Hover chuột vào ô màu để xem chi tiết</span>
  </div>`;
}

    const body = el.querySelector('.card-body');

function addGroup(pjId) {
  const p=getPj(pjId); if(!p) return;
  if(!p.groups) p.groups=[];
  p.groups.push({id:gid(),type:'',rows:[{id:gid(),status:'new',staff:'',qty:0,note:'',ot:0,otNote:'',dateFrom:'',dateTo:'',rate0:0,rate1:0,rate2:0,rate3:0,rate4:0,rate5:0,rate6:0,rate7:0,rate8:0}]});

function addRow(pjId,gid2) {
  const p=getPj(pjId); if(!p) return;
  const g=(p.groups||[]).find(g=>g.id===gid2); if(!g) return;
  g.rows.push({id:gid(),status:'new',staff:'',qty:0,note:'',ot:0,otNote:'',dateFrom:'',dateTo:'',rate0:0,rate1:0,rate2:0,rate3:0,rate4:0,rate5:0,rate6:0,rate7:0,rate8:0});

}
function delGroup(pjId,gid2) {
  if(!confirm('Xóa hạng mục này?')) return;
  const p=getPj(pjId); if(!p) return;
  p.groups=(p.groups||[]).filter(g=>g.id!==gid2);
  save(); rebuildGroups(pjId); refreshPjTotals(pjId);
}
function delRow(pjId,gid2,rid) {
  const p=getPj(pjId); if(!p) return;
  const g=(p.groups||[]).find(g=>g.id===gid2); if(!g) return;
  g.rows=g.rows.filter(r=>r.id!==rid);

}
function rebuildGroups(pjId) {

}
function updGroup(pjId,gid2,field,val) {
  const p=getPjGlobal(pjId)||getPj(pjId); if(!p) return;
  const g=(p.groups||[]).find(g=>g.id===gid2); if(!g) return;
  g[field]=val; save();
}
function updRow(pjId,gid2,rid,field,val) {
  const p=getPjGlobal(pjId)||getPj(pjId); if(!p) return;
  const g=(p.groups||[]).find(g=>g.id===gid2); if(!g) return;
  const r=g.rows.find(r=>r.id===rid); if(!r) return;
  r[field]=val;
  persistD();
  // Leave conflict check when staff, dateFrom or dateTo changes
  if(['staff','dateFrom','dateTo'].includes(field) && r.staff && (r.dateFrom||r.dateTo)) {
    const conflicts = checkLeaveConflict(r.staff, r.dateFrom||r.dateTo, r.dateTo||r.dateFrom);
    if(conflicts.length>0) {
      const info = conflicts.map(l=>`${l.from||'?'} → ${l.to||l.from||'?'}${l.reason?' ('+l.reason+')':''}`).join(', ');
      toast('⚠ ' + r.staff + ' có lịch nghỉ trùng: ' + info, 5000);
    }
  }
}
function refreshPjTotals(pjId) {
  const p = getPj(pjId); if(!p) return;
  const tn=totalNew(p), tr=totalRev(p), ta=tn+tr;
  const fTn = document.getElementById('tfoot-tn-'+pjId); if(fTn) fTn.textContent = tn;
  const fTr = document.getElementById('tfoot-tr-'+pjId); if(fTr) fTr.textContent = tr;
  const fTa = document.getElementById('tfoot-ta-'+pjId); if(fTa) fTa.textContent = ta;
  updateHeroForProject(p);
  refreshHeroTargetDisplay();
  refreshStaffSched(pjId);
  renderSidebar();
}

function openAddProject() {
  showModal(`<h3>＋ Thêm dự án mới</h3>
    <div class="info-grid c3" style="gap:10px">

      <div class="field"><label>Tên dự án (JP)</label><input id="ap-nJP" placeholder="例：吹田市計画"></div>
      <div class="field"><label>Văn phòng</label><select id="ap-off"><option>大阪</option><option>東京</option><option>ハノイ</option><option>HCM</option></select></div>

        <input id="ap-ct" list="ap-cl" placeholder="ソン, フン…">

      <div class="field"><label>Người triển khai chính</label>

}
function confirmAddPj() {
  const nVN=document.getElementById('ap-nVN').value.trim();
  const nJP=document.getElementById('ap-nJP').value.trim();
  if(!nVN&&!nJP){alert('Vui lòng nhập tên dự án');return;}
  const pj={id:gid(),nameVN:nVN,nameJP:nJP,
    office:document.getElementById('ap-off').value,
    contact:document.getElementById('ap-ct').value.trim(),
    mainStaff:document.getElementById('ap-st').value,
    groups:[],photos:[],otLog:[],notes:''};
  if(!D.months[D.activeMonth]) D.months[D.activeMonth]={projects:[],targetNew:0,targetRev:0};
  if(!D.months[D.activeMonth]) D.months[D.activeMonth]={projects:[],projectsVN:[],targetNew:0,targetRev:0};
  if(activeSection==='vn'){
    if(!D.months[D.activeMonth].projectsVN) D.months[D.activeMonth].projectsVN=[];
    D.months[D.activeMonth].projectsVN.push(pj);
  } else {
    D.months[D.activeMonth].projects.push(pj);
  }
  save(); closeModal(); activePjId=pj.id; renderSidebar(); renderContent();
  toast('✓ Đã thêm dự án ' + (activeSection==='vn'?'🇻🇳 VN':'🇯🇵 JP'));
}
function openEditProject(id) {
  const p=getPj(id); if(!p) return;
  showModal(`<h3>✏ Sửa thông tin dự án</h3>

      <div class="field"><label>Văn phòng</label>
        <select id="ep-off"><option ${p.office==='大阪'?'selected':''}>大阪</option><option ${p.office==='東京'?'selected':''}>東京</option><option ${p.office==='ハノイ'?'selected':''}>ハノイ</option><option ${p.office==='HCM'?'selected':''}>HCM</option></select></div>

function deletePj(id) {
  if(!confirm('Xóa dự án này?')) return;
  if(activeSection==='vn'){
    if(D.months[D.activeMonth].projectsVN) D.months[D.activeMonth].projectsVN=D.months[D.activeMonth].projectsVN.filter(p=>p.id!==id);

  }
  save(); activePjId=null; renderSidebar(); renderContent(); toast('✓ Đã xóa');
}

/* DASHBOARD */
function renderDashboard() {
  const year=document.getElementById('dashYear')?.value||new Date().getFullYear().toString();
  const months=Object.keys(D.months).filter(m=>m.startsWith(year)).sort();
  const dc=document.getElementById('dashContent'); if(!dc) return;
  const mData=months.map(mid=>{
    const m=D.months[mid]||{projects:[],projectsVN:[]};
    const pjs=[...(m.projects||[]),...(m.projectsVN||[])];
    return {mid,label:monthLabel(mid),n:pjs.reduce((s,p)=>s+totalNew(p),0),
      r:pjs.reduce((s,p)=>s+totalRev(p),0),ot:pjs.reduce((s,p)=>s+totalOT(p),0),
      pjCount:pjs.length,tN:m.targetNew||0,tR:m.targetRev||0};
  });
  // ── Aggregate separately: JP, VN, Combined ──
  const staffAnn={}, staffAnnJP={}, staffAnnVN={};
  function initAnn(obj) {
    D.settings.staffList.forEach(s=>{
      obj[s]={n:0,r:0,ot:0,rCount:0};
      for(let i=0;i<14;i++) obj[s]['rate'+i+'Sum']=0;
    });
  }
  initAnn(staffAnn); initAnn(staffAnnJP); initAnn(staffAnnVN);

  function accum(obj, rows, otLog, records) {
    (rows||[]).forEach(r=>{
      if(r.staff&&obj[r.staff]){
        if(r.status==='new') obj[r.staff].n+=(r.qty||0); else obj[r.staff].r+=(r.qty||0);
        obj[r.staff].ot+=(r.ot||0);
        let hasRating=false;
        for(let i=0;i<14;i++){if(r['rate'+i]){hasRating=true;obj[r.staff]['rate'+i+'Sum']+=(r['rate'+i]||0);}}
        if(hasRating) obj[r.staff].rCount++;
      }
    });
    (otLog||[]).forEach(e=>{if(e.staff&&obj[e.staff])obj[e.staff].ot+=(e.hours||0);});
    (records||[]).forEach(r=>{if(r.staff&&obj[r.staff]){if(r.status==='new')obj[r.staff].n+=(r.qty||0);else obj[r.staff].r+=(r.qty||0);}});
  }

  months.forEach(mid=>{
    const _m=(D.months[mid]||{projects:[],projectsVN:[]});
    // JP projects
    (_m.projects||[]).forEach(p=>{
      const rows=(p.groups||[]).flatMap(g=>g.rows||[]);
      accum(staffAnnJP, rows, p.otLog, p.records);
      accum(staffAnn,   rows, p.otLog, p.records);
    });
    // VN projects
    (_m.projectsVN||[]).forEach(p=>{
      const rows=(p.groups||[]).flatMap(g=>g.rows||[]);
      accum(staffAnnVN, rows, p.otLog, p.records);
      accum(staffAnn,   rows, p.otLog, p.records);
    });
  });

  // Staff who appear in each section
  const activeSJP  = D.settings.staffList.filter(s=>staffAnnJP[s].n+staffAnnJP[s].r+staffAnnJP[s].ot>0);
  const activeSVN  = D.settings.staffList.filter(s=>staffAnnVN[s].n+staffAnnVN[s].r+staffAnnVN[s].ot>0);
  const activeS    = D.settings.staffList.filter(s=>staffAnn[s].n+staffAnn[s].r+staffAnn[s].ot>0);
  const totN=mData.reduce((s,m)=>s+m.n,0), totR=mData.reduce((s,m)=>s+m.r,0), totOT=mData.reduce((s,m)=>s+m.ot,0);
  const labels=mData.map(m=>m.label);

  // Helper to build a staff performance table with KPI
  function buildPerfTable(staffList, annData, ratingFields, title, flagEmoji, section) {
    if (!staffList.length) return `<div class="card" style="margin-bottom:12px"><div class="card-hd"><span class="card-hd-title">${flagEmoji} ${title}</span></div><div style="padding:16px;text-align:center;color:var(--gray4);font-size:12px">Chưa có dữ liệu</div></div>`;
    const mx = Math.max(1,...staffList.map(s=>annData[s].n+annData[s].r));

    // Group headers for rating columns
    const grpAfields = ratingFields.filter(rf=>rf.group==='A');
    const grpBfields = ratingFields.filter(rf=>rf.group==='B');
    const grpCfields = ratingFields.filter(rf=>rf.group==='C');
    const grpAw = section==='vn' ? 45 : 40;
    const grpBw = 30, grpCw = section==='vn' ? 25 : 30;

    const groupHeaderRow = `<tr>
      <th colspan="7" style="background:var(--navy);color:#fff"></th>
      <th style="text-align:center;font-size:9px;background:#e8f4fd;color:#1a5276;border-left:2px solid #aed6f1">
        📐 ${section==='vn'?'Quy trình':'Kỹ thuật'} (${grpAw}%)
      </th>
      <th style="text-align:center;font-size:9px;background:#eafaf1;color:#1e8449;border-left:1px solid #a9dfbf">
        ⚡ Năng lực (${grpBw}%)
      </th>
      <th style="text-align:center;font-size:9px;background:#fef9e7;color:#7d6608;border-left:1px solid #f9e79f">
        💼 Thái độ (${grpCw}%)
      </th>
      <th colspan="2" style="background:var(--navy);color:#fff"></th>
    </tr>`;

    // Dashboard: show 3 group header columns only
    const ratingHeaders = `
      <th style="text-align:center;font-size:9px;min-width:55px;background:#e8f4fd;color:#1a5276;border-left:2px solid #aed6f1">
        📐 ${section==='vn'?'Quy trình':'Kỹ thuật'}</th>
      <th style="text-align:center;font-size:9px;min-width:55px;background:#eafaf1;color:#1e8449;border-left:1px solid #a9dfbf">
        ⚡ Năng lực</th>
      <th style="text-align:center;font-size:9px;min-width:55px;background:#fef9e7;color:#7d6608;border-left:1px solid #f9e79f">
        💼 Thái độ</th>`;

    const rows = staffList.map(s=>{
      const t=annData[s].n+annData[s].r, pct=Math.round(t/mx*100);
      const rc=annData[s].rCount;

      // Dashboard: 3 group avg cells
      function dashGrpAvg(grpFields) {
        const vals = grpFields.map(rf => rc ? annData[s][rf.field+'Sum']/rc : 0).filter(v=>v>0);
        return vals.length ? vals.reduce((a,b)=>a+b,0)/vals.length : 0;
      }
      function dashGrpCell(grpFields, borderColor) {
        const v = dashGrpAvg(grpFields);
        const dc = v > 0 ? ratingColor(v) : '#ccc';
        const pct = v * 10;
        return rc
          ? `<td style="text-align:center;border-left:1px solid #eee;padding:4px 6px">
              <div style="font-size:14px;font-weight:800;color:${dc}">${v.toFixed(1)}</div>
              <div style="height:3px;background:#eee;border-radius:2px;margin:2px 4px;overflow:hidden">
                <div style="height:100%;background:${dc};width:${pct}%"></div></div>
            </td>`
          : `<td style="text-align:center;color:var(--gray3);border-left:1px solid #eee">—</td>`;
      }
      const ratingCells = dashGrpCell(grpAfields)+dashGrpCell(grpBfields)+dashGrpCell(grpCfields);

      // KPI calculation — use monthly KPI history
      const monthlyData = getStaffMonthlyKPIs(s, section);
      const monthlyKPIs = monthlyData.map(d=>d.kpi).filter(v=>v!==null);
      const rollingKPI  = calcRollingKPI(monthlyKPIs);
      // Also current year avg (PA1)
      const yearAvgKPI  = monthlyKPIs.length ? monthlyKPIs.reduce((a,b)=>a+b,0)/monthlyKPIs.length : null;
      const gRoll = rollingKPI ? kpiGrade(rollingKPI) : null;
      const gYear = yearAvgKPI ? kpiGrade(yearAvgKPI) : null;

      const kpiCell = rollingKPI
        ? `<td style="text-align:center;min-width:80px">
            <div style="font-size:14px;font-weight:800;color:${gRoll.color}">${rollingKPI.toFixed(2)}</div>
            <div style="font-size:9px;color:var(--gray4)">Rolling</div>
            <div style="font-size:10px;color:${gRoll.color};font-weight:600">${kpiStars(gRoll)} ${gRoll.label}</div>
          </td>
          <td style="text-align:center;min-width:70px">
            <div style="font-size:14px;font-weight:800;color:${gYear.color}">${yearAvgKPI.toFixed(2)}</div>
            <div style="font-size:9px;color:var(--gray4)">TB năm</div>
          </td>`
        : `<td colspan="2" style="text-align:center;color:var(--gray3);font-size:11px">Chưa đánh giá</td>`;

      return `<tr>
        <td style="font-weight:600;white-space:nowrap">${s}</td>
        <td class="num-c" style="color:var(--new-tx)">${annData[s].n}</td>
        <td class="num-c" style="color:var(--rev-tx)">${annData[s].r}</td>
        <td class="num-c" style="font-weight:700">${t}</td>
        <td class="num-c" style="color:var(--orange)">${annData[s].ot>0?annData[s].ot.toFixed(1):'—'}</td>
        <td style="min-width:80px"><div style="display:flex;align-items:center;gap:4px">
          <div style="flex:1;height:5px;background:var(--gray2);border-radius:3px;overflow:hidden">
            <div style="height:100%;background:var(--gold);width:${pct}%"></div></div>
          <span style="font-size:10px;color:var(--gray4)">${pct}%</span></div></td>
        <td class="num-c" style="color:var(--orange);font-size:10px">${annData[s].ot>0?`${annData[s].ot.toFixed(1)}h`:''}</td>
        ${ratingCells}
        ${kpiCell}
      </tr>`;
    }).join('');

    return `<div class="card" style="margin-bottom:16px">
      <div class="card-hd">
        <span class="card-hd-title">${flagEmoji} ${title}</span>
        <span style="font-size:10px;color:rgba(255,255,255,.6)">Rolling KPI = TB3T×50% + TB12T×35% + Đỉnh×15%</span>
      </div>
      <div style="overflow-x:auto"><table class="perf-tbl">
        <thead>
          ${groupHeaderRow}
          <tr>
            <th>Nhân sự</th>
            <th style="text-align:center">作成</th><th style="text-align:center">修正</th>
            <th style="text-align:center">Tổng</th>
            <th style="text-align:center">OT</th>
            <th style="min-width:80px">Năng suất</th>
            <th style="text-align:center;font-size:9px">OT(h)</th>
            ${ratingHeaders}
            <th style="text-align:center;min-width:80px;border-left:2px solid #ddd">KPI Rolling</th>
            <th style="text-align:center;min-width:70px">KPI TB Năm</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table></div>
    </div>`;
  }

  // Combined table: use max total across all projects for grade, show both JP+VN totals
  function buildCombinedTable(staffList, annCombined) {
    if (!staffList.length) return '';
    const mx = Math.max(1,...staffList.map(s=>annCombined[s].n+annCombined[s].r));
    const rows = staffList.map(s=>{
      const tJP = (staffAnnJP[s]?.n||0)+(staffAnnJP[s]?.r||0);
      const tVN = (staffAnnVN[s]?.n||0)+(staffAnnVN[s]?.r||0);
      const t   = annCombined[s].n+annCombined[s].r;
      const pct = Math.round(t/mx*100);
      const grade = t>=mx*.8?'🟢 Xuất sắc':t>=mx*.6?'🟡 Tốt':t>=mx*.4?'🟠 Khá':'🔴 Cần cải thiện';
      const both = tJP>0 && tVN>0;
      return `<tr ${both?'style="background:linear-gradient(90deg,#f0f8ff 0%,#fffdf0 100%)"':''}>
        <td style="font-weight:600">${s}${both?'<span style="font-size:9px;margin-left:4px;background:var(--gold);color:var(--navy);border-radius:99px;padding:1px 5px">🇯🇵+🇻🇳</span>':''}</td>
        <td class="num-c" style="color:var(--new-tx)">${annCombined[s].n}</td>
        <td class="num-c" style="color:var(--rev-tx)">${annCombined[s].r}</td>
        <td class="num-c" style="font-weight:700">${t}</td>
        <td style="font-size:10px;text-align:center">
          ${tJP>0?`<span style="color:var(--navy)">🇯🇵${tJP}</span>`:''} 
          ${tVN>0?`<span style="color:#27ae60">🇻🇳${tVN}</span>`:''}
        </td>
        <td class="num-c" style="color:var(--orange)">${annCombined[s].ot>0?annCombined[s].ot.toFixed(1):'—'}</td>
        <td><div style="display:flex;align-items:center;gap:6px">
          <div style="flex:1;height:5px;background:var(--gray2);border-radius:3px;overflow:hidden">
            <div style="height:100%;background:${both?'linear-gradient(90deg,var(--navy),var(--gold))':'var(--gold)'};width:${pct}%"></div></div>
          <span style="font-size:10px;color:var(--gray4);font-weight:${both?700:400}">${pct}%</span></div></td>
        <td style="font-size:12px">${grade}${both?'<span style="font-size:10px;margin-left:4px;color:var(--orange)">⚡ Đa dự án</span>':''}</td>
      </tr>`;
    }).join('');
    return `<div class="card" style="margin-bottom:12px">
      <div class="card-hd"><span class="card-hd-title">📊 Tổng hợp năng lực — ${year}</span>
        <span style="font-size:10px;color:rgba(255,255,255,.6)">Nhân sự làm cả 2 loại dự án được đánh dấu ⭐</span>
      </div>
      <div style="overflow-x:auto"><table class="perf-tbl">
        <thead><tr>
          <th>Nhân sự</th><th style="text-align:center">作成</th><th style="text-align:center">修正</th>
          <th style="text-align:center">Tổng</th><th style="text-align:center">JP / VN</th>
          <th style="text-align:center">OT(h)</th><th style="min-width:90px">Năng suất tổng</th>
          <th>Đánh giá</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table></div>
    </div>`;
  }

  dc.innerHTML=`
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:12px">
    <div class="hero-box green" style="padding:12px"><div class="hero-num" style="font-size:28px">${totN}</div><div class="hero-lbl">Tổng 作成 (Làm mới)</div></div>
    <div class="hero-box gold" style="padding:12px"><div class="hero-num" style="font-size:28px">${totR}</div><div class="hero-lbl">Tổng 修正 (Sửa lại)</div></div>
    <div class="hero-box navy" style="padding:12px"><div class="hero-num" style="font-size:28px">${totN+totR}</div><div class="hero-lbl">Tổng phối cảnh</div></div>
    <div class="hero-box orange" style="padding:12px"><div class="hero-num" style="font-size:28px">${totOT.toFixed(1)}h</div><div class="hero-lbl">Tổng OT</div></div>
  </div>
  <div class="dash-grid c2" style="margin-bottom:12px">
    <div class="chart-box"><h4>Phối cảnh theo tháng</h4><canvas id="cMonthly" height="180"></canvas></div>
    <div class="chart-box"><h4>Năng suất nhân sự</h4><canvas id="cStaff" height="180"></canvas></div>
  </div>
  <div class="dash-grid c3" style="margin-bottom:12px">
    <div class="chart-box"><h4>Mới vs Sửa</h4><canvas id="cRatio" height="150"></canvas></div>
    <div class="chart-box"><h4>OT nhân sự</h4><canvas id="cOT" height="150"></canvas></div>
    <div class="chart-box"><h4>Thực tế vs Mục tiêu</h4><canvas id="cTarget" height="150"></canvas></div>
  </div>
  ${buildPerfTable(activeSJP, staffAnnJP, RATING_JP, 'Hiệu suất Dự án Nhật — ' + year, '🇯🇵', 'jp')}
  ${buildPerfTable(activeSVN, staffAnnVN, RATING_VN, 'Hiệu suất Dự án Việt Nam — ' + year, '🇻🇳', 'vn')}
  ${buildCombinedTable(activeS, staffAnn)}
  `;
  setTimeout(()=>{
    new Chart(document.getElementById('cMonthly'),{type:'bar',data:{labels,datasets:[
      {label:'作成 Mới',data:mData.map(m=>m.n),backgroundColor:'#70AD47',borderRadius:3},
      {label:'修正 Sửa',data:mData.map(m=>m.r),backgroundColor:'#FFC000',borderRadius:3}
    ]},options:{plugins:{legend:{labels:{font:{size:11}}}},scales:{x:{grid:{display:false}},y:{grid:{color:'#f0f0f0'}}},responsive:true}});
    new Chart(document.getElementById('cStaff'),{type:'bar',data:{labels:activeS,datasets:[
      {label:'Mới',data:activeS.map(s=>staffAnn[s].n),backgroundColor:'#70AD47',borderRadius:3},
      {label:'Sửa',data:activeS.map(s=>staffAnn[s].r),backgroundColor:'#FFC000',borderRadius:3}
    ]},options:{indexAxis:'y',plugins:{legend:{labels:{font:{size:11}}}},scales:{x:{grid:{color:'#f0f0f0'}},y:{grid:{display:false}}},responsive:true}});
    new Chart(document.getElementById('cRatio'),{type:'doughnut',data:{labels:['Mới','Sửa'],datasets:[{data:[totN,totR],backgroundColor:['#70AD47','#FFC000'],borderWidth:2,borderColor:'#fff'}]},options:{plugins:{legend:{position:'bottom',labels:{font:{size:11}}}},responsive:true}});
    const wOT=activeS.filter(s=>staffAnn[s].ot>0);
    new Chart(document.getElementById('cOT'),{type:'bar',data:{labels:wOT.length?wOT:['Chưa có'],datasets:[{label:'OT(h)',data:wOT.map(s=>staffAnn[s].ot),backgroundColor:'#ED7D31',borderRadius:3}]},options:{plugins:{legend:{labels:{font:{size:11}}}},scales:{x:{grid:{display:false}},y:{grid:{color:'#f0f0f0'}}},responsive:true}});

/* ── Contract / Review date helper (avoids nested backtick issue) ── */
function contractNextAnnual(dateStr, todayStr) {
  if (!dateStr) return null;
  const base = new Date(dateStr);
  if (isNaN(base)) return null;
  const now = new Date(todayStr);
  let next = new Date(base);
  next.setFullYear(now.getFullYear());
  if (next <= now) next.setFullYear(now.getFullYear() + 1);
  return localDateStr(next);
}
function contractDaysUntil(dateStr, todayStr) {
  if (!dateStr) return null;
  return Math.ceil((new Date(dateStr) - new Date(todayStr)) / 86400000);
}
function contractAlertInfo(days) {
  if (days === null) return {level:null, color:'var(--gray3)', label:''};
  if (days < 0)   return {level:'past',    color:'#e74c3c', label:'Đã qua!'};
  if (days <= 7)  return {level:'week',    color:'#e74c3c', label:'⚠ Còn 1 tuần'};
  if (days <= 14) return {level:'twoweek', color:'#e67e22', label:'⚠ Còn 2 tuần'};
  if (days <= 30) return {level:'month',   color:'#f39c12', label:'Còn 1 tháng'};
  return {level:'ok', color:'#27ae60', label:'Còn thời gian'};
}

function renderDateStatus(nextDate, days, info) {
  if (!nextDate || days === null) {
    return '<div style="font-size:10px;color:var(--gray3);margin-top:3px;font-style:italic">Chưa đặt ngày</div>';
  }
  const dayText = days < 0 ? 'Đã qua ' + Math.abs(days) + ' ngày'
                : days === 0 ? 'Hôm nay!'
                : 'Còn ' + days + ' ngày';
  return '<div style="margin-top:4px;font-size:10px;font-weight:600;color:' + info.color + ';line-height:1.6">'
    + '<span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:' + info.color + ';margin-right:4px;vertical-align:middle"></span>'
    + dayText + ' — ' + info.label
    + '<br><span style="font-weight:400;color:var(--gray4)">Lần tới: ' + nextDate + '</span>'
    + '</div>';
}

function renderContractBlock(staffName, prof, todayStr) {
  const contractEnd = prof.contractEnd || '';
  const nextContract = contractNextAnnual(contractEnd, todayStr);
  const cdDays = contractDaysUntil(nextContract, todayStr);
  const cdInfo = contractAlertInfo(cdDays);
  const cdBorder = cdInfo.level && cdInfo.level !== 'ok' ? cdInfo.color : 'var(--gray2)';
  const cdBg = (cdInfo.level === 'week' || cdInfo.level === 'past') ? '#fff5f5' : '#fff';

  return '<div style="margin-bottom:10px;padding:7px 9px;background:#f0f8ff;border-radius:var(--r);border:1px dashed #90cdf4">'
    + '<div style="font-size:10px;font-weight:600;color:var(--gray4);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px">📄 Hết hạn hợp đồng</div>'
    + '<input type="date" value="' + contractEnd + '"'
    + ' class="contract-date-input" data-staff="' + x(staffName) + '"'
    + ' style="width:100%;padding:4px 7px;border:1px solid ' + cdBorder + ';border-radius:var(--r);font-size:11px;background:' + cdBg + '"'
    + ' onchange="contractDateChanged(this)">'
    + renderDateStatus(nextContract, cdDays, cdInfo)
    + '</div>';
}

function getStaffProfile(name) {
  if (!D.settings.staffProfiles) D.settings.staffProfiles = {};
  if (!D.settings.staffProfiles[name]) D.settings.staffProfiles[name] = {role:'',salaryGross:0,salaryNet:0,leaves:[],order:99,contractEnd:''};
  // Auto-set Management role và order=0 cho Management トゥアン
  if (name === 'Management トゥアン') {
    const p = D.settings.staffProfiles[name];
    if (!p.role) p.role = 'Management';
    if (!p.order || p.order === 99) p.order = 0;
  }
  return D.settings.staffProfiles[name];
}

function sortedStaffList() {

    if (a==='Management トゥアン') return -1;
    if (b==='Management トゥアン') return 1;

// Get all leaves for a staff across all months
function getStaffLeaves(name) {
  const prof = getStaffProfile(name);
  return prof.leaves || [];
}

// Check if a date range overlaps with any leave
function checkLeaveConflict(name, dateFrom, dateTo) {
  if (!dateFrom && !dateTo) return [];
  const leaves = getStaffLeaves(name);
  return leaves.filter(l => {
    const lf = l.from, lt = l.to;
    if (!lf && !lt) return false;
    const from = dateFrom||dateTo, to = dateTo||dateFrom;
    const lFrom = lf||lt, lTo = lt||lf;
    return from <= lTo && to >= lFrom;
  });
}

// Aggregate staff stats across all months
function getStaffStats(name) {
  let totalNew=0, totalRev=0, totalOT=0, totalLeaves=0;
  const monthStats = [];
  Object.entries(D.months).sort((a,b)=>a[0]>b[0]?1:-1).forEach(([mid,m])=>{
    let mn=0,mr=0,mot=0;
    let rSums={},rCount=0;
    for(let i=0;i<9;i++) rSums['rate'+i+'Sum']=0;
    [...(m.projects||[]),...(m.projectsVN||[])].forEach(p=>{
      (p.groups||[]).flatMap(g=>g.rows||[]).forEach(r=>{
        if(r.staff===name){
          if(r.status==='new') mn+=(r.qty||0); else mr+=(r.qty||0);
          mot+=(r.ot||0);
          let hasRating=false;
          for(let i=0;i<9;i++){if(r['rate'+i]){hasRating=true;rSums['rate'+i+'Sum']+=(r['rate'+i]||0);}}
          if(hasRating) rCount++;
        }
      });
      (p.records||[]).forEach(r=>{
        if(r.staff===name){ if(r.status==='new') mn+=(r.qty||0); else mr+=(r.qty||0); }
      });
      (p.otLog||[]).forEach(e=>{ if(e.staff===name) mot+=(e.hours||0); });
    });
    if(mn+mr+mot>0) {
      const entry = {mid,n:mn,r:mr,ot:mot,rCount};
      for(let i=0;i<9;i++) entry['rate'+i] = rCount ? +(rSums['rate'+i+'Sum']/rCount).toFixed(1) : 0;
      // Legacy compat
      entry.rq = entry.rate3||0; entry.rs = entry.rate5||0; entry.rf = entry.rate7||0;
      monthStats.push(entry);
    }
    totalNew+=mn; totalRev+=mr; totalOT+=mot;
  });
  // Count leave days
  const leaves = getStaffLeaves(name);
  leaves.forEach(l=>{
    if(l.from&&l.to){
      const d1=new Date(l.from), d2=new Date(l.to);
      totalLeaves += Math.round((d2-d1)/86400000)+1;
    } else if(l.from||l.to) totalLeaves+=1;
  });
  return {totalNew,totalRev,totalOT,totalLeaves,monthStats};
}

                <div style="font-size:9px;color:var(--gray4);margin-top:4px;line-height:1.6">
                  ${(prof.leaves||[]).slice(-12).map(l=>`<div style="display:flex;justify-content:space-between;gap:4px">
                    <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${l.from||'?'}${l.to&&l.to!==l.from?'→'+l.to:''}</span>

            <button onclick="toggleStaffDetail('sd-${si}')"

          <!-- Collapsible detail section -->
          <div id="sd-${si}" style="display:none">

          <!-- OT this month -->
          ${v.ot>0?`<div style="display:flex;align-items:center;gap:6px;margin-bottom:8px;padding:5px 8px;background:#fff8f2;border-radius:var(--r);border-left:3px solid var(--orange)">

                </div>
                <div class="field"><label>Net</label>

                </div>

            </div>
            <div id="sal-hidden-${si}" style="font-size:12px;color:var(--gray3);font-style:italic">●●●●● / ●●●●●</div>

          <div>
