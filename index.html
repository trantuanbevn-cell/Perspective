/* ── Contract / Review date helper (avoids nested backtick issue) ── */
function contractNextAnnual(dateStr, todayStr) {
  if (!dateStr) return null;
  const base = new Date(dateStr);
  if (isNaN(base)) return null;
  const now = new Date(todayStr);
  let next = new Date(base);
  next.setFullYear(now.getFullYear());
  if (next <= now) next.setFullYear(now.getFullYear() + 1);
  return localDateStr(next);
}
function contractDaysUntil(dateStr, todayStr) {
  if (!dateStr) return null;
  return Math.ceil((new Date(dateStr) - new Date(todayStr)) / 86400000);
}
function contractAlertInfo(days) {
  if (days === null) return {level:null, color:'var(--gray3)', label:''};
  if (days < 0)   return {level:'past',    color:'#e74c3c', label:'Đã qua!'};
  if (days <= 7)  return {level:'week',    color:'#e74c3c', label:'⚠ Còn 1 tuần'};
  if (days <= 14) return {level:'twoweek', color:'#e67e22', label:'⚠ Còn 2 tuần'};
  if (days <= 30) return {level:'month',   color:'#f39c12', label:'Còn 1 tháng'};
  return {level:'ok', color:'#27ae60', label:'Còn thời gian'};
}

function renderDateStatus(nextDate, days, info) {
  if (!nextDate || days === null) {
    return '<div style="font-size:10px;color:var(--gray3);margin-top:3px;font-style:italic">Chưa đặt ngày</div>';
  }
  const dayText = days < 0 ? 'Đã qua ' + Math.abs(days) + ' ngày'
                : days === 0 ? 'Hôm nay!'
                : 'Còn ' + days + ' ngày';
  return '<div style="margin-top:4px;font-size:10px;font-weight:600;color:' + info.color + ';line-height:1.6">'
    + '<span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:' + info.color + ';margin-right:4px;vertical-align:middle"></span>'
    + dayText + ' — ' + info.label
    + '<br><span style="font-weight:400;color:var(--gray4)">Lần tới: ' + nextDate + '</span>'
    + '</div>';
}

function renderContractBlock(staffName, prof, todayStr) {
  const contractEnd = prof.contractEnd || '';
  const nextContract = contractNextAnnual(contractEnd, todayStr);
  const cdDays = contractDaysUntil(nextContract, todayStr);
  const cdInfo = contractAlertInfo(cdDays);
  const cdBorder = cdInfo.level && cdInfo.level !== 'ok' ? cdInfo.color : 'var(--gray2)';
  const cdBg = (cdInfo.level === 'week' || cdInfo.level === 'past') ? '#fff5f5' : '#fff';

  return '<div style="margin-bottom:10px;padding:7px 9px;background:#f0f8ff;border-radius:var(--r);border:1px dashed #90cdf4">'
    + '<div style="font-size:10px;font-weight:600;color:var(--gray4);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px">📄 Hết hạn hợp đồng</div>'
    + '<input type="date" value="' + contractEnd + '"'
    + ' class="contract-date-input" data-staff="' + x(staffName) + '"'
    + ' style="width:100%;padding:4px 7px;border:1px solid ' + cdBorder + ';border-radius:var(--r);font-size:11px;background:' + cdBg + '"'
    + ' onchange="contractDateChanged(this)">'
    + renderDateStatus(nextContract, cdDays, cdInfo)
    + '</div>';
}

function getStaffProfile(name) {
  if (!D.settings.staffProfiles) D.settings.staffProfiles = {};
  if (!D.settings.staffProfiles[name]) D.settings.staffProfiles[name] = {role:'',salaryGross:0,salaryNet:0,leaves:[],order:99,contractEnd:''};
  return D.settings.staffProfiles[name];
}

function saveStaffProfile(name, field, val) {
  const p = getStaffProfile(name);
  p[field] = val;
  persistD();
}

// Get all leaves for a staff across all months
function getStaffLeaves(name) {
  const prof = getStaffProfile(name);
  return prof.leaves || [];
}

// Check if a date range overlaps with any leave
function checkLeaveConflict(name, dateFrom, dateTo) {
  if (!dateFrom && !dateTo) return [];
  const leaves = getStaffLeaves(name);
  return leaves.filter(l => {
    const lf = l.from, lt = l.to;
    if (!lf && !lt) return false;
    const from = dateFrom||dateTo, to = dateTo||dateFrom;
    const lFrom = lf||lt, lTo = lt||lf;
    return from <= lTo && to >= lFrom;
  });
}

// Aggregate staff stats across all months
function getStaffStats(name) {
  let totalNew=0, totalRev=0, totalOT=0, totalLeaves=0;
  const monthStats = [];
  Object.entries(D.months).sort((a,b)=>a[0]>b[0]?1:-1).forEach(([mid,m])=>{
    let mn=0,mr=0,mot=0;
    let rSums={},rCount=0;
    for(let i=0;i<9;i++) rSums['rate'+i+'Sum']=0;
    [...(m.projects||[]),...(m.projectsVN||[])].forEach(p=>{
      (p.groups||[]).flatMap(g=>g.rows||[]).forEach(r=>{
        if(r.staff===name){
          if(r.status==='new') mn+=(r.qty||0); else mr+=(r.qty||0);
          mot+=(r.ot||0);
          let hasRating=false;
          for(let i=0;i<9;i++){if(r['rate'+i]){hasRating=true;rSums['rate'+i+'Sum']+=(r['rate'+i]||0);}}
          if(hasRating) rCount++;
        }
      });
      (p.records||[]).forEach(r=>{
        if(r.staff===name){ if(r.status==='new') mn+=(r.qty||0); else mr+=(r.qty||0); }
      });
      (p.otLog||[]).forEach(e=>{ if(e.staff===name) mot+=(e.hours||0); });
    });
    if(mn+mr+mot>0) {
      const entry = {mid,n:mn,r:mr,ot:mot,rCount};
      for(let i=0;i<9;i++) entry['rate'+i] = rCount ? +(rSums['rate'+i+'Sum']/rCount).toFixed(1) : 0;
      // Legacy compat
      entry.rq = entry.rate3||0; entry.rs = entry.rate5||0; entry.rf = entry.rate7||0;
      monthStats.push(entry);
    }
    totalNew+=mn; totalRev+=mr; totalOT+=mot;
  });
  // Count leave days
  const leaves = getStaffLeaves(name);
  leaves.forEach(l=>{
    if(l.from&&l.to){
      const d1=new Date(l.from), d2=new Date(l.to);
      totalLeaves += Math.round((d2-d1)/86400000)+1;
    } else if(l.from||l.to) totalLeaves+=1;
  });
  return {totalNew,totalRev,totalOT,totalLeaves,monthStats};
}

  sc.innerHTML = reminderHtml + `

    ${sortedStaff.map((s,idx)=>{

      const allStats = getStaffStats(s);

      const perfPct = maxTotal>0?Math.round(t/maxTotal*100):0;
      const perfColor = perfPct>=80?'#27AE60':perfPct>=50?'#F39C12':perfPct>=25?'#E67E22':'#E74C3C';
      const leaveToday = getStaffLeaves(s).some(l=>{

      return `<div class="card" style="border-top:3px solid ${leaveToday?'#E74C3C':perfColor}">
        <!-- Card header: name + role + actions -->
        <div class="card-hd" style="flex-wrap:wrap;gap:6px">
          <div style="display:flex;align-items:center;gap:8px;flex:1;min-width:0">

                  <input type="number" value="${prof.salaryGross||''}" placeholder="0"
                    style="font-family:inherit;font-size:12px"
                    onchange="saveStaffProfile('${s}','salaryGross',+this.value)">
                  <div style="font-size:9px;color:var(--gray4)">¥ / tháng</div>
                </div>
                <div class="field"><label>Net</label>
                  <input type="number" value="${prof.salaryNet||''}" placeholder="0"
                    style="font-family:inherit;font-size:12px"
                    onchange="saveStaffProfile('${s}','salaryNet',+this.value)">

              : (prof.leaves||[]).sort((a,b)=>a.from>b.from?1:-1).map(l=>{
                  const isPast = (l.to||l.from) < today;
                  const isActive = (l.from||l.to)<=today && (l.to||l.from)>=today;
                  const days2 = l.from&&l.to ? Math.round((new Date(l.to)-new Date(l.from))/86400000)+1 : 1;
                  return `<div style="display:flex;align-items:center;gap:6px;padding:4px 7px;border-radius:var(--r);background:${isActive?'#fff5f5':isPast?'var(--gray1)':'#fff8f2'};margin-bottom:4px;border-left:3px solid ${isActive?'#e74c3c':isPast?'var(--gray3)':'var(--orange)'}">
                    <div style="flex:1;min-width:0">
                      <div style="font-size:11px;font-weight:600;color:${isPast?'var(--gray4)':'var(--dark)'}">${l.from||'?'} → ${l.to||l.from||'?'} (${days2} ngày)</div>
                      ${l.reason?`<div style="font-size:10px;color:var(--gray4)">${x(l.reason)}</div>`:''}
                    </div>
                    <span style="font-size:9px;padding:1px 5px;border-radius:3px;background:${isActive?'#e74c3c':isPast?'var(--gray2)':'var(--orange)'};color:#fff;white-space:nowrap">${isActive?'Đang nghỉ':isPast?'Đã qua':'Sắp nghỉ'}</span>
                    <button class="btn btn-xs btn-ghost btn-danger" onclick="delLeave('${s}','${l.id}')">✕</button>
                  </div>`;
                }).join('')
            }
          </div>

          </div><!-- end collapsible -->

          <!-- Order control -->
          <div style="margin-top:10px;padding-top:8px;border-top:1px solid var(--gray1);display:flex;align-items:center;gap:8px">
            <span style="font-size:10px;color:var(--gray4)">Thứ tự:</span>
            <input type="number" min="1" max="99" value="${prof.order||idx+1}"
              style="width:48px;padding:3px 6px;border:1px solid var(--gray2);border-radius:var(--r);font-size:11px;text-align:center"
              onchange="saveStaffProfile('${s}','order',+this.value);renderStaffPage()">
            ${v.pjs.length ? '<span style="font-size:10px;color:var(--gray4);margin-left:auto">Dự án: ' + v.pjs.slice(0,2).map(n=>'<span style="background:var(--gray1);padding:1px 5px;border-radius:3px;font-size:9px">'+x(n)+'</span>').join(' ') + '</span>' : ''}
          </div>
        </div>
      </div>`;
    }).join('')}
  </div>
  `;
}

function toggleSalary(salId) {
  const el = document.getElementById(salId);
  const hidden = document.getElementById('sal-hidden-' + salId.replace('sal-',''));
  if(el) el.style.display = el.style.display==='none' ? 'block' : 'none';
  if(hidden) hidden.style.display = hidden.style.display==='none' ? 'block' : 'none';
}

function addTag(cid,w) {
  const c=document.createElement('div'); c.className='tag-edit';
  c.innerHTML=`<input style="width:${w}px" placeholder="Nhập…"><span class="tag-del" onclick="this.parentElement.remove()">×</span>`;
  document.getElementById(cid).appendChild(c); c.querySelector('input').focus();
}
function saveSettings() {
  D.settings.staffList=[...document.querySelectorAll('#staffTags .tag-edit input')].map(e=>e.value.trim()).filter(Boolean);
  D.settings.typeList=[...document.querySelectorAll('#typeTags .tag-edit input')].map(e=>e.value.trim()).filter(Boolean);
  D.settings.contactList=[...document.querySelectorAll('#contactTags .tag-edit input')].map(e=>e.value.trim()).filter(Boolean);
  save(); toast('✓ Đã lưu cài đặt');
}

/* MODAL */
function showModal(html) {
  const bg=document.createElement('div'); bg.className='modal-bg'; bg.id='activeModal';
  bg.innerHTML=`<div class="modal">${html}</div>`;
  bg.onclick=e=>{if(e.target===bg)closeModal();};
  document.getElementById('modalRoot').appendChild(bg);
}
function closeModal() { document.getElementById('activeModal')?.remove(); }

/* ══════════════════════════════════════════════════════
   SYNC SYSTEM — Password-based, 2-level access
   Backend: JSONBin.io (free, no signup needed for users)
   
   CÁCH HOẠT ĐỘNG:
   - Admin (chủ app) tạo 1 bin trên jsonbin.io, lấy BIN_ID + API_KEY
   - Đặt mật khẩu EDIT và mật khẩu VIEW (lưu trong D.settings.sync)
   - Người khác chỉ cần nhập đúng mật khẩu để đọc hoặc sửa
   - Toàn bộ dữ liệu được mã hoá AES trước khi lên cloud
══════════════════════════════════════════════════════ */

const SYNC = {
  // Credentials chỉ admin biết (lưu localStorage, không chia sẻ)
  get binId()  { return localStorage.getItem('sync_bin_id')||''; },
  get apiKey() { return localStorage.getItem('sync_api_key')||''; },
  set binId(v)  { localStorage.setItem('sync_bin_id', v); },
  set apiKey(v) { localStorage.setItem('sync_api_key', v); },
  get lastSync() { return localStorage.getItem('sync_last')||''; },
  set lastSync(v){ localStorage.setItem('sync_last', v); },
  // Session: quyền hiện tại sau khi đăng nhập
  get role() { return sessionStorage.getItem('sync_role')||'none'; }, // 'admin'|'edit'|'view'|'none'
  set role(v) { sessionStorage.setItem('sync_role', v); },
  get autoOn() { return localStorage.getItem('sync_auto')==='1'; },
  set autoOn(v) { localStorage.setItem('sync_auto', v?'1':'0'); }
};

/* ── AES-GCM encryption (pure Web Crypto, no libs) ── */
async function deriveKey(password, salt) {
  const enc = new TextEncoder();
  const keyMaterial = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey(
    { name:'PBKDF2', salt: enc.encode(salt), iterations:100000, hash:'SHA-256' },
    keyMaterial, { name:'AES-GCM', length:256 }, false, ['encrypt','decrypt']
  );
}

async function encryptData(data, password) {
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const key = await deriveKey(password, 'phoicanh_salt_v1');
  const enc = new TextEncoder();
  const encrypted = await crypto.subtle.encrypt({ name:'AES-GCM', iv }, key, enc.encode(JSON.stringify(data)));
  // Pack: iv(12 bytes) + encrypted
  const combined = new Uint8Array(12 + encrypted.byteLength);
  combined.set(iv, 0);
  combined.set(new Uint8Array(encrypted), 12);
  return btoa(String.fromCharCode(...combined));
}

async function decryptData(b64, password) {
  const combined = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
  const iv = combined.slice(0, 12);
  const data = combined.slice(12);
  const key = await deriveKey(password, 'phoicanh_salt_v1');
  const dec = await crypto.subtle.decrypt({ name:'AES-GCM', iv }, key, data);
  return JSON.parse(new TextDecoder().decode(dec));
}

/* ── Hash password for comparison (stored in D.settings.sync) ── */
async function hashPw(pw) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pw+'pc_salt'));
  return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,'0')).join('');
}

/* ── JSONBin API ── */
const JBIN = 'https://api.jsonbin.io/v3';

async function syncPush() {
  if (!SYNC.binId || !SYNC.apiKey) {
    // Silently skip — not configured, not an error
    return false;
  }
  // editPw stored locally during setup/login — never leaves device
  const editPw = localStorage.getItem('sync_edit_pw') || D.settings?.sync?.editPw || '';
  if (!editPw) { setSyncStatus('error','Cần đăng nhập lại'); toast('⚠ Phiên hết hạn — đăng nhập lại để sync'); return false; }
  // Safety: never push empty data (no projects at all AND no staffProfiles)
  const totalPjs = Object.values(D.months||{}).reduce((s,m)=>s+(m.projects||[]).length+(m.projectsVN||[]).length,0);
  const hasProfiles = Object.keys(D.settings?.staffProfiles||{}).length > 0;
  if (totalPjs === 0 && !hasProfiles && !D.settings?.sync?.adminHash) {
    toast('⚠ Dữ liệu trống — không đồng bộ để tránh ghi đè'); return false;
  }
  try {
    const payload = await encryptData(D, editPw);
    const res = await fetch(`${JBIN}/b/${SYNC.binId}`, {
      method:'PUT',
      headers:{ 'Content-Type':'application/json', 'X-Master-Key': SYNC.apiKey },
      body: JSON.stringify({ data: payload, ts: Date.now() })
    });
    if (!res.ok) throw new Error(res.status);
    SYNC.lastSync = new Date().toLocaleString('vi-VN');
    setSyncStatus('synced', SYNC.autoOn?'⚡ Auto':'✓ Đã lưu');
    return true;
  } catch(e) {
    // Only show error if we actually tried to push
    if (SYNC.binId && SYNC.apiKey) setSyncStatus('error','Lỗi lưu');
    return false;
  }
}

async function syncPull(decryptPassword) {
  // decryptPassword = the editPw used to encrypt the data
  const binId = SYNC.binId || localStorage.getItem('sync_bin_id_public') || '';
  if (!binId) throw new Error('no_bin_id');
  try {
    const headers = SYNC.apiKey ? { 'X-Master-Key': SYNC.apiKey } : {};
    const res = await fetch(`${JBIN}/b/${binId}/latest`, { headers });
    if (!res.ok) throw new Error('http_' + res.status);
    const json = await res.json();
    const payload = json.record?.data;
    if (!payload) throw new Error('no_data');
    return await decryptData(payload, decryptPassword);
  } catch(e) {
    const msg = e.message || '';
    if (msg === 'no_data') throw e;
    if (msg === 'no_bin_id') throw e;
    if (msg.startsWith('http_')) throw new Error('connect_' + msg);
    throw new Error('decrypt_fail');
  }
}

/* ── STATUS BAR ── */
function setSyncStatus(state, label) {
  const btn = document.getElementById('syncBtn');
  const lbl = document.getElementById('syncLabel');
  if (!btn) return;
  btn.className = `sync-status ${state}`;
  lbl.textContent = label;
  btn.title = label + ' · Bấm để sync ngay · Giữ 1s để cài đặt';
}

/* ── AUTO SYNC hook (called by save()) ── */
function triggerAutoSync() {
  // Debounce: push 4s after last save (for immediate feedback on manual edits)
  if (SYNC.binId && SYNC.apiKey && SYNC.role==='admin') {
    clearTimeout(triggerAutoSync._t);
    triggerAutoSync._t = setTimeout(syncPush, 4000);
  }
}

// 5-minute periodic auto-save (runs regardless of edits)
(function startPeriodicSync() {
  setInterval(async () => {
    if (SYNC.binId && SYNC.apiKey && SYNC.role==='admin') {
      await syncPush();
    }
  }, 5 * 60 * 1000); // every 5 minutes
})();

   SYNC PANEL UI

/* ── Quick Sync: 1-click push/pull without password ── */
async function quickSync() {
  // If not configured or not logged in → open panel
  if (!SYNC.binId || SYNC.role === 'none') {
    openSyncPanel();
    return;
  }
  if (SYNC.role === 'admin' || SYNC.role === 'edit') {
    if (!SYNC.apiKey && SYNC.role === 'admin') {
      toast('⚠ Chưa có Master Key — mở cài đặt Sync');
      openSyncPanel();
      return;
    }
    setSyncStatus('syncing', 'Đang lưu…');
    const ok = await syncPush();
    if (ok) {
      toast('✓ Đã đồng bộ lên cloud');
    } else {
      setSyncStatus('synced', SYNC.role === 'admin' ? '✓ Admin' : '✓ Edit');
      toast('⚠ Không sync được — dữ liệu đã lưu local');
    }
  } else if (SYNC.role === 'view') {
    await syncPullWithRole();
  } else {
    openSyncPanel();
  }
}

let _syncHoldTimer = null;
function syncBtnHold(btn) {
  _syncHoldTimer = setTimeout(() => {
    _syncHoldTimer = null;
    openSyncPanel();
  }, 800);
}
function syncBtnRelease(btn) {
  if (_syncHoldTimer) {
    clearTimeout(_syncHoldTimer);
    _syncHoldTimer = null;
    // Short press = quickSync (already handled by onclick)
  }
}

/* ── Local backup: export data as JSON file ── */
function exportBackup() {
  const data = JSON.stringify(D, null, 2);
  const blob = new Blob([data], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'phoicanh_backup_' + localDateStr(new Date()) + '.json';
  a.click();
  URL.revokeObjectURL(url);
  toast('✓ Đã tải backup về máy');
}

function importBackup(input) {
  const file = input.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.months || !data.settings) { alert('File backup không hợp lệ'); return; }
      if (!confirm('Khôi phục từ file backup? Dữ liệu hiện tại sẽ bị thay thế.')) return;
      D = data; save(); renderAll();
      toast('✓ Đã khôi phục từ backup thành công');
    } catch(err) { alert('Lỗi đọc file: ' + err.message); }
  };
  reader.readAsText(file);
}

async function confirmSyncSetup() {
  const apiKey = document.getElementById('su-apikey')?.value.trim();
  const binId  = document.getElementById('su-binid')?.value.trim();
  const adminPw = document.getElementById('su-admin-pw')?.value;
  const editPw  = document.getElementById('su-edit-pw')?.value;
  const viewPw  = document.getElementById('su-view-pw')?.value;

  if (!apiKey||!binId) { alert('Vui lòng điền Master Key và Bin ID'); return; }
  if (!adminPw||!editPw||!viewPw) { alert('Vui lòng đặt đủ 3 mật khẩu'); return; }

  // Save admin credentials locally
  SYNC.apiKey = apiKey;
  SYNC.binId  = binId;
  SYNC.role   = 'admin';

  // Store hashed passwords + binId in app data (shared)
  if (!D.settings.sync) D.settings.sync = {};
  D.settings.sync.adminHash = await hashPw(adminPw);
  D.settings.sync.editHash  = await hashPw(editPw);
  D.settings.sync.viewHash  = await hashPw(viewPw);
  D.settings.sync.editPw    = editPw;  // needed for encryption key (stored locally only via admin)
  D.settings.sync.binId     = binId;   // public — needed by all devices to find data

  // Store editPw and binId locally for encryption/pull
  localStorage.setItem('sync_edit_pw', editPw);
  localStorage.setItem('sync_bin_id_public', binId);

  save();
  setSyncStatus('syncing','Đang lưu…');
  closeModal();

  const ok = await syncPush();
  if (ok) {
    toast('✓ Đã thiết lập xong! Chia sẻ Bin ID + mật khẩu cho team');

async function syncDoLogin() {
  const binId = document.getElementById('li-binid')?.value.trim();
  const pw    = document.getElementById('li-pw')?.value;
  if (!binId) { toast('⚠ Vui lòng nhập Bin ID'); return; }
  if (!pw)    { toast('⚠ Vui lòng nhập mật khẩu'); return; }

  setSyncStatus('syncing','Đang xác thực…');
  closeModal();

  try {
    localStorage.setItem('sync_bin_id_public', binId);
    SYNC.binId = binId;

    const h = await hashPw(pw);
    const storedEditPw = localStorage.getItem('sync_edit_pw') || '';

    // ── Verify password & determine role ──
    // Priority: check LOCAL hashes first (fast, no network)
    // Then pull from cloud if needed (Edit/View on new device)
    const localSync = D.settings?.sync || {};
    let role = 'none';
    let pulled = null;

    // Check local hashes
    if (localSync.adminHash && h === localSync.adminHash) {
      role = 'admin';
    } else if (localSync.editHash && h === localSync.editHash) {
      role = 'edit';
    } else if (localSync.viewHash && h === localSync.viewHash) {
      role = 'view';
    } else {
      // Local check failed → try pulling from cloud to get latest hashes
      // Edit/View role: data encrypted with editPw, try pw as editPw first
      setSyncStatus('syncing', 'Đang kết nối…');
      try {
        pulled = await syncPull(pw); // works if pw == editPw (Edit role)
      } catch(e1) {
        if (storedEditPw && storedEditPw !== pw) {
          try { pulled = await syncPull(storedEditPw); } catch(e2) {}
        }
      }
      if (pulled) {
        const cloudSync = pulled.settings?.sync || {};
        if (cloudSync.adminHash && h === cloudSync.adminHash) role = 'admin';
        else if (cloudSync.editHash && h === cloudSync.editHash) role = 'edit';
        else if (cloudSync.viewHash && h === cloudSync.viewHash) role = 'view';
      }
    }

    if (role === 'none') {
      setSyncStatus('error', 'Sai mật khẩu');
      toast('✗ Sai mật khẩu — vui lòng kiểm tra lại');
      setTimeout(() => openSyncPanel(), 1500);
      return;
    }

    // ── Save session ──
    SYNC.role  = role;
    SYNC.binId = binId;

    // editPw storage:
    // - Admin: editPw was set at confirmSyncSetup → already in localStorage
    //   If not found (new device), admin must use "Tải dữ liệu" after login
    // - Edit: pw IS the editPw (data encrypted with editPw)
    // - View: uses storedEditPw for decryption
    if (role === 'edit') {
      localStorage.setItem('sync_edit_pw', pw);
    }
    // For admin: do NOT overwrite editPw with adminPw — they are different!
    // editPw should already be stored from setup. If missing, warn.
    if (role === 'admin' && !storedEditPw) {
      // Admin on new device — needs to re-enter editPw separately
      toast('⚠ Admin trên thiết bị mới — vui lòng dùng nút "Tải dữ liệu" sau khi nhập Edit Password');
    }

    // ── Load cloud data if pulled ──
    if (pulled) {
      D = pulled; save(); renderAll();
    }

    enableViewOnlyMode(role === 'view');

    SYNC.lastSync = new Date().toLocaleString('vi-VN');
    const roleLabels = {admin:'✓ Admin', edit:'✓ Edit', view:'👁 View'};
    setSyncStatus('synced', SYNC.autoOn && role === 'admin' ? '⚡ Auto' : roleLabels[role]);
    toast('✓ Đăng nhập thành công — quyền ' + role.toUpperCase() + (pulled ? ' (đã tải dữ liệu mới)' : ''));

  } catch(e) {
    setSyncStatus('error', 'Lỗi kết nối');
    const msg = e.message || '';
    if (msg.includes('no_bin_id'))         toast('✗ Bin ID không hợp lệ');
    else if (msg.includes('connect_http_401')) toast('✗ Master Key sai hoặc hết hạn');
    else if (msg.includes('connect_http_404')) toast('✗ Bin ID không tồn tại');
    else if (msg.includes('decrypt_fail'))     toast('✗ Sai mật khẩu — không giải mã được');
    else toast('✗ Lỗi: ' + msg);
    setTimeout(() => openSyncPanel(), 2000);
  }
}

async function syncPullWithRole() {
  const editPw = localStorage.getItem('sync_edit_pw') || '';
  if (!editPw) {
    toast('⚠ Phiên làm việc hết hạn — đăng nhập lại');
    openSyncPanel(); return;
  }
  setSyncStatus('syncing','Đang tải…');
  closeModal();
  try {
    const pulled = await syncPull(editPw);
    D = pulled; save(); renderAll();
    SYNC.lastSync = new Date().toLocaleString('vi-VN');
    setSyncStatus('synced', SYNC.autoOn&&SYNC.role==='admin'?'⚡ Auto':'✓ Đã tải');
    toast('✓ Dữ liệu đã được cập nhật');
  } catch(e) {
    setSyncStatus('error','Lỗi tải');
    const msg = e.message||'';
    if (msg.includes('decrypt_fail')) toast('✗ Không giải mã được — đăng nhập lại');
    else toast('✗ Lỗi tải: ' + msg);
  }
}

function renderStorageMeter() {
  const bar = document.getElementById('storageBar');
  if (!bar) return;
  try {
    const data = localStorage.getItem(SK) || '';
    const kb = Math.round(data.length * 0.75 / 1024);
    const maxKB = 5120;
    const pct = Math.min(100, Math.round(kb / maxKB * 100));
    const color = pct > 80 ? '#e74c3c' : pct > 55 ? '#E67E22' : '#27AE60';
    let photoCount = 0;
    Object.values(D.months).forEach(m => { [...(m.projects||[]),...(m.projectsVN||[])].forEach(p => { photoCount += (p.photos||[]).filter(Boolean).length; }); });
    bar.innerHTML = `
      <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--gray4);margin-bottom:3px">
        <span>💾 ${(kb/1024).toFixed(1)}MB / 5MB</span>
        <span style="color:${color};font-weight:600">${pct}%</span>
      </div>
      <div style="height:4px;background:var(--gray2);border-radius:2px;overflow:hidden">
        <div style="height:100%;background:${color};width:${pct}%;border-radius:2px;transition:width .4s"></div>
      </div>
      ${photoCount > 0 ? `<div style="font-size:10px;color:var(--gray4);margin-top:3px">📷 ${photoCount} ảnh đang lưu</div>` : ''}
      ${pct > 70 ? `<button class="btn btn-xs btn-danger" style="margin-top:5px;width:100%" onclick="openClearPhotosModal()">🗑 Dọn ảnh cũ</button>` : ''}
    `;
  } catch(e) {}
}

  'custom': { name:'Tùy chỉnh', emoji:'✏️' }
};

function applyTheme(themeKey) {
  const theme = THEMES[themeKey]; if (!theme) return;
  const root = document.documentElement;
  Object.entries(theme).forEach(([k,v]) => { if (k.startsWith('--')) root.style.setProperty(k, v); });
  document.querySelector('.header').style.background = theme['--ex-navy']||'';
  document.querySelector('.month-strip').style.background = theme['--ex-navy2']||'';
  localStorage.setItem('app_theme', themeKey);
  if (themeKey !== 'custom') localStorage.setItem('app_theme_data', JSON.stringify(theme));
}

function applyCustomColor(varName, val) {
  document.documentElement.style.setProperty(varName, val);
  const saved = JSON.parse(localStorage.getItem('app_custom_theme')||'{}');
  saved[varName] = val; localStorage.setItem('app_custom_theme', JSON.stringify(saved));
  localStorage.setItem('app_theme', 'custom');
}

function loadSavedTheme() {
  const key = localStorage.getItem('app_theme'); if (!key) return;
  if (key === 'custom') {
    const custom = JSON.parse(localStorage.getItem('app_custom_theme')||'{}');
    if (Object.keys(custom).length) { const root = document.documentElement; Object.entries(custom).forEach(([k,v]) => root.style.setProperty(k, v)); }
  } else if (THEMES[key]) { applyTheme(key); }
}

function cssToHex(color) {
  if (!color) return '#1F3864'; color = color.trim();
  if (color.startsWith('#') && color.length===7) return color;
  if (color.startsWith('#') && color.length===4) return '#'+color[1]+color[1]+color[2]+color[2]+color[3]+color[3];
  const m = color.match(/rgb\s*\(\s*(\d+)\s*,\s*(\d+)\s*,\s*(\d+)\s*\)/);
  if (m) return '#'+[m[1],m[2],m[3]].map(n=>parseInt(n).toString(16).padStart(2,'0')).join('');
  return '#1F3864';
}

function resetTheme() {
  localStorage.removeItem('app_theme'); localStorage.removeItem('app_custom_theme'); localStorage.removeItem('app_theme_data');
  applyTheme('navy-gold'); closeModal(); toast('↺ Đã đặt lại màu mặc định');
}

function showReportOverlay(title, bodyHtml) {
  const overlay = document.createElement('div');
  overlay.id = 'rptOverlay';
  overlay.style.cssText = 'position:fixed;inset:0;z-index:8000;background:rgba(0,0,0,.55);display:flex;flex-direction:column';
  overlay.innerHTML = `
    <div style="background:#1F3864;color:#fff;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0">
      <h2 style="font-size:15px;font-weight:700">${title}</h2>
      <div style="display:flex;gap:8px">
        <button class="btn btn-sm" style="background:rgba(255,255,255,.15);color:#fff;border-color:rgba(255,255,255,.3)" onclick="printReport()">🖨 In / Lưu PDF</button>
        <button class="btn btn-sm btn-gold" onclick="closeReport()">✕ Đóng</button>
      </div>
    </div>
    <div id="rptBody" style="flex:1;overflow-y:auto;background:#fff">${bodyHtml}</div>`;
  overlay.onclick = e => { if(e.target===overlay) closeReport(); };
  document.body.appendChild(overlay);
}

function printReport() {
  const body = document.getElementById('rptBody'); if (!body) return;
  const w = window.open('','_blank','width=900,height=700');
  w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Báo cáo Phối Cảnh Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet">

/* ══════════════════════════════════════════════════════
   SPLASH SCREEN — password gate
   3 password levels: admin / edit / view
   Passwords are hashed via Web Crypto (SHA-256)
   To change passwords: update SPLASH_HASHES below
   Default passwords (change after first login):
     Admin : 204290
     Edit  : 280510
     View  : 123456
══════════════════════════════════════════════════════ */
(async function initSplash() {
  // Pre-computed SHA-256 hashes of default passwords
  // To reset: type new password → SHA-256 hash it → paste here
  const SPLASH_HASHES = {
    admin: 'c9ac2173f7a9dfb94f1b4827f35d74f1b73a6f2299d61cb41645842ea24b9d1a', // 204290
    edit:  '813f7512db1c116c5d706c0fcf98a3b7fd14fcba7a89b08fd1727dd16de8d3e7', // 280510
    view:  '8d969eef6ecad3c29a3a629280e686cf0c3f5d5a86aff3ca12020c923adc6c92', // 123456
  };

  async function sha256(str) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
  }

  // Check session — if already logged in this session, skip splash
  const sessionRole = sessionStorage.getItem('splash_role');
  if (sessionRole) {
    _applySplashRole(sessionRole);
    document.getElementById('splashScreen').style.display = 'none';
    return;
  }

  // Hide main app until authenticated
  document.querySelector('.header') && (document.querySelector('.header').style.visibility = 'hidden');
  document.getElementById('pageMain') && (document.getElementById('pageMain').style.visibility = 'hidden');

  window.splashLogin = async function() {
    const pw = document.getElementById('splashPwInput').value;
    const errEl = document.getElementById('splashError');
    if (!pw) { errEl.textContent = 'Vui lòng nhập mật khẩu'; return; }
    errEl.textContent = '';

    const hash = await sha256(pw);

    // Check against stored sync hashes first (if configured)
    const syncCfg = D?.settings?.sync || {};
    let role = null;

    if (syncCfg.adminHash && hash === syncCfg.adminHash) role = 'admin';
    else if (syncCfg.editHash && hash === syncCfg.editHash) role = 'edit';
    else if (syncCfg.viewHash && hash === syncCfg.viewHash) role = 'view';

    // Fallback: check built-in splash hashes
    if (!role) {
      if (hash === SPLASH_HASHES.admin) role = 'admin';
      else if (hash === SPLASH_HASHES.edit) role = 'edit';
      else if (hash === SPLASH_HASHES.view) role = 'view';
    }

    if (!role) {
      errEl.textContent = 'Mật khẩu không đúng. Thử lại.';
      document.getElementById('splashPwInput').value = '';
      document.getElementById('splashPwInput').focus();
      // Re-trigger shake animation
      errEl.classList.remove('shake');
      requestAnimationFrame(()=>{ errEl.classList.add('shake'); });
      return;
    }

    // Store in session
    sessionStorage.setItem('splash_role', role);
    _applySplashRole(role);

    // Animate out
    const splash = document.getElementById('splashScreen');
    splash.classList.add('fade-out');
    setTimeout(() => {
      splash.style.display = 'none';
      document.querySelector('.header').style.visibility = '';
      document.getElementById('pageMain').style.visibility = '';
    }, 650);
  };

  function _applySplashRole(role) {
    // Sync the role with the SYNC system
    if (role === 'view') {
      SYNC.role = 'view';
      enableViewOnlyMode(true);
    } else if (role === 'edit') {
      SYNC.role = 'edit';
    } else {
      SYNC.role = 'admin';
    }
  }
})();
