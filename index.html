<style>
:root {
  --navy:   #1F3864;
  --navy2:  #2E4A7A;
  --navy3:  #4472C4;
  --gold:   #FFC000;
  --gold2:  #FFD966;
  --orange: #ED7D31;
  --gray1:  #F2F2F2;
  --gray2:  #D9D9D9;
  --gray3:  #BFBFBF;
  --gray4:  #595959;
  --dark:   #1A1A1A;
  --new-bg: #E2EFDA; --new-tx: #375623;
  --rev-bg: #FFF2CC; --rev-tx: #7F6000;
  --r: 4px; --r2: 6px;
  /* theme aliases */
  --ex-navy:   var(--navy);
  --ex-navy2:  var(--navy2);
  --ex-navy3:  var(--navy3);
  --ex-gold:   var(--gold);
  --ex-gold2:  var(--gold2);
  --ex-orange: var(--orange);
  --ex-gray1:  var(--gray1);
  --ex-gray2:  var(--gray2);
  --ex-gray3:  var(--gray3);
  --ex-gray4:  var(--gray4);
  --ex-dark:   var(--dark);
  --new-bg:    #E2EFDA; --new-text: #375623;
  --rev-bg:    #FFF2CC; --rev-text: #7F6000;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Be Vietnam Pro','Noto Sans JP',sans-serif;font-size:13px;background:#EAECF0;color:var(--dark);min-height:100vh}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:var(--gray3);border-radius:3px}

/* HEADER */
.header{
  background:var(--navy);height:60px;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;position:sticky;top:0;z-index:300;
  border-bottom:3px solid var(--gold);box-shadow:0 2px 12px rgba(0,0,0,.3);
  gap:12px;
}
.hdr-logo{display:flex;align-items:center;flex-shrink:0}
.hdr-logo img{height:46px;width:auto;object-fit:contain;filter:brightness(0) invert(1);display:block}
.hdr-nav{display:flex;gap:3px;flex-shrink:0}
.nav-btn{padding:6px 12px;border-radius:var(--r);border:1px solid rgba(255,255,255,.2);background:transparent;color:rgba(255,255,255,.75);font-size:12px;font-family:inherit;cursor:pointer;transition:all .15s;white-space:nowrap}
.nav-btn:hover{color:#fff;background:rgba(255,255,255,.1)}
.nav-btn.active{background:var(--gold);color:var(--navy);border-color:var(--gold);font-weight:600}
.hdr-right{display:flex;gap:6px;align-items:center;flex-shrink:0}

/* MONTH STRIP */
.month-strip{background:var(--navy2);display:flex;align-items:stretch;padding:0 14px;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid rgba(255,255,255,.1)}
.month-strip::-webkit-scrollbar{display:none}
.mtab{padding:8px 16px;font-size:12px;font-weight:500;color:rgba(255,255,255,.5);cursor:pointer;border:none;border-bottom:2px solid transparent;margin-bottom:-1px;background:none;font-family:inherit;transition:all .15s;white-space:nowrap}
.mtab:hover{color:rgba(255,255,255,.85)}
.mtab.active{color:var(--gold);border-bottom-color:var(--gold)}
.mtab-add{color:var(--gold2);font-size:20px;padding:2px 14px;line-height:1}

/* LAYOUT */
#pageMain{display:flex;height:calc(100vh - 93px)}
#pageDashboard,#pageStaff,#pageSettings{display:none;padding:18px 22px;overflow-y:auto;height:calc(100vh - 93px)}

/* SIDEBAR */
.sidebar{width:220px;min-width:200px;background:#f4f5f7;border-right:1px solid var(--gray2);display:flex;flex-direction:column;flex-shrink:0;height:100%;overflow:hidden}
.sidebar-hd{padding:9px 12px;background:var(--navy);color:#fff;font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid var(--gold);flex-shrink:0}
.sidebar-hd span{background:var(--gold);color:var(--navy);border-radius:99px;padding:1px 7px;font-size:10px}
.pj-list{flex:1;overflow-y:auto;overflow-x:hidden;padding:8px 7px;display:flex;flex-direction:column;gap:6px;min-height:0;scroll-behavior:smooth}
/* Project card in sidebar */
.pj-card{background:#fff;border-radius:8px;border:2px solid transparent;cursor:pointer;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.08);transition:border-color .15s,box-shadow .15s,transform .15s;flex-shrink:0;width:100%}
.pj-card:hover{border-color:var(--gold2);box-shadow:0 3px 10px rgba(0,0,0,.13);transform:translateY(-1px)}
.pj-card.active{border-color:var(--gold);box-shadow:0 3px 12px rgba(255,192,0,.3)}
.pj-thumb{width:100%;aspect-ratio:16/9;background:linear-gradient(135deg,var(--navy) 0%,var(--navy2) 100%);overflow:hidden;position:relative;flex-shrink:0;display:block}
.pj-thumb img{width:100%;height:100%;object-fit:cover;display:block;flex-shrink:0}
.pj-thumb-ph{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;color:rgba(255,255,255,.25);font-size:24px}
.pj-thumb-num{position:absolute;top:5px;left:5px;background:var(--gold);color:var(--navy);font-size:10px;font-weight:800;border-radius:4px;padding:1px 5px;line-height:1.4}
.pj-card-body{padding:7px 9px 8px;flex-shrink:0}
.pj-card-name{font-weight:700;font-size:11px;line-height:1.4;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;color:var(--dark);margin-bottom:4px;word-break:break-word}
.pj-card-name-jp{font-size:9px;color:var(--gray4);overflow:hidden;white-space:nowrap;text-overflow:ellipsis;margin-bottom:4px}
.pj-card-sub{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:3px}
.sidebar-ft{padding:7px 8px;border-top:1px solid var(--gray2);background:#eaecf0;flex-shrink:0}

/* CONTENT */
.content{flex:1;overflow-y:auto;background:#EAECF0}
.content-inner{padding:14px 18px}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:4px;padding:6px 12px;border-radius:var(--r);border:1px solid var(--gray2);background:#fff;color:var(--dark);font-family:inherit;font-size:12px;cursor:pointer;transition:all .12s;white-space:nowrap;line-height:1.4}
.btn:hover{background:var(--gray1)}
.btn-primary{background:var(--navy);color:#fff;border-color:var(--navy)}
.btn-primary:hover{background:var(--navy2)}
.btn-gold{background:var(--gold);color:var(--navy);border-color:var(--gold);font-weight:600}
.btn-gold:hover{background:var(--gold2)}
.btn-sm{padding:4px 10px;font-size:11px}
.btn-xs{padding:2px 7px;font-size:10px}
.btn-danger{color:#c00}
.btn-danger:hover{background:#fff0f0;border-color:#fcc}
.btn-ghost{background:transparent;border-color:transparent}
.btn-ghost:hover{background:var(--gray1);border-color:var(--gray2)}
.btn-full{width:100%;justify-content:center}
.btn-new{background:var(--new-bg);color:var(--new-tx);border-color:#a9d18e}
.btn-new:hover{background:#d0e9c4}
.btn-rev{background:var(--rev-bg);color:var(--rev-tx);border-color:#ffd966}
.btn-rev:hover{background:#ffe59a}

/* BADGES */
.badge{display:inline-flex;align-items:center;padding:1px 7px;border-radius:99px;font-size:10px;font-weight:600;white-space:nowrap}
.b-osaka{background:#dbeafe;color:#1d4ed8}
.b-tokyo{background:#fce7f3;color:#9d174d}
.chip{display:inline-flex;align-items:center;padding:2px 8px;border-radius:99px;font-size:10px;font-weight:600}
.chip-new{background:var(--new-bg);color:var(--new-tx)}
.chip-gold{background:var(--rev-bg);color:var(--rev-tx)}
.chip-navy{background:var(--navy);color:#fff}

/* SYNC STATUS */
.sync-btn{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:99px;font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;border:1px solid rgba(255,255,255,.25);color:rgba(255,255,255,.8);background:transparent;font-family:inherit}
.sync-btn:hover{background:rgba(255,255,255,.1)}
.sync-btn .dot{width:7px;height:7px;border-radius:50%;background:#888;flex-shrink:0}
.sync-btn.synced .dot{background:#4ade80;box-shadow:0 0 5px #4ade80}
.sync-btn.error .dot{background:#f87171}
.sync-btn.syncing .dot{background:var(--gold);animation:pulse .8s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* CARD */
.card{background:#fff;border:1px solid var(--gray2);border-radius:var(--r2);margin-bottom:12px;overflow:hidden}
.card-hd{background:var(--navy);color:#fff;padding:9px 14px;font-size:12px;font-weight:600;display:flex;align-items:center;justify-content:space-between;gap:8px;border-bottom:2px solid var(--gold)}
.card-hd-title{display:flex;align-items:center;gap:7px}
.card-body{padding:12px 14px}

/* HERO STATS */
.hero-row{display:grid;grid-template-columns:1fr 1fr 1fr 1fr auto;gap:10px;margin-bottom:12px}
.hero-box{background:#fff;border:1px solid var(--gray2);border-radius:var(--r2);padding:13px 15px;border-top:4px solid var(--gray3)}
.hero-box.green{border-top-color:#70AD47}
.hero-box.gold{border-top-color:var(--gold)}
.hero-box.navy{border-top-color:var(--navy);background:var(--navy);color:#fff}
.hero-box.orange{border-top-color:var(--orange)}
.hero-num{font-size:38px;font-weight:700;line-height:1}
.hero-box.green .hero-num{color:var(--new-tx)}
.hero-box.gold .hero-num{color:var(--rev-tx)}
.hero-box.navy .hero-num{color:var(--gold)}
.hero-lbl{font-size:11px;color:var(--gray4);margin-top:3px;text-transform:uppercase;letter-spacing:.05em;font-weight:500}
.hero-box.navy .hero-lbl{color:rgba(255,255,255,.6)}
.hero-jp{font-size:10px;color:var(--gray3);margin-top:1px}
.progress-track{height:5px;background:var(--gray2);border-radius:3px;overflow:hidden;margin-top:8px}
.progress-fill{height:100%;border-radius:3px;transition:width .4s}
.progress-fill.green{background:#70AD47}
.progress-fill.gold{background:var(--gold)}
.progress-label{font-size:10px;color:var(--gray4);margin-top:3px;display:flex;justify-content:space-between}
/* Target box */
.target-box{background:var(--navy);color:#fff;border-radius:var(--r2);padding:13px 15px;display:flex;flex-direction:column;gap:8px;min-width:170px}
.target-box .tgt-title{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--gold2);font-weight:600}
.target-row{display:flex;align-items:center;justify-content:space-between;gap:8px}
.target-row label{font-size:11px;color:rgba(255,255,255,.7)}
.target-input{width:64px;padding:4px 7px;text-align:center;border:1px solid rgba(255,255,255,.3);border-radius:var(--r);background:rgba(255,255,255,.1);color:#fff;font-family:inherit;font-size:14px;font-weight:700}
.target-input:focus{outline:none;border-color:var(--gold)}

/* RENDER TABLE — hàng ngang */
.rtbl{width:100%;border-collapse:collapse;font-size:12px}
.rtbl thead th{background:var(--navy);color:#fff;padding:7px 9px;text-align:left;font-size:10px;letter-spacing:.06em;text-transform:uppercase;white-space:nowrap;border-right:1px solid rgba(255,255,255,.1)}
.rtbl tbody td{padding:6px 8px;border-bottom:1px solid var(--gray1);vertical-align:middle;border-right:1px solid #f5f5f5}
.rtbl tbody tr:hover td{background:#FFFBEE}
.rtbl tfoot td{font-weight:700;background:var(--rev-bg)!important;border-top:2px solid var(--navy);padding:7px 9px}
/* Group header row */
.grp-hd td{background:var(--navy2)!important;color:#fff;padding:6px 9px;font-weight:600;font-size:11px}
/* Row bg by status */
.row-new td{background:#f8fff5}
.row-rev td{background:#fffdf0}

/* Inline inputs in table */
.tbl-input{width:100%;padding:4px 7px;border:1px solid var(--gray2);border-radius:var(--r);font-family:inherit;font-size:12px;background:#fff}
.tbl-input:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 2px rgba(255,192,0,.15)}
.tbl-input-dark{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);border-radius:var(--r);padding:4px 8px;color:#fff;font-family:inherit;font-size:12px;font-weight:600;width:100%;min-width:0}
.tbl-input-dark:focus{outline:none;border-color:var(--gold)}
.qty-inp{width:54px;padding:4px 5px;text-align:center;border:1px solid var(--gray2);border-radius:var(--r);font-family:inherit;font-size:13px;font-weight:700;background:#fff}
.qty-inp:focus{outline:none;border-color:var(--gold)}
.sel-sm{padding:4px 8px;border:1px solid var(--gray2);border-radius:var(--r);font-family:inherit;font-size:12px;background:#fff;cursor:pointer;width:100%}
.sel-sm:focus{outline:none;border-color:var(--gold)}
/* Status toggle */
.st-toggle{display:inline-flex;border:1px solid var(--gray2);border-radius:var(--r);overflow:hidden}
.st-opt{padding:3px 9px;font-size:11px;font-weight:600;cursor:pointer;border:none;background:#fff;font-family:inherit;transition:all .1s;color:var(--gray3)}
.st-opt.new.on{background:var(--new-bg);color:var(--new-tx)}
.st-opt.rev.on{background:var(--rev-bg);color:var(--rev-tx)}

/* INFO GRID */
.info-grid{display:grid;gap:10px}
.info-grid.c2{grid-template-columns:1fr 1fr}
.info-grid.c3{grid-template-columns:1fr 1fr 1fr}
.info-grid.c4{grid-template-columns:1fr 1fr 1fr 1fr}
.field{display:flex;flex-direction:column;gap:3px}
.field label{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--gray4);font-weight:600}
.field input,.field select,.field textarea{padding:6px 9px;border:1px solid var(--gray2);border-radius:var(--r);font-family:inherit;font-size:12px;background:#fff;transition:border-color .12s}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 2px rgba(255,192,0,.15)}
.field textarea{resize:vertical;min-height:64px}

/* PHOTOS */
.photos-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px}
.photo-slot{aspect-ratio:4/3;border:2px dashed var(--gray2);border-radius:var(--r2);overflow:hidden;position:relative;cursor:pointer;background:var(--gray1);display:flex;flex-direction:column;align-items:center;justify-content:center;transition:border-color .12s}
.photo-slot:hover{border-color:var(--gold)}
.photo-slot.filled{border-style:solid;border-color:var(--gray2)}
.photo-slot img{width:100%;height:100%;object-fit:cover}
.photo-slot .ph-ico{font-size:20px;color:var(--gray3)}
.photo-slot .ph-txt{font-size:10px;color:var(--gray3);margin-top:3px}
.photo-slot .ph-del{position:absolute;top:3px;right:3px;background:rgba(0,0,0,.6);color:#fff;border:none;border-radius:50%;width:20px;height:20px;font-size:12px;cursor:pointer;display:none;align-items:center;justify-content:center;z-index:2}
.photo-slot:hover .ph-del{display:flex}
.photo-slot input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;z-index:1}

/* STAFF PERF BARS */
.perf-bar{margin-bottom:4px}
.perf-bar-row{display:flex;justify-content:space-between;font-size:11px;margin-bottom:2px}
.perf-bar-track{height:4px;background:rgba(255,255,255,.15);border-radius:2px;display:flex;overflow:hidden}
.perf-bar-new{background:#70AD47;border-radius:2px}
.perf-bar-rev{background:var(--gold);border-radius:2px}

/* MONTH SUMMARY TABLE */
.sum-tbl{width:100%;border-collapse:collapse;font-size:12px}
.sum-tbl th{background:var(--navy);color:#fff;padding:7px 9px;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.06em}
.sum-tbl td{padding:8px 9px;border-bottom:1px solid var(--gray1)}
.sum-tbl tr:hover td{background:#FFFBEE;cursor:pointer}
.sum-tbl .tr-total td{font-weight:700;background:var(--rev-bg)!important;border-top:2px solid var(--navy)}
.num-c{text-align:center;font-weight:600}

/* PERF TABLE */
.perf-tbl{width:100%;border-collapse:collapse;font-size:12px}
.perf-tbl th{background:var(--navy);color:#fff;padding:7px 10px;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.06em}
.perf-tbl td{padding:8px 10px;border-bottom:1px solid var(--gray1)}
.perf-tbl tr:hover td{background:#FFFBEE}
.perf-tbl .total-row td{font-weight:700;background:var(--gray1)!important;border-top:2px solid var(--navy)}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;z-index:999}
.modal{background:#fff;border-radius:var(--r2);padding:22px 26px;max-width:560px;width:92%;box-shadow:0 24px 64px rgba(0,0,0,.25);max-height:90vh;overflow-y:auto}
.modal h3{font-size:15px;font-weight:700;margin-bottom:16px;color:var(--navy);border-left:3px solid var(--gold);padding-left:10px}
.modal-ft{display:flex;justify-content:flex-end;gap:8px;margin-top:18px;flex-wrap:wrap}

/* TOAST */
.toast{position:fixed;bottom:22px;right:22px;background:var(--navy);color:#fff;padding:10px 18px;border-radius:var(--r2);font-size:12px;border-left:4px solid var(--gold);z-index:9999;box-shadow:0 8px 24px rgba(0,0,0,.2);animation:tsin .2s ease}
@keyframes tsin{from{transform:translateY(8px);opacity:0}to{transform:translateY(0);opacity:1}}

/* NOTE TEXTAREA */
.note-ta{width:100%;padding:9px 11px;border:1px solid var(--gray2);border-radius:var(--r);font-family:inherit;font-size:12px;resize:vertical;min-height:72px;background:#FFFDF5}
.note-ta:focus{outline:none;border-color:var(--gold)}

/* REPORT OVERLAY */
.rpt-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:2000;display:flex;align-items:center;justify-content:center}
.rpt-container{background:#fff;width:860px;max-width:96vw;max-height:92vh;border-radius:8px;display:flex;flex-direction:column;box-shadow:0 24px 80px rgba(0,0,0,.4);overflow:hidden}
.rpt-header{background:var(--navy);color:#fff;padding:12px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:3px solid var(--gold);flex-shrink:0}
.rpt-header h2{font-size:14px;font-weight:700;display:flex;align-items:center;gap:8px}
.rpt-actions{display:flex;gap:8px}
.rpt-body{flex:1;overflow-y:auto}

/* VIEW ONLY BANNER */
#viewBanner{position:fixed;bottom:0;left:0;right:0;background:#7F6000;color:#FFF2CC;text-align:center;padding:7px;font-size:12px;font-weight:600;z-index:500;letter-spacing:.04em}

/* REPORT DOC STYLES */
.report-doc{padding:36px 44px;font-family:'Be Vietnam Pro','Noto Sans JP',sans-serif;font-size:12px;color:#1a1a1a;background:#fff}
.report-doc .doc-hd{display:flex;justify-content:space-between;align-items:flex-start;padding-bottom:14px;border-bottom:2px solid #1F3864;margin-bottom:20px}
.report-doc .doc-logo{display:flex;align-items:center;gap:11px}
.report-doc .doc-logo-mark{width:40px;height:40px;background:#1F3864;border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;color:#FFC000}
.report-doc .doc-title-main{font-size:17px;font-weight:700;color:#1F3864;line-height:1.2}
.report-doc .doc-title-sub{font-size:11px;color:#595959;margin-top:2px}
.report-doc .doc-meta{text-align:right;font-size:11px;color:#595959;line-height:1.9}
.report-doc .doc-meta strong{color:#1F3864}
.report-doc .sec-title{font-size:13px;font-weight:700;color:#1F3864;border-left:4px solid #FFC000;padding-left:9px;margin:20px 0 10px}
.report-doc .kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:11px;margin-bottom:20px}
.report-doc .kpi-box{border:1px solid #D9D9D9;border-radius:6px;padding:12px;border-top:3px solid #1F3864;text-align:center}
.report-doc .kpi-num{font-size:28px;font-weight:700;color:#1F3864;line-height:1}
.report-doc .kpi-box.gold{border-top-color:#FFC000}.report-doc .kpi-box.gold .kpi-num{color:#7F6000}
.report-doc .kpi-box.green{border-top-color:#70AD47}.report-doc .kpi-box.green .kpi-num{color:#375623}
.report-doc .kpi-box.orange{border-top-color:#ED7D31}.report-doc .kpi-box.orange .kpi-num{color:#7F3500}
.report-doc .kpi-lbl{font-size:10px;color:#595959;margin-top:4px;text-transform:uppercase;letter-spacing:.05em}
.report-doc table{width:100%;border-collapse:collapse;font-size:11px;margin-bottom:14px}
.report-doc table th{background:#1F3864;color:#fff;padding:7px 9px;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.06em}
.report-doc table td{padding:7px 9px;border-bottom:1px solid #F2F2F2}
.report-doc table tr:nth-child(even) td{background:#F9F9F9}
.report-doc table tfoot td{font-weight:700;background:#FFF2CC!important;border-top:2px solid #1F3864}
.report-doc .c-new{color:#375623;font-weight:600;text-align:center}
.report-doc .c-rev{color:#7F6000;font-weight:600;text-align:center}
.report-doc .c-tot{font-weight:700;text-align:center}
.report-doc .c-ot{color:#C55A11;font-weight:600;text-align:center}
.report-doc .b-osaka{background:#dbeafe;color:#1d4ed8;padding:1px 7px;border-radius:99px;font-size:10px;font-weight:600}
.report-doc .b-tokyo{background:#fce7f3;color:#9d174d;padding:1px 7px;border-radius:99px;font-size:10px;font-weight:600}
.report-doc .pj-block{margin-bottom:16px;border:1px solid #E8E8E8;border-radius:6px;overflow:hidden}
.report-doc .pj-block-hd{background:#EEF3FB;padding:8px 13px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #D9D9D9}
.report-doc .pj-block-hd .pj-name{font-weight:700;font-size:12px;color:#1F3864}
.report-doc .pj-block-hd .pj-chips{display:flex;gap:5px;align-items:center}
.report-doc .pj-block-hd .chip-new{background:#E2EFDA;color:#375623;padding:2px 7px;border-radius:99px;font-size:10px;font-weight:600}
.report-doc .pj-block-hd .chip-rev{background:#FFF2CC;color:#7F6000;padding:2px 7px;border-radius:99px;font-size:10px;font-weight:600}
.report-doc .pj-block-hd .chip-tot{background:#1F3864;color:#fff;padding:2px 7px;border-radius:99px;font-size:10px;font-weight:600}
.report-doc .ot-staff-block{margin-bottom:18px}
.report-doc .ot-staff-hd{background:#1F3864;color:#fff;padding:8px 13px;border-radius:6px 6px 0 0;display:flex;justify-content:space-between;align-items:center}
.report-doc .ot-staff-hd .sname{font-size:13px;font-weight:700}
.report-doc .ot-staff-hd .stotal{color:#FFC000;font-size:13px;font-weight:700}
.report-doc .doc-footer{margin-top:32px;padding-top:11px;border-top:1px solid #D9D9D9;display:flex;justify-content:space-between;font-size:10px;color:#BFBFBF}
.report-doc .sign-section{display:grid;grid-template-columns:1fr 1fr;gap:36px;margin-top:26px}
.report-doc .sign-box{border-top:1px solid #595959;padding-top:9px;text-align:center;font-size:11px;color:#595959}

/* THEME PICKERS */
.color-picker-row{display:flex;align-items:center;gap:9px;margin-bottom:10px}
.color-picker-row label{font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--gray4);font-weight:600;min-width:170px}
.color-picker-row input[type=color]{width:38px;height:30px;padding:2px;border:1px solid var(--gray2);border-radius:var(--r);cursor:pointer;background:#fff}
.theme-swatch{width:24px;height:24px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all .15s;flex-shrink:0}
.theme-swatch.active{border-color:#fff;box-shadow:0 0 0 2px var(--navy)}

/* SETTINGS TAGS */
.tag-cloud{display:flex;flex-wrap:wrap;gap:6px}
.tag-edit{display:inline-flex;align-items:center;gap:4px;background:var(--gray1);border:1px solid var(--gray2);border-radius:99px;padding:3px 10px}
.tag-edit input{border:none;background:transparent;font-family:inherit;font-size:11px;outline:none}
.tag-del{cursor:pointer;color:var(--gray3);font-size:14px;line-height:1}
.tag-del:hover{color:#c00}

/* OT LOG ENTRY */
.ot-entry{display:flex;align-items:center;gap:7px;padding:5px 0;border-bottom:1px solid var(--gray1);font-size:12px}
.ot-entry:last-child{border-bottom:none}

/* DASHBOARD */
.dash-grid{display:grid;gap:12px}
.dash-grid.c2{grid-template-columns:1fr 1fr}
.dash-grid.c3{grid-template-columns:1fr 1fr 1fr}
.chart-box{background:#fff;border:1px solid var(--gray2);border-radius:var(--r2);padding:14px}
.chart-box h4{font-size:12px;font-weight:600;color:var(--navy);margin-bottom:10px;text-transform:uppercase;letter-spacing:.06em;border-left:3px solid var(--gold);padding-left:7px}
</style>
</head>
<body>

<!-- HEADER -->

    months: { [mid]: { projects: [], targetNew: 0, targetRev: 0 } },
    activeMonth: mid
  };
}

let D = (() => {
  try { const r = localStorage.getItem(SK); if(r) return JSON.parse(r); } catch(e){}
  return freshData();
})();

// save() defined later in sync section (overrides this stub)
function save() {
  if (window._viewOnly || window._viewOnlyMode) return;
  localStorage.setItem(SK, JSON.stringify(D));
  triggerAutoSync();
}

let activePjId = null;
let activePage = 'main';

function gid() { return Date.now().toString(36)+Math.random().toString(36).slice(2,5); }
function x(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function toast(msg, dur=2800) {
  const t = document.getElementById('toastEl');
  t.textContent = msg; t.style.display='block';
  clearTimeout(t._t); t._t = setTimeout(()=>t.style.display='none', dur);
}

function setSyncStatus(state, label) {
  const btn=document.getElementById('syncBtn'), lbl=document.getElementById('syncLabel');
  if(!btn) return;
  btn.className=`sync-btn ${state}`;
  lbl.textContent=label;
}

function monthLabel(mid) {
  const [y,m]=mid.split('-');
  return `T${parseInt(m)}/${y}`;
}

function curMonth() { return D.months[D.activeMonth]||{projects:[],targetNew:0,targetRev:0}; }
function curProjects() { return curMonth().projects||[]; }
function getPj(id) { return curProjects().find(p=>p.id===id); }

function totalNew(p) {
  const a=(p.records||[]).filter(r=>r.status==='new').reduce((s,r)=>s+(r.qty||0),0);
  const b=(p.groups||[]).flatMap(g=>g.rows||[]).filter(r=>r.status==='new').reduce((s,r)=>s+(r.qty||0),0);
  return a+b;
}
function totalRev(p) {
  const a=(p.records||[]).filter(r=>r.status==='rev').reduce((s,r)=>s+(r.qty||0),0);
  const b=(p.groups||[]).flatMap(g=>g.rows||[]).filter(r=>r.status==='rev').reduce((s,r)=>s+(r.qty||0),0);
  return a+b;
}
function totalOT(p) {
  const a=(p.otLog||[]).reduce((s,e)=>s+(e.hours||0),0);
  const b=(p.groups||[]).flatMap(g=>g.rows||[]).reduce((s,r)=>s+(r.ot||0),0);
  return a+b;
}

/* PAGE NAV */
function showPage(pg) {
  activePage=pg;
  ['main','dashboard','staff','settings'].forEach(p=>{
    const el=document.getElementById('page'+p.charAt(0).toUpperCase()+p.slice(1));
    if(el) el.style.display = p===pg?(p==='main'?'flex':'block'):'none';
    const btn=document.getElementById('nav'+p.charAt(0).toUpperCase()+p.slice(1));
    if(btn) btn.classList.toggle('active',p===pg);
  });
  if(pg==='dashboard') renderDashboard();
  else if(pg==='staff') renderStaffPage();
  else if(pg==='settings') renderSettings();
}

/* MONTH STRIP */
function renderMonthStrip() {
  const strip=document.getElementById('monthStrip');
  const months=Object.keys(D.months).sort();
  strip.innerHTML=months.map(mid=>`
    <button class="mtab ${mid===D.activeMonth?'active':''}" onclick="switchMonth('${mid}')">
      ${monthLabel(mid)}
    </button>`).join('')+`<button class="mtab mtab-add" onclick="addMonth()" title="Thêm tháng mới">＋</button>`;
  const staffSel=document.getElementById('staffMonth');
  if(staffSel) staffSel.innerHTML=months.map(mid=>`<option value="${mid}" ${mid===D.activeMonth?'selected':''}>${monthLabel(mid)}</option>`).join('');
  const dashY=document.getElementById('dashYear');
  if(dashY){
    const years=[...new Set(months.map(m=>m.split('-')[0]))].sort();
    dashY.innerHTML=years.map(y=>`<option value="${y}">${y}</option>`).join('');
    dashY.value=new Date().getFullYear().toString();
  }
}

function switchMonth(mid) { D.activeMonth=mid; activePjId=null; save(); renderAll(); }
function addMonth() {
  const months = Object.keys(D.months).sort();
  const last = months[months.length - 1] || D.activeMonth;
  let [y, m] = last.split('-').map(Number);
  m++; if (m > 12) { m = 1; y++; }
  const newMid = y + '-' + String(m).padStart(2, '0');

  // Count photos in current month
  const curPjs = curProjects();
  let photoCount = 0;
  curPjs.forEach(p => { photoCount += (p.photos || []).filter(Boolean).length; });

  if (photoCount > 0) {
    showModal(`
      <h3>📅 Sang tháng mới — ${monthLabel(newMid)}</h3>
      <div style="background:#EEF3FB;border-radius:6px;padding:12px 14px;margin-bottom:14px;font-size:12px;color:#1F3864;line-height:1.75">
        Tháng hiện tại có <strong>${photoCount} ảnh phối cảnh</strong> đang được lưu.<br>
        Ảnh chiếm nhiều dung lượng — bạn có muốn <strong>xóa toàn bộ ảnh tháng ${monthLabel(D.activeMonth)}</strong> trước khi sang tháng mới không?<br>
        <span style="color:var(--orange);font-size:11px">Dữ liệu số liệu (hạng mục, nhân sự, OT) vẫn được giữ nguyên.</span>
      </div>
      <div class="modal-ft" style="flex-wrap:wrap;gap:8px">
        <button class="btn" onclick="closeModal()">Hủy</button>
        <button class="btn btn-sm" style="background:#fff3e0;color:#7f3500;border-color:#ffcc99"
          onclick="doAddMonth('${newMid}', false)">Giữ ảnh & Sang tháng</button>
        <button class="btn btn-gold"
          onclick="doAddMonth('${newMid}', true)">🗑 Xóa ảnh cũ & Sang tháng</button>
      </div>
    `);
  } else {
    doAddMonth(newMid, false);
  }
}

function doAddMonth(newMid, clearPhotos) {
  // Clear photos from ALL previous months if requested
  if (clearPhotos) {
    Object.keys(D.months).forEach(mid => {
      if (mid !== newMid) {
        (D.months[mid].projects || []).forEach(p => { p.photos = []; });
      }
    });
    toast('🗑 Đã xóa ảnh tháng cũ');
  }
  if (!D.months[newMid]) D.months[newMid] = { projects: [], targetNew: 0, targetRev: 0 };
  D.activeMonth = newMid; activePjId = null; save(); closeModal(); renderAll();
  toast('✓ Đã sang tháng ' + monthLabel(newMid));
  // Show storage status after switch
  setTimeout(showStorageStatus, 500);
}

function showStorageStatus() {
  try {
    const data = localStorage.getItem(SK) || '';
    const kb = Math.round(data.length * 0.75 / 1024);
    const mb = (kb / 1024).toFixed(1);
    const pct = Math.round(kb / 51200 * 100); // 50MB estimate
    const color = pct > 80 ? '#c00' : pct > 50 ? '#E67E22' : '#27AE60';
    toast(`💾 Dung lượng: ${mb}MB / ~5MB (${pct}%)`, 4000);
  } catch(e) {}
}

/* SIDEBAR */
function renderSidebar() {
  const pjs = curProjects();
  document.getElementById('pjCount').textContent = pjs.length;
  const list = document.getElementById('pjList');
  if (!pjs.length) {
    list.innerHTML = '<div style="padding:20px 10px;text-align:center;color:var(--gray4);font-size:11px;line-height:1.7">Chưa có dự án<br><span style="font-size:10px">Nhấn + Thêm dự án</span></div>';
    return;
  }
  list.innerHTML = pjs.map((p, i) => {
    const thumb = (p.photos || []).find(Boolean); // first non-null photo
    const tn = totalNew(p), tr = totalRev(p), ot = totalOT(p);
    const thumbHtml = thumb
      ? `<img src="${thumb}" alt="">`
      : `<div class="pj-thumb-ph">🏗</div>`;
    return `<div class="pj-card ${p.id === activePjId ? 'active' : ''}" onclick="selectPj('${p.id}')">
      <div class="pj-thumb">

      </div>

        <div class="pj-card-name">${x(p.nameVN || p.nameJP || '—')}</div>

function renderContent() {
  const ci = document.getElementById('contentInner');

    renderHeroStats(ci);

}

function updateMonthTarget(field, val) {
  if(!D.months[D.activeMonth]) D.months[D.activeMonth]={projects:[],targetNew:0,targetRev:0};
  D.months[D.activeMonth][field] = Math.max(0, val); save();
  const m = curMonth();
  // Update tgtTotal label
  const el = document.getElementById('tgtTotal');
  if(el) el.textContent = 'Tổng = ' + ((m.targetNew||0)+(m.targetRev||0)) + ' phối cảnh';
  // Recompute progress bars in hero
  const pjs = curProjects();
  const sumNew = pjs.reduce((s,p)=>s+totalNew(p),0);
  const sumRev = pjs.reduce((s,p)=>s+totalRev(p),0);
  const tgtNew = m.targetNew||0, tgtRev = m.targetRev||0;
  const pctNew = tgtNew>0?Math.min(100,Math.round(sumNew/tgtNew*100)):0;
  const pctRev = tgtRev>0?Math.min(100,Math.round(sumRev/tgtRev*100)):0;
  const pN = document.getElementById('prgNew'); if(pN) pN.style.width=pctNew+'%';
  const pR = document.getElementById('prgRev'); if(pR) pR.style.width=pctRev+'%';
  // Update hero - if in project view keep project numbers, else show month totals
  if (!activePjId) {
    const hN = document.getElementById('heroSumNew'); if(hN) hN.textContent=sumNew;
    const hR = document.getElementById('heroSumRev'); if(hR) hR.textContent=sumRev;
  }
  // Update progress labels
  document.querySelectorAll('.progress-label').forEach((el,i)=>{
    const spans = el.querySelectorAll('span');
    if(i===0 && spans.length>=2){ spans[0].textContent=pctNew+'% mục tiêu'; spans[1].textContent=sumNew+'/'+tgtNew; }
    if(i===1 && spans.length>=2){ spans[0].textContent=pctRev+'% mục tiêu'; spans[1].textContent=sumRev+'/'+tgtRev; }
  });
}

function renderMonthStaffCard(pjs) {
  const sm={};
  D.settings.staffList.forEach(s=>sm[s]={n:0,r:0,ot:0});
  pjs.forEach(p=>{
    (p.groups||[]).flatMap(g=>g.rows||[]).forEach(r=>{
      if(r.staff&&sm[r.staff]){
        if(r.status==='new') sm[r.staff].n+=(r.qty||0);
        else sm[r.staff].r+=(r.qty||0);
        sm[r.staff].ot+=(r.ot||0);
      }
    });
    (p.records||[]).forEach(r=>{ if(r.staff&&sm[r.staff]){ if(r.status==='new') sm[r.staff].n+=(r.qty||0); else sm[r.staff].r+=(r.qty||0); } });
    (p.otLog||[]).forEach(e=>{if(e.staff&&sm[e.staff])sm[e.staff].ot+=(e.hours||0);});
  });

/* PHOTOS */
function renderPhotoSlots(p) {
  const photos=p.photos||[]; let html='';
  for(let i=0;i<6;i++){
    const ph=photos[i];
    if(ph) html+=`<div class="photo-slot filled"><img src="${ph}" alt="Photo ${i+1}"><button class="ph-del" onclick="delPhoto('${p.id}',${i})">✕</button></div>`;
    else html+=`<label class="photo-slot"><span class="ph-ico">🖼</span><span class="ph-txt">Thêm ảnh</span><input type="file" accept="image/*" onchange="uploadPhoto('${p.id}',${i},this)"></label>`;
  }
  return html;
}
function uploadPhoto(pjId, slot, input) {
  const file = input.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      // Auto compress: max 900px wide/tall, JPEG quality 0.72 → ~40-60KB/ảnh
      const MAX = 900;
      let w = img.width, h = img.height;
      if (w > MAX || h > MAX) {
        if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
        else { w = Math.round(w * MAX / h); h = MAX; }
      }
      const cv = document.createElement('canvas');
      cv.width = w; cv.height = h;
      cv.getContext('2d').drawImage(img, 0, 0, w, h);
      const compressed = cv.toDataURL('image/jpeg', 0.72);
      const kb = Math.round(compressed.length * 0.75 / 1024);
      const p = getPj(pjId); if (!p) return;
      if (!p.photos) p.photos = [];
      p.photos[slot] = compressed; save();
      const g = document.getElementById('photoGrid-' + pjId);
      if (g) g.innerHTML = renderPhotoSlots(p);
      toast('✓ Đã thêm ảnh (' + kb + 'KB)');
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}
function delPhoto(pjId,slot) {
  const p=getPj(pjId); if(!p||!p.photos) return;
  p.photos[slot]=null; p.photos=p.photos.filter((_,i)=>i!==slot); save();
  const g=document.getElementById(`photoGrid-${pjId}`); if(g) g.innerHTML=renderPhotoSlots(p);
}

function ratingColor(v) {
  if (!v) return 'var(--gray3)';
  if (v <= 3) return '#e74c3c';

  return '#27ae60';
}

          <input class="tbl-input" value="${x(r.otNote||'')}" style="font-size:10px"
            onchange="updRow('${p.id}','${g.id}','${r.id}','otNote',this.value)" placeholder="Lý do OT…">
        </td>
        <td style="text-align:center;padding:4px 3px">
          ${renderRatingCell(p.id, g.id, r.id, 'rateQuality', r.rateQuality||0, 'var(--gold)')}
        </td>
        <td style="text-align:center;padding:4px 3px">
          ${renderRatingCell(p.id, g.id, r.id, 'rateSpeed', r.rateSpeed||0, '#4fc3f7')}
        </td>
        <td style="text-align:center;padding:4px 3px">
          ${renderRatingCell(p.id, g.id, r.id, 'rateFocus', r.rateFocus||0, '#81c784')}
        </td>
        <td style="text-align:center">
          <button class="btn btn-xs btn-ghost btn-danger" onclick="delRow('${p.id}','${g.id}','${r.id}')">✕</button>
        </td>
      </tr>`;
    }).join('');
    return rowsHtml;
  }).join('');
}

/* Staff schedule - 3-week Gantt calendar */
function renderStaffSchedule(p) {
  // Build date range: today + 21 days (3 weeks)
  const today = new Date();
  today.setHours(0,0,0,0);
  const days = [];
  for(let i=0;i<21;i++){
    const d = new Date(today);
    d.setDate(today.getDate()+i);
    days.push(d);
  }
  const todayStr = today.toISOString().split('T')[0];
  const endStr   = days[20].toISOString().split('T')[0];

  // Week separator indices
  const dow = today.getDay(); // 0=Sun
  // Days per week display
  const weekStarts = [];
  let wStart=0;
  days.forEach((d,i)=>{ if(i===0||(d.getDay()===1)){weekStarts.push(i);} });

  // Collect ALL tasks from this project
  const allTasks = (p.groups||[]).flatMap(g=>
    (g.rows||[]).filter(r=>r.staff&&(r.dateFrom||r.dateTo)).map(r=>({
      ...r,
      pjName: p.nameVN||p.nameJP||'Dự án',
      groupName: g.type||'—'
    }))
  );

  // Filter to tasks overlapping the 3-week window
  function overlaps(r) {
    const from = r.dateFrom||r.dateTo||'';
    const to   = r.dateTo||r.dateFrom||'';
    if(!from&&!to) return false;
    return (!to || to >= todayStr) && (!from || from <= endStr);
  }

  // Build per-staff map considering ONLY active tasks in window
  const staffMap = {};
  D.settings.staffList.forEach(s => staffMap[s]=[]);
  allTasks.filter(overlaps).forEach(r=>{
    if(r.staff && staffMap[r.staff]) staffMap[r.staff].push(r);
  });

  // Date formatting helpers
  function toD(str){ return str?new Date(str+'T00:00:00'):null; }
  function dateKey(d){ return d.toISOString().split('T')[0]; }

  // Build day header HTML
  const dayColW = 'calc((100% - 90px) / 21)';

  let hdrMonths = '';
  let hdrDays   = '';
  let curMonth  = -1;
  let mSpan     = 0, mStart = 0;
  const monthSpans = [];
  days.forEach((d,i)=>{
    if(d.getMonth()!==curMonth){
      if(curMonth>=0) monthSpans.push({label:['T1','T2','T3','T4','T5','T6','T7','T8','T9','T10','T11','T12'][curMonth], span:mSpan});
      curMonth=d.getMonth(); mSpan=1;
    } else mSpan++;
    if(i===20) monthSpans.push({label:['T1','T2','T3','T4','T5','T6','T7','T8','T9','T10','T11','T12'][curMonth], span:mSpan});
  });

  const dayVN = ['CN','T2','T3','T4','T5','T6','T7'];
  hdrDays = days.map((d,i)=>{
    const isToday = dateKey(d)===todayStr;
    const isSun   = d.getDay()===0;
    const isSat   = d.getDay()===6;
    const isWeekBorder = d.getDay()===1 && i>0;
    return `<th style="
      min-width:28px;max-width:36px;text-align:center;font-size:9px;padding:2px 1px;
      background:${isToday?'var(--gold)':'var(--navy)'};
      color:${isToday?'var(--navy)':isSun||isSat?'rgba(255,255,255,.4)':'rgba(255,255,255,.8)'};
      font-weight:${isToday?'800':'400'};
      border-left:${isWeekBorder?'2px solid rgba(255,255,255,.3)':'none'};
    ">
      <div>${dayVN[d.getDay()]}</div>
      <div style="font-size:10px;font-weight:${isToday?'800':'600'}">${d.getDate()}</div>
    </th>`;
  }).join('');

  // Month header
  hdrMonths = monthSpans.map(m=>
    `<th colspan="${m.span}" style="background:var(--navy2);color:var(--gold2);font-size:10px;text-align:center;padding:3px;border-right:1px solid rgba(255,255,255,.15)">${m.label}</th>`
  ).join('');

  // Build each staff row
  const staffRows = D.settings.staffList.map(staff=>{
    const tasks = staffMap[staff];
    const isBusy = tasks.length>0;

    // For each day, check which tasks are active
    const dayCells = days.map((d,i)=>{
      const dk = dateKey(d);
      const isToday = dk===todayStr;
      const isSun   = d.getDay()===0;
      const isSat   = d.getDay()===6;
      const isWeekBorder = d.getDay()===1 && i>0;
      const activeTasks = tasks.filter(r=>{
        const from = r.dateFrom||r.dateTo;
        const to   = r.dateTo||r.dateFrom;
        return from<=dk && to>=dk;
      });
      // Check leave on this day
      const leaves = getStaffLeaves(staff);
      const isOnLeave = leaves.some(l=>{
        const lf=l.from||l.to, lt=l.to||l.from;
        return lf && lt && lf<=dk && lt>=dk;
      });
      const bg = isOnLeave?'rgba(231,76,60,.08)':isToday?'rgba(255,192,0,.08)':isSun||isSat?'rgba(0,0,0,.03)':'#fff';
      const borderL = isWeekBorder?'2px solid rgba(0,0,0,.08)':'1px solid #f0f0f0';
      if(activeTasks.length===0){
        return `<td style="background:${bg};border-left:${borderL};padding:1px"></td>`;
      }
      const blocks = activeTasks.map(r=>{
        const isNew = r.status==='new';
        const bg2 = isNew?'#70AD47':'var(--gold)';
        const isFirstDay = r.dateFrom===dk;
        const isLastDay  = r.dateTo===dk;
        return `<div title="${x(r.groupName)} (${r.pjName})\n${isNew?'Làm mới':'Sửa lại'} · ${r.qty||0} mai\n${r.dateFrom||'?'} → ${r.dateTo||'?'}"
          style="background:${bg2};height:10px;margin:1px 0;border-radius:${isFirstDay?'3px 0 0 3px':isLastDay?'0 3px 3px 0':'0'};
          opacity:0.85;overflow:hidden;font-size:7px;color:#fff;white-space:nowrap;padding:0 2px;line-height:10px">
          ${isFirstDay?x(r.groupName.substring(0,6)):''}
        </div>`;
      }).join('');
      return `<td style="background:${bg};border-left:${borderL};padding:1px;vertical-align:top">${blocks}</td>`;
    }).join('');

    // Task list summary on left
    // Show active leaves in summary too
    const activeLeaveList = getStaffLeaves(staff).filter(l=>{
      const lt=l.to||l.from;
      return lt >= todayStr;
    });
    const taskSummary = tasks.length>0 || activeLeaveList.length>0 ? 
      activeLeaveList.map(l=>`<div style="font-size:9px;margin-bottom:1px;display:flex;align-items:center;gap:3px;white-space:nowrap"><span style="width:6px;height:6px;border-radius:50%;background:#e74c3c;flex-shrink:0;display:inline-block"></span><span style="color:#e74c3c;overflow:hidden;text-overflow:ellipsis">Nghỉ ${l.from||'?'}${l.to&&l.to!==l.from?'→'+l.to:''}</span></div>`).join('')
      + tasks.map(r=>{
      const overdue = r.dateTo && r.dateTo < todayStr;
      return `<div style="font-size:9px;margin-bottom:1px;display:flex;align-items:center;gap:3px;white-space:nowrap;overflow:hidden">
        <span style="width:6px;height:6px;border-radius:50%;background:${r.status==='new'?'#70AD47':'var(--gold)'};flex-shrink:0;display:inline-block"></span>
        <span style="overflow:hidden;text-overflow:ellipsis;color:${overdue?'#e74c3c':'inherit'}">${x(r.groupName.length>10?r.groupName.substring(0,10)+'…':r.groupName)}</span>
        ${overdue?'<span style="color:#e74c3c;font-weight:700">!</span>':''}
      </div>`;
    }).join('') : `<div style="font-size:9px;color:#27AE60">✓ Rảnh</div>`;

    const nameBg = isBusy ? 'var(--gray1)' : '#e8fdf0';
    return `<tr style="border-bottom:1px solid var(--gray2)">
      <td style="background:${nameBg};padding:5px 8px;min-width:90px;border-right:1px solid var(--gray2);vertical-align:top">
        <div style="font-weight:700;font-size:11px;color:var(--navy)">${staff}</div>
        ${taskSummary}
      </td>
      ${dayCells}
    </tr>`;
  }).join('');

  return `
  <div style="overflow-x:auto">
  <table style="width:100%;border-collapse:collapse;font-size:11px;min-width:600px">
    <thead>
      <tr>
        <th style="background:var(--navy);width:90px;min-width:90px;padding:4px 8px;color:rgba(255,255,255,.7);font-size:10px;text-align:left">Nhân sự</th>
        ${hdrMonths}
      </tr>
      <tr>
        <th style="background:var(--navy2);padding:4px 8px;font-size:10px;color:rgba(255,255,255,.6);text-align:left">
          <div>Hôm nay:</div>
          <div style="color:var(--gold);font-weight:700">${todayStr.split('-').slice(1).join('/')}</div>
        </th>
        ${hdrDays}
      </tr>
    </thead>
    <tbody>${staffRows}</tbody>
  </table>
  </div>
  <div style="padding:8px 12px;display:flex;gap:14px;font-size:10px;color:var(--gray4);background:var(--gray1);border-top:1px solid var(--gray2)">
    <span>Chú thích:</span>
    <span style="display:flex;align-items:center;gap:4px"><span style="width:12px;height:8px;background:#70AD47;border-radius:2px;display:inline-block"></span> Làm mới</span>
    <span style="display:flex;align-items:center;gap:4px"><span style="width:12px;height:8px;background:var(--gold);border-radius:2px;display:inline-block"></span> Sửa lại</span>
    <span style="display:flex;align-items:center;gap:4px"><span style="color:#e74c3c">!</span> Quá hạn</span>
    <span style="display:flex;align-items:center;gap:4px"><span style="width:12px;height:8px;background:rgba(255,192,0,.15);border:1px solid var(--gold);border-radius:2px;display:inline-block"></span> Hôm nay</span>
    <span style="margin-left:auto;font-style:italic">Hover chuột vào ô màu để xem chi tiết</span>
  </div>`;
}

function updGroup(pjId,gid2,field,val) {
  const p=getPj(pjId); if(!p) return;
  const g=(p.groups||[]).find(g=>g.id===gid2); if(!g) return;
  g[field]=val; save();
}
function updRow(pjId,gid2,rid,field,val) {
  const p=getPj(pjId); if(!p) return;
  const g=(p.groups||[]).find(g=>g.id===gid2); if(!g) return;
  const r=g.rows.find(r=>r.id===rid); if(!r) return;
  r[field]=val; save();
  // Leave conflict check when staff, dateFrom or dateTo changes
  if(['staff','dateFrom','dateTo'].includes(field) && r.staff && (r.dateFrom||r.dateTo)) {
    const conflicts = checkLeaveConflict(r.staff, r.dateFrom||r.dateTo, r.dateTo||r.dateFrom);
    if(conflicts.length>0) {
      const info = conflicts.map(l=>`${l.from||'?'} → ${l.to||l.from||'?'}${l.reason?' ('+l.reason+')':''}`).join(', ');
      toast('⚠ ' + r.staff + ' có lịch nghỉ trùng: ' + info, 5000);
    }
  }
}
function refreshPjTotals(pjId) {
  const p = getPj(pjId); if(!p) return;
  const tn=totalNew(p), tr=totalRev(p), ta=tn+tr;
  const fTn = document.getElementById('tfoot-tn-'+pjId); if(fTn) fTn.textContent = tn;
  const fTr = document.getElementById('tfoot-tr-'+pjId); if(fTr) fTr.textContent = tr;
  const fTa = document.getElementById('tfoot-ta-'+pjId); if(fTa) fTa.textContent = ta;
  updateHeroForProject(p);
  refreshStaffSched(pjId);
  renderSidebar();
}

/* ── Contract / Review date helper (avoids nested backtick issue) ── */
function contractNextAnnual(dateStr, todayStr) {
  if (!dateStr) return null;
  const base = new Date(dateStr);
  if (isNaN(base)) return null;
  const now = new Date(todayStr);
  let next = new Date(base);
  next.setFullYear(now.getFullYear());
  if (next <= now) next.setFullYear(now.getFullYear() + 1);
  return next.toISOString().split('T')[0];
}
function contractDaysUntil(dateStr, todayStr) {
  if (!dateStr) return null;
  return Math.ceil((new Date(dateStr) - new Date(todayStr)) / 86400000);
}
function contractAlertInfo(days) {
  if (days === null) return {level:null, color:'var(--gray3)', label:''};
  if (days < 0)   return {level:'past',    color:'#e74c3c', label:'Đã qua!'};
  if (days <= 7)  return {level:'week',    color:'#e74c3c', label:'⚠ Còn 1 tuần'};
  if (days <= 14) return {level:'twoweek', color:'#e67e22', label:'⚠ Còn 2 tuần'};
  if (days <= 30) return {level:'month',   color:'#f39c12', label:'Còn 1 tháng'};
  return {level:'ok', color:'#27ae60', label:'Còn thời gian'};
}

function renderDateStatus(nextDate, days, info) {
  if (!nextDate || days === null) {
    return '<div style="font-size:10px;color:var(--gray3);margin-top:3px;font-style:italic">Chưa đặt ngày</div>';
  }
  const dayText = days < 0 ? 'Đã qua ' + Math.abs(days) + ' ngày'
                : days === 0 ? 'Hôm nay!'
                : 'Còn ' + days + ' ngày';
  return '<div style="margin-top:4px;font-size:10px;font-weight:600;color:' + info.color + ';line-height:1.6">'
    + '<span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:' + info.color + ';margin-right:4px;vertical-align:middle"></span>'
    + dayText + ' — ' + info.label
    + '<br><span style="font-weight:400;color:var(--gray4)">Lần tới: ' + nextDate + '</span>'
    + '</div>';
}

function renderContractBlock(staffName, prof, todayStr) {
  const contractEnd = prof.contractEnd || '';
  const nextContract = contractNextAnnual(contractEnd, todayStr);
  const cdDays = contractDaysUntil(nextContract, todayStr);
  const cdInfo = contractAlertInfo(cdDays);
  const cdBorder = cdInfo.level && cdInfo.level !== 'ok' ? cdInfo.color : 'var(--gray2)';
  const cdBg = (cdInfo.level === 'week' || cdInfo.level === 'past') ? '#fff5f5' : '#fff';

  return '<div style="margin-bottom:10px;padding:7px 9px;background:#f0f8ff;border-radius:var(--r);border:1px dashed #90cdf4">'
    + '<div style="font-size:10px;font-weight:600;color:var(--gray4);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px">📄 Hết hạn hợp đồng</div>'
    + '<input type="date" value="' + contractEnd + '"'
    + ' style="width:100%;padding:4px 7px;border:1px solid ' + cdBorder + ';border-radius:var(--r);font-size:11px;background:' + cdBg + '"'
    + (' onchange="saveStaffProfile('+JSON.stringify(staffName)+',' + JSON.stringify('contractEnd') + ',this.value);renderStaffPage()">')
    + renderDateStatus(nextContract, cdDays, cdInfo)
    + '</div>';
}

function getStaffProfile(name) {
  if (!D.settings.staffProfiles) D.settings.staffProfiles = {};
  if (!D.settings.staffProfiles[name]) D.settings.staffProfiles[name] = {role:'',salaryGross:0,salaryNet:0,leaves:[],order:99,contractEnd:''};
  return D.settings.staffProfiles[name];
}

function saveStaffProfile(name, field, val) {
  const p = getStaffProfile(name);
  p[field] = val; save();
}

// Get all leaves for a staff across all months
function getStaffLeaves(name) {
  const prof = getStaffProfile(name);
  return prof.leaves || [];
}

// Check if a date range overlaps with any leave
function checkLeaveConflict(name, dateFrom, dateTo) {
  if (!dateFrom && !dateTo) return [];
  const leaves = getStaffLeaves(name);
  return leaves.filter(l => {
    const lf = l.from, lt = l.to;
    if (!lf && !lt) return false;
    const from = dateFrom||dateTo, to = dateTo||dateFrom;
    const lFrom = lf||lt, lTo = lt||lf;
    return from <= lTo && to >= lFrom;
  });
}

// Aggregate staff stats across all months
function getStaffStats(name) {
  let totalNew=0, totalRev=0, totalOT=0, totalLeaves=0;
  const monthStats = [];
  Object.entries(D.months).sort((a,b)=>a[0]>b[0]?1:-1).forEach(([mid,m])=>{
    let mn=0,mr=0,mot=0;
    let rqSum=0,rsSum=0,rfSum=0,rCount=0;
    (m.projects||[]).forEach(p=>{
      (p.groups||[]).flatMap(g=>g.rows||[]).forEach(r=>{
        if(r.staff===name){
          if(r.status==='new') mn+=(r.qty||0); else mr+=(r.qty||0);
          mot+=(r.ot||0);
          if(r.rateQuality||r.rateSpeed||r.rateFocus){
            rqSum+=(r.rateQuality||0); rsSum+=(r.rateSpeed||0); rfSum+=(r.rateFocus||0); rCount++;
          }
        }
      });
      (p.records||[]).forEach(r=>{
        if(r.staff===name){ if(r.status==='new') mn+=(r.qty||0); else mr+=(r.qty||0); }
      });
      (p.otLog||[]).forEach(e=>{ if(e.staff===name) mot+=(e.hours||0); });
    });
    if(mn+mr+mot>0) monthStats.push({
      mid,n:mn,r:mr,ot:mot,
      rq:rCount?+(rqSum/rCount).toFixed(1):0,
      rs:rCount?+(rsSum/rCount).toFixed(1):0,
      rf:rCount?+(rfSum/rCount).toFixed(1):0,
      rCount
    });
    totalNew+=mn; totalRev+=mr; totalOT+=mot;
  });
  // Count leave days
  const leaves = getStaffLeaves(name);
  leaves.forEach(l=>{
    if(l.from&&l.to){
      const d1=new Date(l.from), d2=new Date(l.to);
      totalLeaves += Math.round((d2-d1)/86400000)+1;
    } else if(l.from||l.to) totalLeaves+=1;
  });
  return {totalNew,totalRev,totalOT,totalLeaves,monthStats};
}

                <div style="font-size:10px;color:var(--gray4);margin-bottom:2px">⏱ Tổng OT tích lũy</div>

                ${allStats.monthStats.filter(m=>m.ot>0).length>0?`
                <div style="font-size:9px;color:var(--gray4);margin-top:4px;line-height:1.6">
                  ${allStats.monthStats.filter(m=>m.ot>0).slice(-12).map(m=>`<div style="display:flex;justify-content:space-between"><span>${m.mid.replace(/^20/,'').replace('-','/')}</span><span style="font-weight:600">${m.ot.toFixed(1)}h</span></div>`).join('')}
                </div>`:'<div style="font-size:9px;color:var(--gray3);margin-top:3px;font-style:italic">Chưa có OT</div>'}
              </div>
              <!-- Nghỉ phép tích lũy -->
              <div style="background:#fff5f5;border-radius:var(--r);padding:7px 9px;border-left:3px solid #e74c3c">
                <div style="font-size:10px;color:var(--gray4);margin-bottom:2px">🏖 Tổng ngày nghỉ</div>
                <div style="font-size:18px;font-weight:800;color:#e74c3c;line-height:1">${allStats.totalLeaves}<span style="font-size:11px;font-weight:500"> ngày</span></div>
                ${(prof.leaves||[]).length>0?`
                <div style="font-size:9px;color:var(--gray4);margin-top:4px;line-height:1.6">
                  ${(prof.leaves||[]).slice(-12).map(l=>`<div style="display:flex;justify-content:space-between;gap:4px">
                    <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${l.from||'?'}${l.to&&l.to!==l.from?'→'+l.to:''}</span>
                    ${l.reason?`<span style="color:var(--gray3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${x(l.reason.substring(0,12))}</span>`:''}
                  </div>`).join('')}
                </div>`:'<div style="font-size:9px;color:var(--gray3);margin-top:3px;font-style:italic">Chưa có nghỉ phép</div>'}
              </div>
            </div>

            <!-- Rating trend 12 months -->
            ${(()=>{
              const rStats = allStats.monthStats.filter(m=>m.rCount>0).slice(-12);
              if(!rStats.length) return '<div style="font-size:10px;color:var(--gray3);margin-top:8px;font-style:italic;text-align:center">Chưa có đánh giá</div>';
              const maxW = 100;
              return '<div style="margin-top:8px;border-top:1px solid var(--gray2);padding-top:7px">'
                + '<div style="font-size:10px;font-weight:600;color:var(--gray4);margin-bottom:5px">⭐ Đánh giá theo tháng (12 tháng gần nhất)</div>'
                + '<div style="display:flex;flex-direction:column;gap:4px">'
                + rStats.map(m=>{
                    const label = m.mid.replace(/^20/,'').replace('-','/');
                    const qPct = m.rq*10, sPct = m.rs*10, fPct = m.rf*10;
                    return '<div style="display:grid;grid-template-columns:28px 1fr 1fr 1fr;gap:3px;align-items:center">'
                      + '<span style="font-size:9px;color:var(--gray4)">' + label + '</span>'
                      + '<div title="Chất lượng: ' + m.rq + '/10" style="display:flex;align-items:center;gap:2px"><div style="flex:1;height:5px;background:#fff;border-radius:2px;overflow:hidden"><div style="height:100%;background:var(--gold);width:' + qPct + '%"></div></div><span style="font-size:8px;color:var(--gray4);width:18px;text-align:right">' + m.rq + '</span></div>'
                      + '<div title="Tốc độ: ' + m.rs + '/10" style="display:flex;align-items:center;gap:2px"><div style="flex:1;height:5px;background:#fff;border-radius:2px;overflow:hidden"><div style="height:100%;background:#4fc3f7;width:' + sPct + '%"></div></div><span style="font-size:8px;color:var(--gray4);width:18px;text-align:right">' + m.rs + '</span></div>'
                      + '<div title="Tập trung: ' + m.rf + '/10" style="display:flex;align-items:center;gap:2px"><div style="flex:1;height:5px;background:#fff;border-radius:2px;overflow:hidden"><div style="height:100%;background:#81c784;width:' + fPct + '%"></div></div><span style="font-size:8px;color:var(--gray4);width:18px;text-align:right">' + m.rf + '</span></div>'
                      + '</div>';
                  }).join('')
                + '</div>'
                + '<div style="display:flex;gap:10px;margin-top:4px;font-size:9px;color:var(--gray4)">'
                + '<span style="display:flex;align-items:center;gap:3px"><span style="width:8px;height:4px;background:var(--gold);border-radius:1px;display:inline-block"></span>Chất lượng</span>'
                + '<span style="display:flex;align-items:center;gap:3px"><span style="width:8px;height:4px;background:#4fc3f7;border-radius:1px;display:inline-block"></span>Tốc độ</span>'
                + '<span style="display:flex;align-items:center;gap:3px"><span style="width:8px;height:4px;background:#81c784;border-radius:1px;display:inline-block"></span>Tập trung</span>'
                + '</div>'
                + '</div>';
            })()}
          </div>

          <!-- OT this month -->
          ${v.ot>0?`<div style="display:flex;align-items:center;gap:6px;margin-bottom:8px;padding:5px 8px;background:#fff8f2;border-radius:var(--r);border-left:3px solid var(--orange)">
            <span style="font-size:11px;color:var(--gray4)">OT tháng này:</span>
            <span style="font-weight:700;color:var(--orange)">${v.ot.toFixed(1)}h</span>
          </div>`:''}

          <!-- Contract / Salary Review Date -->
          ${renderContractBlock(s, prof, today)}

          <!-- Salary (hidden by default) -->
          <div style="margin-bottom:10px;padding:7px 9px;background:#f8f9ff;border-radius:var(--r);border:1px dashed var(--gray2)">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
              <span style="font-size:10px;font-weight:600;color:var(--gray4);text-transform:uppercase;letter-spacing:.06em">💰 Lương</span>
              <button onclick="toggleSalary('sal-${s.replace(/[^a-zA-Z0-9]/g,'_')}')" style="background:none;border:none;cursor:pointer;font-size:14px" title="Hiện/ẩn lương">👁</button>
            </div>
            <div id="sal-${s.replace(/[^a-zA-Z0-9]/g,'_')}" style="display:none">
              <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
                <div class="field"><label>Gross</label>
                  <input type="number" value="${prof.salaryGross||''}" placeholder="0"
                    style="font-family:inherit;font-size:12px"
                    onchange="saveStaffProfile('${s}','salaryGross',+this.value)">
                  <div style="font-size:9px;color:var(--gray4)">¥ / tháng</div>
                </div>
                <div class="field"><label>Net</label>
                  <input type="number" value="${prof.salaryNet||''}" placeholder="0"
                    style="font-family:inherit;font-size:12px"
                    onchange="saveStaffProfile('${s}','salaryNet',+this.value)">
                  <div style="font-size:9px;color:var(--gray4)">¥ / tháng</div>
                </div>
              </div>
            </div>
            <div id="sal-hidden-${s.replace(/[^a-zA-Z0-9]/g,'_')}" style="font-size:12px;color:var(--gray3);font-style:italic">●●●●● / ●●●●●</div>
          </div>

          <!-- Leave schedule -->
          <div>
            <div style="font-size:10px;font-weight:600;color:var(--gray4);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px">📅 Lịch nghỉ phép</div>
            ${(prof.leaves||[]).length===0
              ? '<div style="font-size:11px;color:var(--gray3);font-style:italic">Chưa có lịch nghỉ</div>'
              : (prof.leaves||[]).sort((a,b)=>a.from>b.from?1:-1).map(l=>{
                  const isPast = (l.to||l.from) < today;
                  const isActive = (l.from||l.to)<=today && (l.to||l.from)>=today;
                  const days2 = l.from&&l.to ? Math.round((new Date(l.to)-new Date(l.from))/86400000)+1 : 1;
                  return `<div style="display:flex;align-items:center;gap:6px;padding:4px 7px;border-radius:var(--r);background:${isActive?'#fff5f5':isPast?'var(--gray1)':'#fff8f2'};margin-bottom:4px;border-left:3px solid ${isActive?'#e74c3c':isPast?'var(--gray3)':'var(--orange)'}">
                    <div style="flex:1;min-width:0">
                      <div style="font-size:11px;font-weight:600;color:${isPast?'var(--gray4)':'var(--dark)'}">${l.from||'?'} → ${l.to||l.from||'?'} (${days2} ngày)</div>
                      ${l.reason?`<div style="font-size:10px;color:var(--gray4)">${x(l.reason)}</div>`:''}
                    </div>
                    <span style="font-size:9px;padding:1px 5px;border-radius:3px;background:${isActive?'#e74c3c':isPast?'var(--gray2)':'var(--orange)'};color:#fff;white-space:nowrap">${isActive?'Đang nghỉ':isPast?'Đã qua':'Sắp nghỉ'}</span>
                    <button class="btn btn-xs btn-ghost btn-danger" onclick="delLeave('${s}','${l.id}')">✕</button>
                  </div>`;
                }).join('')
            }
          </div>

          <!-- Order control -->
          <div style="margin-top:10px;padding-top:8px;border-top:1px solid var(--gray1);display:flex;align-items:center;gap:8px">
            <span style="font-size:10px;color:var(--gray4)">Thứ tự:</span>
            <input type="number" min="1" max="99" value="${prof.order||idx+1}"
              style="width:48px;padding:3px 6px;border:1px solid var(--gray2);border-radius:var(--r);font-size:11px;text-align:center"
              onchange="saveStaffProfile('${s}','order',+this.value);renderStaffPage()">
            ${v.pjs.length ? '<span style="font-size:10px;color:var(--gray4);margin-left:auto">Dự án: ' + v.pjs.slice(0,2).map(n=>'<span style="background:var(--gray1);padding:1px 5px;border-radius:3px;font-size:9px">'+x(n)+'</span>').join(' ') + '</span>' : ''}
          </div>
        </div>
      </div>`;
    }).join('')}
  </div>
  `;
}

function toggleSalary(salId) {
  const el = document.getElementById(salId);
  const hidden = document.getElementById('sal-hidden-' + salId.replace('sal-',''));
  if(el) el.style.display = el.style.display==='none' ? 'block' : 'none';
  if(hidden) hidden.style.display = hidden.style.display==='none' ? 'block' : 'none';
}


/* SETTINGS */
function renderSettings() {
  const sc=document.getElementById('settingsContent'); if(!sc) return;
  sc.innerHTML=`
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
    <div class="card"><div class="card-hd"><span class="card-hd-title">👤 Nhân sự</span></div>
      <div class="card-body"><div class="tag-cloud" id="staffTags">
        ${D.settings.staffList.map(s=>`<div class="tag-edit"><input value="${x(s)}" style="width:85px"><span class="tag-del" onclick="this.parentElement.remove()">×</span></div>`).join('')}
      </div><button class="btn btn-sm" style="margin-top:9px" onclick="addTag('staffTags',85)">+ Thêm</button></div></div>
    <div class="card"><div class="card-hd"><span class="card-hd-title">📞 Liên hệ JP</span></div>
      <div class="card-body"><div class="tag-cloud" id="contactTags">
        ${D.settings.contactList.map(c=>`<div class="tag-edit"><input value="${x(c)}" style="width:80px"><span class="tag-del" onclick="this.parentElement.remove()">×</span></div>`).join('')}
      </div><button class="btn btn-sm" style="margin-top:9px" onclick="addTag('contactTags',80)">+ Thêm</button></div></div>
    <div class="card" style="grid-column:1/-1"><div class="card-hd"><span class="card-hd-title">🏷 Danh mục hạng mục</span></div>
      <div class="card-body">
        <p style="font-size:11px;color:var(--gray4);margin-bottom:9px">Chỉnh sửa hoặc thêm hạng mục theo nhu cầu</p>
        <div class="tag-cloud" id="typeTags">
          ${D.settings.typeList.map(t=>`<div class="tag-edit"><input value="${x(t)}" style="width:140px"><span class="tag-del" onclick="this.parentElement.remove()">×</span></div>`).join('')}
        </div><button class="btn btn-sm" style="margin-top:9px" onclick="addTag('typeTags',140)">+ Thêm hạng mục</button>
      </div></div>
  </div>
  <div style="display:flex;justify-content:flex-end;margin-top:14px">
    <button class="btn btn-gold" onclick="saveSettings()">💾 Lưu cài đặt</button>
  </div>`;
}
function addTag(cid,w) {
  const c=document.createElement('div'); c.className='tag-edit';
  c.innerHTML=`<input style="width:${w}px" placeholder="Nhập…"><span class="tag-del" onclick="this.parentElement.remove()">×</span>`;
  document.getElementById(cid).appendChild(c); c.querySelector('input').focus();
}
function saveSettings() {
  D.settings.staffList=[...document.querySelectorAll('#staffTags .tag-edit input')].map(e=>e.value.trim()).filter(Boolean);
  D.settings.typeList=[...document.querySelectorAll('#typeTags .tag-edit input')].map(e=>e.value.trim()).filter(Boolean);
  D.settings.contactList=[...document.querySelectorAll('#contactTags .tag-edit input')].map(e=>e.value.trim()).filter(Boolean);
  save(); toast('✓ Đã lưu cài đặt');
}

/* MODAL */
function showModal(html) {
  const bg=document.createElement('div'); bg.className='modal-bg'; bg.id='activeModal';
  bg.innerHTML=`<div class="modal">${html}</div>`;
  bg.onclick=e=>{if(e.target===bg)closeModal();};
  document.getElementById('modalRoot').appendChild(bg);
}
function closeModal() { document.getElementById('activeModal')?.remove(); }

/* ══════════════════════════════════════════════════════
   SYNC SYSTEM — Password-based, 2-level access
   Backend: JSONBin.io (free, no signup needed for users)
   
   CÁCH HOẠT ĐỘNG:
   - Admin (chủ app) tạo 1 bin trên jsonbin.io, lấy BIN_ID + API_KEY
   - Đặt mật khẩu EDIT và mật khẩu VIEW (lưu trong D.settings.sync)
   - Người khác chỉ cần nhập đúng mật khẩu để đọc hoặc sửa
   - Toàn bộ dữ liệu được mã hoá AES trước khi lên cloud
══════════════════════════════════════════════════════ */

const SYNC = {
  // Credentials chỉ admin biết (lưu localStorage, không chia sẻ)
  get binId()  { return localStorage.getItem('sync_bin_id')||''; },
  get apiKey() { return localStorage.getItem('sync_api_key')||''; },
  set binId(v)  { localStorage.setItem('sync_bin_id', v); },
  set apiKey(v) { localStorage.setItem('sync_api_key', v); },
  get lastSync() { return localStorage.getItem('sync_last')||''; },
  set lastSync(v){ localStorage.setItem('sync_last', v); },
  // Session: quyền hiện tại sau khi đăng nhập
  get role() { return sessionStorage.getItem('sync_role')||'none'; }, // 'admin'|'edit'|'view'|'none'
  set role(v) { sessionStorage.setItem('sync_role', v); },
  get autoOn() { return localStorage.getItem('sync_auto')==='1'; },
  set autoOn(v) { localStorage.setItem('sync_auto', v?'1':'0'); }
};

/* ── AES-GCM encryption (pure Web Crypto, no libs) ── */
async function deriveKey(password, salt) {
  const enc = new TextEncoder();
  const keyMaterial = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey(
    { name:'PBKDF2', salt: enc.encode(salt), iterations:100000, hash:'SHA-256' },
    keyMaterial, { name:'AES-GCM', length:256 }, false, ['encrypt','decrypt']
  );
}

async function encryptData(data, password) {
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const key = await deriveKey(password, 'phoicanh_salt_v1');
  const enc = new TextEncoder();
  const encrypted = await crypto.subtle.encrypt({ name:'AES-GCM', iv }, key, enc.encode(JSON.stringify(data)));
  // Pack: iv(12 bytes) + encrypted
  const combined = new Uint8Array(12 + encrypted.byteLength);
  combined.set(iv, 0);
  combined.set(new Uint8Array(encrypted), 12);
  return btoa(String.fromCharCode(...combined));
}

async function decryptData(b64, password) {
  const combined = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
  const iv = combined.slice(0, 12);
  const data = combined.slice(12);
  const key = await deriveKey(password, 'phoicanh_salt_v1');
  const dec = await crypto.subtle.decrypt({ name:'AES-GCM', iv }, key, data);
  return JSON.parse(new TextDecoder().decode(dec));
}

/* ── Hash password for comparison (stored in D.settings.sync) ── */
async function hashPw(pw) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pw+'pc_salt'));
  return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,'0')).join('');
}

/* ── JSONBin API ── */
const JBIN = 'https://api.jsonbin.io/v3';

async function syncPush() {
  if (!SYNC.binId || !SYNC.apiKey) return false;
  // editPw stored locally during setup/login — never leaves device
  const editPw = localStorage.getItem('sync_edit_pw') || D.settings?.sync?.editPw || '';
  if (!editPw) { setSyncStatus('error','Cần đăng nhập lại'); toast('⚠ Phiên hết hạn — đăng nhập lại để sync'); return false; }
  // Safety: never push empty data (no projects at all AND no staffProfiles)
  const totalPjs = Object.values(D.months||{}).reduce((s,m)=>s+(m.projects||[]).length,0);
  const hasProfiles = Object.keys(D.settings?.staffProfiles||{}).length > 0;
  if (totalPjs === 0 && !hasProfiles && !D.settings?.sync?.adminHash) {
    toast('⚠ Dữ liệu trống — không đồng bộ để tránh ghi đè'); return false;
  }
  try {
    const payload = await encryptData(D, editPw);
    const res = await fetch(`${JBIN}/b/${SYNC.binId}`, {
      method:'PUT',
      headers:{ 'Content-Type':'application/json', 'X-Master-Key': SYNC.apiKey },
      body: JSON.stringify({ data: payload, ts: Date.now() })
    });
    if (!res.ok) throw new Error(res.status);
    SYNC.lastSync = new Date().toLocaleString('vi-VN');
    setSyncStatus('synced', SYNC.autoOn?'⚡ Auto':'✓ Đã lưu');
    return true;
  } catch(e) {
    setSyncStatus('error','Lỗi lưu');
    return false;
  }
}

async function syncPull(decryptPassword) {
  // decryptPassword = the editPw used to encrypt the data
  const binId = SYNC.binId || localStorage.getItem('sync_bin_id_public') || '';
  if (!binId) throw new Error('no_bin_id');
  try {
    const headers = SYNC.apiKey ? { 'X-Master-Key': SYNC.apiKey } : {};
    const res = await fetch(`${JBIN}/b/${binId}/latest`, { headers });
    if (!res.ok) throw new Error('http_' + res.status);
    const json = await res.json();
    const payload = json.record?.data;
    if (!payload) throw new Error('no_data');
    return await decryptData(payload, decryptPassword);
  } catch(e) {
    const msg = e.message || '';
    if (msg === 'no_data') throw e;
    if (msg === 'no_bin_id') throw e;
    if (msg.startsWith('http_')) throw new Error('connect_' + msg);
    throw new Error('decrypt_fail');
  }
}

/* ── STATUS BAR ── */
function setSyncStatus(state, label) {
  const btn = document.getElementById('syncBtn');
  const lbl = document.getElementById('syncLabel');
  if (!btn) return;
  btn.className = `sync-status ${state}`;
  lbl.textContent = label;
  btn.title = label + ' · Bấm để sync ngay · Giữ 1s để cài đặt';
}

/* ── AUTO SYNC hook (called by save()) ── */
function triggerAutoSync() {
  // Debounce: push 4s after last save (for immediate feedback on manual edits)
  if (SYNC.binId && SYNC.apiKey && SYNC.role==='admin') {
    clearTimeout(triggerAutoSync._t);
    triggerAutoSync._t = setTimeout(syncPush, 4000);
  }
}

// 5-minute periodic auto-save (runs regardless of edits)
(function startPeriodicSync() {
  setInterval(async () => {
    if (SYNC.binId && SYNC.apiKey && SYNC.role==='admin') {
      await syncPush();
    }
  }, 5 * 60 * 1000); // every 5 minutes
})();

/* ── Quick Sync: 1-click push/pull without password ── */
async function quickSync() {
  if (!SYNC.binId) {
    toast('☁ Chưa cấu hình sync — giữ nút Sync để mở cài đặt');
    return;
  }
  if (SYNC.role === 'admin' || SYNC.role === 'edit') {
    // Push local → cloud
    setSyncStatus('syncing', 'Đang lưu…');
    const ok = await syncPush();
    if (ok) toast('✓ Đã đồng bộ lên cloud');
  } else if (SYNC.role === 'view') {
    // Pull cloud → local (view only)
    await syncPullWithRole();
  } else {
    // Not logged in — open login
    openSyncPanel();
  }
}

let _syncHoldTimer = null;
function syncBtnHold(btn) {
  _syncHoldTimer = setTimeout(() => {
    _syncHoldTimer = null;
    openSyncPanel();
  }, 800);
}
function syncBtnRelease(btn) {
  if (_syncHoldTimer) {
    clearTimeout(_syncHoldTimer);
    _syncHoldTimer = null;
    // Short press = quickSync (already handled by onclick)
  }
}

/* ── Local backup: export data as JSON file ── */
function exportBackup() {
  const data = JSON.stringify(D, null, 2);
  const blob = new Blob([data], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'phoicanh_backup_' + new Date().toISOString().split('T')[0] + '.json';
  a.click();
  URL.revokeObjectURL(url);
  toast('✓ Đã tải backup về máy');
}

function importBackup(input) {
  const file = input.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.months || !data.settings) { alert('File backup không hợp lệ'); return; }
      if (!confirm('Khôi phục từ file backup? Dữ liệu hiện tại sẽ bị thay thế.')) return;

      toast('✓ Đã khôi phục từ backup thành công');
    } catch(err) { alert('Lỗi đọc file: ' + err.message); }
  };
  reader.readAsText(file);
}

async function confirmSyncSetup() {
  const apiKey = document.getElementById('su-apikey')?.value.trim();
  const binId  = document.getElementById('su-binid')?.value.trim();
  const adminPw = document.getElementById('su-admin-pw')?.value;
  const editPw  = document.getElementById('su-edit-pw')?.value;
  const viewPw  = document.getElementById('su-view-pw')?.value;

  if (!apiKey||!binId) { alert('Vui lòng điền Master Key và Bin ID'); return; }
  if (!adminPw||!editPw||!viewPw) { alert('Vui lòng đặt đủ 3 mật khẩu'); return; }

  // Save admin credentials locally
  SYNC.apiKey = apiKey;
  SYNC.binId  = binId;
  SYNC.role   = 'admin';

  // Store hashed passwords + binId in app data (shared)
  if (!D.settings.sync) D.settings.sync = {};
  D.settings.sync.adminHash = await hashPw(adminPw);
  D.settings.sync.editHash  = await hashPw(editPw);
  D.settings.sync.viewHash  = await hashPw(viewPw);
  D.settings.sync.editPw    = editPw;  // needed for encryption key (stored locally only via admin)
  D.settings.sync.binId     = binId;   // public — needed by all devices to find data

  // Store editPw and binId locally for encryption/pull
  localStorage.setItem('sync_edit_pw', editPw);
  localStorage.setItem('sync_bin_id_public', binId);

  save();
  setSyncStatus('syncing','Đang lưu…');
  closeModal();

  const ok = await syncPush();
  if (ok) {
    toast('✓ Đã thiết lập xong! Chia sẻ Bin ID + mật khẩu cho team');
    setSyncStatus('synced','✓ Admin');
    setTimeout(()=>showSyncStatus(), 800);
  } else {
    toast('✗ Lỗi kết nối — kiểm tra lại Master Key và Bin ID');
  }
}

async function syncDoLogin() {
  const binId = document.getElementById('li-binid')?.value.trim();
  const pw    = document.getElementById('li-pw')?.value;
  if (!binId) { toast('⚠ Vui lòng nhập Bin ID'); return; }
  if (!pw)    { toast('⚠ Vui lòng nhập mật khẩu'); return; }

  setSyncStatus('syncing','Đang xác thực…');
  closeModal();

  try {
    localStorage.setItem('sync_bin_id_public', binId);
    SYNC.binId = binId;

    const h = await hashPw(pw);
    const storedEditPw = localStorage.getItem('sync_edit_pw') || '';

    // ── Verify password & determine role ──
    // Priority: check LOCAL hashes first (fast, no network)
    // Then pull from cloud if needed (Edit/View on new device)
    const localSync = D.settings?.sync || {};
    let role = 'none';
    let pulled = null;

    // Check local hashes
    if (localSync.adminHash && h === localSync.adminHash) {
      role = 'admin';
    } else if (localSync.editHash && h === localSync.editHash) {
      role = 'edit';
    } else if (localSync.viewHash && h === localSync.viewHash) {
      role = 'view';
    } else {
      // Local check failed → try pulling from cloud to get latest hashes
      // Edit/View role: data encrypted with editPw, try pw as editPw first
      setSyncStatus('syncing', 'Đang kết nối…');
      try {
        pulled = await syncPull(pw); // works if pw == editPw (Edit role)
      } catch(e1) {
        if (storedEditPw && storedEditPw !== pw) {
          try { pulled = await syncPull(storedEditPw); } catch(e2) {}
        }
      }
      if (pulled) {
        const cloudSync = pulled.settings?.sync || {};
        if (cloudSync.adminHash && h === cloudSync.adminHash) role = 'admin';
        else if (cloudSync.editHash && h === cloudSync.editHash) role = 'edit';
        else if (cloudSync.viewHash && h === cloudSync.viewHash) role = 'view';
      }
    }

    if (role === 'none') {
      setSyncStatus('error', 'Sai mật khẩu');
      toast('✗ Sai mật khẩu — vui lòng kiểm tra lại');
      setTimeout(() => openSyncPanel(), 1500);
      return;
    }

    // ── Save session ──
    SYNC.role  = role;
    SYNC.binId = binId;

    // editPw storage:
    // - Admin: editPw was set at confirmSyncSetup → already in localStorage
    //   If not found (new device), admin must use "Tải dữ liệu" after login
    // - Edit: pw IS the editPw (data encrypted with editPw)
    // - View: uses storedEditPw for decryption
    if (role === 'edit') {
      localStorage.setItem('sync_edit_pw', pw);
    }
    // For admin: do NOT overwrite editPw with adminPw — they are different!
    // editPw should already be stored from setup. If missing, warn.
    if (role === 'admin' && !storedEditPw) {
      // Admin on new device — needs to re-enter editPw separately
      toast('⚠ Admin trên thiết bị mới — vui lòng dùng nút "Tải dữ liệu" sau khi nhập Edit Password');
    }

    // ── Load cloud data if pulled ──
    if (pulled) {
      D = pulled; save(); renderAll();
    }

    enableViewOnlyMode(role === 'view');

    SYNC.lastSync = new Date().toLocaleString('vi-VN');
    const roleLabels = {admin:'✓ Admin', edit:'✓ Edit', view:'👁 View'};
    setSyncStatus('synced', SYNC.autoOn && role === 'admin' ? '⚡ Auto' : roleLabels[role]);
    toast('✓ Đăng nhập thành công — quyền ' + role.toUpperCase() + (pulled ? ' (đã tải dữ liệu mới)' : ''));

  } catch(e) {
    setSyncStatus('error', 'Lỗi kết nối');
    const msg = e.message || '';
    if (msg.includes('no_bin_id'))         toast('✗ Bin ID không hợp lệ');
    else if (msg.includes('connect_http_401')) toast('✗ Master Key sai hoặc hết hạn');
    else if (msg.includes('connect_http_404')) toast('✗ Bin ID không tồn tại');
    else if (msg.includes('decrypt_fail'))     toast('✗ Sai mật khẩu — không giải mã được');
    else toast('✗ Lỗi: ' + msg);
    setTimeout(() => openSyncPanel(), 2000);
  }
}

async function syncPullWithRole() {
  const editPw = localStorage.getItem('sync_edit_pw') || '';
  if (!editPw) {
    toast('⚠ Phiên làm việc hết hạn — đăng nhập lại');
    openSyncPanel(); return;
  }
  setSyncStatus('syncing','Đang tải…');
  closeModal();
  try {
    const pulled = await syncPull(editPw);
    D = pulled; save(); renderAll();
    SYNC.lastSync = new Date().toLocaleString('vi-VN');
    setSyncStatus('synced', SYNC.autoOn&&SYNC.role==='admin'?'⚡ Auto':'✓ Đã tải');
    toast('✓ Dữ liệu đã được cập nhật');
  } catch(e) {
    setSyncStatus('error','Lỗi tải');
    const msg = e.message||'';
    if (msg.includes('decrypt_fail')) toast('✗ Không giải mã được — đăng nhập lại');
    else toast('✗ Lỗi tải: ' + msg);
  }
}

async function doSyncPush() {
  const role = SYNC.role;

  closeModal();

}

function syncLogout() {

/* VIEW-ONLY MODE: disable all inputs */
function enableViewOnlyMode(on) {
  const banner = document.getElementById('viewOnlyBanner');
  if (on) {
    if (!banner) {
      const b = document.createElement('div');
      b.id = 'viewOnlyBanner';
      b.style.cssText = 'position:fixed;bottom:0;left:0;right:0;background:#7F6000;color:#FFF2CC;text-align:center;padding:8px;font-size:12px;font-weight:600;z-index:500;letter-spacing:.04em';
      b.innerHTML = '👁 CHẾ ĐỘ CHỈ XEM — Mọi thay đổi sẽ không được lưu';
      document.body.appendChild(b);
    }
    // Intercept save to prevent writes
    window._viewOnlyMode = true;
    window._viewOnly = true;
  } else {
    if (banner) banner.remove();
    window._viewOnlyMode = false;
    window._viewOnly = false;
  }
}

function showSyncStatus() {
  // Show quick status after setup
  const role = SYNC.role;
  const binId = D.settings?.sync?.binId || SYNC.binId;
  toast(`✓ Thiết lập xong! Bin ID: ${binId.slice(0,8)}…`);

    setSyncStatus('synced', SYNC.autoOn ? '⚡ Auto' : '✓ Admin');

    setSyncStatus('synced', '✓ Edit');
  } else if (role === 'view') {
    setSyncStatus('synced', '👁 View');
    enableViewOnlyMode(true);
  }

// Auto-push on data change — hooks into every save() call
const _origSave = save;
function save() {
  if (window._viewOnlyMode) return; // block saves in view mode
  localStorage.setItem(SK, JSON.stringify(D));
  triggerAutoSync();
}
