<style>
:root {
  --navy:   #1F3864;
  --navy2:  #2E4A7A;
  --navy3:  #4472C4;
  --gold:   #FFC000;
  --gold2:  #FFD966;
  --orange: #ED7D31;
  --gray1:  #F2F2F2;
  --gray2:  #D9D9D9;
  --gray3:  #BFBFBF;
  --gray4:  #595959;
  --dark:   #1A1A1A;
  --new-bg: #E2EFDA; --new-tx: #375623;
  --rev-bg: #FFF2CC; --rev-tx: #7F6000;
  --r: 4px; --r2: 6px;
  /* theme aliases */
  --ex-navy:   var(--navy);
  --ex-navy2:  var(--navy2);
  --ex-navy3:  var(--navy3);
  --ex-gold:   var(--gold);
  --ex-gold2:  var(--gold2);
  --ex-orange: var(--orange);
  --ex-gray1:  var(--gray1);
  --ex-gray2:  var(--gray2);
  --ex-gray3:  var(--gray3);
  --ex-gray4:  var(--gray4);
  --ex-dark:   var(--dark);
  --new-bg:    #E2EFDA; --new-text: #375623;
  --rev-bg:    #FFF2CC; --rev-text: #7F6000;
  /* Tùy biến màu nền — có thể chỉnh trong Cài đặt */
  --app-bg:    #EAECF0;
  --card-bg:   #FFFFFF;
  --sidebar-bg:#F5F5F5;
  --table-bg:  #FFFFFF;
  --table-hover:#FFFBEE;
  --table-stripe:#F9F9F9;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Be Vietnam Pro','Noto Sans JP',sans-serif;font-size:13px;background:var(--app-bg);color:var(--dark);min-height:100vh}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:var(--gray3);border-radius:3px}

/* HEADER */
.header{
  background:var(--navy);height:60px;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;position:sticky;top:0;z-index:300;
  border-bottom:3px solid var(--gold);box-shadow:0 2px 12px rgba(0,0,0,.3);
  gap:12px;
}
.hdr-logo{display:flex;align-items:center;flex-shrink:0}
.hdr-logo img{height:46px;width:auto;object-fit:contain;filter:brightness(0) invert(1);display:block}
.hdr-nav{display:flex;gap:3px;flex-shrink:0}
.nav-btn{padding:6px 12px;border-radius:var(--r);border:1px solid rgba(255,255,255,.2);background:transparent;color:rgba(255,255,255,.75);font-size:12px;font-family:inherit;cursor:pointer;transition:all .15s;white-space:nowrap}
.nav-btn:hover{color:#fff;background:rgba(255,255,255,.1)}
.nav-btn.active{background:var(--gold);color:var(--navy);border-color:var(--gold);font-weight:600}
.hdr-right{display:flex;gap:6px;align-items:center;flex-shrink:0}

/* MONTH STRIP */
.month-strip{background:var(--navy2);display:flex;align-items:stretch;padding:0 14px;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid rgba(255,255,255,.1)}
.month-strip::-webkit-scrollbar{display:none}
.mtab{padding:8px 16px;font-size:12px;font-weight:500;color:rgba(255,255,255,.5);cursor:pointer;border:none;border-bottom:2px solid transparent;margin-bottom:-1px;background:none;font-family:inherit;transition:all .15s;white-space:nowrap}
.mtab:hover{color:rgba(255,255,255,.85)}
.mtab.active{color:var(--gold);border-bottom-color:var(--gold)}
.mtab-add{color:var(--gold2);font-size:20px;padding:2px 14px;line-height:1}

/* LAYOUT */
#pageMain{display:flex;height:calc(100vh - 93px)}
#pageDashboard,#pageStaff,#pageSettings{display:none;padding:18px 22px;overflow-y:auto;height:calc(100vh - 93px)}

/* SIDEBAR */
.sidebar{width:220px;min-width:200px;background:var(--sidebar-bg);border-right:1px solid var(--gray2);display:flex;flex-direction:column;flex-shrink:0;height:100%;overflow:hidden}
.sidebar-hd{padding:9px 12px;background:var(--navy);color:#fff;font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid var(--gold);flex-shrink:0}
.sidebar-hd span{background:var(--gold);color:var(--navy);border-radius:99px;padding:1px 7px;font-size:10px}
.pj-list{flex:1;overflow-y:auto;overflow-x:hidden;padding:8px 7px;display:flex;flex-direction:column;gap:6px;min-height:0;scroll-behavior:smooth}
/* Project card in sidebar */
.pj-card{background:var(--card-bg);border-radius:8px;border:2px solid transparent;cursor:pointer;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.08);transition:border-color .15s,box-shadow .15s,transform .15s;flex-shrink:0;width:100%}
.pj-card:hover{border-color:var(--gold2);box-shadow:0 3px 10px rgba(0,0,0,.13);transform:translateY(-1px)}
.pj-card.active{border-color:var(--gold);box-shadow:0 3px 12px rgba(255,192,0,.3)}
.pj-thumb{width:100%;aspect-ratio:16/9;background:linear-gradient(135deg,var(--navy) 0%,var(--navy2) 100%);overflow:hidden;position:relative;flex-shrink:0;display:block}
.pj-thumb img{width:100%;height:100%;object-fit:cover;display:block;flex-shrink:0}
.pj-thumb-ph{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;color:rgba(255,255,255,.25);font-size:24px}
.pj-thumb-num{position:absolute;top:5px;left:5px;background:var(--gold);color:var(--navy);font-size:10px;font-weight:800;border-radius:4px;padding:1px 5px;line-height:1.4}
.pj-card-body{padding:7px 9px 8px;flex-shrink:0}
.pj-card-name{font-weight:700;font-size:11px;line-height:1.4;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;color:var(--dark);margin-bottom:4px;word-break:break-word}
.pj-card-name-jp{font-size:9px;color:var(--gray4);overflow:hidden;white-space:nowrap;text-overflow:ellipsis;margin-bottom:4px}
.pj-card-sub{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:3px}
.sidebar-ft{padding:7px 8px;border-top:1px solid var(--gray2);background:var(--app-bg);flex-shrink:0}

/* CONTENT */
.content{flex:1;overflow-y:auto;background:#EAECF0}
.content-inner{padding:14px 18px}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:4px;padding:6px 12px;border-radius:var(--r);border:1px solid var(--gray2);background:#fff;color:var(--dark);font-family:inherit;font-size:12px;cursor:pointer;transition:all .12s;white-space:nowrap;line-height:1.4}
.btn:hover{background:var(--gray1)}
.btn-primary{background:var(--navy);color:#fff;border-color:var(--navy)}
.btn-primary:hover{background:var(--navy2)}
.btn-gold{background:var(--gold);color:var(--navy);border-color:var(--gold);font-weight:600}
.btn-gold:hover{background:var(--gold2)}
.btn-sm{padding:4px 10px;font-size:11px}
.btn-xs{padding:2px 7px;font-size:10px}
.btn-danger{color:#c00}
.btn-danger:hover{background:#fff0f0;border-color:#fcc}
.btn-ghost{background:transparent;border-color:transparent}
.btn-ghost:hover{background:var(--gray1);border-color:var(--gray2)}
.btn-full{width:100%;justify-content:center}
.btn-new{background:var(--new-bg);color:var(--new-tx);border-color:#a9d18e}
.btn-new:hover{background:#d0e9c4}
.btn-rev{background:var(--rev-bg);color:var(--rev-tx);border-color:#ffd966}
.btn-rev:hover{background:#ffe59a}

/* BADGES */
.badge{display:inline-flex;align-items:center;padding:1px 7px;border-radius:99px;font-size:10px;font-weight:600;white-space:nowrap}
.b-osaka{background:#dbeafe;color:#1d4ed8}
.b-tokyo{background:#fce7f3;color:#9d174d}
.b-hanoi{background:#dcfce7;color:#15803d}
.b-hcm{background:#fef9c3;color:#854d0e}
.chip{display:inline-flex;align-items:center;padding:2px 8px;border-radius:99px;font-size:10px;font-weight:600}
.chip-new{background:var(--new-bg);color:var(--new-tx)}
.chip-gold{background:var(--rev-bg);color:var(--rev-tx)}
.chip-navy{background:var(--navy);color:#fff}

/* SYNC STATUS */
.sync-btn{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:99px;font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;border:1px solid rgba(255,255,255,.25);color:rgba(255,255,255,.8);background:transparent;font-family:inherit}
.sync-btn:hover{background:rgba(255,255,255,.1)}
.sync-btn .dot{width:7px;height:7px;border-radius:50%;background:#888;flex-shrink:0}
.sync-btn.synced .dot{background:#4ade80;box-shadow:0 0 5px #4ade80}
.sync-btn.error .dot{background:#f87171}
.sync-btn.syncing .dot{background:var(--gold);animation:pulse .8s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* CARD */
.card{background:var(--card-bg);border:1px solid var(--gray2);border-radius:var(--r2);margin-bottom:12px;overflow:hidden}
.card-hd{background:var(--navy);color:#fff;padding:9px 14px;font-size:12px;font-weight:600;display:flex;align-items:center;justify-content:space-between;gap:8px;border-bottom:2px solid var(--gold)}
.card-hd-title{display:flex;align-items:center;gap:7px}
.card-body{padding:12px 14px}

/* HERO STATS */
.hero-row{display:grid;gap:10px;margin-bottom:12px}
.hero-box{background:var(--card-bg);border:1px solid var(--gray2);border-radius:var(--r2);padding:13px 15px;border-top:4px solid var(--gray3)}
.hero-box.green{border-top-color:#70AD47;background:#70AD47;border-color:#5a9a35;color:#fff}
.hero-box.gold{border-top-color:var(--gold);background:var(--gold);border-color:#d4a000;color:#fff}
.hero-box.navy{border-top-color:var(--navy);background:var(--navy);color:#fff}
.hero-box.orange{border-top-color:var(--orange)}
.hero-num{font-size:36px;font-weight:700;line-height:1}
.hero-box.green .hero-num{color:#fff}
.hero-box.gold .hero-num{color:#fff}
.hero-box.navy .hero-num{color:var(--gold)}
.hero-lbl{font-size:11px;margin-top:3px;text-transform:uppercase;letter-spacing:.05em;font-weight:500}
.hero-box.green .hero-lbl{color:rgba(255,255,255,.85)}
.hero-box.gold .hero-lbl{color:rgba(255,255,255,.85)}
.hero-box.navy .hero-lbl{color:rgba(255,255,255,.6)}
.hero-jp{font-size:10px;color:var(--gray3);margin-top:1px}
.progress-track{height:5px;background:var(--gray2);border-radius:3px;overflow:hidden;margin-top:8px}
.progress-fill{height:100%;border-radius:3px;transition:width .4s}
.progress-fill.green{background:rgba(255,255,255,.7)}
.progress-fill.gold{background:rgba(255,255,255,.7)}
.progress-label{font-size:10px;color:rgba(255,255,255,.8);margin-top:3px;display:flex;justify-content:space-between}
/* Target box */
.target-box{background:var(--navy);color:#fff;border-radius:var(--r2);padding:13px 15px;display:flex;flex-direction:column;gap:6px;min-width:200px}
.target-box .tgt-title{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--gold2);font-weight:600}
.target-row{display:flex;align-items:center;justify-content:space-between;gap:8px}
.target-row label{font-size:11px;color:rgba(255,255,255,.7)}
.target-input{width:64px;padding:4px 7px;text-align:center;border:1px solid rgba(255,255,255,.3);border-radius:var(--r);background:rgba(255,255,255,.1);color:#fff;font-family:inherit;font-size:14px;font-weight:700}
.target-input:focus{outline:none;border-color:var(--gold)}

/* RENDER TABLE — hàng ngang */
.rtbl{width:100%;border-collapse:collapse;font-size:12px}
.rtbl thead th{background:var(--navy);color:#fff;padding:7px 9px;text-align:left;font-size:10px;letter-spacing:.06em;text-transform:uppercase;white-space:nowrap;border-right:1px solid rgba(255,255,255,.1)}
.rtbl tbody td{padding:6px 8px;border-bottom:1px solid var(--gray1);vertical-align:middle;border-right:1px solid #f5f5f5}
.rtbl tbody tr:hover td{background:var(--table-hover)}
.rtbl tfoot td{font-weight:700;background:var(--rev-bg)!important;border-top:2px solid var(--navy);padding:7px 9px}
/* Group header row */
.grp-hd td{background:var(--navy2)!important;color:#fff;padding:6px 9px;font-weight:600;font-size:11px}
/* Row bg by status */
.row-new td{background:#f8fff5}
.row-rev td{background:#fffdf0}

/* Inline inputs in table */
.tbl-input{width:100%;padding:4px 7px;border:1px solid var(--gray2);border-radius:var(--r);font-family:inherit;font-size:12px;background:var(--table-bg)}
.tbl-input:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 2px rgba(255,192,0,.15)}
.tbl-input-dark{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);border-radius:var(--r);padding:4px 8px;color:#fff;font-family:inherit;font-size:12px;font-weight:600;width:100%;min-width:0}
.tbl-input-dark:focus{outline:none;border-color:var(--gold)}
.qty-inp{width:54px;padding:4px 5px;text-align:center;border:1px solid var(--gray2);border-radius:var(--r);font-family:inherit;font-size:13px;font-weight:700;background:var(--table-bg)}
.qty-inp:focus{outline:none;border-color:var(--gold)}
.sel-sm{padding:4px 8px;border:1px solid var(--gray2);border-radius:var(--r);font-family:inherit;font-size:12px;background:#fff;cursor:pointer;width:100%}
.sel-sm:focus{outline:none;border-color:var(--gold)}
/* Status toggle */
.st-toggle{display:inline-flex;border:1px solid var(--gray2);border-radius:var(--r);overflow:hidden}
.st-opt{padding:3px 9px;font-size:11px;font-weight:600;cursor:pointer;border:none;background:#fff;font-family:inherit;transition:all .1s;color:var(--gray3)}
.st-opt.new.on{background:var(--new-bg);color:var(--new-tx)}
.st-opt.rev.on{background:var(--rev-bg);color:var(--rev-tx)}

/* INFO GRID */
.info-grid{display:grid;gap:10px}
.info-grid.c2{grid-template-columns:1fr 1fr}
.info-grid.c3{grid-template-columns:1fr 1fr 1fr}
.info-grid.c4{grid-template-columns:1fr 1fr 1fr 1fr}
.field{display:flex;flex-direction:column;gap:3px}
.field label{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--gray4);font-weight:600}
.field input,.field select,.field textarea{padding:6px 9px;border:1px solid var(--gray2);border-radius:var(--r);font-family:inherit;font-size:12px;background:#fff;transition:border-color .12s}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 2px rgba(255,192,0,.15)}
.field textarea{resize:vertical;min-height:64px}

/* PHOTOS */
.photos-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px}
.photo-slot{aspect-ratio:4/3;border:2px dashed var(--gray2);border-radius:var(--r2);overflow:hidden;position:relative;cursor:pointer;background:var(--gray1);display:flex;flex-direction:column;align-items:center;justify-content:center;transition:border-color .12s}
.photo-slot:hover{border-color:var(--gold)}
.photo-slot.filled{border-style:solid;border-color:var(--gray2)}
.photo-slot img{width:100%;height:100%;object-fit:cover}
.photo-slot .ph-ico{font-size:20px;color:var(--gray3)}
.photo-slot .ph-txt{font-size:10px;color:var(--gray3);margin-top:3px}
.photo-slot .ph-del{position:absolute;top:3px;right:3px;background:rgba(0,0,0,.6);color:#fff;border:none;border-radius:50%;width:20px;height:20px;font-size:12px;cursor:pointer;display:none;align-items:center;justify-content:center;z-index:2}
.photo-slot:hover .ph-del{display:flex}
.photo-slot input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;z-index:1}

/* STAFF PERF BARS */
.perf-bar{margin-bottom:4px}
.perf-bar-row{display:flex;justify-content:space-between;font-size:11px;margin-bottom:2px}
.perf-bar-track{height:4px;background:rgba(255,255,255,.15);border-radius:2px;display:flex;overflow:hidden}
.perf-bar-new{background:#70AD47;border-radius:2px}
.perf-bar-rev{background:var(--gold);border-radius:2px}

/* MONTH SUMMARY TABLE */
.sum-tbl{width:100%;border-collapse:collapse;font-size:12px}
.sum-tbl th{background:var(--navy);color:#fff;padding:7px 9px;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.06em}
.sum-tbl td{padding:8px 9px;border-bottom:1px solid var(--gray1);background:var(--table-bg)}
.sum-tbl tr:hover td{background:var(--table-hover);cursor:pointer}
.sum-tbl .tr-total td{font-weight:700;background:var(--rev-bg)!important;border-top:2px solid var(--navy)}
.num-c{text-align:center;font-weight:600}

/* PERF TABLE */
.perf-tbl{width:100%;border-collapse:collapse;font-size:12px}
.perf-tbl th{background:var(--navy);color:#fff;padding:7px 10px;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.06em}
.perf-tbl td{padding:8px 10px;border-bottom:1px solid var(--gray1);background:var(--table-bg)}
.perf-tbl tr:hover td{background:var(--table-hover)}
.perf-tbl .total-row td{font-weight:700;background:var(--gray1)!important;border-top:2px solid var(--navy)}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;z-index:999}
.modal{background:var(--card-bg);border-radius:var(--r2);padding:22px 26px;max-width:560px;width:92%;box-shadow:0 24px 64px rgba(0,0,0,.25);max-height:90vh;overflow-y:auto}
.modal h3{font-size:15px;font-weight:700;margin-bottom:16px;color:var(--navy);border-left:3px solid var(--gold);padding-left:10px}
.modal-ft{display:flex;justify-content:flex-end;gap:8px;margin-top:18px;flex-wrap:wrap}

/* TOAST */
.toast{position:fixed;bottom:22px;right:22px;background:var(--navy);color:#fff;padding:10px 18px;border-radius:var(--r2);font-size:12px;border-left:4px solid var(--gold);z-index:9999;box-shadow:0 8px 24px rgba(0,0,0,.2);animation:tsin .2s ease}
@keyframes tsin{from{transform:translateY(8px);opacity:0}to{transform:translateY(0);opacity:1}}

/* NOTE TEXTAREA */
.note-ta{width:100%;padding:9px 11px;border:1px solid var(--gray2);border-radius:var(--r);font-family:inherit;font-size:12px;resize:vertical;min-height:72px;background:#FFFDF5}
.note-ta:focus{outline:none;border-color:var(--gold)}

/* REPORT OVERLAY */
.rpt-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:2000;display:flex;align-items:center;justify-content:center}
.rpt-container{background:#fff;width:860px;max-width:96vw;max-height:92vh;border-radius:8px;display:flex;flex-direction:column;box-shadow:0 24px 80px rgba(0,0,0,.4);overflow:hidden}
.rpt-header{background:var(--navy);color:#fff;padding:12px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:3px solid var(--gold);flex-shrink:0}
.rpt-header h2{font-size:14px;font-weight:700;display:flex;align-items:center;gap:8px}
.rpt-actions{display:flex;gap:8px}
.rpt-body{flex:1;overflow-y:auto}

/* VIEW ONLY BANNER */
#viewBanner{position:fixed;bottom:0;left:0;right:0;background:#7F6000;color:#FFF2CC;text-align:center;padding:7px;font-size:12px;font-weight:600;z-index:500;letter-spacing:.04em}

/* REPORT DOC STYLES */
.report-doc{padding:36px 44px;font-family:'Be Vietnam Pro','Noto Sans JP',sans-serif;font-size:12px;color:#1a1a1a;background:var(--table-bg)}
.report-doc .doc-hd{display:flex;justify-content:space-between;align-items:flex-start;padding-bottom:14px;border-bottom:2px solid #1F3864;margin-bottom:20px}
.report-doc .doc-logo{display:flex;align-items:center;gap:11px}
.report-doc .doc-logo-mark{width:40px;height:40px;background:#1F3864;border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;color:#FFC000}
.report-doc .doc-title-main{font-size:17px;font-weight:700;color:#1F3864;line-height:1.2}
.report-doc .doc-title-sub{font-size:11px;color:#595959;margin-top:2px}
.report-doc .doc-meta{text-align:right;font-size:11px;color:#595959;line-height:1.9}
.report-doc .doc-meta strong{color:#1F3864}
.report-doc .sec-title{font-size:13px;font-weight:700;color:#1F3864;border-left:4px solid #FFC000;padding-left:9px;margin:20px 0 10px}
.report-doc .kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:11px;margin-bottom:20px}
.report-doc .kpi-box{border:1px solid #D9D9D9;border-radius:6px;padding:12px;border-top:3px solid #1F3864;text-align:center}
.report-doc .kpi-num{font-size:28px;font-weight:700;color:#1F3864;line-height:1}
.report-doc .kpi-box.gold{border-top-color:#FFC000}.report-doc .kpi-box.gold .kpi-num{color:#7F6000}
.report-doc .kpi-box.green{border-top-color:#70AD47}.report-doc .kpi-box.green .kpi-num{color:#375623}
.report-doc .kpi-box.orange{border-top-color:#ED7D31}.report-doc .kpi-box.orange .kpi-num{color:#7F3500}
.report-doc .kpi-lbl{font-size:10px;color:#595959;margin-top:4px;text-transform:uppercase;letter-spacing:.05em}
.report-doc table{width:100%;border-collapse:collapse;font-size:11px;margin-bottom:14px}
.report-doc table th{background:#1F3864;color:#fff;padding:7px 9px;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.06em}
.report-doc table td{padding:7px 9px;border-bottom:1px solid #F2F2F2}
.report-doc table tr:nth-child(even) td{background:var(--table-stripe)}
.report-doc table tfoot td{font-weight:700;background:#FFF2CC!important;border-top:2px solid #1F3864}
.report-doc .c-new{color:#375623;font-weight:600;text-align:center}
.report-doc .c-rev{color:#7F6000;font-weight:600;text-align:center}
.report-doc .c-tot{font-weight:700;text-align:center}
.report-doc .c-ot{color:#C55A11;font-weight:600;text-align:center}
.report-doc .b-osaka{background:#dbeafe;color:#1d4ed8;padding:1px 7px;border-radius:99px;font-size:10px;font-weight:600}
.report-doc .b-tokyo{background:#fce7f3;color:#9d174d;padding:1px 7px;border-radius:99px;font-size:10px;font-weight:600}
.report-doc .b-hanoi{background:#dcfce7;color:#15803d;padding:1px 7px;border-radius:99px;font-size:10px;font-weight:600}
.report-doc .b-hcm{background:#fef9c3;color:#854d0e;padding:1px 7px;border-radius:99px;font-size:10px;font-weight:600}
.report-doc .pj-block{margin-bottom:16px;border:1px solid #E8E8E8;border-radius:6px;overflow:hidden}
.report-doc .pj-block-hd{background:#EEF3FB;padding:8px 13px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #D9D9D9}
.report-doc .pj-block-hd .pj-name{font-weight:700;font-size:12px;color:#1F3864}
.report-doc .pj-block-hd .pj-chips{display:flex;gap:5px;align-items:center}
.report-doc .pj-block-hd .chip-new{background:#E2EFDA;color:#375623;padding:2px 7px;border-radius:99px;font-size:10px;font-weight:600}
.report-doc .pj-block-hd .chip-rev{background:#FFF2CC;color:#7F6000;padding:2px 7px;border-radius:99px;font-size:10px;font-weight:600}
.report-doc .pj-block-hd .chip-tot{background:#1F3864;color:#fff;padding:2px 7px;border-radius:99px;font-size:10px;font-weight:600}
.report-doc .ot-staff-block{margin-bottom:18px}
.report-doc .ot-staff-hd{background:#1F3864;color:#fff;padding:8px 13px;border-radius:6px 6px 0 0;display:flex;justify-content:space-between;align-items:center}
.report-doc .ot-staff-hd .sname{font-size:13px;font-weight:700}
.report-doc .ot-staff-hd .stotal{color:#FFC000;font-size:13px;font-weight:700}
.report-doc .doc-footer{margin-top:32px;padding-top:11px;border-top:1px solid #D9D9D9;display:flex;justify-content:space-between;font-size:10px;color:#BFBFBF}
.report-doc .sign-section{display:grid;grid-template-columns:1fr 1fr;gap:36px;margin-top:26px}
.report-doc .sign-box{border-top:1px solid #595959;padding-top:9px;text-align:center;font-size:11px;color:#595959}

/* THEME PICKERS */
.color-picker-row{display:flex;align-items:center;gap:9px;margin-bottom:10px}
.color-picker-row label{font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--gray4);font-weight:600;min-width:170px}
.color-picker-row input[type=color]{width:38px;height:30px;padding:2px;border:1px solid var(--gray2);border-radius:var(--r);cursor:pointer;background:var(--table-bg)}
.theme-swatch{width:24px;height:24px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all .15s;flex-shrink:0}
.theme-swatch.active{border-color:#fff;box-shadow:0 0 0 2px var(--navy)}

/* SETTINGS TAGS */
.tag-cloud{display:flex;flex-wrap:wrap;gap:6px}
.tag-edit{display:inline-flex;align-items:center;gap:4px;background:var(--gray1);border:1px solid var(--gray2);border-radius:99px;padding:3px 10px}
.tag-edit input{border:none;background:transparent;font-family:inherit;font-size:11px;outline:none}
.tag-del{cursor:pointer;color:var(--gray3);font-size:14px;line-height:1}
.tag-del:hover{color:#c00}

/* OT LOG ENTRY */
.ot-entry{display:flex;align-items:center;gap:7px;padding:5px 0;border-bottom:1px solid var(--gray1);font-size:12px}
.ot-entry:last-child{border-bottom:none}

/* DASHBOARD */
.dash-grid{display:grid;gap:12px}
.dash-grid.c2{grid-template-columns:1fr 1fr}
.dash-grid.c3{grid-template-columns:1fr 1fr 1fr}
.chart-box{background:#fff;border:1px solid var(--gray2);border-radius:var(--r2);padding:14px}
.chart-box h4{font-size:12px;font-weight:600;color:var(--navy);margin-bottom:10px;text-transform:uppercase;letter-spacing:.06em;border-left:3px solid var(--gold);padding-left:7px}

/* ══════════ SPLASH SCREEN ══════════ */
#splashScreen {
  position: fixed; inset: 0; z-index: 9999;
  background: #fff;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 44px;
  transition: opacity .7s ease;
}
#splashScreen.fade-out { opacity: 0; pointer-events: none; }

.splash-logo-area {
  display: flex; flex-direction: column;
  align-items: center; gap: 14px;
}

/* ── Logo image animation ──
   Inspired by gs-archi.com:
   The 4 pillars feel like they "build up" from the bottom, 
   then the text materialises.
   We clip the image using a reveal mask that sweeps upward,
   then the whole logo gently settles.
*/
.splash-logo-img {
  width: min(520px, 85vw);
  height: auto;
  display: block;
  /* Step 1: clip reveal from bottom  */
  clip-path: inset(100% 0 0 0);
  opacity: 0;
  animation:
    logoReveal   1.1s cubic-bezier(.16,1,.3,1)   .1s  forwards,
    logoSettle   .6s  cubic-bezier(.34,1.56,.64,1) 1.0s forwards;
  will-change: clip-path, transform, opacity;
}
@keyframes logoReveal {
  0%  { clip-path: inset(100% 0 0 0); opacity: 0; }
  20% { opacity: 1; }
  100%{ clip-path: inset(0%   0 0 0); opacity: 1; }
}
/* slight float up after reveal */
@keyframes logoSettle {
  0%  { transform: translateY(0); }
  50% { transform: translateY(-6px); }
  100%{ transform: translateY(0); }
}

/* "Design Studio" tagline */
.splash-studio {
  font-family: 'Be Vietnam Pro', 'Helvetica Neue', sans-serif;
  /* Width matches logo exactly; letter-spacing auto-fits text within */
  width: min(520px, 85vw);
  text-align: center;
  /* Fit text inside logo width via letter-spacing */
  font-size: clamp(9px, 1.6vw, 12px);
  font-weight: 300;
  letter-spacing: .55em;
  padding-left: .55em; /* optical centering for letter-spacing */
  color: #bbb;
  text-transform: uppercase;
  white-space: nowrap;
  overflow: hidden;
  opacity: 0;
  /* Step 1: fade+slide in, then switch to blink loop */
  animation:
    studioFade   .9s ease 1.3s forwards,
    studioBlink  2.4s ease-in-out 2.4s infinite;
}
@keyframes studioFade {
  from { opacity:0; transform: translateY(8px); }
  to   { opacity:1; transform: translateY(0); }
}
@keyframes studioBlink {
  0%,100% { opacity:1; }
  50%     { opacity:.25; }
}

/* Password */
.splash-pw-wrap {
  display: flex; flex-direction: column; align-items: center; gap: 8px;
  opacity: 0;
  animation: studioFade .8s ease 1.5s forwards;
}
.splash-pw-box {
  display: flex; align-items: center;
  border: 1px solid #e0e0e0; border-radius: 99px;
  padding: 0 8px 0 22px; gap: 6px;
  background: #fafafa;
  transition: border-color .2s, box-shadow .2s;
  width: min(300px, 75vw);
}
.splash-pw-box:focus-within {
  border-color: #aaa;
  box-shadow: 0 0 0 3px rgba(0,0,0,.05);
}
#splashPwInput {
  flex:1; border:none; outline:none; background:transparent;
  font-family: 'Be Vietnam Pro', sans-serif;
  font-size: 15px; letter-spacing: .12em;
  padding: 12px 0; color: #333;
}
.splash-pw-icon-btn {
  background: none; border: none; cursor: pointer;
  padding: 7px 8px 4px; display:flex; align-items:center;
  opacity: .65; transition: opacity .2s, transform .15s;
  flex-shrink: 0;
}
.splash-pw-icon-btn:hover { opacity: 1; }
.splash-pw-icon-btn:active { transform: scale(.93); }
.splash-error {
  font-size: 11px; color: #e74c3c; min-height: 16px;
  font-family: 'Be Vietnam Pro', sans-serif; letter-spacing: .04em;
}
.splash-error.shake { animation: shake .35s ease; }
@keyframes shake {
  0%,100%{ transform:translateX(0) }
  25%{ transform:translateX(-7px) }
  75%{ transform:translateX(7px) }
}

/* ══════════ RESPONSIVE MOBILE / IPAD ══════════ */
@media (max-width: 768px) {
  .header { padding: 0 10px; height: auto; min-height: 50px; flex-wrap: wrap; gap: 6px; }
  .hdr-logo img { height: 28px; }
  .hdr-nav { gap: 4px; flex-wrap: wrap; justify-content: center; }
  .nav-btn { font-size: 10px; padding: 5px 10px; }
  #navMainGroup button { font-size: 10px; padding: 5px 8px; }
  .hdr-right { gap: 4px; }
  .hdr-right .btn { font-size: 10px; padding: 4px 8px; }
  .sync-btn { font-size: 10px; }

  #pageMain { flex-direction: column; height: auto; }
  .sidebar {
    width: 100% !important; height: auto;
    flex-direction: row; flex-wrap: nowrap;
    overflow-x: auto; overflow-y: visible;
    min-height: unset;
    border-right: none; border-bottom: 1px solid var(--gray2);
    padding-bottom: 6px;
  }
  .sidebar-hd { display: none; }
  .pj-list {
    display: flex; flex-direction: row; gap: 8px;
    padding: 8px; overflow-x: auto; flex-shrink: 0;
    min-height: unset; max-height: unset;
  }
  .pj-card { min-width: 140px; max-width: 160px; }
  .pj-thumb { height: 80px; }
  .sidebar-ft { flex-shrink: 0; padding: 8px; display: flex; align-items: flex-start; }
  .sidebar-ft .btn-full { width: auto; white-space: nowrap; }
  #storageBar { display: none; }

  .content { overflow-y: auto; -webkit-overflow-scrolling: touch; }
  .hero-row { grid-template-columns: 1fr 1fr !important; gap: 8px; }
  .hero-row > *:nth-child(3) { grid-column: 1/-1; }
  .hero-row > *:nth-child(4) { grid-column: 1/-1; }
  .target-box { min-width: unset !important; }

  .rtbl, .sum-tbl, .perf-tbl { font-size: 11px; }
  .rtbl th, .rtbl td { padding: 4px 3px; }

  #dashContent .dash-grid { grid-template-columns: 1fr !important; }

  .staff-grid { grid-template-columns: 1fr !important; }

  .card { border-radius: 6px; }
  .card-hd { padding: 8px 10px; font-size: 11px; }

  .month-strip { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .mtab { font-size: 10px; padding: 6px 10px; }
}

@media (max-width: 480px) {
  body { font-size: 12px; }
  .hero-num { font-size: 26px !important; }
  .hero-row { grid-template-columns: 1fr 1fr !important; }
  .nav-btn { font-size: 9px; padding: 4px 7px; }
  .pj-card { min-width: 120px; }
}

@media (min-width: 768px) and (max-width: 1100px) {
  /* iPad landscape */
  .sidebar { width: 180px; }
  .hero-row { grid-template-columns: 1fr 1fr 1fr auto !important; }
  #dashContent .dash-grid.c3 { grid-template-columns: 1fr 1fr !important; }
}

/* ── persistD: save to localStorage AND sessionStorage (file:// fallback) ── */
function persistD() {
  if (window._viewOnly || window._viewOnlyMode) return;
  // Auto-backup: lưu timestamp lần backup cuối
  try {
    const now = Date.now();
    const lastBackup = +localStorage.getItem('last_auto_backup') || 0;
    const totalPjs = Object.values(D.months||{}).reduce((s,m)=>s+(m.projects||[]).length+(m.projectsVN||[]).length, 0);
    // Backup mỗi 30 phút nếu có dữ liệu
    if (totalPjs > 0 && now - lastBackup > 30 * 60 * 1000) {
      localStorage.setItem('last_auto_backup', now);
      localStorage.setItem('phoicanh_backup_' + new Date().toISOString().slice(0,10), JSON.stringify(D));
      // Giữ tối đa 7 bản backup
      const keys = Object.keys(localStorage).filter(k=>k.startsWith('phoicanh_backup_')).sort();
      if (keys.length > 7) keys.slice(0, keys.length-7).forEach(k=>localStorage.removeItem(k));
    }
  } catch(e) {}
  // Ensure contractEnd in all profiles
  if (D.settings && D.settings.staffProfiles) {
    Object.values(D.settings.staffProfiles).forEach(p => {
      if (p.contractEnd === undefined) p.contractEnd = '';
    });
  }
  // Migrate: init new lists nếu chưa có (data cũ)
  if (!D.settings.contactListVN) D.settings.contactListVN = ['HAN X.グエン','HAN ソン','Management トゥアン','SGN ニャー'];
  if (!D.settings.typeListVN) D.settings.typeListVN = [];
  const json = JSON.stringify(D);
  // Check storage level after every save (throttled 30s)
  const now30 = Date.now();
  if (!persistD._lastCheck || now30 - persistD._lastCheck > 30000) {
    persistD._lastCheck = now30;
    setTimeout(checkStorageAndWarn, 500);
  }

  try {
    localStorage.setItem(SK, json);
  } catch(e) {
    if (e.name === 'QuotaExceededError' || e.code === 22) {
      // Storage full — warn user and suggest cleanup
      const kb = Math.round(json.length * 0.75 / 1024);
      console.warn('localStorage full:', kb + 'KB');
      // Try saving without photos to preserve data structure
      try {
        const noPhoto = JSON.parse(json);
        let freed = 0;
        Object.values(noPhoto.months||{}).forEach(m=>{
          [...(m.projects||[]),...(m.projectsVN||[])].forEach(p=>{
            if (p.photos?.length) { freed += p.photos.join('').length; p.photos = []; }
          });
        });
        localStorage.setItem(SK, JSON.stringify(noPhoto));
        const freedKB = Math.round(freed * 0.75 / 1024);
        toast(`⚠ Bộ nhớ đầy! Đã tạm xóa ảnh (${freedKB}KB) để lưu dữ liệu. Vào Cài đặt → Dọn dẹp ảnh để quản lý.`, 6000);
      } catch(e2) {
        toast('🚨 Bộ nhớ đầy hoàn toàn! Vào Cài đặt → Dọn dẹp ảnh ngay.', 8000);
      }
    }
  }
  try { sessionStorage.setItem(SK+'_backup', json); } catch(e) {}
  // Local auto-backup (silent)
  try {
    const totalPjs = Object.values(D.months||{}).reduce((s,m)=>s+(m.projects||[]).length+(m.projectsVN||[]).length,0);
    if (totalPjs > 0) {
      const dateKey = new Date().toISOString().slice(0,10);
      const lastBk = localStorage.getItem('phoicanh_bk_date');
      if (lastBk !== dateKey) {
        localStorage.setItem('phoicanh_backup_' + dateKey, json);
        localStorage.setItem('phoicanh_bk_date', dateKey);
        const keys = Object.keys(localStorage).filter(k=>k.startsWith('phoicanh_backup_')).sort();
        if (keys.length > 7) keys.slice(0,keys.length-7).forEach(k=>localStorage.removeItem(k));
      }
    }
  } catch(e) {}
  triggerAutoSync();
}

// save() - primary implementation (sync section has identical override)
function save() { persistD(); }

let activePjId = null;
let activePage = 'main';
let activeSection = 'jp'; // 'jp' | 'vn'

function gid() { return Date.now().toString(36)+Math.random().toString(36).slice(2,5); }
function x(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function toast(msg, dur=2800) {
  const t = document.getElementById('toastEl');
  t.textContent = msg; t.style.display='block';
  clearTimeout(t._t); t._t = setTimeout(()=>t.style.display='none', dur);

function setSyncStatus(state, label) {

function monthLabel(mid) {
  const [y,m]=mid.split('-');
  return `T${parseInt(m)}/${y}`;
}

function curMonth() { return D.months[D.activeMonth]||{projects:[],projectsVN:[],targetNew:0,targetRev:0}; }
function curProjects() {
  const m = curMonth();
  return activeSection==='vn' ? (m.projectsVN||[]) : (m.projects||[]);
}
function allCurProjects() {  // used by gantt/stats that need BOTH sections
  const m = curMonth();
  return [...(m.projects||[]), ...(m.projectsVN||[])];
}
function getPj(id) {
  // Search current section first, then the other (important for cross-section rating save)
  const m = curMonth();
  return (m.projects||[]).find(p=>p.id===id)
      || (m.projectsVN||[]).find(p=>p.id===id);
}
// Search across ALL months (for rating cells that fire after navigation)
function getPjGlobal(id) {
  for (const mid of Object.keys(D.months)) {
    const m = D.months[mid];
    const found = (m.projects||[]).find(p=>p.id===id) || (m.projectsVN||[]).find(p=>p.id===id);
    if (found) return found;
  }
  return null;
}

function totalNew(p) {
  const a=(p.records||[]).filter(r=>r.status==='new').reduce((s,r)=>s+(r.qty||0),0);
  const b=(p.groups||[]).flatMap(g=>g.rows||[]).filter(r=>r.status==='new').reduce((s,r)=>s+(r.qty||0),0);
  return a+b;
}
function totalRev(p) {
  const a=(p.records||[]).filter(r=>r.status==='rev').reduce((s,r)=>s+(r.qty||0),0);
  const b=(p.groups||[]).flatMap(g=>g.rows||[]).filter(r=>r.status==='rev').reduce((s,r)=>s+(r.qty||0),0);
  return a+b;
}
function totalOT(p) {
  const a=(p.otLog||[]).reduce((s,e)=>s+(e.hours||0),0);
  const b=(p.groups||[]).flatMap(g=>g.rows||[]).reduce((s,r)=>s+(r.ot||0),0);
  return a+b;
}

/* PAGE NAV */
function showPage(pg) {
  // Block restricted pages for non-admin roles
  const sessionRole = sessionStorage.getItem('splash_role') || 'admin';

    if(el) el.style.display = p===pg?(p==='main'?'flex':'block'):'none';
    const btn=document.getElementById('nav'+p.charAt(0).toUpperCase()+p.slice(1));

  });

  const btnVN=document.getElementById('navMainVN');
  const btnJP=document.getElementById('navMain');
  if(btnVN&&btnJP&&pg==='main'){
    btnVN.classList.toggle('active', activeSection==='vn');
    btnJP.classList.toggle('active', activeSection==='jp');
  }
  if(pg==='dashboard') renderDashboard();
  else if(pg==='staff') renderStaffPage();
  else if(pg==='settings') renderSettings();
  else if(pg==='main') { activePjId=null; renderContent(); }
}

function setSection(sec) {
  activeSection = sec;
  activePjId = null;

  const btnVN=document.getElementById('navMainVN');
  const btnJP=document.getElementById('navMain');

  if(btnJP) btnJP.classList.toggle('active', sec==='jp');

/* MONTH STRIP */
function renderMonthStrip() {
  const strip=document.getElementById('monthStrip');
  const months=Object.keys(D.months).sort();
  strip.innerHTML=months.map(mid=>`
    <button class="mtab ${mid===D.activeMonth?'active':''}" onclick="switchMonth('${mid}')">
      ${monthLabel(mid)}
    </button>`).join('')+`<button class="mtab mtab-add" onclick="addMonth()" title="Thêm tháng mới">＋</button>`;
  const staffSel=document.getElementById('staffMonth');
  if(staffSel) staffSel.innerHTML=months.map(mid=>`<option value="${mid}" ${mid===D.activeMonth?'selected':''}>${monthLabel(mid)}</option>`).join('');
  const dashY=document.getElementById('dashYear');
  if(dashY){
    const years=[...new Set(months.map(m=>m.split('-')[0]))].sort();
    dashY.innerHTML=years.map(y=>`<option value="${y}">${y}</option>`).join('');
    dashY.value=new Date().getFullYear().toString();
  }
}

function switchMonth(mid) { D.activeMonth=mid; activePjId=null; save(); renderSidebar(); renderContent(); }
function addMonth() {
  const months = Object.keys(D.months).sort();
  const last = months[months.length - 1] || D.activeMonth;
  let [y, m] = last.split('-').map(Number);
  m++; if (m > 12) { m = 1; y++; }
  const newMid = y + '-' + String(m).padStart(2, '0');
  const newMidStr = monthLabel(newMid);
  const curMidStr = monthLabel(last);

  // Count stats to show in confirm dialog
  const allPjs    = [...(D.months[last]?.projects||[]), ...(D.months[last]?.projectsVN||[])];
  const pjCount   = allPjs.length;
  const photoCount = allPjs.reduce((s,p)=>(p.photos||[]).filter(Boolean).length+s, 0);

  // Count projects with active timeline (dateFrom or dateTo extends into new month)
  const newMidStart = newMid + '-01';
  const activeTimeline = allPjs.filter(p =>
    (p.groups||[]).some(g =>
      (g.rows||[]).some(r => r.dateTo && r.dateTo >= newMidStart)
    )
  ).length;

  showModal(`
    <h3>📅 Sang tháng mới — ${newMidStr}</h3>

    <div style="background:#f0f7ff;border-radius:10px;padding:14px 16px;margin-bottom:14px;font-size:12px;line-height:1.85;color:#1F3864">
      <div style="font-weight:700;font-size:13px;margin-bottom:8px">Hệ thống sẽ thực hiện:</div>
      <div style="display:flex;flex-direction:column;gap:5px">
        <div>📋 <strong>${pjCount} dự án</strong> sẽ được copy sang tháng mới (tên, văn phòng, liên hệ, hạng mục)</div>
        <div>🔄 Số lượng mới/sửa, đánh giá nhân viên sẽ <strong>reset về 0</strong></div>
        <div>🖼 <strong>${photoCount} ảnh</strong> được copy sang tháng mới, ảnh tháng cũ sẽ <strong>bị xóa</strong></div>
        ${activeTimeline > 0
          ? `<div style="color:#27ae60">✅ <strong>${activeTimeline} dự án</strong> có timeline kéo sang tháng mới — <strong>giữ nguyên lịch UP</strong></div>`
          : ''}
      </div>
    </div>

    <div style="background:#fff8e1;border-radius:8px;padding:10px 14px;margin-bottom:14px;font-size:11px;color:#856404">
      ⚡ Dự án tháng cũ vẫn xem được — bấm tab tháng cũ để xem lại lịch sử
    </div>

    <div class="modal-ft">
      <button class="btn" onclick="closeModal()">Hủy</button>
      <button class="btn btn-gold" onclick="closeModal();doAddMonth('${last}','${newMid}')">
        ✓ Xác nhận sang tháng ${newMidStr}
      </button>
    </div>
  `);
}

function doAddMonth(prevMid, newMid) {
  const newMidStart = newMid + '-01';

  // ── Copy dự án sang tháng mới ──
  function copyProjects(srcList) {
    return srcList.map(p => {
      // Kiểm tra có timeline kéo sang tháng mới không
      const hasActiveTimeline = (p.groups||[]).some(g =>
        (g.rows||[]).some(r => r.dateTo && r.dateTo >= newMidStart)
      );

      const newGroups = (p.groups||[]).map(g => ({
        ...g,
        rows: (g.rows||[]).map(r => {
          const rowActive = r.dateTo && r.dateTo >= newMidStart;
          return {
            ...r,
            // Reset số lượng và đánh giá
            qty: 0,
            ot: 0, otNote: '',
            // Reset rating fields
            rate0:0,rate1:0,rate2:0,rate3:0,rate4:0,rate5:0,
            rate6:0,rate7:0,rate8:0,rate9:0,
            rate10:0,rate11:0,rate12:0,rate13:0,
            note: '',
            // Giữ nguyên timeline nếu đang active, xóa nếu đã qua
            dateFrom: rowActive ? r.dateFrom : '',
            dateTo:   rowActive ? r.dateTo   : '',
          };
        })
      }));

      return {
        id: 'pj_' + Date.now() + '_' + Math.random().toString(36).slice(2,7),
        nameJP:    p.nameJP    || '',
        nameVN:    p.nameVN    || '',
        office:    p.office    || '',
        contact:   p.contact   || '',
        mainStaff: p.mainStaff || '',
        groups:    newGroups,
        photos:    (p.photos||[]).filter(Boolean), // copy ảnh sang tháng mới
        otLog:     [],
        notes:     '',
      };
    });
  }

  // Tạo tháng mới với dự án đã copy
  const srcMonth = D.months[prevMid] || {};
  D.months[newMid] = {
    projects:   copyProjects(srcMonth.projects   || []),
    projectsVN: copyProjects(srcMonth.projectsVN || []),
    targetNew:  srcMonth.targetNew || 0,
    targetRev:  srcMonth.targetRev || 0,
  };

  // ── Xóa ảnh tháng cũ (prevMid) ──
  [...(D.months[prevMid]?.projects||[]),...(D.months[prevMid]?.projectsVN||[])].forEach(p => {
    p.photos = [];
  });

  D.activeMonth = newMid;
  activePjId = null;
  persistD();
  closeModal();
  renderAll();

  const newPjCount = (D.months[newMid].projects.length) + (D.months[newMid].projectsVN.length);
  toast(`✓ Sang tháng ${monthLabel(newMid)} — ${newPjCount} dự án được copy, ảnh tháng cũ đã xóa`, 4000);
  setTimeout(checkStorageAndWarn, 800);
}

function showStorageStatus() {
  try {
    const data = localStorage.getItem(SK) || '';
    const kb = Math.round(data.length * 0.75 / 1024);
    const mb = (kb / 1024).toFixed(1);
    const pct = Math.round(kb / 51200 * 100); // 50MB estimate
    const color = pct > 80 ? '#c00' : pct > 50 ? '#E67E22' : '#27AE60';
    toast(`💾 Dung lượng: ${mb}MB / ~5MB (${pct}%)`, 4000);
  } catch(e) {}
}

/* SIDEBAR */
function renderSidebar() {
  const pjs = curProjects();
  document.getElementById('pjCount').textContent = pjs.length;
  const _hdEl=document.getElementById('sidebarHd');
  if(_hdEl&&_hdEl.childNodes[0]) _hdEl.childNodes[0].nodeValue=(activeSection==='vn'?'Dự án VN ':'Dự án JP ');
  const _addBtn=document.getElementById('addPjBtn');
  if(_addBtn) _addBtn.textContent='\uFF0B '+(activeSection==='vn'?'Dự án VN 🇻🇳':'Dự án Nhật 🇯🇵');
  const list = document.getElementById('pjList');
  if (!pjs.length) {
    list.innerHTML = '<div style="padding:20px 10px;text-align:center;color:var(--gray4);font-size:11px;line-height:1.7">Chưa có dự án<br><span style="font-size:10px">Nhấn + Thêm dự án</span></div>';
    return;
  }
  const today = localDateStr(new Date());
  const tomorrow = localDateStr(new Date(Date.now() + 86400000));

  // Lọc và sắp xếp: ẩn dự án đã hoàn thành từ hôm qua trở về trước
  const visiblePjs = pjs;

  list.innerHTML = visiblePjs.map((p, i) => {
    const thumb = (p.photos || []).find(Boolean);
    const tn = totalNew(p), tr = totalRev(p), ot = totalOT(p);
    const thumbHtml = thumb ? `<img src="${thumb}" alt="">` : `<div class="pj-thumb-ph">🏗</div>`;

    const allRows = (p.groups||[]).flatMap(g=>g.rows||[]).filter(r=>r.dateTo);

    // Hàng có dateTo = hôm nay
    const todayRows = allRows.filter(r => r.dateTo === today);
    // Hàng đang active (lịch kéo qua hôm nay)
    const activeRows = (p.groups||[]).flatMap(g=>g.rows||[]).filter(r => {
      if (!r.staff) return false;
      const from = r.dateFrom||r.dateTo, to = r.dateTo||r.dateFrom;
      return from && to && from <= today && to >= today;
    });

    // Kiểm tra hoàn thành: tất cả hàng có dateTo <= hôm nay đã UP hết
    const dueRows = allRows.filter(r => r.dateTo <= today);
    const allDueUpped = dueRows.length > 0 && dueRows.every(r => r.doneAt);
    // Có hàng nào hôm nay mà chưa UP không?
    const hasPendingToday = todayRows.some(r => !r.doneAt);

    const isFullyDone = allDueUpped && !hasPendingToday;
    const isActive = activeRows.length > 0 && !isFullyDone;
    const activeStaff = [...new Set(activeRows.map(r=>r.staff))];

    // Badge trạng thái
    let statusBadge = '';
    if (isFullyDone) {
      statusBadge = `<div style="position:absolute;top:5px;right:5px;background:#fff;border:1px solid #FFC000;border-radius:99px;padding:1px 5px;font-size:8px;font-weight:700;color:#FFC000">✓ Hoàn thành</div>`;
    } else if (isActive) {
      statusBadge = `<div style="position:absolute;top:5px;right:5px;background:#27ae60;border-radius:99px;padding:1px 5px;font-size:8px;font-weight:700;color:#fff">● Đang làm</div>`;
    }

    // ── Phân loại mức độ ưu tiên hiển thị ──
    const allRowsAll = (p.groups||[]).flatMap(g=>g.rows||[]);
    const hasTodayUp  = allRowsAll.some(r => r.dateTo === today && !r.doneAt);
    const hasFutureUp = allRowsAll.some(r => r.dateTo > today);
    const hasAnySchedule = allRowsAll.some(r => r.dateTo);
    const allUpped = hasAnySchedule && allRowsAll.filter(r=>r.dateTo).every(r=>r.doneAt);

    // Mức 1: Hôm nay UP — nổi bật nhất
    // Mức 2: Có lịch tương lai — sáng bình thường
    // Mức 3: Đã UP hết hoặc không có lịch — mờ xuống
    const cardOpacity = hasTodayUp ? '1'
      : hasFutureUp  ? '0.95'
      : allUpped     ? '0.45'
      : !hasAnySchedule ? '0.5'
      : '0.85';

    const cardFilter = hasTodayUp ? ''
      : hasFutureUp  ? ''
      : 'filter:saturate(0.4) brightness(0.85);';

    const cardScale = hasTodayUp ? 'transform:scale(1.01);' : '';

    // Viền card theo mức ưu tiên
    const cardBorder = hasTodayUp
      ? 'border-color:#e74c3c;box-shadow:0 0 0 2px rgba(231,76,60,.3),0 4px 12px rgba(231,76,60,.2)'
      : isFullyDone
      ? 'border-color:#FFC000;box-shadow:0 0 0 2px rgba(255,192,0,.25)'
      : isActive
      ? 'border-color:var(--gold);box-shadow:0 0 0 2px rgba(255,192,0,.2)'
      : hasFutureUp
      ? 'border-color:#c8d6e5'
      : 'border-color:#e8e8e8';

    // Staff avatars
    const staffAvatars = activeStaff.slice(0,4).map(s=>{
      const initials = s.replace(/[A-Z]{2,3}\s/,'').charAt(0).toUpperCase();
      const color = ['#70AD47','#4472C4','#ED7D31','#9B59B6'][activeStaff.indexOf(s)%4];
      return `<span title="${s}" style="width:18px;height:18px;border-radius:50%;background:${color};color:#fff;font-size:9px;font-weight:700;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0">${initials}</span>`;
    }).join('');

    return `<div class="pj-card ${p.id === activePjId ? 'active' : ''}" onclick="selectPj('${p.id}')"
      style="${cardBorder};opacity:${cardOpacity};${cardFilter}${cardScale}transition:all .2s">
      <div class="pj-thumb">
        ${thumbHtml}
        <div class="pj-thumb-num">${i + 1}</div>
        ${statusBadge}
      </div>
      <div class="pj-card-body">
        <div class="pj-card-name">${x(p.nameVN || p.nameJP || '—')}</div>
        ${p.nameJP && p.nameVN ? `<div class="pj-card-name-jp">${x(p.nameJP)}</div>` : ''}
        <div class="pj-card-sub">
          <span class="badge ${officeBadgeClass(p.office)}" style="font-size:9px">${p.office || '—'}</span>
          <div style="display:flex;gap:3px">
            <span class="chip chip-new" style="font-size:9px;padding:1px 5px">作成 ${tn}</span>
            <span class="chip chip-gold" style="font-size:9px;padding:1px 5px">修正 ${tr}</span>
            ${ot > 0 ? `<span class="chip" style="font-size:9px;padding:1px 5px;background:#fde8d8;color:#7f3500">⏱${ot.toFixed(0)}h</span>` : ''}
          </div>
        </div>
        ${isActive && staffAvatars ? `<div style="display:flex;gap:2px;margin-top:4px;align-items:center;flex-wrap:wrap">${staffAvatars}<span style="font-size:9px;color:var(--gray4);margin-left:2px">${activeStaff.length > 4 ? '+' + (activeStaff.length-4) + ' người' : ''}</span></div>` : ''}
      </div>
    </div>`;
  }).join('');
}

function selectPj(id) { activePjId=id; renderSidebar(); renderContent(); }

/* CONTENT */
function renderContent() {
  const ci = document.getElementById('contentInner');
  if (activePjId) {
    const p = getPj(activePjId);
    if (!p) { activePjId = null; renderContent(); return; }
    try {
      renderHeroStats(ci);
      const detailDiv = document.getElementById('pjDetailArea');
      if (detailDiv) renderProjectDetail(detailDiv, p);
      updateHeroForProject(p);
    } catch(e) {
      console.error('renderContent error:', e);
      if (ci) ci.innerHTML = `<div style="padding:20px;color:#e74c3c;font-size:12px">
        ⚠ Lỗi render dự án: ${e.message}<br>
        <small style="color:#888">${e.stack?.split('\n')[1]||''}</small>
      </div>`;
    }
  } else {
    renderMonthOverview(ci);
  }
}

function renderHeroStats(ci) {
  const pjs = curProjects();
  const m = curMonth();
  const sumNew = pjs.reduce((s,p) => s + totalNew(p), 0);
  const sumRev = pjs.reduce((s,p) => s + totalRev(p), 0);
  const tgtNew = m.targetNew || 0, tgtRev = m.targetRev || 0;
  const tgtAll = tgtNew + tgtRev;
  const pctNew = tgtNew > 0 ? Math.min(100, Math.round(sumNew / tgtNew * 100)) : 0;
  const pctRev = tgtRev > 0 ? Math.min(100, Math.round(sumRev / tgtRev * 100)) : 0;

  const smPerf = {};
  D.settings.staffList.forEach(s => smPerf[s] = 0);
  pjs.forEach(p => {
    (p.groups||[]).flatMap(g => g.rows||[]).forEach(r => { if(r.staff && smPerf[r.staff] !== undefined) smPerf[r.staff] += (r.qty||0); });
    (p.records||[]).forEach(r => { if(r.staff && smPerf[r.staff] !== undefined) smPerf[r.staff] += (r.qty||0); });
  });
  const maxPerf = Math.max(1, ...Object.values(smPerf));
  const activePerf = D.settings.staffList.filter(s => smPerf[s] > 0).sort((a,b) => smPerf[b] - smPerf[a]);

  ci.innerHTML = `
  <div id="heroStatsRow" class="hero-row" style="grid-template-columns:1fr 1fr 1fr auto">
    <div class="hero-box green">
      <div class="hero-num" id="heroSumNew">${sumNew}</div>
      <div class="hero-lbl">作成 — Làm mới</div>
      <div class="progress-track"><div class="progress-fill green" id="prgNew" style="width:${pctNew}%"></div></div>
      <div class="progress-label"><span>${pctNew}% mục tiêu</span><span>${sumNew}/${tgtNew}</span></div>
    </div>
    <div class="hero-box gold">
      <div class="hero-num" id="heroSumRev">${sumRev}</div>
      <div class="hero-lbl">修正 — Sửa lại</div>
      <div class="progress-track"><div class="progress-fill gold" id="prgRev" style="width:${pctRev}%"></div></div>
      <div class="progress-label"><span>${pctRev}% mục tiêu</span><span>${sumRev}/${tgtRev}</span></div>
    </div>
    <div class="hero-box navy">
      <div style="font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--gold2);font-weight:700;margin-bottom:8px">⚡ Hiệu suất nhân sự</div>
      ${activePerf.length ? activePerf.slice(0,6).map(s => `
        <div class="perf-bar">
          <div class="perf-bar-row">
            <span style="color:rgba(255,255,255,.85);font-weight:500">${s}</span>
            <span style="color:var(--gold);font-weight:700">${smPerf[s]}</span>
          </div>
          <div class="perf-bar-track">
            <div class="perf-bar-new" style="width:${Math.round(smPerf[s]/maxPerf*100)}%"></div>
          </div>
        </div>`).join('')
      : '<div style="font-size:11px;color:rgba(255,255,255,.4);text-align:center;padding:6px 0">Chưa có dữ liệu</div>'}
    </div>
    <div class="target-box">
      <div class="tgt-title">🎯 Mục tiêu tháng</div>
      <div class="target-row">
        <label>作成 Mới</label>
        <input class="target-input" type="number" value="${tgtNew}" min="0" id="tgtN" onchange="updateMonthTarget('targetNew',+this.value)">
      </div>
      <div class="target-row">
        <label>修正 Sửa</label>
        <input class="target-input" type="number" value="${tgtRev}" min="0" id="tgtR" onchange="updateMonthTarget('targetRev',+this.value)">
      </div>
      <div style="font-size:10px;color:rgba(255,255,255,.5);margin-top:4px" id="tgtTotal">Tổng = ${tgtAll} phối cảnh</div>
    </div>
  </div>
  <div id="pjDetailArea"></div>
  `;
}

/* MONTH OVERVIEW */
function renderProjectTimeline(pjs) {
  const m     = D.activeMonth;
  const [yr, mo] = m.split('-').map(Number);
  const daysInMonth = new Date(yr, mo, 0).getDate();
  const todayStr = localDateStr(new Date());
  const holidaySet = new Set(getHolidays().map(h => h.date || h));
  const isVN = activeSection === 'vn';

  const CB = '1px solid #ddd';
  const PB = '2px solid #aaa';

  // Day headers — T7+CN+ngày lễ đỏ
  const dayHeaders = Array.from({length: daysInMonth}, (_,i) => {
    const d   = i + 1;
    const ds  = `${yr}-${String(mo).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dow = new Date(yr, mo-1, d).getDay();
    const isToday = ds === todayStr;
    const isHol   = holidaySet.has(ds) || dow===0 || dow===6;
    const col  = isToday ? '#27ae60' : isHol ? '#e74c3c' : 'var(--gray4)';
    const bg   = isToday ? 'rgba(39,174,96,.1)' : isHol ? 'rgba(231,76,60,.06)' : '';
    return `<th style="width:14px;padding:2px 0;text-align:center;font-size:8px;font-weight:600;color:${col};border-bottom:${PB};border-left:${CB};${bg?'background:'+bg:''};white-space:nowrap">${d}</th>`;
  }).join('');

  // Day cell builder
  function dayCell(ds, barColor, pos, label, isToday, isHol, isLast, showUp) {
    const bg = isToday ? 'rgba(39,174,96,.07)' : isHol ? 'rgba(231,76,60,.04)' : 'var(--table-bg)';
    const br = pos==='start'?'2px 0 0 2px':pos==='end'?'0 2px 2px 0':pos==='only'?'2px':'0';
    const labelHtml = (pos==='start' && label)
      ? `<div style="position:absolute;top:0;left:2px;font-size:6px;color:${barColor};white-space:nowrap;line-height:1;font-weight:700;z-index:10;pointer-events:none;text-shadow:0 0 3px #fff,0 0 3px #fff,0 0 3px #fff">${label}</div>`
      : '';
    const bar = barColor
      ? `<div style="position:absolute;top:50%;transform:translateY(-50%);left:0;right:0;height:3px;background:${barColor};border-radius:${br}"></div>${labelHtml}`
      : '';
    const upHtml = (isToday && showUp)
      ? `<div style="position:absolute;top:1px;left:0;right:0;text-align:center;font-size:7px;font-weight:900;color:#e74c3c;line-height:1;z-index:11;text-shadow:0 0 3px #fff,0 0 3px #fff">UP</div>`
      : '';
    return `<td style="width:14px;padding:0;position:relative;overflow:visible;background:${bg};border-left:${CB};border-bottom:${isLast?PB:CB}"><div style="height:16px;position:relative;overflow:visible">${bar}${upHtml}</div></td>`;
  }

  // Sắp xếp dự án: 大阪 trước, 東京 sau
  const OFFICE_ORDER = ['大阪','東京'];
  const sorted = [...pjs].sort((a,b)=>{
    const ia=OFFICE_ORDER.indexOf(a.office||''), ib=OFFICE_ORDER.indexOf(b.office||'');
    if(ia===-1&&ib===-1) return 0; if(ia===-1) return 1; if(ib===-1) return -1;
    return ia-ib;
  });

  const rows = sorted.map((p, pi) => {
    const allGrpRows = (p.groups||[]).filter(g => g.type || (g.rows||[]).some(r=>r.qty>0));
    const allDone = allGrpRows.length>0 && allGrpRows.every(g=>(g.rows||[]).filter(r=>r.dateTo).every(r=>r.doneAt)) && allGrpRows.some(g=>(g.rows||[]).some(r=>r.dateTo));
    const rowDim = allDone ? 'opacity:0.5' : '';

    // Project name row (no timeline)
    const pjRow = `<tr style="${rowDim}">
      <td style="padding:2px 4px 1px 4px;border-bottom:none;border-right:${CB};border-left:${CB};background:var(--table-bg)">
        <span class="badge ${officeBadgeClass(p.office)}" style="font-size:8px;padding:1px 4px">${p.office||'—'}</span>
      </td>
      <td style="padding:4px 4px 1px;border-bottom:none;border-right:${CB};background:var(--table-bg);max-width:175px;overflow:hidden">
        <div style="font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:170px;cursor:pointer;color:var(--navy)"
          onclick="selectPj('${p.id}')" title="${x(p.nameVN||p.nameJP||'—')}">${x(p.nameVN||p.nameJP||'—')}</div>
      </td>
      <td style="padding:2px 3px 1px;border-bottom:none;border-right:${CB};text-align:right;font-size:8px;background:var(--table-bg)"></td>
      <td style="padding:2px 3px 1px;border-bottom:none;border-right:${CB};text-align:right;font-size:8px;background:var(--table-bg)"></td>
      ${Array.from({length:daysInMonth},(_,i)=>{
        const d=i+1, ds=`${yr}-${String(mo).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const dow=new Date(yr,mo-1,d).getDay();
        const isToday=ds===todayStr, isHol=holidaySet.has(ds)||dow===0||dow===6;
        const bg=isToday?'rgba(39,174,96,.07)':isHol?'rgba(231,76,60,.04)':'var(--table-bg)';
        return `<td style="width:14px;padding:0;background:${bg};border-left:${CB};border-bottom:none"><div style="height:8px"></div></td>`;
      }).join('')}
      <td style="border-bottom:none;border-left:${CB};background:var(--table-bg)"></td>
    </tr>`;

    // Group rows
    const grpRows = allGrpRows.map((g, gi) => {
      const isLastGrp = gi === allGrpRows.length - 1;
      const rowBorderB = isLastGrp ? PB : CB;
      const grpNew = (g.rows||[]).filter(r=>r.status==='new').reduce((s,r)=>s+(r.qty||0),0);
      const grpRev = (g.rows||[]).filter(r=>r.status==='rev').reduce((s,r)=>s+(r.qty||0),0);
      const grpAllDone = (g.rows||[]).some(r=>r.dateTo) && (g.rows||[]).filter(r=>r.dateTo).every(r=>r.doneAt);
      // Có lịch UP chưa done VÀ dateTo >= hôm nay (không tính quá hạn)
      const grpHasPendingUp = (g.rows||[]).some(r=>r.dateTo && !r.doneAt && r.dateTo >= todayStr);
      // Opacity: done→mờ, có UP pending→sáng, không có UP→mờ nhẹ
      const grpOpacity = grpAllDone ? '0.45' : grpHasPendingUp ? '1' : (rowDim ? '0.55' : '0.5');
      // Màu tên hạng mục: khớp với status của row đang pending (mới=xanh, sửa=vàng)
      const pendingRow = (g.rows||[]).find(r=>r.dateTo && !r.doneAt && r.dateTo >= todayStr);
      const grpNameColor = grpAllDone ? '#aaa' : grpHasPendingUp
        ? (isVN
            ? (pendingRow?.status==='new' ? '#7c3aed' : '#db2777')
            : (pendingRow?.status==='new' ? '#5a9a35' : '#d4900a'))
        : '#bbb';
      const grpNameWeight = grpHasPendingUp && !grpAllDone ? '700' : '400';

      const dayCells = Array.from({length:daysInMonth}, (_,i) => {
        const d  = i+1;
        const ds = `${yr}-${String(mo).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const dow = new Date(yr,mo-1,d).getDay();
        const isToday = ds===todayStr;
        const isHol   = holidaySet.has(ds)||dow===0||dow===6;

        const activeRow = (g.rows||[]).find(r=>{
          if (!r.dateFrom && !r.dateTo) return false;
          const from=r.dateFrom||r.dateTo, to=r.dateTo||r.dateFrom;
          return from<=ds && ds<=to && !isHol;
        });

        let barColor=null, pos='mid', label='';
        if (activeRow) {
          const from=activeRow.dateFrom||activeRow.dateTo, to=activeRow.dateTo||activeRow.dateFrom;
          const done = !!(activeRow.doneAt);
          const pastDeadline = !!(activeRow.dateTo) && activeRow.dateTo < todayStr;
          // Xám: đã done HOẶC dateTo đã qua hôm nay (kể cả chưa done)
          barColor = (done || pastDeadline) ? '#ccc'
            : isVN ? (activeRow.status==='new'?'#7c3aed':'#db2777')
            :        (activeRow.status==='new'?'#5a9a35':'#d4900a');

          const prevDs=`${yr}-${String(mo).padStart(2,'0')}-${String(d-1).padStart(2,'0')}`;
          const nextDs=`${yr}-${String(mo).padStart(2,'0')}-${String(d+1).padStart(2,'0')}`;
          const pd1=new Date(yr,mo-1,d-1).getDay(), nd1=new Date(yr,mo-1,d+1).getDay();
          const prevHol=d<=1||holidaySet.has(prevDs)||pd1===0||pd1===6;
          const nextHol=d>=daysInMonth||holidaySet.has(nextDs)||nd1===0||nd1===6;
          const isStart=from===ds||prevHol, isEnd=to===ds||nextHol;
          pos=isStart&&isEnd?'only':isStart?'start':isEnd?'end':'mid';
          // Tên hạng mục đầy đủ — không cắt
          if (isStart) label = (g.type||'').replace('パース','').replace('作成','');
        }
        // UP: chỉ hiện đúng ngày hôm nay
        const showUp = isToday && (g.rows||[]).some(r=>r.dateTo===todayStr&&!r.doneAt);
        return dayCell(ds, barColor, pos, label, isToday, isHol, isLastGrp, showUp);
      }).join('');

      // Ghi chú từ tất cả row trong hạng mục
      const notes = (g.rows||[]).map(r=>(r.note||'').trim()).filter(Boolean);

      return `<tr style="opacity:${grpOpacity}">
        <td style="padding:0 4px 0;border-bottom:${rowBorderB};border-right:${CB};border-left:${CB};background:var(--table-bg)"></td>
        <td style="padding:1px 4px 1px;border-bottom:${rowBorderB};border-right:${CB};background:var(--table-bg);vertical-align:middle">
          <div style="font-size:7px;color:${grpNameColor};font-weight:${grpNameWeight};white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:165px;line-height:1.2;font-style:${grpAllDone?'italic':'normal'}">${x(g.type||'—')}${grpAllDone?' ✓':''}</div>
        </td>
        <td style="padding:1px 3px;border-bottom:${rowBorderB};border-right:${CB};text-align:right;font-size:8px;font-weight:600;color:#27ae60;background:var(--table-bg);vertical-align:middle">${grpNew||''}</td>
        <td style="padding:1px 3px;border-bottom:${rowBorderB};border-right:${CB};text-align:right;font-size:8px;font-weight:600;color:#e67e22;background:var(--table-bg);vertical-align:middle">${grpRev||''}</td>
        ${dayCells}
        <td style="padding:1px 5px;border-bottom:${rowBorderB};border-left:${CB};background:var(--table-bg);vertical-align:middle;max-width:90px;overflow:hidden">
